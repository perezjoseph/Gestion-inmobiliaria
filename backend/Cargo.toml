[package]
name = "realestate-backend"
version = "0.1.0"
edition = "2024"

[dependencies]
actix-web = "4"
actix-cors = "0.7"
tokio = { version = "1", features = ["full"] }
sea-orm = { version = "1", features = ["sqlx-postgres", "runtime-tokio-rustls", "macros"] }
sea-orm-migration = { version = "1", features = ["sqlx-postgres", "runtime-tokio-rustls"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
jsonwebtoken = "10"
argon2 = "0.5"
dotenvy = "0.15"
anyhow = "1"
thiserror = "1"
chrono = { version = "0.4", features = ["serde"] }
rust_decimal = { version = "1", features = ["serde-with-str"] }
uuid = { version = "1", features = ["v4", "serde"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
tracing-actix-web = "0.7"
actix-governor = "0.6"
actix-multipart = "0.7"
actix-files = "0.6"
futures-util = "0.3"
genpdf = "0.2"
rust_xlsxwriter = "0.94"
csv = "1"
calamine = "0.34"

[dev-dependencies]
proptest = "1"
