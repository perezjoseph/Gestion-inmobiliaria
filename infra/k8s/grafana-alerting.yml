# Grafana alerting provisioning: contact points, notification policies, and alert rules.
# Mounted into /etc/grafana/provisioning/alerting/ in the Grafana pod.
#
# PREREQUISITE: The alertmanager-github secret must exist in the monitoring namespace
# (already created for the alertmanager-github-bridge deployment):
#
#   kubectl create secret generic alertmanager-github \
#     --namespace monitoring \
#     --from-literal=token=ghp_YOUR_FINE_GRAINED_PAT
#
# The GITHUB_REPO env var is set directly on the Grafana deployment (monitoring.yml).
#
# After editing, apply with:
#   kubectl apply -f infra/k8s/grafana-alerting.yml
#   kubectl rollout restart deployment/grafana -n monitoring
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-alerting-provisioning
  namespace: monitoring
data:
  alerting.yml: |
    apiVersion: 1
    contactPoints:
      - orgId: 1
        name: GitHub Autofix Dispatch
        receivers:
          - uid: github-autofix-webhook
            type: webhook
            disableResolveMessage: true
            settings:
              url: https://api.github.com/repos/${GITHUB_REPO}/dispatches
              httpMethod: POST
              authorization_scheme: Bearer
              authorization_credentials: ${GITHUB_DISPATCH_TOKEN}
              maxAlerts: "1"
              message: >-
                {{ define "payload" }}{
                  "event_type": "grafana-alert",
                  "client_payload": {
                    "alertname": "{{ (index .Alerts 0).Labels.alertname }}",
                    "severity": "{{ (index .Alerts 0).Labels.severity }}",
                    "container": "{{ (index .Alerts 0).Labels.container }}",
                    "namespace": "realestate",
                    "summary": "{{ (index .Alerts 0).Annotations.summary }}",
                    "description": "{{ (index .Alerts 0).Annotations.description }}",
                    "fingerprint": "{{ (index .Alerts 0).Fingerprint }}"
                  }
                }{{ end }}{{ template "payload" . }}

    policies:
      - orgId: 1
        receiver: grafana-default-email
        group_by: ['grafana_folder', 'alertname']
        routes:
          - receiver: GitHub Autofix Dispatch
            object_matchers:
              - ['autofix', '=', 'true']
            group_wait: 30s
            group_interval: 5m
            repeat_interval: 1h
            continue: true

    groups:
      - orgId: 1
        name: runtime-autofix
        folder: Autofix Alerts
        interval: 1m
        rules:
          - uid: backend-error-rate-spike
            title: Backend Error Rate Spike
            condition: C
            for: 0s
            noDataState: OK
            execErrState: Alerting
            labels:
              autofix: "true"
              container: backend
              severity: critical
            annotations:
              summary: Backend error log rate exceeds threshold
              description: >-
                The backend container is producing error-level log lines.
                This indicates a runtime crash or recurring panic.
            data:
              - refId: A
                datasourceUid: P8E80F9AEF21F6940
                relativeTimeRange:
                  from: 300
                  to: 0
                model:
                  expr: 'sum(count_over_time({container="backend", namespace="realestate", level=~"(?i)error|panic|fatal"}[5m]))'
                  queryType: instant
                  refId: A
              - refId: B
                datasourceUid: __expr__
                relativeTimeRange:
                  from: 0
                  to: 0
                model:
                  type: reduce
                  expression: A
                  reducer: last
                  refId: B
              - refId: C
                datasourceUid: __expr__
                relativeTimeRange:
                  from: 0
                  to: 0
                model:
                  type: threshold
                  expression: B
                  refId: C
                  conditions:
                    - evaluator:
                        type: gt
                        params: [0]

          - uid: baileys-error-rate-spike
            title: Baileys Error Rate Spike
            condition: C
            for: 0s
            noDataState: OK
            execErrState: Alerting
            labels:
              autofix: "true"
              container: baileys
              severity: warning
            annotations:
              summary: Baileys error log rate exceeds threshold
              description: >-
                The baileys WhatsApp sidecar container is producing error
                logs, indicating message processing failures or connection
                issues.
            data:
              - refId: A
                datasourceUid: P8E80F9AEF21F6940
                relativeTimeRange:
                  from: 300
                  to: 0
                model:
                  expr: 'sum(count_over_time({container="baileys", namespace="realestate", level=~"(?i)error|panic|fatal"}[5m]))'
                  queryType: instant
                  refId: A
              - refId: B
                datasourceUid: __expr__
                relativeTimeRange:
                  from: 0
                  to: 0
                model:
                  type: reduce
                  expression: A
                  reducer: last
                  refId: B
              - refId: C
                datasourceUid: __expr__
                relativeTimeRange:
                  from: 0
                  to: 0
                model:
                  type: threshold
                  expression: B
                  refId: C
                  conditions:
                    - evaluator:
                        type: gt
                        params: [0]
