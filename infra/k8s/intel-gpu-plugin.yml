apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: intel-gpu-plugin
  namespace: kube-system
  labels:
    app.kubernetes.io/name: intel-gpu-plugin
    app.kubernetes.io/component: device-plugin
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: intel-gpu-plugin
  template:
    metadata:
      labels:
        app.kubernetes.io/name: intel-gpu-plugin
    spec:
      automountServiceAccountToken: false
      nodeSelector:
        kubernetes.io/hostname: coreos
      containers:
        - name: intel-gpu-plugin
          image: intel/intel-gpu-plugin:0.31.1
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
              ephemeral-storage: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
              ephemeral-storage: 64Mi
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          volumeMounts:
            - name: devfs
              mountPath: /dev/dri
              readOnly: true
            - name: sysfs
              mountPath: /sys/class/drm
              readOnly: true
            - name: kubeletsockets
              mountPath: /var/lib/kubelet/device-plugins
      volumes:
        - name: devfs
          hostPath:
            path: /dev/dri
        - name: sysfs
          hostPath:
            path: /sys/class/drm
        - name: kubeletsockets
          hostPath:
            path: /var/lib/kubelet/device-plugins
