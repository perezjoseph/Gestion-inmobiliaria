# Cloudflare Tunnel: exposes the app to the internet without opening ports.
# Prerequisites:
#   1. Create tunnel in Cloudflare Zero Trust dashboard (or via CLI)
#   2. Copy the tunnel token
#   3. Create K8s secret:
#      kubectl -n realestate create secret generic cloudflare-tunnel-credentials \
#        --from-literal=tunnel-token=<TOKEN>
#   4. Ingress rules are configured in the Cloudflare dashboard (token mode)
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared
  namespace: realestate
  labels:
    app.kubernetes.io/name: cloudflared
    app.kubernetes.io/component: tunnel
    app.kubernetes.io/part-of: realestate
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: cloudflared
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cloudflared
        app.kubernetes.io/component: tunnel
        app.kubernetes.io/part-of: realestate
    spec:
      automountServiceAccountToken: false
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      containers:
        - name: cloudflared
          image: cloudflare/cloudflared:2026.5.2
          args:
            - tunnel
            - --metrics
            - 0.0.0.0:2000
            - run
            - --token
            - $(TUNNEL_TOKEN)
          env:
            - name: TUNNEL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: cloudflare-tunnel-credentials
                  key: tunnel-token
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
              ephemeral-storage: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
              ephemeral-storage: 64Mi
          livenessProbe:
            httpGet:
              path: /ready
              port: 2000
            initialDelaySeconds: 10
            periodSeconds: 30
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
