# Example secrets for prod environment.
# Copy this file to secrets.yml and fill in real values.
# DO NOT commit secrets.yml to git.
---
apiVersion: v1
kind: Secret
metadata:
  name: realestate-db-secret
  namespace: realestate
type: Opaque
stringData:
  username: realestate
  password: CHANGE_ME_prod_password
---
apiVersion: v1
kind: Secret
metadata:
  name: realestate-db-url
  namespace: realestate
type: Opaque
stringData:
  DATABASE_URL: postgresql://realestate:CHANGE_ME_prod_password@db:5432/realestate
---
apiVersion: v1
kind: Secret
metadata:
  name: realestate-app-secret
  namespace: realestate
type: Opaque
stringData:
  jwt-secret: CHANGE_ME_prod_jwt_secret_at_least_32_chars
---
apiVersion: v1
kind: Secret
metadata:
  name: realestate-chatbot-secret
  namespace: realestate
type: Opaque
stringData:
  baileys-internal-token: CHANGE_ME_prod_baileys_token
  session-encryption-key: CHANGE_ME_prod_session_key_32chars!!
  wa-database-url: postgresql://whatsapp_session_rw:CHANGE_ME@db:5432/realestate
---
apiVersion: v1
kind: Secret
metadata:
  name: realestate-bcrd-secret
  namespace: realestate
type: Opaque
stringData:
  BCRD_API_TOKEN: CHANGE_ME
---
apiVersion: v1
kind: Secret
metadata:
  name: mailcow-smtp
  namespace: realestate
type: Opaque
stringData:
  SMTP_HOST: mail.myhomeva.us
  SMTP_PORT: "587"
  SMTP_USER: CHANGE_ME
  SMTP_PASS: CHANGE_ME
  SMTP_FROM: no-reply@myhomeva.us
---
apiVersion: v1
kind: Secret
metadata:
  name: cloudflare-tunnel-credentials
  namespace: realestate
type: Opaque
stringData:
  credentials.json: |
    {
      "AccountTag": "CHANGE_ME",
      "TunnelSecret": "CHANGE_ME",
      "TunnelID": "CHANGE_ME"
    }
---
apiVersion: v1
kind: Secret
metadata:
  name: realestate-internal-service-tokens
  namespace: realestate
type: Opaque
stringData:
  ocr-service-token: CHANGE_ME_generate_with_openssl_rand_hex_32
  vllm-api-key: CHANGE_ME_generate_with_openssl_rand_hex_32
