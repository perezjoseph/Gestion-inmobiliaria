# Example secrets for dev environment.
# Copy this file to secrets.yml and fill in real values.
# DO NOT commit secrets.yml to git.
---
apiVersion: v1
kind: Secret
metadata:
  name: realestate-db-secret
  namespace: realestate-dev
type: Opaque
stringData:
  username: realestate_dev
  password: CHANGE_ME_dev_password
---
apiVersion: v1
kind: Secret
metadata:
  name: realestate-db-url
  namespace: realestate-dev
type: Opaque
stringData:
  DATABASE_URL: postgresql://realestate_dev:CHANGE_ME_dev_password@db:5432/realestate
---
apiVersion: v1
kind: Secret
metadata:
  name: realestate-app-secret
  namespace: realestate-dev
type: Opaque
stringData:
  jwt-secret: CHANGE_ME_dev_jwt_secret_at_least_32_chars
---
apiVersion: v1
kind: Secret
metadata:
  name: realestate-chatbot-secret
  namespace: realestate-dev
type: Opaque
stringData:
  baileys-internal-token: CHANGE_ME_dev_baileys_token
  session-encryption-key: CHANGE_ME_dev_session_key_32chars!!
  wa-database-url: postgresql://whatsapp_session_rw:CHANGE_ME@db:5432/realestate
