# Dev environment: accessible via https://gestion.local (LAN only, Traefik)
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: realestate-dev
  namespace: realestate-dev
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`gestion.local`)
      kind: Rule
      services:
        - name: frontend
          port: 8443
          scheme: https
          serversTransport: frontend-transport-dev
---
# HTTP -> HTTPS redirect
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: realestate-dev-http
  namespace: realestate-dev
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`gestion.local`)
      kind: Rule
      middlewares:
        - name: redirect-https-dev
      services:
        - name: frontend
          port: 8443
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: redirect-https-dev
  namespace: realestate-dev
spec:
  redirectScheme:
    scheme: https
    permanent: true
---
apiVersion: traefik.io/v1alpha1
kind: ServersTransport
metadata:
  name: frontend-transport-dev
  namespace: realestate-dev
spec:
  insecureSkipVerify: true
