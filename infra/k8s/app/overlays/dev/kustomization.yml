apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: realestate-dev

resources:
  - ../../base
  - namespace.yml
  - ingress.yml

# Dev shares the prod Postgres instance (different database: realestate_dev).
# The db Deployment/Service/PVC are removed; backend points cross-namespace.
patches:
  # Remove the db Deployment — dev uses the prod Postgres instance
  - target:
      kind: Deployment
      name: db
    patch: |
      $patch: delete
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: db
  # Remove db Service — dev connects cross-namespace
  - target:
      kind: Service
      name: db
    patch: |
      $patch: delete
      apiVersion: v1
      kind: Service
      metadata:
        name: db
  # Remove db PVC — no local storage needed
  - target:
      kind: PersistentVolumeClaim
      name: realestate-db-pvc
    patch: |
      $patch: delete
      apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: realestate-db-pvc
  # Single replica for dev backend
  - target:
      kind: Deployment
      name: backend
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
      - op: replace
        path: /spec/template/spec/containers/0/env/2/value
        value: "development"
      - op: replace
        path: /spec/template/spec/containers/0/env/3/value
        value: "https://gestion.local"

configMapGenerator:
  - name: caddyfile
    files:
      - Caddyfile

images:
  - name: ghcr.io/perezjoseph/realestate-backend
    newTag: latest
  - name: ghcr.io/perezjoseph/realestate-frontend
    newTag: latest
  - name: ghcr.io/perezjoseph/realestate-baileys
    newTag: latest
