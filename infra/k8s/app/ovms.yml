apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ovms-models-pvc
  namespace: realestate
spec:
  storageClassName: local-path
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 25Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ovms
  namespace: realestate
  labels:
    app.kubernetes.io/name: ovms
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: ovms
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ovms
    spec:
      automountServiceAccountToken: false
      nodeSelector:
        kubernetes.io/hostname: inference
      initContainers:
        - name: init-config
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              cp /config-src/config.json /models/config.json
              mkdir -p /models/Qwen3-30B-A3B
              cp /config-src/graph.pbtxt /models/Qwen3-30B-A3B/graph.pbtxt
          volumeMounts:
            - name: models
              mountPath: /models
            - name: ovms-config
              mountPath: /config-src
          securityContext:
            runAsNonRoot: true
            runAsUser: 5000
            runAsGroup: 44
            allowPrivilegeEscalation: false
      containers:
        - name: ovms
          image: openvino/model_server:latest-gpu
          args:
            - "--config_path"
            - "/models/config.json"
            - "--port"
            - "8000"
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: 500m
              memory: 16Gi
              ephemeral-storage: 128Mi
              gpu.intel.com/xe: "1"
            limits:
              cpu: 4000m
              memory: 20Gi
              ephemeral-storage: 512Mi
              gpu.intel.com/xe: "1"
          volumeMounts:
            - name: models
              mountPath: /models
              readOnly: true
          readinessProbe:
            httpGet:
              path: /v1/config
              port: 8000
            initialDelaySeconds: 120
            periodSeconds: 30
            timeoutSeconds: 10
          livenessProbe:
            httpGet:
              path: /v1/config
              port: 8000
            initialDelaySeconds: 180
            periodSeconds: 30
            timeoutSeconds: 10
          securityContext:
            runAsNonRoot: true
            runAsUser: 5000
            runAsGroup: 44
            allowPrivilegeEscalation: false
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: ovms-models-pvc
        - name: ovms-config
          configMap:
            name: ovms-config
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ovms-config
  namespace: realestate
data:
  config.json: |
    {
      "model_config_list": [],
      "mediapipe_config_list": [
        {
          "name": "Qwen3-30B-A3B",
          "base_path": "/models/Qwen3-30B-A3B"
        }
      ]
    }
  graph.pbtxt: |
    input_stream: "HTTP_REQUEST_PAYLOAD:input"
    output_stream: "HTTP_RESPONSE_PAYLOAD:output"

    node: {
      name: "LLMExecutor"
      calculator: "HttpLLMCalculator"
      input_stream: "LOOPBACK:loopback"
      input_stream: "HTTP_REQUEST_PAYLOAD:input"
      input_side_packet: "LLM_NODE_RESOURCES:llm"
      output_stream: "LOOPBACK:loopback"
      output_stream: "HTTP_RESPONSE_PAYLOAD:output"
      input_stream_info: {
        tag_index: 'LOOPBACK:0',
        back_edge: true
      }
      node_options: {
        [type.googleapis.com/mediapipe.LLMCalculatorOptions]: {
          models_path: "/models/Qwen3-30B-A3B/1/model"
          device: "GPU"
          enable_prefix_caching: true
          max_num_batched_tokens: 4096
          cache_size: 8
          plugin_config: "{\"NUM_STREAMS\": 1}"
        }
      }
      input_stream_handler {
        input_stream_handler: "SyncSetInputStreamHandler",
        options {
          [mediapipe.SyncSetInputStreamHandlerOptions.ext] {
            sync_set {
              tag_index: "LOOPBACK:0"
            }
          }
        }
      }
    }
---
apiVersion: v1
kind: Service
metadata:
  name: ovms
  namespace: realestate
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: ovms
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
