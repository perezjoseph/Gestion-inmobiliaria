apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: fdroid-repo-pvc
  namespace: realestate
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fdroid-repo
  namespace: realestate
  labels:
    app: fdroid-repo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fdroid-repo
  template:
    metadata:
      labels:
        app: fdroid-repo
    spec:
      automountServiceAccountToken: false
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 8080
              protocol: TCP
          volumeMounts:
            - name: repo-data
              mountPath: /usr/share/nginx/html
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
            - name: tmp
              mountPath: /tmp
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
              ephemeral-storage: 50Mi
            limits:
              cpu: 100m
              memory: 64Mi
              ephemeral-storage: 100Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 10
          securityContext:
            runAsNonRoot: true
            runAsUser: 101
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
      volumes:
        - name: repo-data
          persistentVolumeClaim:
            claimName: fdroid-repo-pvc
        - name: nginx-config
          configMap:
            name: fdroid-nginx-config
        - name: tmp
          emptyDir:
            sizeLimit: 16Mi
        - name: nginx-cache
          emptyDir:
            sizeLimit: 32Mi
        - name: nginx-run
          emptyDir:
            sizeLimit: 8Mi
---
apiVersion: v1
kind: Service
metadata:
  name: fdroid-repo
  namespace: realestate
  labels:
    app: fdroid-repo
spec:
  selector:
    app: fdroid-repo
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: fdroid-nginx-config
  namespace: realestate
data:
  default.conf: |
    server {
        listen 8080;
        server_name _;
        root /usr/share/nginx/html;

        location /health {
            access_log off;
            return 200 "OK\n";
        }

        location /repo/ {
            autoindex on;
            types {
                application/vnd.android.package-archive apk;
                application/json json;
                application/xml xml;
                application/octet-stream jar;
            }
        }

        location / {
            return 301 /repo/;
        }
    }
