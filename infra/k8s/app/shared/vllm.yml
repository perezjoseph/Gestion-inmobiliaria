apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vllm-models-pvc
  namespace: realestate
spec:
  storageClassName: local-path
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 25Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm
  namespace: realestate
  labels:
    app.kubernetes.io/name: vllm
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: vllm
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vllm
    spec:
      automountServiceAccountToken: false
      nodeSelector:
        kubernetes.io/hostname: inference
      containers:
        - name: vllm
          image: intel/vllm:latest
          command: ["vllm", "serve"]
          args:
            - "Qwen/Qwen3-30B-A3B"
            - "--dtype=bfloat16"
            - "--enforce-eager"
            - "--port"
            - "8000"
            - "--host"
            - "0.0.0.0"
            - "--gpu-memory-util=0.9"
            - "--no-enable-prefix-caching"
            - "--max-model-len=4096"
            - "--max-num-batched-tokens=4096"
            - "--block-size"
            - "64"
            - "--download-dir=/models"
            - "--enable-auto-tool-choice"
            - "--tool-call-parser=hermes"
          ports:
            - containerPort: 8000
          env:
            - name: HOME
              value: /tmp
            - name: HF_HOME
              value: /models
            - name: ZE_FLAT_DEVICE_HIERARCHY
              value: "FLAT"
          resources:
            requests:
              cpu: 500m
              memory: 16Gi
              ephemeral-storage: 128Mi
              gpu.intel.com/xe: "1"
            limits:
              cpu: 4000m
              memory: 20Gi
              ephemeral-storage: 512Mi
              gpu.intel.com/xe: "1"
          volumeMounts:
            - name: models
              mountPath: /models
            - name: shm
              mountPath: /dev/shm
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 300
            periodSeconds: 30
            timeoutSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 600
            periodSeconds: 60
            timeoutSeconds: 10
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: vllm-models-pvc
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: vllm-inference
  namespace: realestate
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: vllm
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
