apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vllm-models-pvc
  namespace: realestate
spec:
  storageClassName: local-path
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 25Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm
  namespace: realestate
  labels:
    app.kubernetes.io/name: vllm
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: vllm
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vllm
    spec:
      automountServiceAccountToken: false
      nodeSelector:
        kubernetes.io/hostname: inference
      containers:
        - name: vllm
          image: intel/vllm:latest
          command: ["python", "-m", "vllm.entrypoints.openai.api_server"]
          args:
            - "--model"
            - "Qwen/Qwen3-30B-A3B"
            - "--host"
            - "0.0.0.0"
            - "--port"
            - "8000"
            - "--dtype"
            - "auto"
            - "--max-model-len"
            - "4096"
            - "--gpu-memory-utilization"
            - "0.95"
            - "--quantization"
            - "bitsandbytes"
            - "--load-format"
            - "bitsandbytes"
            - "--enable-auto-tool-choice"
            - "--tool-call-parser"
            - "hermes"
            - "--reasoning-parser"
            - "deepseek_r1"
            - "--download-dir"
            - "/models"
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: 500m
              memory: 16Gi
              ephemeral-storage: 128Mi
              gpu.intel.com/xe: "1"
            limits:
              cpu: 4000m
              memory: 20Gi
              ephemeral-storage: 512Mi
              gpu.intel.com/xe: "1"
          volumeMounts:
            - name: models
              mountPath: /models
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 120
            periodSeconds: 30
            timeoutSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 180
            periodSeconds: 30
            timeoutSeconds: 10
          env:
            - name: HOME
              value: /tmp
          securityContext:
            allowPrivilegeEscalation: false
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: vllm-models-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: vllm-inference
  namespace: realestate
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: vllm
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
