apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vllm-models-pvc
  namespace: realestate
spec:
  storageClassName: local-path
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 25Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm
  namespace: realestate
  labels:
    app.kubernetes.io/name: vllm
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: vllm
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vllm
    spec:
      automountServiceAccountToken: false
      nodeSelector:
        kubernetes.io/hostname: inference
      containers:
        - name: vllm
          image: intel/vllm:0.17.0-xpu
          command: ["bash", "-c"]
          args:
            - |
              VLLM_WORKER_MULTIPROC_METHOD=spawn vllm serve Intel/Qwen3-30B-A3B-Instruct-2507-int4-AutoRound \
                --dtype=float16 \
                --enforce-eager \
                --port 8000 \
                --host 0.0.0.0 \
                --block-size 64 \
                --gpu-memory-util 0.9 \
                --no-enable-prefix-caching \
                --trust-remote-code \
                --max-num-batched-tokens 4096 \
                --max-model-len 4096 \
                --max-num-seqs 8 \
                --quantization gptq \
                --download-dir /models \
                --enable-auto-tool-choice \
                --tool-call-parser hermes \
                ${VLLM_API_KEY:+--api-key $VLLM_API_KEY}
          ports:
            - containerPort: 8000
          env:
            - name: HOME
              value: /home/vllm
            - name: HF_HOME
              value: /models
            - name: HF_HUB_OFFLINE
              value: "1"
            - name: TRANSFORMERS_OFFLINE
              value: "1"
            - name: SYCL_UR_USE_LEVEL_ZERO_V2
              value: "0"
            - name: PYTORCH_ALLOC_CONF
              value: "expandable_segments:True"
            - name: PYTORCH_CUDA_ALLOC_CONF
              value: "expandable_segments:True"
            - name: ZE_FLAT_DEVICE_HIERARCHY
              value: "FLAT"
            - name: VLLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: realestate-internal-service-tokens
                  key: vllm-api-key
                  optional: true
          resources:
            requests:
              cpu: 500m
              memory: 24Gi
              ephemeral-storage: 128Mi
              gpu.intel.com/xe: "1"
            limits:
              cpu: 4000m
              memory: 32Gi
              ephemeral-storage: 512Mi
              gpu.intel.com/xe: "1"
          volumeMounts:
            - name: models
              mountPath: /models
            - name: shm
              mountPath: /dev/shm
            - name: tmp
              mountPath: /tmp
            - name: home
              mountPath: /home/vllm
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 60
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            periodSeconds: 60
            timeoutSeconds: 10
            failureThreshold: 5
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: vllm-models-pvc
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 10Gi
        - name: tmp
          emptyDir:
            sizeLimit: 256Mi
        - name: home
          emptyDir:
            sizeLimit: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: vllm-inference
  namespace: realestate
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: vllm
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
