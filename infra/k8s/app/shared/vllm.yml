apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vllm-models-pvc
  namespace: realestate
spec:
  storageClassName: local-path
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 25Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm
  namespace: realestate
  labels:
    app.kubernetes.io/name: vllm
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: vllm
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vllm
    spec:
      automountServiceAccountToken: false
      nodeSelector:
        kubernetes.io/hostname: inference
      containers:
        - name: vllm
          image: intelanalytics/ipex-llm-serving-xpu:0.2.0-b2
          command: ["bash", "-c"]
          args:
            - |
              export SYCL_CACHE_PERSISTENT=1
              export SYCL_PI_LEVEL_ZERO_USE_IMMEDIATE_COMMANDLISTS=2
              export VLLM_USE_V1=0
              export LOAD_IN_LOW_BIT="sym_int4"
              export IPEX_LLM_LOWBIT=$LOAD_IN_LOW_BIT
              python -m ipex_llm.vllm.xpu.entrypoints.openai.api_server \
                --port 8000 \
                --model "Qwen/Qwen3-30B-A3B" \
                --served-model-name "Qwen3-30B-A3B" \
                --trust-remote-code \
                --gpu-memory-utilization 0.90 \
                --device xpu \
                --dtype float16 \
                --enforce-eager \
                --load-in-low-bit $LOAD_IN_LOW_BIT \
                --max-model-len 4096 \
                --max-num-batched-tokens 4096 \
                --max-num-seqs 16 \
                --block-size 8 \
                --download-dir /llm/models \
                --disable-async-output-proc \
                --enable-auto-tool-choice \
                --tool-call-parser hermes
          ports:
            - containerPort: 8000
          env:
            - name: HOME
              value: /root
            - name: HF_HOME
              value: /llm/models
          resources:
            requests:
              cpu: 500m
              memory: 16Gi
              ephemeral-storage: 128Mi
              gpu.intel.com/xe: "1"
            limits:
              cpu: 4000m
              memory: 24Gi
              ephemeral-storage: 512Mi
              gpu.intel.com/xe: "1"
          volumeMounts:
            - name: models
              mountPath: /llm/models
            - name: shm
              mountPath: /dev/shm
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 600
            periodSeconds: 30
            timeoutSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 1800
            periodSeconds: 60
            timeoutSeconds: 10
          securityContext:
            privileged: true
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: vllm-models-pvc
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 16Gi
---
apiVersion: v1
kind: Service
metadata:
  name: vllm-inference
  namespace: realestate
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: vllm
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
