apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vllm-models-pvc
  namespace: realestate
spec:
  storageClassName: local-path
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 60Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm
  namespace: realestate
  labels:
    app.kubernetes.io/name: vllm
spec:
  replicas: 1
  progressDeadlineSeconds: 1800
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: vllm
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vllm
    spec:
      automountServiceAccountToken: false
      nodeSelector:
        kubernetes.io/hostname: inference
      containers:
        - name: vllm
          image: intel/llm-scaler-vllm:0.14.0-b8.3.1
          imagePullPolicy: IfNotPresent
          command: ["bash", "-c"]
          args:
            - |
              source /opt/intel/oneapi/setvars.sh --force && \
              vllm serve Qwen/Qwen3-Coder-30B-A3B-Instruct \
                --dtype=float16 \
                --enforce-eager \
                --port 8000 \
                --host 0.0.0.0 \
                --block-size 64 \
                --gpu-memory-util 0.95 \
                --trust-remote-code \
                --max-num-batched-tokens 32768 \
                --max-model-len 32768 \
                --max-num-seqs 12 \
                --quantization sym_int4 \
                --enable-prefix-caching \
                --enable-chunked-prefill \
                --enable-auto-tool-choice \
                --tool-call-parser qwen3_coder \
                --speculative-config '{"method": "ngram", "num_speculative_tokens": 5, "prompt_lookup_max": 10, "prompt_lookup_min": 8}' \
                -tp=1 \
                ${VLLM_API_KEY:+--api-key $VLLM_API_KEY}
          ports:
            - containerPort: 8000
          env:
            - name: HOME
              value: /root
            - name: HF_HOME
              value: /models
            - name: HF_HUB_OFFLINE
              value: "1"
            - name: TRANSFORMERS_OFFLINE
              value: "1"
            - name: VLLM_USE_V1
              value: "1"
            - name: VLLM_ENABLE_V1_MULTIPROCESSING
              value: "0"
            - name: VLLM_ALLOW_LONG_MAX_MODEL_LEN
              value: "1"
            - name: VLLM_WORKER_MULTIPROC_METHOD
              value: "spawn"
            - name: VLLM_OFFLOAD_WEIGHTS_BEFORE_QUANT
              value: "1"
            - name: VLLM_QUANTIZE_Q40_LIB
              value: "/usr/local/lib/python3.12/dist-packages/vllm_int4_for_multi_arc.so"
            - name: SYCL_UR_USE_LEVEL_ZERO_V2
              value: "0"
            - name: PYTORCH_ALLOC_CONF
              value: "expandable_segments:True"
            - name: ZE_FLAT_DEVICE_HIERARCHY
              value: "FLAT"
            - name: ZE_COMMAND_QUEUE_SYNCHRONIZE_TIMEOUT
              value: "4294967295"
            - name: VLLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: realestate-internal-service-tokens
                  key: vllm-api-key
                  optional: true
          resources:
            requests:
              cpu: 500m
              memory: 48Gi
              ephemeral-storage: 128Mi
              gpu.intel.com/xe: "1"
            limits:
              cpu: 4000m
              memory: 60Gi
              ephemeral-storage: 512Mi
              gpu.intel.com/xe: "1"
          volumeMounts:
            - name: models
              mountPath: /models
            - name: shm
              mountPath: /dev/shm
            - name: tmp
              mountPath: /tmp
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 60
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            periodSeconds: 60
            timeoutSeconds: 10
            failureThreshold: 5
          securityContext:
            runAsNonRoot: false
            runAsUser: 0
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: vllm-models-pvc
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 10Gi
        - name: tmp
          emptyDir:
            sizeLimit: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: vllm-inference
  namespace: realestate
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: vllm
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
