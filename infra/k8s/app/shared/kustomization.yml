# Shared resources: deployed once in the 'realestate' namespace,
# accessible by both dev and prod environments cross-namespace.
# These are GPU-bound or singleton services that shouldn't be duplicated.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: realestate

resources:
  - ocr-service.yml
  - vllm.yml
  - fdroid-repo.yml
  - ingress-fdroid.yml

# NOTE: OVMS was removed — vLLM serves the Qwen3 model exclusively now.
# The ovms.yml file is kept for reference but no longer deployed.
