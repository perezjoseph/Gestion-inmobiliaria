apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: uploads-pvc
  namespace: realestate
spec:
  storageClassName: local-path
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 5Gi
---
# NFS server to expose uploads PVC as RWX to multiple backend replicas
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nfs-uploads
  namespace: realestate
  labels:
    app.kubernetes.io/name: nfs-uploads
    app.kubernetes.io/component: storage
    app.kubernetes.io/part-of: realestate
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: nfs-uploads
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nfs-uploads
        app.kubernetes.io/component: storage
        app.kubernetes.io/part-of: realestate
    spec:
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      containers:
        - name: nfs
          image: erichough/nfs-server:2.2.1
          env:
            - name: NFS_EXPORT_0
              value: "/exports *(rw,no_subtree_check,no_root_squash,fsid=0)"
          ports:
            - containerPort: 2049
              name: nfs
          volumeMounts:
            - name: data
              mountPath: /exports
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          securityContext:
            capabilities:
              add: ["SYS_ADMIN"]
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: uploads-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: nfs-uploads
  namespace: realestate
spec:
  selector:
    app.kubernetes.io/name: nfs-uploads
  ports:
    - port: 2049
      targetPort: 2049
---
# PV and PVC backed by the NFS server — mountable by all backend replicas
apiVersion: v1
kind: PersistentVolume
metadata:
  name: uploads-nfs-pv
spec:
  capacity:
    storage: 5Gi
  accessModes: [ReadWriteMany]
  nfs:
    server: nfs-uploads.realestate.svc.cluster.local
    path: /
  mountOptions:
    - nfsvers=4
    - hard
    - intr
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: uploads-nfs-pvc
  namespace: realestate
spec:
  accessModes: [ReadWriteMany]
  storageClassName: ""
  volumeName: uploads-nfs-pv
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: realestate
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: realestate
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: backend
        app.kubernetes.io/component: api
        app.kubernetes.io/part-of: realestate
    spec:
      automountServiceAccountToken: false
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      containers:
        - name: backend
          image: ghcr.io/perezjoseph/realestate-backend:latest # NOSONAR — deploy.yml overrides with pinned digest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          envFrom:
            - secretRef:
                name: realestate-db-url
            # mailcow-smtp secret keys:
            #   SMTP_HOST=mail.myhomeva.us
            #   SMTP_PORT (e.g. 587)
            #   SMTP_USER
            #   SMTP_PASS
            #   SMTP_FROM=no-reply@myhomeva.us
            - secretRef:
                name: mailcow-smtp
          env:
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: realestate-app-secret
                  key: jwt-secret
            - name: SERVER_PORT
              value: "8080"
            - name: ENVIRONMENT
              value: "production"
            - name: CORS_ORIGIN
              value: "https://gestion.local"
            - name: OCR_SERVICE_URL
              value: http://ocr-service:8000
            - name: BAILEYS_SERVICE_URL
              value: http://baileys:3100
            - name: BAILEYS_INTERNAL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: realestate-chatbot-secret
                  key: baileys-internal-token
            - name: BCRD_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: realestate-bcrd-secret
                  key: BCRD_API_TOKEN
            - name: DB_MAX_CONNECTIONS
              value: "5"
            - name: DB_MIN_CONNECTIONS
              value: "1"
            - name: VLLM_ENDPOINT
              value: http://vllm:8000/v1
            - name: VLLM_CHAT_MODEL
              value: /models/Qwen3-30B-A3B-Instruct
            - name: AI_CHAT_TIMEOUT_SECS
              value: "30"
          volumeMounts:
            - name: uploads
              mountPath: /app/uploads
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
              ephemeral-storage: 64Mi
            limits:
              cpu: 500m
              memory: 384Mi
              ephemeral-storage: 256Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: uploads-nfs-pvc
        - name: tmp
          emptyDir:
            sizeLimit: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: realestate
spec:
  selector:
    app.kubernetes.io/name: backend
  ports:
    - port: 8080
      targetPort: 8080
