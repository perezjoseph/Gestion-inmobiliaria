apiVersion: apps/v1
kind: Deployment
metadata:
  name: ovms-ocr
  namespace: realestate
  labels:
    app.kubernetes.io/name: ovms-ocr
    app.kubernetes.io/component: model-server
    app.kubernetes.io/part-of: realestate
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: ovms-ocr
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ovms-ocr
        app.kubernetes.io/component: model-server
        app.kubernetes.io/part-of: realestate
    spec:
      automountServiceAccountToken: false
      nodeSelector:
        kubernetes.io/hostname: coreos
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      initContainers:
        - name: export-models
          image: ghcr.io/perezjoseph/realestate-ocr-service:latest
          command: ["python", "/app/export_models_ovms.py"]
          volumeMounts:
            - name: models
              mountPath: /models
      containers:
        - name: ovms
          image: openvino/model_server:2025.0
          args:
            - --config_path=/config/config.json
            - --port=9000
            - --rest_port=9001
            - --log_level=INFO
          ports:
            - containerPort: 9000
              name: grpc
            - containerPort: 9001
              name: rest
          env:
            - name: OPENVINO_TELEMETRY_ENABLE
              value: "0"
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
              gpu.intel.com/i915: "1"
            limits:
              cpu: 2000m
              memory: 2Gi
              gpu.intel.com/i915: "1"
          readinessProbe:
            httpGet:
              path: /v1/config
              port: 9001
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /v1/config
              port: 9001
            initialDelaySeconds: 60
            periodSeconds: 30
          securityContext:
            runAsNonRoot: true
            runAsUser: 5000
            allowPrivilegeEscalation: false
          volumeMounts:
            - name: models
              mountPath: /models
              readOnly: true
            - name: config
              mountPath: /config
              readOnly: true
      volumes:
        - name: models
          emptyDir:
            sizeLimit: 512Mi
        - name: config
          configMap:
            name: ovms-ocr-config
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ovms-ocr-config
  namespace: realestate
data:
  config.json: |
    {
      "model_config_list": [
        {
          "config": {
            "name": "pp-ocrv5-rec",
            "base_path": "/models/pp-ocrv5-rec",
            "target_device": "GPU",
            "batch_size": "16",
            "shape": "(16,3,48,320)",
            "nireq": 4,
            "plugin_config": {
              "PERFORMANCE_HINT": "THROUGHPUT",
              "NUM_STREAMS": "2",
              "CACHE_DIR": "/models/.cache"
            }
          }
        },
        {
          "config": {
            "name": "pp-ocrv5-det",
            "base_path": "/models/pp-ocrv5-det",
            "target_device": "GPU",
            "shape": "(1,3,640,640)",
            "nireq": 2,
            "plugin_config": {
              "PERFORMANCE_HINT": "LATENCY",
              "NUM_STREAMS": "1",
              "CACHE_DIR": "/models/.cache"
            }
          }
        }
      ]
    }
---
apiVersion: v1
kind: Service
metadata:
  name: ovms-ocr
  namespace: realestate
spec:
  selector:
    app.kubernetes.io/name: ovms-ocr
  ports:
    - port: 9000
      targetPort: 9000
      name: grpc
    - port: 9001
      targetPort: 9001
      name: rest
