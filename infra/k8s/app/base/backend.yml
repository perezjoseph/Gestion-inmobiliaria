apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: uploads-pvc
spec:
  storageClassName: local-path
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: realestate
spec:
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: backend
        app.kubernetes.io/component: api
        app.kubernetes.io/part-of: realestate
    spec:
      automountServiceAccountToken: false
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      containers:
        - name: backend
          image: ghcr.io/perezjoseph/realestate-backend:latest # deploy.yml overrides with pinned digest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          envFrom:
            - secretRef:
                name: realestate-db-url
          env:
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: realestate-app-secret
                  key: jwt-secret
            - name: SERVER_PORT
              value: "8080"
            - name: ENVIRONMENT
              value: "production"
            - name: CORS_ORIGIN
              value: "https://gestion.local"
            - name: OCR_SERVICE_URL
              value: http://ocr-service.realestate.svc.cluster.local:8000
            - name: BAILEYS_SERVICE_URL
              value: http://baileys:3100
            - name: BAILEYS_INTERNAL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: realestate-chatbot-secret
                  key: baileys-internal-token
            - name: VLLM_ENDPOINT
              value: http://vllm-inference.realestate.svc.cluster.local:8000/v1
            - name: VLLM_CHAT_MODEL
              value: Intel/Qwen3-30B-A3B-Instruct-2507-int4-AutoRound
            - name: AI_CHAT_TIMEOUT_SECS
              value: "30"
            - name: RUST_LOG
              value: "realestate_backend=info,actix_web=info"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://alloy-otlp.monitoring.svc.cluster.local:4317"
            - name: OTEL_SERVICE_NAME
              value: "realestate-backend"
            - name: OCR_SERVICE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: realestate-internal-service-tokens
                  key: ocr-service-token
                  optional: true
            - name: VLLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: realestate-internal-service-tokens
                  key: vllm-api-key
                  optional: true
          volumeMounts:
            - name: uploads
              mountPath: /app/uploads
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
              ephemeral-storage: 64Mi
            limits:
              cpu: "1"
              memory: 1Gi
              ephemeral-storage: 256Mi
          startupProbe:
            httpGet:
              path: /livez
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /livez
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 15
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: uploads-pvc
        - name: tmp
          emptyDir:
            sizeLimit: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: backend
spec:
  selector:
    app.kubernetes.io/name: backend
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
