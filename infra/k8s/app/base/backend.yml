apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: uploads-pvc
spec:
  storageClassName: local-path
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: realestate
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: backend
        app.kubernetes.io/component: api
        app.kubernetes.io/part-of: realestate
    spec:
      automountServiceAccountToken: false
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      containers:
        - name: backend
          image: ghcr.io/perezjoseph/realestate-backend:latest # deploy.yml overrides with pinned digest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          envFrom:
            - secretRef:
                name: realestate-db-url
          env:
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: realestate-app-secret
                  key: jwt-secret
            - name: SERVER_PORT
              value: "8080"
            - name: ENVIRONMENT
              value: "production"
            - name: CORS_ORIGIN
              value: "https://gestion.local"
            - name: OCR_SERVICE_URL
              value: http://ocr-service.realestate.svc.cluster.local:8000
            - name: BAILEYS_SERVICE_URL
              value: http://baileys:3100
            - name: BAILEYS_INTERNAL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: realestate-chatbot-secret
                  key: baileys-internal-token
            - name: VLLM_ENDPOINT
              value: http://vllm.realestate.svc.cluster.local:8000/v1
            - name: VLLM_CHAT_MODEL
              value: /models/Qwen3-30B-A3B-Instruct
            - name: AI_CHAT_TIMEOUT_SECS
              value: "30"
            - name: RUST_LOG
              value: "realestate_backend=info,actix_web=info"
          volumeMounts:
            - name: uploads
              mountPath: /app/uploads
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
              ephemeral-storage: 64Mi
            limits:
              cpu: 500m
              memory: 384Mi
              ephemeral-storage: 256Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: uploads-pvc
        - name: tmp
          emptyDir:
            sizeLimit: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: backend
spec:
  selector:
    app.kubernetes.io/name: backend
  ports:
    - port: 8080
      targetPort: 8080
