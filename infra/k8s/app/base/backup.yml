# Database backup CronJob: runs pg_dump daily at 02:00 UTC.
# Stores compressed backups in a PVC. Retains last 7 days.
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: db-backups-pvc
spec:
  storageClassName: local-path
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 10Gi
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: db-backup
  labels:
    app.kubernetes.io/name: db-backup
    app.kubernetes.io/component: backup
    app.kubernetes.io/part-of: realestate
spec:
  schedule: "0 2 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 600
      template:
        metadata:
          labels:
            app.kubernetes.io/name: db-backup
        spec:
          restartPolicy: OnFailure
          automountServiceAccountToken: false
          tolerations:
            - key: node-role.kubernetes.io/control-plane
              operator: Exists
              effect: NoSchedule
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
          containers:
            - name: backup
              image: postgres:16
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  TIMESTAMP=$(date +%Y%m%d_%H%M%S)
                  BACKUP_FILE="/backups/realestate_${TIMESTAMP}.sql.gz"

                  echo "Starting backup: ${BACKUP_FILE}"
                  pg_dump "$DATABASE_URL" | gzip > "${BACKUP_FILE}"
                  echo "Backup completed: $(du -h ${BACKUP_FILE} | cut -f1)"

                  # Retain only last 7 days of backups
                  find /backups -name "realestate_*.sql.gz" -mtime +7 -delete
                  echo "Cleanup completed. Remaining backups:"
                  ls -lh /backups/realestate_*.sql.gz 2>/dev/null || echo "  (none)"
              env:
                - name: DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: realestate-db-url
                      key: DATABASE_URL
              volumeMounts:
                - name: backups
                  mountPath: /backups
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
                limits:
                  cpu: 500m
                  memory: 256Mi
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
          volumes:
            - name: backups
              persistentVolumeClaim:
                claimName: db-backups-pvc
