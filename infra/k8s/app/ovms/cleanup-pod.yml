apiVersion: v1
kind: Pod
metadata:
  name: pv-cleanup
  namespace: realestate
spec:
  restartPolicy: Never
  nodeSelector:
    kubernetes.io/hostname: inference
  containers:
    - name: cleanup
      image: busybox:1.36
      command: ["sh", "-c", "rm -rf /models/* && echo cleaned"]
      volumeMounts:
        - name: models
          mountPath: /models
  volumes:
    - name: models
      persistentVolumeClaim:
        claimName: ovms-models-pvc
