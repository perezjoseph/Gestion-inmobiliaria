apiVersion: batch/v1
kind: Job
metadata:
  name: ovms-model-export
  namespace: realestate
  labels:
    app.kubernetes.io/name: ovms
    app.kubernetes.io/component: model-export
spec:
  backoffLimit: 2
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ovms
        app.kubernetes.io/component: model-export
    spec:
      restartPolicy: Never
      automountServiceAccountToken: false
      nodeSelector:
        kubernetes.io/hostname: inference
      containers:
        - name: export
          image: python:3.13-slim
          command:
            - /bin/bash
            - -c
            - |
              set -e
              # Use PV for HuggingFace cache to avoid ephemeral storage eviction
              export HF_HOME=/models/.hf_cache
              export PIP_CACHE_DIR=/models/.pip_cache
              mkdir -p "$HF_HOME" "$PIP_CACHE_DIR"

              echo "Installing dependencies..."
              pip install --no-cache-dir optimum[openvino] openvino-tokenizers transformers torch --extra-index-url https://download.pytorch.org/whl/cpu

              echo "Installing git..."
              apt-get update && apt-get install -y --no-install-recommends git

              echo "Cloning export script..."
              git clone --depth 1 https://github.com/openvinotoolkit/model_server.git /tmp/ovms

              echo "Running export..."
              python /tmp/ovms/demos/common/export_models/export_model.py text_generation \
                --source_model Qwen/Qwen3-30B-A3B \
                --weight-format int4 \
                --model_repository_path /models \
                --model_name Qwen3-30B-A3B \
                --target_device GPU \
                --config_file_path /models/config.json \
                --cache_size 8 \
                --enable_prefix_caching true \
                --max_num_batched_tokens 4096 \
                --overwrite_models

              # Clean up HuggingFace cache from PV after export
              echo "Cleaning up cache..."
              rm -rf /models/.hf_cache /models/.pip_cache

              echo "Export complete."
          resources:
            requests:
              cpu: 8000m
              memory: 32Gi
              ephemeral-storage: 4Gi
            limits:
              cpu: 20000m
              memory: 48Gi
              ephemeral-storage: 10Gi
          volumeMounts:
            - name: models
              mountPath: /models
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: ovms-models-pvc
