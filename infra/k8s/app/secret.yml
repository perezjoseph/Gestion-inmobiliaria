# Create these secrets before applying the other manifests:
#   kubectl create secret generic realestate-db-secret \
#     --namespace realestate \
#     --from-literal=username=realestate \
#     --from-literal=password=<your-db-password>
#
#   kubectl create secret generic realestate-db-url \
#     --namespace realestate \
#     --from-literal=DATABASE_URL=postgresql://realestate:<your-db-password>@db:5432/realestate
#
#   kubectl create secret generic realestate-app-secret \
#     --namespace realestate \
#     --from-literal=jwt-secret=<your-jwt-secret>
#
# This file is a placeholder template. Do NOT commit real credentials.
apiVersion: v1
kind: Secret
metadata:
  name: realestate-db-secret
  namespace: realestate
type: Opaque
stringData:
  username: realestate
  password: CHANGE_ME
---
apiVersion: v1
kind: Secret
metadata:
  name: realestate-db-url
  namespace: realestate
type: Opaque
stringData:
  DATABASE_URL: postgresql://realestate:CHANGE_ME@db:5432/realestate
---
apiVersion: v1
kind: Secret
metadata:
  name: realestate-app-secret
  namespace: realestate
type: Opaque
stringData:
  jwt-secret: CHANGE_ME
---
# Create chatbot secrets:
#   kubectl create secret generic realestate-chatbot-secret \
#     --namespace realestate \
#     --from-literal=baileys-internal-token=<min-32-char-token> \
#     --from-literal=session-encryption-key=<64-hex-char-aes-key> \
#     --from-literal=wa-database-url=<postgres://whatsapp_session_rw:password@postgres:5432/realestate>
apiVersion: v1
kind: Secret
metadata:
  name: realestate-chatbot-secret
  namespace: realestate
type: Opaque
stringData:
  baileys-internal-token: CHANGE_ME_MIN_32_CHARACTERS_LONG
  session-encryption-key: CHANGE_ME_EXACTLY_32_CHARACTERS!
  wa-database-url: postgres://whatsapp_session_rw:CHANGE_ME@postgres:5432/realestate
