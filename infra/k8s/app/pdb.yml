# PodDisruptionBudgets: ensure at least one pod stays available during
# voluntary disruptions (node drain, cluster upgrades).
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: backend-pdb
  namespace: realestate
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: backend
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: db-pdb
  namespace: realestate
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: db
