apiVersion: v1
kind: ConfigMap
metadata:
  name: xpumanager-scripts
  namespace: default
data:
  wsgi.py: |
    from xpum_rest_main import main
    app = main()
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: xpumanager
  namespace: default
  labels:
    app: xpumanager
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: xpumanager
  template:
    metadata:
      labels:
        app: xpumanager
    spec:
      automountServiceAccountToken: false
      nodeName: inference
      initContainers:
        - name: gen-credentials
          image: intel/xpumanager:latest
          command:
            - /bin/bash
            - -c
            - |
              mkdir -p /conf
              cd /usr/lib/xpum
              echo -e 'Xpum@2024\nXpum@2024' | python3 rest/rest_config.py
              cp -r rest/conf/* /conf/
          volumeMounts:
            - name: rest-conf
              mountPath: /conf
          securityContext:
            runAsUser: 0
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
      containers:
        - name: xpumanager
          image: intel/xpumanager:latest
          env:
            - name: XPUM_REST_NO_TLS
              value: "1"
            - name: XPUM_METRICS
              value: "0-38"
          securityContext:
            privileged: true
          ports:
            - containerPort: 29999
              name: metrics
          volumeMounts:
            - name: devdri
              mountPath: /dev/dri
            - name: rest-conf
              mountPath: /usr/lib/xpum/rest/conf
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
              ephemeral-storage: 32Mi
            limits:
              cpu: 500m
              memory: 512Mi
              ephemeral-storage: 128Mi
          startupProbe:
            httpGet:
              path: /rest/v1/version
              port: 29999
              httpHeaders:
                - name: Authorization
                  value: Basic eHB1bWFkbWluOlhwdW1AMjAyNA==
            failureThreshold: 12
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /rest/v1/version
              port: 29999
              httpHeaders:
                - name: Authorization
                  value: Basic eHB1bWFkbWluOlhwdW1AMjAyNA==
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /rest/v1/version
              port: 29999
              httpHeaders:
                - name: Authorization
                  value: Basic eHB1bWFkbWluOlhwdW1AMjAyNA==
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
      volumes:
        - name: devdri
          hostPath:
            path: /dev/dri
        - name: rest-conf
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: xpumanager
  namespace: default
spec:
  selector:
    app: xpumanager
  type: ClusterIP
  ports:
    - port: 29999
      targetPort: 29999
      name: rest-api
---
# Expose via Traefik at xpumanager.local
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: xpumanager
  namespace: default
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`xpumanager.local`)
      kind: Rule
      services:
        - name: xpumanager
          port: 29999
