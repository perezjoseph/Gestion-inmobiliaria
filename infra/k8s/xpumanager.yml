apiVersion: v1
kind: ConfigMap
metadata:
  name: xpumd-config
  namespace: default
data:
  config.yaml: |
    receivers:
      intelxpu:
        collection_interval: 5s
        initial_delay: 1s
        timeout: 0
        sampling_interval: 1s

    processors:
      intelxpustatus:
        rules:
          - name: "Intel GPU core temperature health"
            source_metric: "hw.temperature"
            parent_metric: "hw.gpu.info"
            parent_ref_attribute: "hw.id"
            parent_filters:
              - key: "pci.vendor_id"
                values: ["8086"]
            component_filters:
              - key: "hw.sensor_location"
                values: ["gpu"]
            copy_attributes: ["hw.id", "hw.name", "pci.bdf", "hw.sensor_location", "com.intel.subdevice_id"]
            add_attributes:
              hw.type: "temperature"
            states:
              - state_name: "ok"
              - state_name: "warning"
                conditions:
                  - value: 85.0
          - name: "Intel GPU memory temperature health"
            source_metric: "hw.temperature"
            parent_metric: "hw.gpu.info"
            parent_ref_attribute: "hw.id"
            parent_filters:
              - key: "pci.vendor_id"
                values: ["8086"]
            component_filters:
              - key: "hw.sensor_location"
                values: ["memory"]
            copy_attributes: ["hw.id", "hw.name", "pci.bdf", "hw.sensor_location", "com.intel.subdevice_id"]
            add_attributes:
              hw.type: "temperature"
            states:
              - state_name: "ok"
              - state_name: "warning"
                conditions:
                  - value: 85.0

    exporters:
      prometheus:
        endpoint: "0.0.0.0:9273"

    extensions:

    service:
      telemetry:
        logs:
          level: info
      pipelines:
        metrics:
          receivers: [intelxpu]
          processors: [intelxpustatus]
          exporters: [prometheus]
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: xpumanager
  namespace: default
  labels:
    app: xpumanager
spec:
  selector:
    matchLabels:
      app: xpumanager
  template:
    metadata:
      labels:
        app: xpumanager
    spec:
      automountServiceAccountToken: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      nodeSelector:
        kubernetes.io/hostname: inference
      containers:
        - name: xpumd
          image: ghcr.io/intel/xpumanager/xpumd:v2.0.0
          args:
            - "--config"
            - "/etc/xpumd/config.yaml"
          ports:
            - containerPort: 9273
              name: metrics
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            runAsUser: 0
            capabilities:
              drop: ["ALL"]
              add: ["SYS_ADMIN"]
          volumeMounts:
            - name: config
              mountPath: /etc/xpumd
              readOnly: true
            - name: sys
              mountPath: /sys
              readOnly: true
            - name: rundir
              mountPath: /run/xpumd
          resources:
            requests:
              cpu: 10m
              memory: 128Mi
            limits:
              gpu.intel.com/xe: 1
              memory: 2Gi
          startupProbe:
            httpGet:
              path: /metrics
              port: 9273
            failureThreshold: 12
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /metrics
              port: 9273
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /metrics
              port: 9273
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
      volumes:
        - name: config
          configMap:
            name: xpumd-config
        - name: sys
          hostPath:
            path: /sys
        - name: rundir
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: xpumanager
  namespace: default
spec:
  selector:
    app: xpumanager
  type: ClusterIP
  ports:
    - port: 9273
      targetPort: 9273
      name: metrics
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: xpumanager
  namespace: default
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`xpumanager.local`)
      kind: Rule
      services:
        - name: xpumanager
          port: 9273
