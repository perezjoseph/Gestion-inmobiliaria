apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: xpumanager
  namespace: default
  labels:
    app: xpumanager
spec:
  selector:
    matchLabels:
      app: xpumanager
  template:
    metadata:
      labels:
        app: xpumanager
    spec:
      automountServiceAccountToken: false
      nodeSelector:
        kubernetes.io/hostname: inference
      containers:
        # xpumd daemon: collects GPU telemetry via Level Zero
        - name: xpumd
          image: intel/xpumanager:v1.2.27
          command: ["/usr/bin/xpumd"]
          env:
            - name: SPDLOG_LEVEL
              value: info
            - name: XPUM_METRICS
              value: "0-38"
          securityContext:
            privileged: true
          volumeMounts:
            - name: devdri
              mountPath: /dev/dri
            - name: sockdir
              mountPath: /tmp
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
              ephemeral-storage: 32Mi
            limits:
              cpu: 500m
              memory: 512Mi
              ephemeral-storage: 128Mi
        # Python exporter: exposes Prometheus /metrics via gunicorn
        - name: exporter
          image: intel/xpumanager:v1.2.27
          workingDir: /usr/lib/xpum/rest
          command:
            - gunicorn
            - --bind
            - "0.0.0.0:29999"
            - --worker-connections
            - "64"
            - --worker-class
            - gthread
            - --workers
            - "1"
            - --threads
            - "4"
            - "xpum_rest_main:main()"
          env:
            - name: XPUM_EXPORTER_NO_AUTH
              value: "1"
            - name: XPUM_EXPORTER_ONLY
              value: "1"
            - name: XPUM_REST_NO_TLS
              value: "1"
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          ports:
            - containerPort: 29999
              name: metrics
          volumeMounts:
            - name: sockdir
              mountPath: /tmp
            - name: devdri
              mountPath: /dev/dri
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
              ephemeral-storage: 32Mi
            limits:
              cpu: 200m
              memory: 256Mi
              ephemeral-storage: 64Mi
          startupProbe:
            httpGet:
              path: /metrics
              port: 29999
            failureThreshold: 12
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healtz
              port: 29999
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healtz
              port: 29999
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
      volumes:
        - name: devdri
          hostPath:
            path: /dev/dri
        - name: sockdir
          emptyDir:
            medium: Memory
---
apiVersion: v1
kind: Service
metadata:
  name: xpumanager
  namespace: default
spec:
  selector:
    app: xpumanager
  type: ClusterIP
  ports:
    - port: 29999
      targetPort: 29999
      name: metrics
---
# Expose via Traefik at xpumanager.local
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: xpumanager
  namespace: default
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`xpumanager.local`)
      kind: Rule
      services:
        - name: xpumanager
          port: 29999
