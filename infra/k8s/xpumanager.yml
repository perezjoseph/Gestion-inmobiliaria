apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: xpumanager
  namespace: default
  labels:
    app: xpumanager
spec:
  selector:
    matchLabels:
      app: xpumanager
  template:
    metadata:
      labels:
        app: xpumanager
    spec:
      automountServiceAccountToken: false
      hostPID: true
      nodeSelector:
        kubernetes.io/hostname: inference
      containers:
        - name: qmmd
          image: intel/metrics-manager:2026.1.0-rc2
          command: ["sh", "-c"]
          args:
            - |
              if command -v qmmd >/dev/null 2>&1; then
                exec qmmd -d 0000:04:00.0 -p 9273 -i 0.0.0.0
              else
                # Fallback: patch supervisord to pass device to qmassa, then start
                sed -i 's|command=qmassa|command=qmassa -d 0000:04:00.0|' /etc/supervisor/supervisord.conf
                exec /usr/local/bin/supervisord -c /etc/supervisor/supervisord.conf
              fi
          ports:
            - containerPort: 9273
              name: metrics
          volumeMounts:
            - name: sys
              mountPath: /sys
              readOnly: true
            - name: run
              mountPath: /run
              readOnly: true
            - name: devdri
              mountPath: /dev/dri
          securityContext:
            privileged: true
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
              ephemeral-storage: 32Mi
            limits:
              cpu: 200m
              memory: 256Mi
              ephemeral-storage: 64Mi
          startupProbe:
            httpGet:
              path: /metrics
              port: 9273
            failureThreshold: 12
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /metrics
              port: 9273
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /metrics
              port: 9273
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
      volumes:
        - name: sys
          hostPath:
            path: /sys
        - name: run
          hostPath:
            path: /run
        - name: devdri
          hostPath:
            path: /dev/dri
---
apiVersion: v1
kind: Service
metadata:
  name: xpumanager
  namespace: default
spec:
  selector:
    app: xpumanager
  type: ClusterIP
  ports:
    - port: 9273
      targetPort: 9273
      name: metrics
---
# Expose via Traefik at xpumanager.local
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: xpumanager
  namespace: default
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`xpumanager.local`)
      kind: Rule
      services:
        - name: xpumanager
          port: 9273
