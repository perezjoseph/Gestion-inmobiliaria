# docker-mailserver deployment — single pod, hostNetwork for real client IPs
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mailserver
  namespace: mail
  labels:
    app.kubernetes.io/name: mailserver
    app.kubernetes.io/part-of: realestate
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: mailserver
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mailserver
    spec:
      automountServiceAccountToken: false
      hostname: mail
      dnsPolicy: ClusterFirst
      nodeSelector:
        kubernetes.io/hostname: coreos
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      containers:
        - name: mailserver
          image: ghcr.io/docker-mailserver/docker-mailserver:15.1.0
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsUser: 0
            runAsGroup: 0
            runAsNonRoot: false
            privileged: false
            capabilities:
              add:
                - CHOWN
                - FOWNER
                - MKNOD
                - SETGID
                - SETUID
                - DAC_OVERRIDE
                - NET_ADMIN
                - NET_RAW
                - NET_BIND_SERVICE
                - SYS_CHROOT
                - KILL
              drop: [ALL]
            seccompProfile:
              type: RuntimeDefault
          envFrom:
            - configMapRef:
                name: mailserver-env
          ports:
            - name: smtp
              containerPort: 25
              protocol: TCP
            - name: esmtp-implicit
              containerPort: 465
              protocol: TCP
            - name: esmtp-explicit
              containerPort: 587
              protocol: TCP
            - name: imap-implicit
              containerPort: 993
              protocol: TCP
          volumeMounts:
            - name: data
              mountPath: /var/mail
              subPath: data
            - name: data
              mountPath: /var/mail-state
              subPath: state
            - name: data
              mountPath: /var/log/mail
              subPath: log
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: 200m
              memory: 1Gi
              ephemeral-storage: 128Mi
            limits:
              cpu: 1500m
              memory: 4Gi
              ephemeral-storage: 512Mi
          readinessProbe:
            tcpSocket:
              port: 25
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 25
            initialDelaySeconds: 60
            periodSeconds: 30
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: mailserver-data
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mailserver-data
  namespace: mail
spec:
  storageClassName: local-path
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 20Gi
