# Roundcube webmail — connects to docker-mailserver for IMAP/SMTP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: roundcube
  namespace: mail
  labels:
    app.kubernetes.io/name: roundcube
    app.kubernetes.io/part-of: realestate
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: roundcube
  template:
    metadata:
      labels:
        app.kubernetes.io/name: roundcube
    spec:
      automountServiceAccountToken: false
      containers:
        - name: roundcube
          image: roundcube/roundcubemail:1.6.15-apache
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              name: http
          env:
            - name: ROUNDCUBEMAIL_DEFAULT_HOST
              value: mailserver.mail.svc.cluster.local
            - name: ROUNDCUBEMAIL_DEFAULT_PORT
              value: "993"
            - name: ROUNDCUBEMAIL_SMTP_SERVER
              value: mailserver.mail.svc.cluster.local
            - name: ROUNDCUBEMAIL_SMTP_PORT
              value: "587"
            - name: ROUNDCUBEMAIL_PLUGINS
              value: archive,zipdownload,managesieve
            - name: ROUNDCUBEMAIL_SKIN
              value: elastic
            - name: ROUNDCUBEMAIL_DB_TYPE
              value: sqlite
            - name: ROUNDCUBEMAIL_UPLOAD_MAX_FILESIZE
              value: 25M
          volumeMounts:
            - name: db
              mountPath: /var/roundcube/db
            - name: tmp
              mountPath: /tmp/roundcube-temp
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
              ephemeral-storage: 32Mi
            limits:
              cpu: 300m
              memory: 256Mi
              ephemeral-storage: 128Mi
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 30
      volumes:
        - name: db
          persistentVolumeClaim:
            claimName: roundcube-db
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: roundcube-db
  namespace: mail
spec:
  storageClassName: local-path
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: roundcube
  namespace: mail
  labels:
    app.kubernetes.io/name: roundcube
spec:
  selector:
    app.kubernetes.io/name: roundcube
  ports:
    - name: http
      port: 80
      targetPort: 80
