# Pin Traefik to the coreos node so all ingress traffic stays local
# and is reachable via coreos.local mDNS.
# Apply: kubectl apply -f infra/k8s/traefik-config.yml
apiVersion: helm.cattle.io/v1
kind: HelmChartConfig
metadata:
  name: traefik
  namespace: kube-system
spec:
  valuesContent: |-
    image:
      registry: docker.io
      repository: library/traefik
      tag: "3.7.4"
    nodeSelector:
      kubernetes.io/hostname: coreos
    tolerations:
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule
    metrics:
      prometheus:
        entryPoint: metrics
        addEntryPointsLabels: true
        addServicesLabels: true
        addRoutersLabels: true
    ports:
      metrics:
        port: 9100
        expose:
          default: true
        exposedPort: 9100
        protocol: TCP
