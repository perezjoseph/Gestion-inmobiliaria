apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
  labels:
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/enforce-version: latest
    pod-security.kubernetes.io/warn: restricted
    pod-security.kubernetes.io/warn-version: latest
---
# Prometheus config
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    alerting:
      alertmanagers:
        - static_configs:
            - targets: ["alertmanager.monitoring.svc.cluster.local:9093"]

    rule_files:
      - /etc/prometheus/alerts.yml

    scrape_configs:
      - job_name: "xpumanager"
        scheme: http
        metrics_path: "/metrics"
        static_configs:
          - targets: ["xpumanager.default.svc.cluster.local:9273"]
            labels:
              node: "inference"

      - job_name: "node-exporter"
        dns_sd_configs:
          - names: ['node-exporter.monitoring.svc.cluster.local']
            type: A
            port: 9100
        static_configs:
          - targets: ['192.168.88.22:9100']
            labels:
              node: "networkstorage"

      - job_name: "backend"
        metrics_path: "/internal/metrics"
        static_configs:
          - targets: ["backend.realestate.svc.cluster.local:8080"]
            labels:
              environment: "production"

      - job_name: "backend-dev"
        metrics_path: "/internal/metrics"
        static_configs:
          - targets: ["backend.realestate-dev.svc.cluster.local:8080"]
            labels:
              environment: "development"

      - job_name: "vllm"
        metrics_path: "/metrics"
        static_configs:
          - targets: ["vllm-inference.realestate.svc.cluster.local:8000"]
            labels:
              node: "inference"

      - job_name: "kube-state-metrics"
        static_configs:
          - targets: ["kube-state-metrics.monitoring.svc.cluster.local:8080"]
---
# Prometheus deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: docker.io/prom/prometheus:v3.4.0
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.path=/prometheus"
            - "--storage.tsdb.retention.time=30d"
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus/prometheus.yml
              subPath: prometheus.yml
            - name: alerts
              mountPath: /etc/prometheus/alerts.yml
              subPath: alerts.yml
            - name: data
              mountPath: /prometheus
          resources:
            requests:
              cpu: 50m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1536Mi
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: alerts
          configMap:
            name: prometheus-alerts
        - name: data
          persistentVolumeClaim:
            claimName: prometheus-data-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: prometheus-data-pvc
  namespace: monitoring
spec:
  storageClassName: local-path
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: monitoring
spec:
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090
---
# Grafana datasource and dashboard provisioning
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: monitoring
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus.monitoring.svc.cluster.local:9090
        isDefault: true
        editable: true
      - name: Loki
        type: loki
        access: proxy
        url: http://loki.monitoring.svc.cluster.local:3100
        isDefault: false
        editable: true
        jsonData:
          timeout: 60
          maxLines: 1000
          derivedFields:
            - datasourceUid: tempo
              matcherRegex: "trace_id=(\\w+)"
              name: TraceID
              url: "$${__value.raw}"
      - name: Tempo
        type: tempo
        access: proxy
        uid: tempo
        url: http://tempo.monitoring.svc.cluster.local:3200
        isDefault: false
        editable: true
        jsonData:
          tracesToLogsV2:
            datasourceUid: loki
            filterByTraceID: true
          tracesToMetrics:
            datasourceUid: prometheus
          serviceMap:
            datasourceUid: prometheus
          nodeGraph:
            enabled: true
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-providers
  namespace: monitoring
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: 'infrastructure'
        orgId: 1
        folder: 'Infrastructure'
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards/infrastructure
          foldersFromFilesStructure: false
      - name: 'application'
        orgId: 1
        folder: 'Application'
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards/application
          foldersFromFilesStructure: false
---
# Grafana deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: docker.io/grafana/grafana:11.6.14
          env:
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: grafana-admin-secret
                  key: password
            - name: GF_SECURITY_ADMIN_USER
              value: "admin"
            - name: GF_PATHS_DATA
              value: "/var/lib/grafana/data"
            - name: GF_INSTALL_PLUGINS
              value: "grafana-lokiexplore-app"
            - name: GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS
              value: "grafana-lokiexplore-app"
          ports:
            - containerPort: 3000
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboard-providers
              mountPath: /etc/grafana/provisioning/dashboards
            # Infrastructure dashboards
            - name: dashboard-xpum
              mountPath: /var/lib/grafana/dashboards/infrastructure/xpum-dashboard.json
              subPath: xpum-dashboard.json
            - name: dashboard-node
              mountPath: /var/lib/grafana/dashboards/infrastructure/node-exporter-dashboard.json
              subPath: node-exporter-dashboard.json
            - name: dashboard-vllm
              mountPath: /var/lib/grafana/dashboards/infrastructure/vllm-dashboard.json
              subPath: vllm-dashboard.json
            - name: dashboard-logs
              mountPath: /var/lib/grafana/dashboards/infrastructure/logs-dashboard.json
              subPath: logs-dashboard.json
            # Application dashboards
            - name: dashboard-backend-api
              mountPath: /var/lib/grafana/dashboards/application/backend-api-dashboard.json
              subPath: backend-api-dashboard.json
            - name: dashboard-backend-health
              mountPath: /var/lib/grafana/dashboards/application/backend-health-dashboard.json
              subPath: backend-health-dashboard.json
            - name: dashboard-slo
              mountPath: /var/lib/grafana/dashboards/application/slo-dashboard.json
              subPath: slo-dashboard.json
            - name: dashboard-database
              mountPath: /var/lib/grafana/dashboards/application/database-dashboard.json
              subPath: database-dashboard.json
            - name: dashboard-business-kpi
              mountPath: /var/lib/grafana/dashboards/application/business-kpi-dashboard.json
              subPath: business-kpi-dashboard.json
            # Kubernetes cluster dashboard
            - name: dashboard-kubernetes
              mountPath: /var/lib/grafana/dashboards/infrastructure/kubernetes-dashboard.json
              subPath: kubernetes-dashboard.json
            - name: grafana-data
              mountPath: /var/lib/grafana/data
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: dashboard-providers
          configMap:
            name: grafana-dashboard-providers
        - name: dashboard-xpum
          configMap:
            name: grafana-dashboard-xpum
        - name: dashboard-node
          configMap:
            name: grafana-dashboard-node
        - name: dashboard-vllm
          configMap:
            name: grafana-dashboard-vllm
        - name: dashboard-logs
          configMap:
            name: grafana-dashboard-logs
        - name: dashboard-backend-api
          configMap:
            name: grafana-dashboard-backend-api
        - name: dashboard-backend-health
          configMap:
            name: grafana-dashboard-backend-health
        - name: dashboard-slo
          configMap:
            name: grafana-dashboard-slo
        - name: dashboard-database
          configMap:
            name: grafana-dashboard-database
        - name: dashboard-business-kpi
          configMap:
            name: grafana-dashboard-business-kpi
        - name: dashboard-kubernetes
          configMap:
            name: grafana-dashboard-kubernetes
        - name: grafana-data
          persistentVolumeClaim:
            claimName: grafana-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: monitoring
spec:
  selector:
    app: grafana
  ports:
    - port: 3000
      targetPort: 3000
---
# Expose Grafana via Traefik at grafana.local
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: grafana
  namespace: monitoring
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`grafana.local`)
      kind: Rule
      services:
        - name: grafana
          port: 3000

---
# Grafana persistent storage
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-pvc
  namespace: monitoring
spec:
  storageClassName: local-path
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 1Gi
---
# Node Exporter DaemonSet - runs on all nodes
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: node-exporter
  namespace: monitoring
  labels:
    app: node-exporter
spec:
  selector:
    matchLabels:
      app: node-exporter
  template:
    metadata:
      labels:
        app: node-exporter
    spec:
      hostNetwork: true
      hostPID: true
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      containers:
        - name: node-exporter
          image: docker.io/prom/node-exporter:v1.9.1
          args:
            - "--path.rootfs=/host"
            - "--path.procfs=/host/proc"
            - "--path.sysfs=/host/sys"
            - "--collector.filesystem.mount-points-exclude=^/(dev|proc|sys|var/lib/docker/.+|var/lib/kubelet/.+)($|/)"
          ports:
            - containerPort: 9100
              hostPort: 9100
              name: metrics
          volumeMounts:
            - name: rootfs
              mountPath: /host
              readOnly: true
              mountPropagation: HostToContainer
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
      volumes:
        - name: rootfs
          hostPath:
            path: /
---
apiVersion: v1
kind: Service
metadata:
  name: node-exporter
  namespace: monitoring
spec:
  selector:
    app: node-exporter
  clusterIP: None
  ports:
    - port: 9100
      targetPort: 9100
      name: metrics
