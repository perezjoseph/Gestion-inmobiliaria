# Prometheus alerting rules for the realestate application
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-alerts
  namespace: monitoring
data:
  alerts.yml: |
    groups:
      - name: backend
        rules:
          - alert: HighErrorRate
            expr: |
              sum(rate(api_http_requests_total{status=~"5.."}[5m]))
              / sum(rate(api_http_requests_total[5m])) > 0.01
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "Backend error rate > 1% for 5 minutes"
              description: "{{ $value | humanizePercentage }} of requests are failing"

          - alert: HighLatencyP95
            expr: |
              histogram_quantile(0.95, sum(rate(api_http_requests_duration_seconds_bucket[5m])) by (le))
              > 2
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "P95 latency > 2s for 5 minutes"

          - alert: PodRestarts
            expr: |
              increase(kube_pod_container_status_restarts_total{namespace="realestate"}[1h]) > 3
            for: 0m
            labels:
              severity: warning
            annotations:
              summary: "Pod {{ $labels.pod }} restarted {{ $value }} times in 1h"

          - alert: PodNotReady
            expr: |
              kube_pod_status_ready{namespace="realestate", condition="true"} == 0
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "Pod {{ $labels.pod }} not ready for 5 minutes"

      - name: database
        rules:
          - alert: DatabaseConnectionPoolExhausted
            expr: |
              sea_orm_pool_active_connections / sea_orm_pool_max_connections > 0.9
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "DB connection pool > 90% utilization"

          - alert: DatabaseDown
            expr: |
              up{job="backend"} == 0
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "Backend is down (health check failing)"

      - name: infrastructure
        rules:
          - alert: DiskUsageHigh
            expr: |
              (node_filesystem_size_bytes - node_filesystem_avail_bytes)
              / node_filesystem_size_bytes > 0.85
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "Disk usage > 85% on {{ $labels.instance }}"

          - alert: DiskUsageCritical
            expr: |
              (node_filesystem_size_bytes - node_filesystem_avail_bytes)
              / node_filesystem_size_bytes > 0.95
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "Disk usage > 95% on {{ $labels.instance }}"

          - alert: HighMemoryUsage
            expr: |
              (node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes)
              / node_memory_MemTotal_bytes > 0.9
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "Memory usage > 90% on {{ $labels.instance }}"

      - name: backups
        rules:
          - alert: BackupJobFailed
            expr: |
              kube_job_status_failed{namespace="realestate", job_name=~"db-backup.*"} > 0
            for: 0m
            labels:
              severity: critical
            annotations:
              summary: "Database backup job failed"

          - alert: BackupJobMissing
            expr: |
              time() - kube_job_status_completion_time{namespace="realestate", job_name=~"db-backup.*"}
              > 129600
            for: 0m
            labels:
              severity: warning
            annotations:
              summary: "No successful backup in 36 hours"

      - name: slo
        rules:
          # Multi-window burn rate alerts (Google SRE approach)
          # SLO: 99.5% availability over 7 days → error budget = 0.5%
          # 14.4x burn rate over 1h = exhausts 7-day budget in 6h (page immediately)
          - alert: SLOAvailabilityBurnRateCritical
            expr: |
              (
                sum(rate(api_http_requests_total{job="backend", environment="production", status=~"5.."}[1h]))
                / sum(rate(api_http_requests_total{job="backend", environment="production"}[1h]))
              ) > (14.4 * 0.005)
              and
              (
                sum(rate(api_http_requests_total{job="backend", environment="production", status=~"5.."}[5m]))
                / sum(rate(api_http_requests_total{job="backend", environment="production"}[5m]))
              ) > (14.4 * 0.005)
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "Availability SLO burn rate critical (14.4x over 1h)"
              description: "Error budget will be exhausted in ~6 hours at this rate"

          # 6x burn rate over 6h = exhausts budget in ~28h (ticket)
          - alert: SLOAvailabilityBurnRateHigh
            expr: |
              (
                sum(rate(api_http_requests_total{job="backend", environment="production", status=~"5.."}[6h]))
                / sum(rate(api_http_requests_total{job="backend", environment="production"}[6h]))
              ) > (6 * 0.005)
              and
              (
                sum(rate(api_http_requests_total{job="backend", environment="production", status=~"5.."}[30m]))
                / sum(rate(api_http_requests_total{job="backend", environment="production"}[30m]))
              ) > (6 * 0.005)
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Availability SLO burn rate elevated (6x over 6h)"
              description: "Error budget will be exhausted in ~28 hours at this rate"

          # Latency SLO: 95% of requests < 500ms
          - alert: SLOLatencyBurnRateCritical
            expr: |
              (
                1 - (
                  sum(rate(api_http_requests_duration_seconds_bucket{job="backend", environment="production", le="0.5"}[1h]))
                  / sum(rate(api_http_requests_duration_seconds_count{job="backend", environment="production"}[1h]))
                )
              ) > (14.4 * 0.05)
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "Latency SLO burn rate critical (14.4x over 1h)"
              description: "Too many requests exceeding 500ms threshold"

      - name: business
        rules:
          - alert: HighOverduePayments
            expr: |
              pagos_atrasados > 30
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "{{ $value }} overdue payments — above threshold (30)"

          - alert: AIInferenceDown
            expr: |
              sum(rate(ai_requests_total{result="error"}[10m]))
              / sum(rate(ai_requests_total[10m])) > 0.5
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "AI chatbot error rate > 50% for 5 minutes"

          - alert: LoginBruteForce
            expr: |
              sum(rate(auth_login_attempts_total{result="locked"}[5m])) > 0.1
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: "Account lockouts detected — possible brute force"

      - name: monitoring
        rules:
          - alert: PrometheusDown
            expr: absent(up{job="prometheus"})
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "Prometheus is down"
              description: "Prometheus self-scrape target is not responding"

          - alert: TargetDown
            expr: up == 0
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "Scrape target is down"
              description: "{{ $labels.job }}/{{ $labels.instance }} is unreachable"

          - alert: GpuOverheating
            expr: hw_temperature_celsius{hw_sensor_location="gpu", statistic="max"} > 85
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "GPU temperature critical"
              description: "GPU temperature on {{ $labels.pci_bdf }} exceeds 85°C ({{ $value }}°C)"

          - alert: VllmScaleUpFailed
            expr: |
              kube_deployment_spec_replicas{deployment="vllm", namespace="realestate"} > 0
              and kube_deployment_status_ready_replicas{deployment="vllm", namespace="realestate"} == 0
            for: 3m
            labels:
              severity: warning
            annotations:
              summary: "vLLM solicitado pero no listo después de 3 minutos"
              description: "KEDA escaló vLLM a 1 réplica pero el pod no se ha iniciado correctamente"
