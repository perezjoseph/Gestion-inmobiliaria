apiVersion: v1
kind: Pod
metadata:
  name: debug-gpu-test
  namespace: realestate
spec:
  nodeSelector:
    kubernetes.io/hostname: inference
  restartPolicy: Never
  containers:
    - name: gpu-test
      image: intel/vllm:0.14.1-xpu
      command:
        [
          "python3",
          "-c",
          "import torch; print('XPU available:', torch.xpu.is_available()); print('XPU count:', torch.xpu.device_count()); t = torch.randn(10, 10, device='xpu'); print('Tensor on XPU:', t.device); print('Sum:', t.sum().item()); print('GPU TEST PASSED')",
        ]
      resources:
        requests:
          gpu.intel.com/xe: "1"
        limits:
          gpu.intel.com/xe: "1"
