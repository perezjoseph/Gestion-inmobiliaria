apiVersion: v1
kind: Pod
metadata:
  name: driver-update
  namespace: realestate
spec:
  nodeSelector:
    kubernetes.io/hostname: inference
  hostPID: true
  restartPolicy: Never
  containers:
    - name: driver-update
      image: fedora:44
      command:
        - bash
        - -c
        - |
          set -e
          echo "=== Installing Intel compute runtime and Level-Zero on inference node ==="
          echo ""
          echo "Current layered packages:"
          nsenter -t 1 -m -- rpm-ostree status | grep -A5 "^\*"
          echo ""
          echo "=== Installing intel-compute-runtime (includes level-zero) ==="
          nsenter -t 1 -m -- rpm-ostree install --idempotent \
            intel-compute-runtime \
            intel-level-zero \
            intel-level-zero-devel \
            intel-opencl
          echo ""
          echo "=== Done. Node needs a reboot to activate the new packages. ==="
          echo "Run: kubectl drain inference --ignore-daemonsets --delete-emptydir-data"
          echo "Then reboot the node, then: kubectl uncordon inference"
      securityContext:
        privileged: true
