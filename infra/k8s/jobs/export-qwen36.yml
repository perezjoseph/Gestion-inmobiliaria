apiVersion: batch/v1
kind: Job
metadata:
  name: export-qwen35-35b-a3b
  namespace: realestate
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: model-export
    spec:
      restartPolicy: Never
      automountServiceAccountToken: false
      nodeSelector:
        kubernetes.io/hostname: inference
      containers:
        - name: export
          image: python:3.12-slim
          env:
            - name: HF_HOME
              value: /models/.hf_cache
            - name: TRANSFORMERS_CACHE
              value: /models/.hf_cache
            - name: PIP_CACHE_DIR
              value: /models/.pip_cache
          command:
            - /bin/bash
            - -c
            - |
              set -e
              apt-get update && apt-get install -y --no-install-recommends git && rm -rf /var/lib/apt/lists/*
              echo "=== Installing dependencies ==="
              pip install --no-cache-dir torch --index-url https://download.pytorch.org/whl/cpu
              pip install --no-cache-dir git+https://github.com/huggingface/optimum-intel.git
              pip install --no-cache-dir git+https://github.com/huggingface/optimum.git
              pip install --no-cache-dir "transformers>=5.5,<5.8"

              echo "=== Removing old model (if exists) ==="
              rm -rf /models/Qwen3-30B-A3B || true
              rm -rf /models/Qwen3.6-35B-A3B || true
              echo "Old models removed."

              echo "=== Exporting Qwen3.5-35B-A3B to OpenVINO IR (INT4) ==="
              optimum-cli export openvino \
                --model Qwen/Qwen3.5-35B-A3B \
                --weight-format int4 \
                --group-size 128 \
                --ratio 1.0 \
                --task image-text-to-text \
                /models/Qwen3.5-35B-A3B

              echo "=== Export complete ==="
              ls -la /models/Qwen3.5-35B-A3B/
              du -sh /models/Qwen3.5-35B-A3B/
              echo "=== Cleaning up cache ==="
              rm -rf /models/.hf_cache /models/.pip_cache
              echo "=== Done ==="
          resources:
            requests:
              cpu: "4"
              memory: 48Gi
              ephemeral-storage: 10Gi
            limits:
              cpu: "8"
              memory: 64Gi
              ephemeral-storage: 20Gi
          volumeMounts:
            - name: models
              mountPath: /models
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: ovms-models-pvc
