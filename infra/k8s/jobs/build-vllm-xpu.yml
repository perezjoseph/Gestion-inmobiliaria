# Build vLLM XPU Docker image from source using Docker-in-Docker
# Skips the Rust frontend stage (static.rust-lang.org unreachable from this node)
apiVersion: batch/v1
kind: Job
metadata:
  name: build-vllm-xpu
  namespace: kube-system
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vllm-build
    spec:
      restartPolicy: Never
      automountServiceAccountToken: false
      nodeSelector:
        kubernetes.io/hostname: inference
      containers:
        - name: dind
          image: docker:27.5-dind
          securityContext:
            privileged: true
          env:
            - name: DOCKER_TLS_CERTDIR
              value: ""
          command:
            - sh
            - -c
            - |
              # Start dockerd in background
              dockerd --host=unix:///var/run/docker.sock --storage-driver=overlay2 &

              # Wait for docker daemon to be ready
              echo "=== Waiting for Docker daemon ==="
              for i in $(seq 1 30); do
                docker info >/dev/null 2>&1 && break
                sleep 2
              done
              docker info || { echo "Docker daemon failed to start"; exit 1; }

              echo "=== Cloning vLLM v0.22.1 ==="
              apk add --no-cache git sed
              git clone --depth 1 --branch v0.22.1 https://github.com/vllm-project/vllm.git /workspace/vllm
              cd /workspace/vllm

              echo "=== Patching Dockerfile to skip Rust frontend (rust-lang.org unreachable) ==="
              # Remove the entire rust-build stage and the COPY that imports it
              sed -i '1,/^FROM.*AS vllm-base/{/^FROM.*AS vllm-base/!d}' docker/Dockerfile.xpu
              sed -i '/COPY --from=rust-build/d' docker/Dockerfile.xpu
              # Remove GIT_REPO_CHECK that requires .git
              sed -i '/GIT_REPO_CHECK/d' docker/Dockerfile.xpu
              # Show patched Dockerfile head
              echo "--- Patched Dockerfile.xpu (first 10 lines) ---"
              head -10 docker/Dockerfile.xpu

              echo "=== Building XPU image (this will take 30-60+ min) ==="
              DOCKER_BUILDKIT=1 docker build \
                -f docker/Dockerfile.xpu \
                --target vllm-openai \
                --tag vllm-xpu:0.22.1 \
                --build-arg GIT_REPO_CHECK=0 \
                .

              echo "=== Saving image to host ==="
              docker save vllm-xpu:0.22.1 -o /output/vllm-xpu-0.22.1.tar
              ls -lh /output/vllm-xpu-0.22.1.tar

              echo "=== Build complete ==="
          resources:
            requests:
              cpu: "4"
              memory: 16Gi
            limits:
              cpu: "8"
              memory: 32Gi
          volumeMounts:
            - name: docker-storage
              mountPath: /var/lib/docker
            - name: output
              mountPath: /output
      volumes:
        - name: docker-storage
          emptyDir:
            sizeLimit: 60Gi
        - name: output
          hostPath:
            path: /var/lib/rancher/k3s/agent/images
            type: DirectoryOrCreate
