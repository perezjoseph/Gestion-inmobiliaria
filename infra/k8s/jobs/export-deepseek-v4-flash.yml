apiVersion: batch/v1
kind: Job
metadata:
  name: export-deepseek-v4-flash-int4
  namespace: realestate
  labels:
    app.kubernetes.io/name: ovms
    app.kubernetes.io/component: model-export
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 7200
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ovms
        app.kubernetes.io/component: model-export
    spec:
      restartPolicy: Never
      automountServiceAccountToken: false
      nodeSelector:
        kubernetes.io/hostname: inference
      containers:
        - name: export
          image: python:3.13-slim
          command:
            - /bin/bash
            - -c
            - |
              set -e

              # Use PV for caches to avoid ephemeral storage eviction
              export HF_HOME=/models/.hf_cache
              export PIP_CACHE_DIR=/models/.pip_cache
              export TMPDIR=/models/.tmp
              mkdir -p "$HF_HOME" "$PIP_CACHE_DIR" "$TMPDIR"

              echo "=== Installing dependencies ==="
              pip install --cache-dir="$PIP_CACHE_DIR" \
                "optimum[openvino]" \
                openvino-tokenizers \
                transformers \
                torch --extra-index-url https://download.pytorch.org/whl/cpu

              echo "=== Installing git ==="
              apt-get update && apt-get install -y --no-install-recommends git

              echo "=== Running optimum-cli export ==="
              optimum-cli export openvino \
                --model deepseek-ai/DeepSeek-V4-Flash \
                --weight-format int4 \
                --group-size 128 \
                --ratio 1.0 \
                --sym \
                --task text-generation-with-past \
                --trust-remote-code \
                /models/DeepSeek-V4-Flash-int4-ov

              echo "=== Export complete ==="
              ls -la /models/DeepSeek-V4-Flash-int4-ov/
              du -sh /models/DeepSeek-V4-Flash-int4-ov/

              # Clean up caches
              echo "=== Cleaning up caches ==="
              rm -rf /models/.hf_cache /models/.pip_cache /models/.tmp

              echo "=== Done ==="
          resources:
            requests:
              cpu: 8000m
              memory: 300Gi
              ephemeral-storage: 20Gi
            limits:
              cpu: 32000m
              memory: 400Gi
              ephemeral-storage: 50Gi
          volumeMounts:
            - name: models
              mountPath: /models
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: ovms-models-pvc
