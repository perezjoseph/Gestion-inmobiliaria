apiVersion: v1
kind: Pod
metadata:
  name: patch-model-config
  namespace: realestate
spec:
  restartPolicy: Never
  nodeSelector:
    kubernetes.io/hostname: inference
  containers:
    - name: patcher
      image: python:3.12-slim
      command: ["python3", "-c"]
      args:
        - |
          import json, sys

          config_path = "/models/hub/models--Intel--Qwen3-30B-A3B-Instruct-2507-int4-AutoRound/snapshots/57260401ae48d607dbeb2cd3eee17d61c1087ceb/config.json"

          with open(config_path) as f:
              config = json.load(f)

          print("Current quantization_config keys:", list(config.get("quantization_config", {}).keys()))
          print("quant_method:", config.get("quantization_config", {}).get("quant_method", "NOT SET"))

          # Remove quantization_config to prevent vLLM from using INC quantized kernels
          # The model weights are already in int4 format and will be loaded as-is
          if "quantization_config" in config:
              del config["quantization_config"]
              print("Removed quantization_config from config.json")

          with open(config_path, "w") as f:
              json.dump(config, f, indent=2)

          print("Config patched successfully")
      volumeMounts:
        - name: models
          mountPath: /models
  volumes:
    - name: models
      persistentVolumeClaim:
        claimName: vllm-models-pvc
