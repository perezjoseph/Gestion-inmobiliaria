apiVersion: v1
kind: Pod
metadata:
  name: restore-model-config
  namespace: realestate
spec:
  restartPolicy: Never
  nodeSelector:
    kubernetes.io/hostname: inference
  containers:
    - name: patcher
      image: python:3.12-slim
      command: ["python3", "-c"]
      args:
        - |
          import json

          config_path = "/models/hub/models--Intel--Qwen3-30B-A3B-Instruct-2507-int4-AutoRound/snapshots/57260401ae48d607dbeb2cd3eee17d61c1087ceb/config.json"

          with open(config_path) as f:
              config = json.load(f)

          if "quantization_config" not in config:
              # Restore the quantization_config that was removed
              # Read from the backup in .huggingface metadata or reconstruct
              config["quantization_config"] = {
                  "autoround_version": "0.6.1.dev",
                  "bits": 4,
                  "data_type": "int",
                  "group_size": 128,
                  "nsamples": 512,
                  "packing_format": "triton_zeropoint",
                  "quant_method": "intel/auto-round",
                  "sym": False
              }
              print("Restored quantization_config")
          else:
              print("quantization_config already present")

          with open(config_path, "w") as f:
              json.dump(config, f, indent=2)

          print("Done")
      volumeMounts:
        - name: models
          mountPath: /models
  volumes:
    - name: models
      persistentVolumeClaim:
        claimName: vllm-models-pvc
