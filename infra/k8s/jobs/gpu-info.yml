apiVersion: v1
kind: Pod
metadata:
  name: gpu-info
  namespace: realestate
spec:
  nodeSelector:
    kubernetes.io/hostname: inference
  hostPID: true
  restartPolicy: Never
  containers:
    - name: gpu-info
      image: fedora:44
      command:
        - bash
        - -c
        - |
          nsenter -t 1 -m -- bash -c '
            echo "=== GPU Card Identity ==="
            lspci | grep -i "vga\|display\|3d"
            echo ""
            echo "=== DRM cards ==="
            ls -la /sys/class/drm/card*/device/driver 2>/dev/null
            echo ""
            echo "=== Card1 device info ==="
            cat /sys/class/drm/card1/device/device 2>/dev/null && echo " (device ID)"
            cat /sys/class/drm/card1/device/vendor 2>/dev/null && echo " (vendor ID)"
            cat /sys/class/drm/card1/device/subsystem_device 2>/dev/null && echo " (subsystem)"
            echo ""
            echo "=== VRAM / memory info ==="
            find /sys/class/drm/card1 -name "*mem*" -type f 2>/dev/null | while read f; do echo "$f: $(cat $f 2>/dev/null)"; done
            echo ""
            echo "=== xe driver VRAM regions ==="
            find /sys -path "*card1*" -name "*lmem*" -o -path "*card1*" -name "*vram*" -o -path "*card1*" -name "*local*" 2>/dev/null | while read f; do echo "$f: $(cat $f 2>/dev/null | head -1)"; done
            echo ""
            echo "=== Total system memory ==="
            free -h | head -2
            echo ""
            echo "=== xpu-smi (if available) ==="
            xpu-smi discovery 2>/dev/null || echo "xpu-smi not available"
          '
      securityContext:
        privileged: true
