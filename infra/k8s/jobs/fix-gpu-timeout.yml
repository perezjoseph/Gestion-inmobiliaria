apiVersion: v1
kind: Pod
metadata:
  name: fix-gpu-timeout
  namespace: realestate
spec:
  nodeSelector:
    kubernetes.io/hostname: inference
  hostPID: true
  restartPolicy: Never
  containers:
    - name: fix-gpu
      image: fedora:44
      command:
        - bash
        - -c
        - |
          set -e
          echo "=== Checking current xe driver parameters ==="
          nsenter -t 1 -m -- bash -c '
            echo "Kernel module params:"
            cat /sys/module/xe/parameters/job_timeout_ms 2>/dev/null && echo " (job_timeout_ms)" || echo "job_timeout_ms: not found"
            cat /sys/module/xe/parameters/guc_log_level 2>/dev/null || true
            
            echo ""
            echo "Available xe module parameters:"
            ls /sys/module/xe/parameters/ 2>/dev/null || echo "no xe module params dir"
            
            echo ""
            echo "Current GPU memory info:"
            cat /sys/class/drm/card1/device/mem_info_vram_total 2>/dev/null || echo "no vram_total"
            find /sys/class/drm/card1 -name "*mem*" -exec sh -c "echo {}; cat {} 2>/dev/null" \; 2>/dev/null | head -20
            
            echo ""
            echo "=== Attempting to increase job timeout ==="
            if [ -f /sys/module/xe/parameters/job_timeout_ms ]; then
              echo 60000 > /sys/module/xe/parameters/job_timeout_ms 2>/dev/null && echo "Set job_timeout_ms to 60000" || echo "Cannot write (read-only param)"
            fi
            
            echo ""
            echo "=== Checking if modprobe conf exists ==="
            cat /etc/modprobe.d/*xe* 2>/dev/null || echo "No xe modprobe config"
            
            echo ""
            echo "=== Creating persistent config ==="
            echo "options xe job_timeout_ms=60000" > /etc/modprobe.d/xe-timeout.conf
            cat /etc/modprobe.d/xe-timeout.conf
            echo "Config written. Reboot needed to apply."
          '
      securityContext:
        privileged: true
