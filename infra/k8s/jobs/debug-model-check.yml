apiVersion: v1
kind: Pod
metadata:
  name: debug-model-check
  namespace: realestate
spec:
  restartPolicy: Never
  nodeSelector:
    kubernetes.io/hostname: inference
  containers:
    - name: debug
      image: busybox
      command:
        - sh
        - -c
        - |
          echo "=== Qwen/Qwen3-30B-A3B full listing ==="
          find /models/hub/models--Qwen--Qwen3-30B-A3B -type f 2>&1 | head -40
          echo "=== Intel model config.json ==="
          cat /models/hub/models--Intel--Qwen3-30B-A3B-Instruct-2507-int4-AutoRound/snapshots/57260401ae48d607dbeb2cd3eee17d61c1087ceb/quantization_config.json 2>&1
          echo "=== model file sizes ==="
          ls -lh /models/hub/models--Intel--Qwen3-30B-A3B-Instruct-2507-int4-AutoRound/snapshots/57260401ae48d607dbeb2cd3eee17d61c1087ceb/*.safetensors 2>&1
          echo "---DONE---"
      volumeMounts:
        - name: models
          mountPath: /models
  volumes:
    - name: models
      persistentVolumeClaim:
        claimName: vllm-models-pvc
