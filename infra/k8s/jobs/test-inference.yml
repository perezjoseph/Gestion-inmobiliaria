apiVersion: v1
kind: Pod
metadata:
  name: test-inference
  namespace: realestate
spec:
  restartPolicy: Never
  containers:
    - name: curl
      image: curlimages/curl:latest
      command:
        - sh
        - -c
        - |
          curl -v http://vllm-inference.realestate.svc.cluster.local:8000/v1/chat/completions \
            -H "Content-Type: application/json" \
            -d '{
              "model": "Intel/Qwen3-30B-A3B-Instruct-2507-int4-AutoRound",
              "messages": [{"role": "user", "content": "Hola, cuanto es 2+2? Responde brevemente."}],
              "max_tokens": 100,
              "temperature": 0.7
            }'
