apiVersion: batch/v1
kind: Job
metadata:
  name: download-qwen3-coder-ov
  namespace: realestate
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: model-export
    spec:
      restartPolicy: Never
      automountServiceAccountToken: false
      nodeSelector:
        kubernetes.io/hostname: inference
      containers:
        - name: download
          image: python:3.12-slim
          command:
            - /bin/bash
            - -c
            - |
              set -e
              echo "=== Installing huggingface-cli ==="
              pip install --no-cache-dir "huggingface_hub[cli]"

              echo "=== Cleaning up old caches and orphan models ==="
              rm -rf /models/.hf_cache || true
              rm -rf /models/.pip_cache || true
              rm -rf /models/Qwen3-30B-A3B || true
              rm -rf /models/Qwen3.5-35B-A3B || true
              rm -rf /models/Qwen3.6-35B-A3B || true
              df -h /models

              echo "=== Downloading pre-built OpenVINO IR (INT4) ==="
              hf download OpenVINO/Qwen3-Coder-30B-A3B-Instruct-int4-ov \
                --local-dir /models/Qwen3-Coder-30B-A3B-Instruct-int4-ov

              echo "=== Download complete ==="
              ls -la /models/Qwen3-Coder-30B-A3B-Instruct-int4-ov/
              du -sh /models/Qwen3-Coder-30B-A3B-Instruct-int4-ov/
              echo "=== Done ==="
          resources:
            requests:
              cpu: "1"
              memory: 2Gi
              ephemeral-storage: 2Gi
            limits:
              cpu: "4"
              memory: 4Gi
              ephemeral-storage: 4Gi
          volumeMounts:
            - name: models
              mountPath: /models
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: ovms-models-pvc
