sonar.projectKey=gestion-inmobiliaria
sonar.projectName=Gestion Inmobiliaria

# ── Source layout ──
# Rust sources (backend + frontend)
# Kotlin sources (Android app, core modules, feature modules)
sonar.sources=\
  backend/src,\
  frontend/src,\
  android/app/src/main/kotlin,\
  android/core/common/src/main/kotlin,\
  android/core/data/src/main/kotlin,\
  android/core/database/src/main/kotlin,\
  android/core/model/src/main/kotlin,\
  android/core/network/src/main/kotlin,\
  android/core/ui/src/main/kotlin,\
  android/feature/auditoria/src/main/kotlin,\
  android/feature/auth/src/main/kotlin,\
  android/feature/configuracion/src/main/kotlin,\
  android/feature/contratos/src/main/kotlin,\
  android/feature/dashboard/src/main/kotlin,\
  android/feature/documentos/src/main/kotlin,\
  android/feature/gastos/src/main/kotlin,\
  android/feature/importacion/src/main/kotlin,\
  android/feature/inquilinos/src/main/kotlin,\
  android/feature/mantenimiento/src/main/kotlin,\
  android/feature/notificaciones/src/main/kotlin,\
  android/feature/pagos/src/main/kotlin,\
  android/feature/perfil/src/main/kotlin,\
  android/feature/propiedades/src/main/kotlin,\
  android/feature/reportes/src/main/kotlin,\
  android/feature/scanner/src/main/kotlin

sonar.tests=\
  backend/tests,\
  frontend/tests,\
  android/core/common/src/test/kotlin,\
  android/core/data/src/test/kotlin,\
  android/core/database/src/test/kotlin,\
  android/core/network/src/test/kotlin,\
  android/feature/auth/src/test/kotlin,\
  android/feature/contratos/src/test/kotlin,\
  android/feature/dashboard/src/test/kotlin,\
  android/feature/gastos/src/test/kotlin,\
  android/feature/inquilinos/src/test/kotlin,\
  android/feature/mantenimiento/src/test/kotlin,\
  android/feature/pagos/src/test/kotlin,\
  android/feature/propiedades/src/test/kotlin,\
  android/feature/scanner/src/test/kotlin

sonar.exclusions=\
  **/target/**,\
  **/dist/**,\
  **/node_modules/**,\
  **/*.generated.*,\
  **/migrations/**,\
  **/build/**,\
  **/.gradle/**

# ── Encoding ──
sonar.sourceEncoding=UTF-8

# ── Language-specific settings ──
sonar.kotlin.file.suffixes=.kt,.kts
sonar.rust.file.suffixes=.rs

# ── Duplication detection ──
sonar.cpd.minimumTokens=50

# ── External reports (generated by CI) ──
sonar.rust.lcov.reportPaths=coverage/lcov.info
sonar.rust.clippy.reportPaths=clippy-report.json
sonar.kotlin.detekt.reportPaths=android/build/reports/detekt/detekt.xml
sonar.androidLint.reportPaths=android/app/build/reports/lint-results-debug.xml
sonar.coverage.jacoco.xmlReportPaths=android/**/build/reports/coverage/test/debug/report.xml

# ── Quality thresholds (scanner-side enforcement) ──
sonar.qualitygate.wait=true
sonar.qualitygate.timeout=300

# ── SCM / blame ──
sonar.scm.provider=git
sonar.scm.forceReloadAll=false
