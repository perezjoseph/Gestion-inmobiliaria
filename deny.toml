[graph]
targets = [
    "x86_64-unknown-linux-gnu",
    "wasm32-unknown-unknown",
]

[advisories]
ignore = [
    # rsa Marvin Attack (RUSTSEC-2023-0071): no patch available.
    # We use HMAC (HS256) for JWT, not RSA. The rsa crate is a transitive dep
    # of jsonwebtoken but never exercised in our code path.
    "RUSTSEC-2023-0071",
    # proc-macro-error unmaintained: transitive dep from yew-macro/yew 0.21.
    # No safe upgrade until yew drops this dependency.
    "RUSTSEC-2024-0370",
    # bincode unmaintained: transitive dep from gloo-worker/yew 0.21.
    # No safe upgrade until yew drops this dependency.
    "RUSTSEC-2025-0141",
    # rusttype unmaintained: transitive dep from numaelis-rckive-genpdf.
    # No safe upgrade available.
    "RUSTSEC-2021-0140",
    # rand unsoundness (RUSTSEC-2026-0097): transitive dep, no patch available.
    # Synced with .cargo/audit.toml.
    "RUSTSEC-2026-0097",
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "BSL-1.0",
    "CC0-1.0",
    "OpenSSL",
    "MPL-2.0",
]
confidence-threshold = 0.8

# Our own workspace crates are private and unlicensed
[licenses.private]
ignore = true
registries = []

# Crate-specific license exceptions for copyleft/uncommon licenses
[[licenses.exceptions]]
name = "actix-governor"
allow = ["GPL-3.0"]

[[licenses.exceptions]]
name = "numaelis-rckive-genpdf"
allow = ["EUPL-1.2"]

[[licenses.exceptions]]
name = "webpki-roots"
allow = ["CDLA-Permissive-2.0"]

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
