# Refactored "Process queue" step for .github/workflows/kiro-autofix-trigger.yml
#
# WHAT CHANGED vs the original:
#   - Kiro is now invoked via the custom agent config:
#       kiro-cli --agent autofix chat --no-interactive --trust-all-tools "<minimal prompt>"
#   - The diagnostics context is handed to the agent ONLY through the
#     KIRO_DIAGNOSTICS_FILE environment variable. It is no longer inlined or
#     described in the positional prompt.
#   - All standing instructions (read the diagnostics file, honor the success
#     criteria, read prior history/learnings, write the commit message, fix the
#     root cause with no stubs, run verification sensors, leave git to the
#     workflow) now live in the agent's system prompt (autofix-system.md) and
#     are surfaced to the agent via env vars. The positional prompt is minimal.
#
# WHAT IS UNCHANGED (intentionally preserved intact):
#   - The queue loop structure (while IFS= read -r artifact ... done)
#   - Truncation logic (MAX_CONTEXT_BYTES + tail -c + truncated note)
#   - Every safety check (empty context, deploy skips, already-fixed dedup)
#   - Commit logic (git add -A, git status --porcelain, commit -F message file
#     or fallback commit, KIRO_COMMIT_MSG_FILE Workflow-run trailer)
#   - Learnings + git-history accumulation and exit-code-driven queue control
#
# Drop this in place of the existing "Process queue" step.

- name: Process queue (one Kiro run + one commit per artifact)
  id: queue
  if: steps.optout.outputs.skip == 'false' && steps.attempts.outputs.exceeded == 'false' && steps.list.outputs.count != '0' && steps.baseline.outputs.still_failing != 'false'
  env:
    KIRO_API_KEY: ${{ secrets.KIRO_API }}
    KIRO_MAX_FIX_ITERATIONS: "3"
    ARTIFACTS_JSON: ${{ steps.list.outputs.artifacts }}
    GIT_HISTORY_FILE: ${{ steps.history.outputs.history_log }}
    QUEUE_RUNS: ${{ steps.attempts.outputs.queue_runs }}
  run: |
    umask 077
    ATTEMPT_DISPLAY=$((QUEUE_RUNS + 1))
    COMMITS_MADE=0
    TOTAL=$(echo "$ARTIFACTS_JSON" | jq 'length')
    POS=0
    FIXED_FILES=""

    # Initialize accumulated learnings file for cross-artifact context.
    LEARNINGS_FILE="${RUNNER_TEMP}/autofix-learnings.txt"
    : > "$LEARNINGS_FILE"

    # Iterate through artifacts in priority order
    while IFS= read -r artifact; do
      [ -z "$artifact" ] && continue
      POS=$((POS + 1))
      CONTEXT_PATH="${RUNNER_TEMP}/all-diag/${artifact}/context.txt"

      # collect-diagnostics guarantees non-empty context.txt.
      # If somehow empty, try any file in the artifact dir, then skip.
      if [ ! -s "$CONTEXT_PATH" ]; then
        ALT_FILE=$(find "${RUNNER_TEMP}/all-diag/${artifact}/" -type f -size +0 2>/dev/null | head -1)
        if [ -n "$ALT_FILE" ]; then
          CONTEXT_PATH="$ALT_FILE"
          echo "::notice::Using alternative file from ${artifact}: $(basename "$ALT_FILE")"
        else
          echo "::warning::${artifact} has no usable diagnostics content — skipping"
          printf '[%s] SKIPPED: no usable diagnostics content\n' "$artifact" >> "$LEARNINGS_FILE"
          continue
        fi
      fi

      echo "::group::Processing ${artifact}"

      # Truncate diagnostics if oversized to protect context window.
      CTX_BYTES=$(wc -c < "$CONTEXT_PATH")
      TRUNCATED_CTX="${RUNNER_TEMP}/all-diag/${artifact}/context-truncated.txt"
      if [ "$CTX_BYTES" -gt "${MAX_CONTEXT_BYTES}" ]; then
        echo "::warning::context.txt for ${artifact} is ${CTX_BYTES} bytes; truncating to last ${MAX_CONTEXT_BYTES}"
        tail -c "${MAX_CONTEXT_BYTES}" "$CONTEXT_PATH" > "$TRUNCATED_CTX"
        echo "[NOTE: Earlier diagnostic output was truncated; only the last ${MAX_CONTEXT_BYTES} bytes are shown above.]" >> "$TRUNCATED_CTX"
        EFFECTIVE_CTX="$TRUNCATED_CTX"
      else
        EFFECTIVE_CTX="$CONTEXT_PATH"
      fi

      # Skip deploy artifacts where the cluster is unreachable — no code change can fix this.
      if [[ "$artifact" == diag-deploy-* ]] && grep -qF "=== CLUSTER UNREACHABLE ===" "$EFFECTIVE_CTX"; then
        echo "::notice::Skipping ${artifact}: cluster unreachable (infrastructure issue, not actionable by code fix)"
        printf '[%s] SKIPPED: cluster unreachable — infrastructure issue\n' "$artifact" >> "$LEARNINGS_FILE"
        echo "::endgroup::"
        continue
      fi

      # Skip deploy artifacts where pods crash due to a secret length/value misconfiguration.
      # These require updating GitHub Actions secrets, not code changes.
      if [[ "$artifact" == diag-deploy-* ]] && grep -qF "JWT_SECRET debe tener al menos 32 caracteres" "$EFFECTIVE_CTX"; then
        echo "::notice::Skipping ${artifact}: secret misconfiguration (JWT_SECRET too short — update the DEV_JWT_SECRET or JWT_SECRET GitHub Actions secret)"
        printf '[%s] SKIPPED: secret misconfiguration — update DEV_JWT_SECRET repository secret to >=32 chars\n' "$artifact" >> "$LEARNINGS_FILE"
        echo "::endgroup::"
        continue
      fi

      # Skip deploy artifacts where pods crash due to database unreachable (PoolTimedOut).
      # This is an infrastructure issue (db pod not running), not a code issue.
      if [[ "$artifact" == diag-deploy-* ]] && grep -qF "SqlxError(PoolTimedOut)" "$EFFECTIVE_CTX"; then
        echo "::notice::Skipping ${artifact}: database unreachable (PoolTimedOut — ensure the db deployment is running in the namespace)"
        printf '[%s] SKIPPED: database unreachable (PoolTimedOut) — ensure db pod is running in namespace\n' "$artifact" >> "$LEARNINGS_FILE"
        echo "::endgroup::"
        continue
      fi

      # Skip deploy artifacts where pods crash due to database credential mismatch (28P01).
      # This requires updating the DEV_POSTGRES_PASSWORD GitHub Actions secret.
      if [[ "$artifact" == diag-deploy-* ]] && grep -qF "password authentication failed" "$EFFECTIVE_CTX"; then
        echo "::notice::Skipping ${artifact}: database credential mismatch (28P01 — update DEV_POSTGRES_PASSWORD secret to match the Postgres user password)"
        printf '[%s] SKIPPED: database credential mismatch (28P01) — update DEV_POSTGRES_PASSWORD repository secret\n' "$artifact" >> "$LEARNINGS_FILE"
        echo "::endgroup::"
        continue
      fi

      # Skip artifacts whose errors reference only files already fixed by prior queue items.
      if [ -n "$FIXED_FILES" ]; then
        DIAG_FILES=$(grep -oP '(?:^|\s)(\S+\.(?:rs|ts|tsx|kt|kts))' "$EFFECTIVE_CTX" | sort -u || true)
        ALL_COVERED=true
        while IFS= read -r dfile; do
          [ -z "$dfile" ] && continue
          # Trim leading/trailing whitespace without xargs (avoids quote parsing issues)
          dfile_trimmed="${dfile#"${dfile%%[![:space:]]*}"}"
          dfile_trimmed="${dfile_trimmed%"${dfile_trimmed##*[![:space:]]}"}"
          if ! echo "$FIXED_FILES" | grep -qF "$dfile_trimmed"; then
            ALL_COVERED=false
            break
          fi
        done <<< "$DIAG_FILES"
        if [ "$ALL_COVERED" = true ] && [ -n "$DIAG_FILES" ]; then
          echo "::notice::Skipping ${artifact}: all referenced files were already fixed by prior queue items"
          printf '[%s] SKIPPED: all referenced files already fixed by prior items\n' "$artifact" >> "$LEARNINGS_FILE"
          echo "::endgroup::"
          continue
        fi
      fi

      # Determine success criteria based on artifact type.
      # Passed to the agent via env var (KIRO_SUCCESS_CRITERIA) rather than
      # inlined into the prompt — the system prompt instructs the agent to
      # treat it as the definition of done.
      SUCCESS_CRITERIA=""
      case "$artifact" in
        diag-clippy-backend|diag-build-backend)
          SUCCESS_CRITERIA="'cargo clippy --locked -p realestate-backend --target x86_64-unknown-linux-musl -- -D warnings' must exit 0 with no output."
          ;;
        diag-clippy-frontend|diag-build-frontend)
          SUCCESS_CRITERIA="'cargo clippy --locked --target wasm32-unknown-unknown -p realestate-frontend -- -D warnings' must exit 0 with no output."
          ;;
        diag-test-backend)
          SUCCESS_CRITERIA="'cargo test --locked -p realestate-backend' must exit 0 with all tests passing."
          ;;
        diag-test-frontend)
          SUCCESS_CRITERIA="'cargo test --locked -p realestate-frontend' must exit 0 with all tests passing."
          ;;
        diag-container-*)
          SUCCESS_CRITERIA="the Dockerfile must build successfully and trivy image scan must find no CRITICAL vulnerabilities."
          ;;
        diag-security-*|diag-semgrep-*)
          SUCCESS_CRITERIA="the security finding described in the diagnostics must be resolved without introducing new issues."
          ;;
        *)
          SUCCESS_CRITERIA="the error described in the diagnostics must be fully resolved."
          ;;
      esac

      # Set environment variables for the agent.
      # The diagnostics context is delivered ONLY via KIRO_DIAGNOSTICS_FILE
      # (not inlined in the prompt). The agent's system prompt tells it to
      # read these files.
      # NOTE: GH_TOKEN is NOT exported here — the agent should not have
      # access to the PAT. Only KIRO_API_KEY is available to the agent.
      export KIRO_ARTIFACT="$artifact"
      export KIRO_QUEUE_POSITION="${POS}/${TOTAL}"
      export KIRO_DIAGNOSTICS_FILE="$EFFECTIVE_CTX"
      export KIRO_SUCCESS_CRITERIA="$SUCCESS_CRITERIA"
      export KIRO_COMMIT_MSG_FILE="${RUNNER_TEMP}/kiro-commit-message-${artifact}.txt"
      export KIRO_GIT_HISTORY_FILE="$GIT_HISTORY_FILE"
      export KIRO_LEARNINGS_FILE="$LEARNINGS_FILE"

      # Minimal positional prompt — all standing instructions live in the
      # agent's system prompt (autofix-system.md). The diagnostics, success
      # criteria, history, learnings, and commit-message destination are
      # supplied through the exported KIRO_* environment variables above.
      PROMPT="Fix the CI failure for artifact '${artifact}' (queue position ${POS}/${TOTAL})."

      # Invoke the autofix agent config (no per-artifact timeout; job-level
      # timeout-minutes guards against runaway execution).
      AGENT_EXIT=0
      kiro-cli --agent autofix chat --no-interactive --trust-all-tools \
          "$PROMPT" \
        || AGENT_EXIT=$?

      # Detect ANY change in working tree (tracked, staged, OR untracked).
      git add -A
      if [ -z "$(git status --porcelain)" ]; then
        echo "No changes produced by Kiro for ${artifact}, skipping commit"
        printf '[%s] NO CHANGES: agent exit=%d, no files modified\n' "$artifact" "$AGENT_EXIT" >> "$LEARNINGS_FILE"
        if [ "$AGENT_EXIT" -ne 0 ]; then
          echo "::warning::Agent exited ${AGENT_EXIT} with no changes for ${artifact}; stopping queue."
          echo "::endgroup::"
          break
        fi
        echo "::endgroup::"
        continue
      fi

      # Track which files were fixed for deduplication of later artifacts.
      NEWLY_FIXED=$(git diff --cached --name-only)
      FIXED_FILES="${FIXED_FILES}"$'\n'"${NEWLY_FIXED}"

      # Record what was fixed in learnings for subsequent artifacts.
      printf '[%s] FIXED: agent exit=%d, files changed:\n%s\n' "$artifact" "$AGENT_EXIT" "$NEWLY_FIXED" >> "$LEARNINGS_FILE"

      # Commit locally — no push yet (push happens once at end of queue).
      # Ensure every queued commit ends with the Workflow run trailer for
      # the queue-run counter to detect.
      if [ -s "$KIRO_COMMIT_MSG_FILE" ]; then
        if ! grep -qF "Workflow run: ${RUN_URL}" "$KIRO_COMMIT_MSG_FILE"; then
          printf '\nWorkflow run: %s\n' "$RUN_URL" >> "$KIRO_COMMIT_MSG_FILE"
        fi
        git commit -F "$KIRO_COMMIT_MSG_FILE"
      else
        echo "::warning::Kiro did not produce a commit message for ${artifact}; using fallback."
        git commit -m "fix(autofix): resolve ${artifact}" -m "Kiro did not write a descriptive commit message. Inspect the diff for details." -m "Workflow run: ${RUN_URL}"
      fi
      COMMITS_MADE=$((COMMITS_MADE + 1))
      echo "Commit ${COMMITS_MADE} created for ${artifact}"

      # Update git history file so subsequent artifacts see what changed.
      {
        echo "=== RECENT COMMITS (last 10) ==="
        git log --format='%h %ae %s%n%b%n---' -n 10
        echo ""
        echo "=== PRIOR KIRO-BOT QUEUE RUNS AT HEAD: ${QUEUE_RUNS} ==="
      } > "$GIT_HISTORY_FILE"

      # Exit code handling: 0 → continue queue; non-zero → stop queue
      if [ "$AGENT_EXIT" -ne 0 ]; then
        echo "::warning::Agent exited ${AGENT_EXIT} for ${artifact}; committed partial fix, stopping queue."
        echo "::endgroup::"
        break
      fi

      echo "::endgroup::"
    done < <(echo "$ARTIFACTS_JSON" | jq -r '.[]')

    echo "commits_made=$COMMITS_MADE" >> "$GITHUB_OUTPUT"
    echo ""
    echo "Queue complete. Created $COMMITS_MADE commits."
    if [ -s "$LEARNINGS_FILE" ]; then
      echo "=== Queue Learnings ==="
      cat "$LEARNINGS_FILE"
    fi
