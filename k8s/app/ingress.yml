# k3s Traefik IngressRoute for the application.
# Caddy (frontend) handles TLS termination and proxies /api/* to backend internally.
# Traefik routes all external traffic to the frontend service.
#
# If you want Traefik to handle TLS instead of Caddy, replace this with
# a TLS IngressRoute and update the Caddyfile to listen on :80 without TLS.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: realestate
  namespace: realestate
spec:
  entryPoints:
    - websecure
  routes:
    - match: PathPrefix(`/`)
      kind: Rule
      services:
        - name: frontend
          port: 8443
          scheme: https
          serversTransport: frontend-transport
---
# Tell Traefik to skip TLS verification when connecting to Caddy's self-signed cert
apiVersion: traefik.io/v1alpha1
kind: ServersTransport
metadata:
  name: frontend-transport
  namespace: realestate
spec:
  insecureSkipVerify: true
