# Reduces the ARC controller polling interval from the default 1m to 10s.
# This controls how often the controller checks GitHub for queued workflow runs.
#
# Apply with:
#   kubectl patch deployment arc-actions-runner-controller -n arc-systems \
#     --type strategic -p "$(cat k8s/arc-runners/arc-controller-sync-period-patch.yml)"
#
# Or via Helm upgrade:
#   helm upgrade arc-controller <chart> --set syncPeriod=10s
#
# Trade-off: more GitHub API calls (~12 req/min with 2 autoscalers).
# GitHub rate limit is 5,000 req/hr for authenticated requests, so this is safe
# for a single-repo setup.
spec:
  template:
    spec:
      securityContext:
        runAsNonRoot: true
      containers:
        - name: manager
          args:
            - "--sync-period=10s"
