apiVersion: v1
kind: Pod
metadata:
  name: xpu-smi
  namespace: default
spec:
  nodeName: inference
  restartPolicy: Never
  containers:
    - name: xpu-smi
      image: ghcr.io/intel/xpumanager/xpumd:v2.x
      command: ["sh", "-c", "xpumd & sleep 3; xpumcli discovery 2>&1; xpumcli stats -d 0 2>&1 || xpu-smi discovery 2>&1; xpu-smi stats -d 0 2>&1"]
      securityContext:
        privileged: true
      volumeMounts:
        - name: dri
          mountPath: /dev/dri
  volumes:
    - name: dri
      hostPath:
        path: /dev/dri
