<!DOCTYPE html>
<html lang="es" data-theme="light">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Gestión Inmobiliaria — República Dominicana</title>
  <link rel="manifest" href="/manifest.webmanifest">
  <link data-trunk rel="copy-file" href="manifest.webmanifest" />
  <link data-trunk rel="copy-file" href="service-worker.js" />
  <link data-trunk rel="copy-dir" href="fonts" />
  <link data-trunk rel="css" href="styles/fonts.css" />
  <link data-trunk rel="css" href="styles/tailwind.css" />
  <link data-trunk rel="rust" data-wasm-opt="0" />
  <script data-trunk src="js/theme-init.js"></script>
  <script data-trunk src="js/error-handler.js"></script>
</head>

<body>
  <div id="loading"
    style="display:flex;align-items:center;justify-content:center;min-height:100vh;background-color:var(--surface-base, #faf9f7);">
    <div style="text-align:center;">
      <div
        style="width:36px;height:36px;border:3px solid #e0ddd8;border-top-color:#3d8b8b;border-radius:50%;animation:sp .8s linear infinite;margin:0 auto 16px;">
      </div>
      <p style="font-family:'Source Sans 3',system-ui,sans-serif;font-size:0.875rem;color:#6d6862;">Cargando aplicación…
      </p>
    </div>
  </div>
  <style>
    @keyframes sp {
      to {
        transform: rotate(360deg)
      }
    }
  </style>
  <script data-trunk src="js/app-loaded.js"></script>
  <script data-trunk type="module" src="js/service-worker-register.js"></script>
</body>

</html>
