name: Android SDK Setup
description: >
  Ensures Android SDK is available. Uses the prebaked SDK on the runner image
  if present, otherwise downloads and installs cmdline-tools + platform 36 + build-tools 36.

runs:
  using: composite
  steps:
    - name: Configure Android SDK
      shell: bash
      run: |
        MAX_ATTEMPTS=3
        ATTEMPT=0
        while [ "$ATTEMPT" -lt "$MAX_ATTEMPTS" ]; do
          ATTEMPT=$((ATTEMPT + 1))

          if [ -d "${ANDROID_HOME:-/opt/android-sdk}/cmdline-tools/latest" ]; then
            export ANDROID_HOME="${ANDROID_HOME:-/opt/android-sdk}"
            echo "Android SDK already available at ${ANDROID_HOME}"
            echo "ANDROID_HOME=${ANDROID_HOME}" >> "${GITHUB_ENV}"
            echo "${ANDROID_HOME}/cmdline-tools/latest/bin" >> "${GITHUB_PATH}"
            echo "${ANDROID_HOME}/build-tools/36.0.0" >> "${GITHUB_PATH}"
            exit 0
          fi

          export ANDROID_HOME="${HOME}/android-sdk"
          mkdir -p "${ANDROID_HOME}/cmdline-tools"

          if curl -fsSL "https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip" \
            -o /tmp/cmdline-tools.zip; then
            unzip -qo /tmp/cmdline-tools.zip -d "${ANDROID_HOME}/cmdline-tools"
            mv -f "${ANDROID_HOME}/cmdline-tools/cmdline-tools" "${ANDROID_HOME}/cmdline-tools/latest" 2>/dev/null || true
            yes 2>/dev/null | "${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager" --licenses > /dev/null 2>&1 || true
            "${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager" \
              "platforms;android-36" "build-tools;36.0.0" > /dev/null 2>&1
            echo "ANDROID_HOME=${ANDROID_HOME}" >> "${GITHUB_ENV}"
            echo "${ANDROID_HOME}/cmdline-tools/latest/bin" >> "${GITHUB_PATH}"
            echo "${ANDROID_HOME}/build-tools/36.0.0" >> "${GITHUB_PATH}"
            rm -f /tmp/cmdline-tools.zip
            exit 0
          fi

          echo "Attempt ${ATTEMPT}/${MAX_ATTEMPTS} failed, retrying in 10s..."
          rm -f /tmp/cmdline-tools.zip
          sleep 10
        done
        echo "::error::Failed to install Android SDK after ${MAX_ATTEMPTS} attempts"
        exit 1
