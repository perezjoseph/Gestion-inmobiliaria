name: 'Rust Setup'
description: 'Shared setup for Rust CI jobs: workspace cleanup, checkout, OpenSSL headers, toolchain, and cache'

inputs:
  components:
    description: 'Comma-separated rustup components (e.g., rustfmt,clippy)'
    required: false
    default: ''
  targets:
    description: 'Comma-separated rustup targets (e.g., wasm32-unknown-unknown)'
    required: false
    default: ''
  cache-key:
    description: 'Shared cache key prefix for Swatinem/rust-cache'
    required: false
    default: 'default'

runs:
  using: composite
  steps:
    - name: Clean workspace
      shell: bash
      run: |
        if [ -z "$GITHUB_WORKSPACE" ] || [ "$GITHUB_WORKSPACE" = "/" ]; then
          echo "::error::GITHUB_WORKSPACE is empty or root -- aborting cleanup"
          exit 1
        fi
        rm -rf "${GITHUB_WORKSPACE:?}"/* "${GITHUB_WORKSPACE:?}"/.* 2>/dev/null || true

    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false

    - name: Install OpenSSL development headers
      shell: bash
      run: |
        if ! dpkg -s libssl-dev pkg-config >/dev/null 2>&1; then
          sudo apt-get update -qq
          sudo apt-get install -y -qq --no-install-recommends pkg-config libssl-dev
        fi

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      with:
        toolchain: "1.88.0"
        components: ${{ inputs.components }}
        targets: ${{ inputs.targets }}

    - name: Rust cache
      uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      with:
        shared-key: ${{ inputs.cache-key }}
        cache-on-failure: true
