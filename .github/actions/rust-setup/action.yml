name: 'Rust Setup'
description: 'Shared setup for Rust CI jobs: OpenSSL headers and toolchain installation for ARC ephemeral runners.'

inputs:
  components:
    description: 'Comma-separated rustup components (e.g., rustfmt,clippy)'
    required: false
    default: ''
  targets:
    description: 'Comma-separated rustup targets (e.g., wasm32-unknown-unknown)'
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Ensure build tools and OpenSSL development headers are available
      shell: bash
      run: |
        NEED_INSTALL=false
        if ! command -v cc >/dev/null 2>&1; then
          echo "C linker (cc) missing -- will install build-essential"
          NEED_INSTALL=true
        fi
        if ! pkg-config --exists openssl 2>/dev/null; then
          echo "OpenSSL headers missing -- will install libssl-dev"
          NEED_INSTALL=true
        fi
        if [ "$NEED_INSTALL" = true ]; then
          sudo apt-get update -qq
          sudo apt-get install -y -qq --no-install-recommends build-essential pkg-config libssl-dev
        else
          echo "Build tools and OpenSSL headers already available (cc: $(cc --version | head -1), openssl: $(pkg-config --modversion openssl))"
        fi

    - name: Ensure CARGO_HOME directories are writable
      shell: bash
      run: |
        # Pre-create directories so rustup doesn't fail with "Permission denied".
        # Also fix ownership in case a cache restore created them as a different user.
        for dir in "$HOME/.cargo/bin" "$HOME/.cargo/registry" "$HOME/.rustup"; do
          mkdir -p "$dir" 2>/dev/null || sudo mkdir -p "$dir"
          if [ ! -w "$dir" ]; then
            echo "Fixing ownership on $dir"
            sudo chown -R "$(id -u):$(id -g)" "$(dirname "$dir")"
          fi
        done
        echo "CARGO_HOME=$HOME/.cargo" >> "$GITHUB_ENV"
        echo "RUSTUP_HOME=$HOME/.rustup" >> "$GITHUB_ENV"

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      with:
        toolchain: "1.88.0"
        components: ${{ inputs.components }}
        targets: ${{ inputs.targets }}
