name: 'Rust Setup'
description: 'Shared setup for Rust CI jobs: OpenSSL headers and toolchain installation for ARC ephemeral runners.'

inputs:
  components:
    description: 'Comma-separated rustup components (e.g., rustfmt,clippy)'
    required: false
    default: ''
  targets:
    description: 'Comma-separated rustup targets (e.g., wasm32-unknown-unknown)'
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Ensure OpenSSL development headers are available
      shell: bash
      run: |
        if pkg-config --exists openssl 2>/dev/null; then
          echo "OpenSSL development headers already available ($(pkg-config --modversion openssl))"
        else
          echo "OpenSSL headers missing -- installing via apt"
          sudo apt-get update -qq
          sudo apt-get install -y -qq --no-install-recommends pkg-config libssl-dev
        fi

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      with:
        toolchain: "1.88.0"
        components: ${{ inputs.components }}
        targets: ${{ inputs.targets }}
