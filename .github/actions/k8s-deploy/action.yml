name: Kubernetes Deploy
description: >
  Deploys application to a k3s namespace: configures kubeconfig, updates secrets,
  applies kustomize manifests, sets image digests, waits for rollout, runs health
  checks, and rolls back on failure. Consolidates dev/prod deploy logic.

inputs:
  namespace:
    description: "Target Kubernetes namespace"
    required: true
  kubeconfig-data:
    description: "Base64-encoded kubeconfig"
    required: true
  db-username:
    description: "Database username"
    required: true
  db-password:
    description: "Database password"
    required: true
  db-host:
    description: "Database host (e.g. db:5432 or db.realestate.svc.cluster.local:5432)"
    required: true
  db-name:
    description: "Database name"
    required: true
  jwt-secret:
    description: "JWT secret for app auth"
    required: true
  kustomize-path:
    description: "Path to kustomize overlay (e.g. infra/k8s/app/overlays/dev/)"
    required: true
  caddyfile-path:
    description: "Path to Caddyfile for ConfigMap"
    required: true
  shared-manifests-path:
    description: "Path to shared kustomize base (applied before overlay, e.g. infra/k8s/app/shared/). Empty to skip."
    required: false
    default: ""
  backend-digest:
    description: "Backend image digest"
    required: true
  frontend-digest:
    description: "Frontend image digest"
    required: true
  baileys-digest:
    description: "Baileys image digest"
    required: true
  ocr-service-digest:
    description: "OCR service image digest (empty to skip)"
    required: false
    default: ""
  image-owner:
    description: "GHCR namespace for images"
    required: true
  verify-attestations:
    description: "Whether to verify image attestations before deploy (true for prod)"
    required: false
    default: "false"
  github-token:
    description: "GitHub token for attestation verification"
    required: false
    default: ""

outputs:
  deploy-outcome:
    description: "Outcome of the deploy step"
    value: ${{ steps.deploy.outcome }}

runs:
  using: composite
  steps:
    - name: Configure kubeconfig
      shell: bash
      env:
        KUBECONFIG_DATA: ${{ inputs.kubeconfig-data }}
      run: |
        umask 077
        mkdir -p "${HOME}/.kube"
        echo "${KUBECONFIG_DATA}" | base64 -d > "${HOME}/.kube/config"

    - name: Verify cluster connectivity
      uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
      with:
        timeout_minutes: 5
        max_attempts: 10
        retry_wait_seconds: 30
        command: kubectl cluster-info

    - name: Mask secrets
      shell: bash
      env:
        DB_PASSWORD: ${{ inputs.db-password }}
        JWT_SECRET: ${{ inputs.jwt-secret }}
      run: |
        echo "::add-mask::${DB_PASSWORD}"
        echo "::add-mask::${JWT_SECRET}"

    - name: Validate secrets
      shell: bash
      env:
        JWT_SECRET: ${{ inputs.jwt-secret }}
      run: |
        if [ "${#JWT_SECRET}" -lt 32 ]; then
          echo "::error::JWT secret is ${#JWT_SECRET} characters but backend requires at least 32. Update the repository secret (DEV_JWT_SECRET or JWT_SECRET)."
          echo "=== SECRET MISCONFIGURATION ===" > "${RUNNER_TEMP}/secret_validation_failed"
          exit 1
        fi

    - name: Verify backend attestation
      if: inputs.verify-attestations == 'true'
      uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        IMAGE_OWNER: ${{ inputs.image-owner }}
        BACKEND_DIGEST: ${{ inputs.backend-digest }}
      with:
        timeout_minutes: 3
        max_attempts: 3
        retry_wait_seconds: 10
        command: |
          gh attestation verify \
            "oci://ghcr.io/${IMAGE_OWNER}/realestate-backend@${BACKEND_DIGEST}" \
            --owner "${IMAGE_OWNER}"

    - name: Verify frontend attestation
      if: inputs.verify-attestations == 'true'
      uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        IMAGE_OWNER: ${{ inputs.image-owner }}
        FRONTEND_DIGEST: ${{ inputs.frontend-digest }}
      with:
        timeout_minutes: 3
        max_attempts: 3
        retry_wait_seconds: 10
        command: |
          gh attestation verify \
            "oci://ghcr.io/${IMAGE_OWNER}/realestate-frontend@${FRONTEND_DIGEST}" \
            --owner "${IMAGE_OWNER}"

    - name: Verify OCR service attestation
      if: inputs.verify-attestations == 'true' && inputs.ocr-service-digest != ''
      uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        IMAGE_OWNER: ${{ inputs.image-owner }}
        OCR_DIGEST: ${{ inputs.ocr-service-digest }}
      with:
        timeout_minutes: 3
        max_attempts: 3
        retry_wait_seconds: 10
        command: |
          gh attestation verify \
            "oci://ghcr.io/${IMAGE_OWNER}/realestate-ocr-service@${OCR_DIGEST}" \
            --owner "${IMAGE_OWNER}"

    - name: Verify Baileys attestation
      if: inputs.verify-attestations == 'true'
      uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        IMAGE_OWNER: ${{ inputs.image-owner }}
        BAILEYS_DIGEST: ${{ inputs.baileys-digest }}
      with:
        timeout_minutes: 3
        max_attempts: 3
        retry_wait_seconds: 10
        command: |
          gh attestation verify \
            "oci://ghcr.io/${IMAGE_OWNER}/realestate-baileys@${BAILEYS_DIGEST}" \
            --owner "${IMAGE_OWNER}"

    - name: Ensure namespace exists
      shell: bash
      env:
        NS: ${{ inputs.namespace }}
      run: kubectl get namespace "${NS}" || kubectl create namespace "${NS}"

    - name: Update secrets
      shell: bash
      env:
        NS: ${{ inputs.namespace }}
        DB_USERNAME: ${{ inputs.db-username }}
        DB_PASSWORD: ${{ inputs.db-password }}
        DB_HOST: ${{ inputs.db-host }}
        DB_NAME: ${{ inputs.db-name }}
        JWT_SECRET: ${{ inputs.jwt-secret }}
      run: |
        kubectl create secret generic realestate-db-secret \
          --namespace "${NS}" \
          --from-literal=username="${DB_USERNAME}" \
          --from-literal=password="${DB_PASSWORD}" \
          --dry-run=client -o yaml | kubectl apply -f -

        kubectl create secret generic realestate-db-url \
          --namespace "${NS}" \
          --from-literal=DATABASE_URL="postgresql://${DB_USERNAME}:${DB_PASSWORD}@${DB_HOST}/${DB_NAME}" \
          --dry-run=client -o yaml | kubectl apply -f -

        kubectl create secret generic realestate-app-secret \
          --namespace "${NS}" \
          --from-literal=jwt-secret="${JWT_SECRET}" \
          --dry-run=client -o yaml | kubectl apply -f -

    - name: Update Caddyfile ConfigMap
      shell: bash
      env:
        NS: ${{ inputs.namespace }}
        CADDYFILE_PATH: ${{ inputs.caddyfile-path }}
      run: |
        kubectl create configmap caddyfile \
          --namespace "${NS}" \
          --from-file=Caddyfile="${CADDYFILE_PATH}" \
          --dry-run=client -o yaml | kubectl apply -f -

    - name: Deploy shared resources
      if: inputs.shared-manifests-path != ''
      shell: bash
      env:
        SHARED_PATH: ${{ inputs.shared-manifests-path }}
      run: kubectl apply -k "${SHARED_PATH}"

    - name: Deploy application manifests
      shell: bash
      env:
        KUSTOMIZE_PATH: ${{ inputs.kustomize-path }}
      run: kubectl apply -k "${KUSTOMIZE_PATH}"

    - name: Update container images by digest
      id: deploy
      shell: bash
      env:
        NS: ${{ inputs.namespace }}
        IMAGE_OWNER: ${{ inputs.image-owner }}
        BACKEND_DIGEST: ${{ inputs.backend-digest }}
        FRONTEND_DIGEST: ${{ inputs.frontend-digest }}
        BAILEYS_DIGEST: ${{ inputs.baileys-digest }}
        OCR_DIGEST: ${{ inputs.ocr-service-digest }}
      run: |
        # Helper: get the current image digest running in a deployment's container
        current_digest() {
          local deploy="$1" container="$2"
          kubectl get deployment "$deploy" -n "${NS}" \
            -o jsonpath="{.spec.template.spec.containers[?(@.name==\"${container}\")].image}" 2>/dev/null \
            | grep -oP '@\K.*' || true
        }

        UPDATED=""

        # Backend
        CURRENT=$(current_digest "backend" "backend")
        if [ "$CURRENT" != "$BACKEND_DIGEST" ]; then
          echo "Updating backend: ${CURRENT:-<none>} → ${BACKEND_DIGEST}"
          kubectl set image deployment/backend \
            "backend=ghcr.io/${IMAGE_OWNER}/realestate-backend@${BACKEND_DIGEST}" \
            --namespace "${NS}"
          UPDATED="${UPDATED} backend"
        else
          echo "Backend already at ${BACKEND_DIGEST} — skipping"
        fi

        # Frontend
        CURRENT=$(current_digest "frontend" "frontend")
        if [ "$CURRENT" != "$FRONTEND_DIGEST" ]; then
          echo "Updating frontend: ${CURRENT:-<none>} → ${FRONTEND_DIGEST}"
          kubectl set image deployment/frontend \
            "frontend=ghcr.io/${IMAGE_OWNER}/realestate-frontend@${FRONTEND_DIGEST}" \
            --namespace "${NS}"
          UPDATED="${UPDATED} frontend"
        else
          echo "Frontend already at ${FRONTEND_DIGEST} — skipping"
        fi

        # Baileys
        CURRENT=$(current_digest "baileys" "baileys")
        if [ "$CURRENT" != "$BAILEYS_DIGEST" ]; then
          echo "Updating baileys: ${CURRENT:-<none>} → ${BAILEYS_DIGEST}"
          kubectl set image deployment/baileys \
            "baileys=ghcr.io/${IMAGE_OWNER}/realestate-baileys@${BAILEYS_DIGEST}" \
            --namespace "${NS}"
          UPDATED="${UPDATED} baileys"
        else
          echo "Baileys already at ${BAILEYS_DIGEST} — skipping"
        fi

        # OCR (optional)
        if [ -n "${OCR_DIGEST}" ] && kubectl get deployment/ocr-service --namespace "${NS}" >/dev/null 2>&1; then
          CURRENT=$(current_digest "ocr-service" "ocr-service")
          if [ "$CURRENT" != "$OCR_DIGEST" ]; then
            echo "Updating ocr-service: ${CURRENT:-<none>} → ${OCR_DIGEST}"
            kubectl set image deployment/ocr-service \
              "ocr-service=ghcr.io/${IMAGE_OWNER}/realestate-ocr-service@${OCR_DIGEST}" \
              --namespace "${NS}"
            UPDATED="${UPDATED} ocr-service"
          else
            echo "OCR service already at ${OCR_DIGEST} — skipping"
          fi
        fi

        echo "updated=${UPDATED}" >> "$GITHUB_OUTPUT"
        if [ -z "$UPDATED" ]; then
          echo "::notice::All deployments already at target digests — no rollout triggered"
        else
          echo "Updated deployments:${UPDATED}"
        fi

    - name: Wait for rollout
      id: rollout
      uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
      env:
        NS: ${{ inputs.namespace }}
        OCR_DIGEST: ${{ inputs.ocr-service-digest }}
      with:
        timeout_minutes: 15
        max_attempts: 2
        command: |
          kubectl rollout status deployment/backend --namespace "${NS}" --timeout=600s
          kubectl rollout status deployment/frontend --namespace "${NS}" --timeout=600s
          kubectl rollout status deployment/baileys --namespace "${NS}" --timeout=600s
          if [ -n "${OCR_DIGEST}" ] && kubectl get deployment/ocr-service --namespace "${NS}" >/dev/null 2>&1; then
            if ! kubectl rollout status deployment/ocr-service --namespace "${NS}" --timeout=600s; then
              echo "::warning::ocr-service rollout did not complete (optional service) — continuing"
            fi
          fi

    - name: Health check
      id: health-check
      uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
      env:
        NS: ${{ inputs.namespace }}
        OCR_DIGEST: ${{ inputs.ocr-service-digest }}
      with:
        timeout_minutes: 10
        max_attempts: 5
        command: |
          DEPLOYS="backend frontend baileys"
          for DEPLOY in $DEPLOYS; do
            READY=$(kubectl get deployment "$DEPLOY" -n "${NS}" \
              -o jsonpath='{.status.readyReplicas}')
            DESIRED=$(kubectl get deployment "$DEPLOY" -n "${NS}" \
              -o jsonpath='{.spec.replicas}')
            if [ "${READY:-0}" -lt "${DESIRED:-1}" ]; then
              echo "::error::${DEPLOY}: ${READY:-0}/${DESIRED:-1} replicas ready"
              exit 1
            fi
            echo "${DEPLOY}: ${READY}/${DESIRED} replicas ready"
          done
          if [ -n "${OCR_DIGEST}" ] && kubectl get deployment/ocr-service -n "${NS}" >/dev/null 2>&1; then
            READY=$(kubectl get deployment ocr-service -n "${NS}" \
              -o jsonpath='{.status.readyReplicas}')
            DESIRED=$(kubectl get deployment ocr-service -n "${NS}" \
              -o jsonpath='{.spec.replicas}')
            if [ "${READY:-0}" -lt "${DESIRED:-1}" ]; then
              echo "::warning::ocr-service: ${READY:-0}/${DESIRED:-1} replicas ready (optional service)"
            else
              echo "ocr-service: ${READY}/${DESIRED} replicas ready"
            fi
          fi
          echo "All core deployments healthy"

    - name: Rollback on failure
      if: failure() && steps.deploy.outcome == 'success'
      shell: bash
      env:
        NS: ${{ inputs.namespace }}
        OCR_DIGEST: ${{ inputs.ocr-service-digest }}
      run: |
        echo "::warning::Deployment health check failed -- rolling back only unhealthy deployments"
        DEPLOYS="backend frontend baileys"
        if [ -n "${OCR_DIGEST}" ] && kubectl get deployment/ocr-service -n "${NS}" >/dev/null 2>&1; then
          DEPLOYS="$DEPLOYS ocr-service"
        fi
        for DEPLOY in $DEPLOYS; do
          READY=$(kubectl get deployment "$DEPLOY" -n "${NS}" \
            -o jsonpath='{.status.readyReplicas}' 2>/dev/null || echo 0)
          DESIRED=$(kubectl get deployment "$DEPLOY" -n "${NS}" \
            -o jsonpath='{.spec.replicas}' 2>/dev/null || echo 1)
          if [ "${READY:-0}" -lt "${DESIRED:-1}" ]; then
            echo "::warning::${DEPLOY} is unhealthy (${READY:-0}/${DESIRED:-1}) -- rolling back"
            kubectl rollout undo "deployment/${DEPLOY}" --namespace "${NS}" || true
          else
            echo "${DEPLOY} is healthy (${READY}/${DESIRED}) -- leaving at new revision"
          fi
        done

    - name: Collect deployment diagnostics
      id: diagnostics
      if: failure()
      shell: bash
      env:
        NS: ${{ inputs.namespace }}
        OCR_DIGEST: ${{ inputs.ocr-service-digest }}
      run: |
        umask 077
        mkdir -p "${RUNNER_TEMP}/diag"
        OUT="${RUNNER_TEMP}/diag/context.txt"

        DEPLOYS="backend frontend baileys"
        if [ -n "${OCR_DIGEST}" ] && kubectl get deployment/ocr-service -n "${NS}" >/dev/null 2>&1; then
          DEPLOYS="$DEPLOYS ocr-service"
        fi

        CLUSTER_REACHABLE=true
        {
          echo "=== DEPLOYMENT FAILURE (${NS}) ==="
          echo "Step outcomes:"
          echo "  deploy=${{ steps.deploy.outcome }}"
          echo "  rollout=${{ steps.rollout.outcome }}"
          echo "  health-check=${{ steps.health-check.outcome }}"
          echo ""

          if ! kubectl cluster-info 2>&1; then
            CLUSTER_REACHABLE=false
            echo "=== CLUSTER UNREACHABLE ==="
            echo "kubectl cluster-info failed. The K8s cluster may be down or kubeconfig invalid."
          else
            echo "=== DEPLOYMENT STATUS ==="
            kubectl get deployments,pods,services -n "${NS}" -o wide 2>&1 || true
            echo ""

            echo "=== RECENT EVENTS (last 50) ==="
            kubectl get events -n "${NS}" \
              --sort-by='.lastTimestamp' \
              -o custom-columns=TIME:.lastTimestamp,TYPE:.type,REASON:.reason,OBJECT:.involvedObject.name,MESSAGE:.message \
              2>&1 | tail -50 || true
            echo ""

            for DEPLOY in $DEPLOYS; do
              echo "=== PODS FOR ${DEPLOY} ==="
              for POD in $(kubectl get pods -n "${NS}" \
                  -l "app.kubernetes.io/name=${DEPLOY}" \
                  -o jsonpath='{.items[*].metadata.name}' 2>/dev/null); do
                echo "--- logs pod/${POD} (last 200 lines) ---"
                kubectl logs "$POD" -n "${NS}" --tail=200 2>&1 || true
                echo ""
                echo "--- logs pod/${POD} (previous, last 100 lines) ---"
                kubectl logs "$POD" -n "${NS}" --previous --tail=100 2>&1 || true
                echo ""
              done
            done
          fi
        } > "$OUT"

        if [ ! -s "$OUT" ]; then
          echo "=== DEPLOYMENT FAILURE (${NS}) === Diagnostics collection produced no output." > "$OUT"
        fi
        echo "Wrote $(wc -l < "$OUT") lines to $OUT"

        # If the cluster is unreachable, skip artifact upload to avoid
        # triggering autofix for infrastructure issues no code change can fix.
        if [ "$CLUSTER_REACHABLE" = false ]; then
          echo "::warning::Cluster unreachable — skipping diagnostics artifact upload (not actionable by autofix)"
          echo "actionable=false" >> "$GITHUB_OUTPUT"
        elif [ -f "${RUNNER_TEMP}/secret_validation_failed" ]; then
          echo "::warning::Secret misconfiguration — skipping diagnostics artifact upload (not actionable by autofix)"
          echo "actionable=false" >> "$GITHUB_OUTPUT"
        elif grep -qF "SqlxError(PoolTimedOut)" "$OUT"; then
          echo "::warning::Database unreachable (PoolTimedOut) — skipping diagnostics artifact upload (not actionable by autofix)"
          echo "actionable=false" >> "$GITHUB_OUTPUT"
        elif grep -qF "password authentication failed" "$OUT"; then
          echo "::warning::Database credential mismatch (28P01) — skipping diagnostics artifact upload (not actionable by autofix)"
          echo "actionable=false" >> "$GITHUB_OUTPUT"
        else
          echo "actionable=true" >> "$GITHUB_OUTPUT"
        fi

    - name: Upload deployment diagnostics
      if: failure() && steps.diagnostics.outputs.actionable == 'true'
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4.6.2
      with:
        name: diag-deploy-${{ inputs.namespace }}
        path: ${{ runner.temp }}/diag/context.txt
        retention-days: 1

    - name: Credential cleanup
      if: always()
      shell: bash
      run: rm -f "${HOME}/.kube/config"
