name: Kiro Autofix Trigger

# Triggered AFTER the CI workflow completes (success or failure).
# Runs in a separate workflow so it is NOT affected by CI's concurrency
# group with cancel-in-progress. This solves the problem where a new push
# (from autofix itself) would cancel the still-running CI workflow before
# the autofix jobs could start.

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions: {}

concurrency:
  group: kiro-autofix-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  # ── Build Autofix: triggered when CI fails on non-main branches ──
  collect-and-fix-build:
    name: "Autofix Build Failures"
    if: >-
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.head_branch != 'main' &&
      github.event.workflow_run.event != 'pull_request' ||
      (github.event.workflow_run.event == 'pull_request' &&
       github.event.workflow_run.head_repository.full_name == github.repository)
    runs-on: arc-runner-dind
    timeout-minutes: 25
    permissions:
      contents: read
      actions: read
    steps:
      - name: Download diagnostics from CI run
        id: download
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: diag-*
          path: ${{ runner.temp }}/all-diag
          merge-multiple: false
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.KIRO_GITHUB_TOKEN }}
        continue-on-error: true

      - name: Check if diagnostics were downloaded
        id: check-diag
        run: |
          if find "${RUNNER_TEMP}/all-diag" -name "*.txt" -size +0c 2>/dev/null | grep -q .; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "::warning::No diagnostics artifacts found from CI run ${{ github.event.workflow_run.id }}"
          fi

      - name: Merge diagnostics into single context file
        if: steps.check-diag.outputs.found == 'true'
        run: |
          umask 077
          mkdir -p "${RUNNER_TEMP}/diag"
          OUT="${RUNNER_TEMP}/diag/context.txt"

          {
            echo "=== CI FAILURE DIAGNOSTICS ==="
            echo "=== Source workflow run: ${{ github.event.workflow_run.html_url }} ==="
            echo "=== Branch: ${{ github.event.workflow_run.head_branch }} ==="
            echo ""
          } > "$OUT"

          for dir in "${RUNNER_TEMP}/all-diag"/diag-*/; do
            if [ -d "$dir" ]; then
              for f in "$dir"*.txt; do
                if [ -s "$f" ]; then
                  cat "$f" >> "$OUT"
                  echo "" >> "$OUT"
                fi
              done
            fi
          done

          echo "Wrote $(wc -l < "$OUT") lines to $OUT"

      - name: Upload merged diagnostics
        if: steps.check-diag.outputs.found == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4.6.2
        with:
          name: kiro-build-diagnostics
          path: ${{ runner.temp }}/diag/context.txt
          retention-days: 1

    outputs:
      has-diagnostics: ${{ steps.check-diag.outputs.found }}

  kiro-autofix-build:
    name: Kiro Autofix (build)
    needs: [collect-and-fix-build]
    if: needs.collect-and-fix-build.outputs.has-diagnostics == 'true'
    permissions:
      contents: write
      pull-requests: write
    uses: ./.github/workflows/kiro-autofix.yml
    with:
      stage: build
      branch: ${{ github.event.workflow_run.head_branch }}
      context-artifact: kiro-build-diagnostics
      run-url: ${{ github.event.workflow_run.html_url }}
    secrets:
      kiro-api: ${{ secrets.KIRO_API }}
      github-token: ${{ secrets.KIRO_GITHUB_TOKEN }}

  # ── Deploy Autofix: triggered when CI fails on main (deploy stage) ──
  kiro-autofix-deploy:
    name: Kiro Autofix (deploy)
    if: >-
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.head_branch == 'main' &&
      github.event.workflow_run.event == 'push'
    permissions:
      contents: write
      pull-requests: write
    uses: ./.github/workflows/kiro-autofix.yml
    with:
      stage: deploy
      branch: main
      context-artifact: kiro-deploy-diagnostics
      run-url: ${{ github.event.workflow_run.html_url }}
    secrets:
      kiro-api: ${{ secrets.KIRO_API }}
      github-token: ${{ secrets.KIRO_GITHUB_TOKEN }}
