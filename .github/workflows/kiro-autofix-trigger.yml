name: Kiro Autofix Trigger

# Triggered AFTER the CI/Semgrep workflows complete. Discovers failing-job
# diagnostics artifacts and runs an inline sequential queue: one Kiro
# invocation per failing artifact, one local commit per resolved issue,
# one final push at the end. This keeps each commit focused (one fix per
# artifact) while only triggering CI once at the end of the queue.
#
# REQUIRED SECRETS:
#   KIRO_API       — kiro-cli API key
#   KIRO_GITHUB_TOKEN — fine-grained PAT scoped to THIS repo with:
#                       contents: read+write (push commits)
#                       pull-requests: read+write (comment on PRs)
#                       actions: read (cross-run artifact download)
#                       metadata: read (default)
#                     Do NOT use a classic PAT with org-wide access — the
#                     kiro-cli step runs with --trust-all-tools and could
#                     misuse a broadly-scoped token.
#
# OPT-OUT:
#   - Add the [skip-autofix] PR label, OR
#   - Include [skip-autofix] in the latest commit message
#   The autofix will not run.

on:
  workflow_run:
    workflows: ["CI", "Semgrep"]
    types: [completed]

permissions: {}

# IMPORTANT: cancel-in-progress MUST be false. The queue processes one
# artifact at a time within a single job. If a new workflow_run event
# fires (e.g. CI re-runs after the final push), cancel-in-progress: true
# would kill the still-running queue mid-loop.
concurrency:
  group: kiro-autofix-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: false

env:
  # MAX_QUEUE_RUNS counts distinct queue executions (each may produce many
  # commits). When exceeded, autofix halts and asks for human help.
  MAX_QUEUE_RUNS: "5"
  # Hard cap on prompt size sent to Kiro (per artifact). Avoids context
  # window overflow when diagnostics are unusually verbose.
  MAX_CONTEXT_BYTES: "60000"

jobs:
  autofix-build-queue:
    name: "Sequential Autofix Queue"
    # Runs on any failed CI run including main. On main, fixes are pushed
    # directly to main (kiro-bot has commit access). On non-main branches,
    # fixes are pushed to the same branch the CI ran on. Fork PRs are
    # excluded — we never run autofix against untrusted contributor code.
    if: >-
      github.event.workflow_run.conclusion == 'failure' &&
      (github.event.workflow_run.event != 'pull_request' ||
       github.event.workflow_run.head_repository.full_name == github.repository)
    runs-on: arc-runner-dind
    timeout-minutes: 90
    permissions:
      contents: write
      pull-requests: write
      actions: read
    env:
      RUN_URL: ${{ github.event.workflow_run.html_url }}
      BRANCH: ${{ github.event.workflow_run.head_branch }}
      CI_RUN_ID: ${{ github.event.workflow_run.id }}
    steps:
      # Preflight: fail fast with a clear message if required secrets are
      # missing or empty. Without this, actions/checkout below would die
      # with the opaque "Input required and not supplied: token" error
      # because we explicitly pass token:, and an empty secret resolves
      # to an empty input value rather than falling back to a default.
      - name: Validate required secrets
        env:
          KIRO_GITHUB_TOKEN: ${{ secrets.KIRO_GITHUB_TOKEN }}
          KIRO_API: ${{ secrets.KIRO_API }}
        run: |
          umask 077
          missing=()
          [ -z "${KIRO_GITHUB_TOKEN}" ] && missing+=("KIRO_GITHUB_TOKEN")
          [ -z "${KIRO_API}" ] && missing+=("KIRO_API")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Kiro Autofix cannot run: missing repository secret(s): ${missing[*]}"
            echo "::error::Configure them at Settings -> Secrets and variables -> Actions."
            echo "::error::See the header of .github/workflows/kiro-autofix-trigger.yml for required scopes."
            exit 1
          fi
          echo "All required secrets are configured."

      # persist-credentials: true is required because we git push at the end.
      # All other workflows in this repo use persist-credentials: false.
      - name: Checkout branch
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ env.BRANCH }}
          fetch-depth: 0
          token: ${{ secrets.KIRO_GITHUB_TOKEN }}
          persist-credentials: true

      - name: Check opt-out (label or commit marker)
        id: optout
        env:
          GH_TOKEN: ${{ secrets.KIRO_GITHUB_TOKEN }}
        run: |
          umask 077
          # Check latest commit message
          last_msg=$(git log -1 --format=%B)
          if echo "$last_msg" | grep -qF '[skip-autofix]'; then
            echo "::notice::Autofix skipped: [skip-autofix] marker in latest commit message"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Check PR labels (if a PR exists for this branch)
          pr_labels=$(gh pr list \
            --repo "${{ github.repository }}" \
            --head "${BRANCH}" \
            --state open \
            --json labels \
            --jq '[.[].labels[].name] | join(",")' 2>/dev/null || echo "")
          if echo "$pr_labels" | grep -qF 'skip-autofix'; then
            echo "::notice::Autofix skipped: skip-autofix label on PR"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Count prior queue runs (distinct workflow-run trailers in kiro-bot commits at HEAD)
        id: attempts
        if: steps.optout.outputs.skip == 'false'
        run: |
          umask 077
          # Walk back from HEAD collecting consecutive kiro-bot commits.
          # Group them by their "Workflow run:" trailer — each queue execution
          # produces commits sharing the same trailer URL.
          declare -A seen_runs
          queue_runs=0
          i=0
          while [ "$i" -lt 50 ]; do
            email=$(git log --format='%ae' -n 1 "HEAD~$i" 2>/dev/null || true)
            if [ -z "$email" ]; then break; fi
            case "$email" in
              kiro-bot@*) ;;
              *) break ;;
            esac
            # Extract Workflow run URL from commit message body
            run_url=$(git log --format='%B' -n 1 "HEAD~$i" 2>/dev/null \
              | grep -oP '^Workflow run:\s*\K\S+' | head -1 || true)
            if [ -n "$run_url" ] && [ -z "${seen_runs[$run_url]+x}" ]; then
              seen_runs[$run_url]=1
              queue_runs=$((queue_runs + 1))
            fi
            i=$((i + 1))
          done
          echo "queue_runs=$queue_runs" >> "$GITHUB_OUTPUT"
          echo "Detected $queue_runs distinct prior queue runs at HEAD (max: ${MAX_QUEUE_RUNS})"

          if [ "$queue_runs" -ge "${MAX_QUEUE_RUNS}" ]; then
            echo "exceeded=true" >> "$GITHUB_OUTPUT"
            echo "::warning::Kiro Autofix limit reached: $queue_runs queue runs at HEAD."
          else
            echo "exceeded=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Find related PR
        id: pr
        if: steps.optout.outputs.skip == 'false' && steps.attempts.outputs.exceeded == 'true'
        env:
          GH_TOKEN: ${{ secrets.KIRO_GITHUB_TOKEN }}
        run: |
          umask 077
          pr_number=$(gh pr list \
            --repo "${{ github.repository }}" \
            --head "${BRANCH}" \
            --state open \
            --json number \
            --jq '.[0].number // empty')
          echo "number=${pr_number}" >> "$GITHUB_OUTPUT"

      # Edit existing comment if present, otherwise create — avoids spam
      # when autofix repeatedly hits the limit on the same PR.
      - name: Notify human on PR (max attempts reached)
        if: steps.optout.outputs.skip == 'false' && steps.attempts.outputs.exceeded == 'true' && steps.pr.outputs.number != ''
        env:
          GH_TOKEN: ${{ secrets.KIRO_GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          MARKER: "<!-- kiro-autofix-gave-up -->"
        run: |
          umask 077
          BODY="${MARKER}
          🤖 **Kiro Autofix gave up at the build stage.**

          Attempted ${MAX_QUEUE_RUNS} consecutive queue runs without restoring CI to green. Manual intervention is required.

          - Latest failed run: ${RUN_URL}
          - Branch: \`${BRANCH}\`

          To resume autofix, push a non-bot commit to this branch (the counter resets on any human commit at HEAD), or remove the \`skip-autofix\` label."

          existing=$(gh api \
            "repos/${{ github.repository }}/issues/${PR_NUMBER}/comments?per_page=100" \
            --jq ".[] | select(.body | contains(\"${MARKER}\")) | .id" \
            | head -1)

          if [ -n "$existing" ]; then
            gh api -X PATCH "repos/${{ github.repository }}/issues/comments/${existing}" \
              -f body="$BODY"
            echo "Updated existing autofix-gave-up comment ${existing}"
          else
            gh pr comment "$PR_NUMBER" \
              --repo "${{ github.repository }}" \
              --body "$BODY"
            echo "Created new autofix-gave-up comment"
          fi

      - name: Stop if max attempts exceeded
        if: steps.optout.outputs.skip == 'false' && steps.attempts.outputs.exceeded == 'true'
        run: |
          echo "::error::Kiro Autofix has hit the queue-run limit. Manual intervention required."
          exit 1

      - name: Rust setup
        if: steps.optout.outputs.skip == 'false' && steps.attempts.outputs.exceeded == 'false'
        uses: ./.github/actions/rust-setup
        with:
          components: rustfmt,clippy
          targets: x86_64-unknown-linux-musl,wasm32-unknown-unknown

      - name: List failing-job artifacts from CI run (priority-sorted)
        id: list
        if: steps.optout.outputs.skip == 'false' && steps.attempts.outputs.exceeded == 'false'
        env:
          GH_TOKEN: ${{ secrets.KIRO_GITHUB_TOKEN }}
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
        with:
          timeout_minutes: 3
          max_attempts: 3
          retry_wait_seconds: 10
          command: |
            umask 077
            ARTIFACTS_JSON=$(gh api \
              "repos/${{ github.repository }}/actions/runs/${CI_RUN_ID}/artifacts?per_page=100" \
              --jq '[.artifacts[] | select(.name | startswith("diag-")) | .name]')

            if [ -z "$ARTIFACTS_JSON" ] || [ "$ARTIFACTS_JSON" = "[]" ]; then
              echo "::warning::No diag-* artifacts found in run ${CI_RUN_ID}"
              echo "artifacts=[]" >> "$GITHUB_OUTPUT"
              echo "count=0" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            # Priority: build > lint > container > security > semgrep > codeql
            SORTED=$(echo "$ARTIFACTS_JSON" | jq -c '
              sort_by(
                if startswith("diag-build-") then 0
                elif startswith("diag-lint-") then 1
                elif startswith("diag-container-") then 2
                elif startswith("diag-security-") then 3
                elif startswith("diag-semgrep-") then 4
                elif startswith("diag-codeql-") then 5
                else 6 end
              )
            ')

            COUNT=$(echo "$SORTED" | jq 'length')
            echo "artifacts=$SORTED" >> "$GITHUB_OUTPUT"
            echo "count=$COUNT" >> "$GITHUB_OUTPUT"
            echo "Found $COUNT failing-job artifacts (priority-sorted): $SORTED"

      - name: Notify on zero diagnostics artifacts
        if: steps.optout.outputs.skip == 'false' && steps.attempts.outputs.exceeded == 'false' && steps.list.outputs.count == '0'
        env:
          GH_TOKEN: ${{ secrets.KIRO_GITHUB_TOKEN }}
        run: |
          umask 077
          pr_number=$(gh pr list \
            --repo "${{ github.repository }}" \
            --head "${BRANCH}" \
            --state open \
            --json number \
            --jq '.[0].number // empty' 2>/dev/null || echo "")
          MSG="⚠️ **Kiro Autofix: CI failed but no diagnostics artifacts were found.**

          Run [${CI_RUN_ID}](${RUN_URL}) failed without producing any \`diag-*\` artifacts. This usually means a job failed before reaching its \`collect-diagnostics\` step, or the step was not wired for the failing job.

          **Action needed:** Check the failing job and add \`collect-diagnostics\` to its \`if: failure()\` steps."

          if [ -n "$pr_number" ]; then
            gh pr comment "$pr_number" \
              --repo "${{ github.repository }}" \
              --body "$MSG"
          else
            echo "::warning::CI failed with no diag-* artifacts and no open PR to notify. Run: ${RUN_URL}"
          fi

      - name: Download all failing-job artifacts
        if: steps.optout.outputs.skip == 'false' && steps.attempts.outputs.exceeded == 'false' && steps.list.outputs.count != '0'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: diag-*
          path: ${{ runner.temp }}/all-diag
          merge-multiple: false
          run-id: ${{ env.CI_RUN_ID }}
          github-token: ${{ secrets.KIRO_GITHUB_TOKEN }}

      - name: Verify downloaded artifacts
        if: steps.optout.outputs.skip == 'false' && steps.attempts.outputs.exceeded == 'false' && steps.list.outputs.count != '0'
        env:
          ARTIFACTS_JSON: ${{ steps.list.outputs.artifacts }}
        run: |
          echo "=== Downloaded artifact structure ==="
          find "${RUNNER_TEMP}/all-diag" -type f -exec ls -la {} \; 2>/dev/null || echo "No files found"
          echo ""

          # Fix flat downloads: when only 1 artifact matches the pattern,
          # download-artifact may place files directly in the path dir
          # instead of a subdirectory. Detect and reorganize.
          if [ -f "${RUNNER_TEMP}/all-diag/context.txt" ] && [ ! -d "${RUNNER_TEMP}/all-diag/$(echo "$ARTIFACTS_JSON" | jq -r '.[0]')" ]; then
            FIRST_ARTIFACT=$(echo "$ARTIFACTS_JSON" | jq -r '.[0]')
            echo "::notice::Flat download detected — reorganizing into ${FIRST_ARTIFACT}/"
            mkdir -p "${RUNNER_TEMP}/all-diag/${FIRST_ARTIFACT}"
            mv "${RUNNER_TEMP}/all-diag/context.txt" "${RUNNER_TEMP}/all-diag/${FIRST_ARTIFACT}/context.txt"
            # Move any other stray files too
            for f in "${RUNNER_TEMP}/all-diag"/*; do
              [ -d "$f" ] && continue
              mv "$f" "${RUNNER_TEMP}/all-diag/${FIRST_ARTIFACT}/" 2>/dev/null || true
            done
          fi

          for dir in "${RUNNER_TEMP}/all-diag"/*/; do
            [ -d "$dir" ] || continue
            artifact_name=$(basename "$dir")
            ctx="$dir/context.txt"
            if [ -s "$ctx" ]; then
              echo "${artifact_name}/context.txt: $(wc -c < "$ctx") bytes, $(wc -l < "$ctx") lines"
            elif [ -f "$ctx" ]; then
              echo "::warning::${artifact_name}/context.txt exists but is EMPTY (0 bytes)"
            else
              echo "::warning::${artifact_name}/context.txt DOES NOT EXIST"
              echo "  Files in ${artifact_name}/: $(ls "$dir" 2>/dev/null || echo 'none')"
            fi
          done

      - name: Baseline verification (confirm failure still reproduces)
        id: baseline
        if: steps.optout.outputs.skip == 'false' && steps.attempts.outputs.exceeded == 'false' && steps.list.outputs.count != '0'
        run: |
          umask 077
          # Determine the appropriate quick-check command from the first artifact.
          FIRST_ARTIFACT=$(echo '${{ steps.list.outputs.artifacts }}' | jq -r '.[0]')
          echo "Running baseline check for artifact type: ${FIRST_ARTIFACT}"

          BASELINE_PASS=false
          case "$FIRST_ARTIFACT" in
            diag-clippy-*|diag-build-*)
              # Quick cargo check (not full build) to confirm compile errors exist
              if cargo check --locked -p realestate-backend 2>/dev/null; then
                if cargo check --locked -p realestate-frontend --target wasm32-unknown-unknown 2>/dev/null; then
                  BASELINE_PASS=true
                fi
              fi
              ;;
            diag-test-*)
              # For test failures, cargo check passes but tests would fail.
              # Just confirm the code compiles — test failures are assumed valid.
              ;;
            *)
              # For container, security, lint artifacts — assume still failing.
              ;;
          esac

          if [ "$BASELINE_PASS" = true ]; then
            echo "::notice::Baseline check PASSED — code compiles cleanly. The failure may have been fixed by a concurrent push."
            echo "still_failing=false" >> "$GITHUB_OUTPUT"
          else
            echo "Baseline confirms failure still present. Proceeding with autofix."
            echo "still_failing=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build git history of prior attempts
        id: history
        if: steps.optout.outputs.skip == 'false' && steps.attempts.outputs.exceeded == 'false' && steps.list.outputs.count != '0' && steps.baseline.outputs.still_failing != 'false'
        run: |
          umask 077
          HISTORY_LOG="${RUNNER_TEMP}/git-history.txt"
          {
            echo "=== RECENT COMMITS (last 10) ==="
            git log --format='%h %ae %s%n%b%n---' -n 10
            echo ""
            echo "=== PRIOR KIRO-BOT QUEUE RUNS AT HEAD: ${{ steps.attempts.outputs.queue_runs }} ==="
          } > "$HISTORY_LOG"
          echo "history_log=$HISTORY_LOG" >> "$GITHUB_OUTPUT"

      - name: Configure git identity
        if: steps.optout.outputs.skip == 'false' && steps.attempts.outputs.exceeded == 'false' && steps.list.outputs.count != '0' && steps.baseline.outputs.still_failing != 'false'
        run: |
          git config user.name "kiro-bot"
          git config user.email "kiro-bot@users.noreply.github.com"

      - name: Export sanitized branch for KB keying
        if: steps.optout.outputs.skip == 'false' && steps.attempts.outputs.exceeded == 'false' && steps.list.outputs.count != '0' && steps.baseline.outputs.still_failing != 'false'
        run: |
          SANITIZED=$(echo "${BRANCH}" | sed 's/[^A-Za-z0-9._-]/_/g')
          echo "KIRO_KB_BRANCH=${SANITIZED}" >> "$GITHUB_ENV"
          echo "Per-branch KB segment: ${SANITIZED}"

      # kiro-cli stores session state in a SQLite DB under its data dir
      # ($XDG_DATA_HOME/kiro-cli or $HOME/.local/share/kiro-cli). On the
      # ephemeral arc-runner-dind runner those parent directories may not
      # exist, and SQLite does not create missing parents — it fails with
      # "unable to open database file", which aborts the agent (exit 1, no
      # changes) and stops the whole queue. Pre-create a guaranteed-writable
      # data dir under RUNNER_TEMP and pin XDG_DATA_HOME at it for all
      # subsequent steps so kiro-cli can always open its database.
      - name: Prepare kiro-cli data directory
        if: steps.optout.outputs.skip == 'false' && steps.attempts.outputs.exceeded == 'false' && steps.list.outputs.count != '0' && steps.baseline.outputs.still_failing != 'false'
        run: |
          umask 077
          DATA_HOME="${RUNNER_TEMP}/kiro-data"
          mkdir -p "${DATA_HOME}/kiro-cli" "${HOME}/.local/share/kiro-cli"
          echo "XDG_DATA_HOME=${DATA_HOME}" >> "$GITHUB_ENV"
          echo "kiro-cli data dir ready: ${DATA_HOME}/kiro-cli"

      - name: Process queue (one Kiro run + one commit per artifact)
        id: queue
        if: steps.optout.outputs.skip == 'false' && steps.attempts.outputs.exceeded == 'false' && steps.list.outputs.count != '0' && steps.baseline.outputs.still_failing != 'false'
        env:
          KIRO_API_KEY: ${{ secrets.KIRO_API }}
          KIRO_MAX_FIX_ITERATIONS: "3"
          ARTIFACTS_JSON: ${{ steps.list.outputs.artifacts }}
          GIT_HISTORY_FILE: ${{ steps.history.outputs.history_log }}
          QUEUE_RUNS: ${{ steps.attempts.outputs.queue_runs }}
        run: |
          umask 077
          ATTEMPT_DISPLAY=$((QUEUE_RUNS + 1))
          COMMITS_MADE=0
          TOTAL=$(echo "$ARTIFACTS_JSON" | jq 'length')
          POS=0
          FIXED_FILES=""

          # Initialize accumulated learnings file for cross-artifact context.
          LEARNINGS_FILE="${RUNNER_TEMP}/autofix-learnings.txt"
          : > "$LEARNINGS_FILE"

          # Iterate through artifacts in priority order
          while IFS= read -r artifact; do
            [ -z "$artifact" ] && continue
            POS=$((POS + 1))
            CONTEXT_PATH="${RUNNER_TEMP}/all-diag/${artifact}/context.txt"

            # collect-diagnostics guarantees non-empty context.txt.
            # If somehow empty, try any file in the artifact dir, then skip.
            if [ ! -s "$CONTEXT_PATH" ]; then
              ALT_FILE=$(find "${RUNNER_TEMP}/all-diag/${artifact}/" -type f -size +0 2>/dev/null | head -1)
              if [ -n "$ALT_FILE" ]; then
                CONTEXT_PATH="$ALT_FILE"
                echo "::notice::Using alternative file from ${artifact}: $(basename "$ALT_FILE")"
              else
                echo "::warning::${artifact} has no usable diagnostics content — skipping"
                printf '[%s] SKIPPED: no usable diagnostics content\n' "$artifact" >> "$LEARNINGS_FILE"
                continue
              fi
            fi

            echo "::group::Processing ${artifact}"

            # Truncate diagnostics if oversized to protect context window.
            CTX_BYTES=$(wc -c < "$CONTEXT_PATH")
            TRUNCATED_CTX="${RUNNER_TEMP}/all-diag/${artifact}/context-truncated.txt"
            if [ "$CTX_BYTES" -gt "${MAX_CONTEXT_BYTES}" ]; then
              echo "::warning::context.txt for ${artifact} is ${CTX_BYTES} bytes; truncating to last ${MAX_CONTEXT_BYTES}"
              tail -c "${MAX_CONTEXT_BYTES}" "$CONTEXT_PATH" > "$TRUNCATED_CTX"
              echo "[NOTE: Earlier diagnostic output was truncated; only the last ${MAX_CONTEXT_BYTES} bytes are shown above.]" >> "$TRUNCATED_CTX"
              EFFECTIVE_CTX="$TRUNCATED_CTX"
            else
              EFFECTIVE_CTX="$CONTEXT_PATH"
            fi

            # Skip deploy artifacts where the cluster is unreachable — no code change can fix this.
            if [[ "$artifact" == diag-deploy-* ]] && grep -qF "=== CLUSTER UNREACHABLE ===" "$EFFECTIVE_CTX"; then
              echo "::notice::Skipping ${artifact}: cluster unreachable (infrastructure issue, not actionable by code fix)"
              printf '[%s] SKIPPED: cluster unreachable — infrastructure issue\n' "$artifact" >> "$LEARNINGS_FILE"
              echo "::endgroup::"
              continue
            fi

            # Skip deploy artifacts where pods crash due to a secret length/value misconfiguration.
            # These require updating GitHub Actions secrets, not code changes.
            if [[ "$artifact" == diag-deploy-* ]] && grep -qF "JWT_SECRET debe tener al menos 32 caracteres" "$EFFECTIVE_CTX"; then
              echo "::notice::Skipping ${artifact}: secret misconfiguration (JWT_SECRET too short — update the DEV_JWT_SECRET or JWT_SECRET GitHub Actions secret)"
              printf '[%s] SKIPPED: secret misconfiguration — update DEV_JWT_SECRET repository secret to >=32 chars\n' "$artifact" >> "$LEARNINGS_FILE"
              echo "::endgroup::"
              continue
            fi

            # Skip deploy artifacts where pods crash due to database unreachable (PoolTimedOut).
            # This is an infrastructure issue (db pod not running), not a code issue.
            if [[ "$artifact" == diag-deploy-* ]] && grep -qF "SqlxError(PoolTimedOut)" "$EFFECTIVE_CTX"; then
              echo "::notice::Skipping ${artifact}: database unreachable (PoolTimedOut — ensure the db deployment is running in the namespace)"
              printf '[%s] SKIPPED: database unreachable (PoolTimedOut) — ensure db pod is running in namespace\n' "$artifact" >> "$LEARNINGS_FILE"
              echo "::endgroup::"
              continue
            fi

            # Skip deploy artifacts where pods crash due to database credential mismatch (28P01).
            # This requires updating the DEV_POSTGRES_PASSWORD GitHub Actions secret.
            if [[ "$artifact" == diag-deploy-* ]] && grep -qF "password authentication failed" "$EFFECTIVE_CTX"; then
              echo "::notice::Skipping ${artifact}: database credential mismatch (28P01 — update DEV_POSTGRES_PASSWORD secret to match the Postgres user password)"
              printf '[%s] SKIPPED: database credential mismatch (28P01) — update DEV_POSTGRES_PASSWORD repository secret\n' "$artifact" >> "$LEARNINGS_FILE"
              echo "::endgroup::"
              continue
            fi

            # Skip artifacts whose errors reference only files already fixed by prior queue items.
            if [ -n "$FIXED_FILES" ]; then
              DIAG_FILES=$(grep -oP '(?:^|\s)(\S+\.(?:rs|ts|tsx|kt|kts))' "$EFFECTIVE_CTX" | sort -u || true)
              ALL_COVERED=true
              while IFS= read -r dfile; do
                [ -z "$dfile" ] && continue
                # Trim leading/trailing whitespace without xargs (avoids quote parsing issues)
                dfile_trimmed="${dfile#"${dfile%%[![:space:]]*}"}"
                dfile_trimmed="${dfile_trimmed%"${dfile_trimmed##*[![:space:]]}"}"
                if ! echo "$FIXED_FILES" | grep -qF "$dfile_trimmed"; then
                  ALL_COVERED=false
                  break
                fi
              done <<< "$DIAG_FILES"
              if [ "$ALL_COVERED" = true ] && [ -n "$DIAG_FILES" ]; then
                echo "::notice::Skipping ${artifact}: all referenced files were already fixed by prior queue items"
                printf '[%s] SKIPPED: all referenced files already fixed by prior items\n' "$artifact" >> "$LEARNINGS_FILE"
                echo "::endgroup::"
                continue
              fi
            fi

            # Set environment variables for the agent.
            # NOTE: GH_TOKEN is NOT exported here — the agent should not have
            # access to the PAT. Only KIRO_API_KEY is available to the agent.
            export KIRO_DIAGNOSTICS_FILE="$EFFECTIVE_CTX"
            export KIRO_COMMIT_MSG_FILE="${RUNNER_TEMP}/kiro-commit-message-${artifact}.txt"
            export KIRO_GIT_HISTORY_FILE="$GIT_HISTORY_FILE"
            export KIRO_LEARNINGS_FILE="$LEARNINGS_FILE"

            # Determine success criteria based on artifact type.
            SUCCESS_CRITERIA=""
            case "$artifact" in
              diag-clippy-backend|diag-build-backend)
                SUCCESS_CRITERIA="Success criteria: 'cargo clippy --locked -p realestate-backend --target x86_64-unknown-linux-musl -- -D warnings' must exit 0 with no output."
                ;;
              diag-clippy-frontend|diag-build-frontend)
                SUCCESS_CRITERIA="Success criteria: 'cargo clippy --locked --target wasm32-unknown-unknown -p realestate-frontend -- -D warnings' must exit 0 with no output."
                ;;
              diag-test-backend)
                SUCCESS_CRITERIA="Success criteria: 'cargo test --locked -p realestate-backend' must exit 0 with all tests passing."
                ;;
              diag-test-frontend)
                SUCCESS_CRITERIA="Success criteria: 'cargo test --locked -p realestate-frontend' must exit 0 with all tests passing."
                ;;
              diag-container-*)
                SUCCESS_CRITERIA="Success criteria: the Dockerfile must build successfully and trivy image scan must find no CRITICAL vulnerabilities."
                ;;
              diag-security-*|diag-semgrep-*)
                SUCCESS_CRITERIA="Success criteria: the security finding described in the diagnostics must be resolved without introducing new issues."
                ;;
              *)
                SUCCESS_CRITERIA="Success criteria: the error described in the diagnostics must be fully resolved."
                ;;
            esac

            # Build the positional prompt with success criteria and learnings context.
            PROMPT="Fix CI failure from artifact '${artifact}' (queue position ${POS}/${TOTAL}). ${SUCCESS_CRITERIA} Read the diagnostics file at \$KIRO_DIAGNOSTICS_FILE. Read prior attempt history at \$KIRO_GIT_HISTORY_FILE."

            # Include learnings from prior queue items if any exist.
            if [ -s "$LEARNINGS_FILE" ]; then
              PROMPT="${PROMPT} Read accumulated learnings from earlier queue items at \$KIRO_LEARNINGS_FILE."
            fi

            PROMPT="${PROMPT} Write your commit message to \$KIRO_COMMIT_MSG_FILE when done. Do NOT use placeholder or stub implementations — fix the root cause completely."

            # Invoke the autofix agent (no per-artifact timeout; job-level
            # timeout-minutes guards against runaway execution).
            AGENT_EXIT=0
            kiro-cli chat --agent autofix --model claude-opus-4.6 --effort max --no-interactive --trust-all-tools \
                "$PROMPT" \
              || AGENT_EXIT=$?

            # Detect ANY change in working tree (tracked, staged, OR untracked).
            git add -A
            if [ -z "$(git status --porcelain)" ]; then
              echo "No changes produced by Kiro for ${artifact}, skipping commit"
              printf '[%s] NO CHANGES: agent exit=%d, no files modified\n' "$artifact" "$AGENT_EXIT" >> "$LEARNINGS_FILE"
              if [ "$AGENT_EXIT" -ne 0 ]; then
                echo "::warning::Agent exited ${AGENT_EXIT} with no changes for ${artifact}; stopping queue."
                echo "::endgroup::"
                break
              fi
              echo "::endgroup::"
              continue
            fi

            # Track which files were fixed for deduplication of later artifacts.
            NEWLY_FIXED=$(git diff --cached --name-only)
            FIXED_FILES="${FIXED_FILES}"$'\n'"${NEWLY_FIXED}"

            # Record what was fixed in learnings for subsequent artifacts.
            printf '[%s] FIXED: agent exit=%d, files changed:\n%s\n' "$artifact" "$AGENT_EXIT" "$NEWLY_FIXED" >> "$LEARNINGS_FILE"

            # Commit locally — no push yet (push happens once at end of queue).
            # Ensure every queued commit ends with the Workflow run trailer for
            # the queue-run counter to detect.
            if [ -s "$KIRO_COMMIT_MSG_FILE" ]; then
              if ! grep -qF "Workflow run: ${RUN_URL}" "$KIRO_COMMIT_MSG_FILE"; then
                printf '\nWorkflow run: %s\n' "$RUN_URL" >> "$KIRO_COMMIT_MSG_FILE"
              fi
              git commit -F "$KIRO_COMMIT_MSG_FILE"
            else
              echo "::warning::Kiro did not produce a commit message for ${artifact}; using fallback."
              git commit -m "fix(autofix): resolve ${artifact}" -m "Kiro did not write a descriptive commit message. Inspect the diff for details." -m "Workflow run: ${RUN_URL}"
            fi
            COMMITS_MADE=$((COMMITS_MADE + 1))
            echo "Commit ${COMMITS_MADE} created for ${artifact}"

            # Update git history file so subsequent artifacts see what changed.
            {
              echo "=== RECENT COMMITS (last 10) ==="
              git log --format='%h %ae %s%n%b%n---' -n 10
              echo ""
              echo "=== PRIOR KIRO-BOT QUEUE RUNS AT HEAD: ${QUEUE_RUNS} ==="
            } > "$GIT_HISTORY_FILE"

            # Exit code handling: 0 → continue queue; non-zero → stop queue
            if [ "$AGENT_EXIT" -ne 0 ]; then
              echo "::warning::Agent exited ${AGENT_EXIT} for ${artifact}; committed partial fix, stopping queue."
              echo "::endgroup::"
              break
            fi

            echo "::endgroup::"
          done < <(echo "$ARTIFACTS_JSON" | jq -r '.[]')

          echo "commits_made=$COMMITS_MADE" >> "$GITHUB_OUTPUT"
          echo ""
          echo "Queue complete. Created $COMMITS_MADE commits."
          if [ -s "$LEARNINGS_FILE" ]; then
            echo "=== Queue Learnings ==="
            cat "$LEARNINGS_FILE"
          fi

      - name: Post-queue review pass (separated evaluator)
        id: review
        if: steps.queue.outputs.commits_made != '0' && steps.queue.outputs.commits_made != ''
        env:
          KIRO_API_KEY: ${{ secrets.KIRO_API }}
        run: |
          umask 077
          # Generate a combined diff of all queued commits for review.
          REVIEW_DIFF="${RUNNER_TEMP}/review-diff.txt"
          git diff "origin/${BRANCH}..HEAD" > "$REVIEW_DIFF"

          DIFF_SIZE=$(wc -c < "$REVIEW_DIFF")
          if [ "$DIFF_SIZE" -gt "${MAX_CONTEXT_BYTES}" ]; then
            echo "::notice::Review diff is ${DIFF_SIZE} bytes; truncating to last ${MAX_CONTEXT_BYTES} for review."
            tail -c "${MAX_CONTEXT_BYTES}" "$REVIEW_DIFF" > "${REVIEW_DIFF}.truncated"
            mv "${REVIEW_DIFF}.truncated" "$REVIEW_DIFF"
          fi

          export KIRO_REVIEW_DIFF_FILE="$REVIEW_DIFF"
          export KIRO_REVIEW_VERDICT_FILE="${RUNNER_TEMP}/review-verdict.txt"

          REVIEW_PROMPT="You are a code reviewer. Review the diff at \$KIRO_REVIEW_DIFF_FILE. Check for:
          1. Band-aid fixes that suppress errors without addressing root cause
          2. Regressions introduced by the fix (e.g., removing functionality, breaking API contracts)
          3. Dead code or commented-out code left behind
          4. Security issues introduced by the fix
          Write PASS or FAIL (with explanation) to \$KIRO_REVIEW_VERDICT_FILE.
          If FAIL, also write which specific commit(s) should be reverted.
          Only FAIL for serious issues — cosmetic or style nits are acceptable."

          # Review agent runs without --trust-all-tools (read-only is sufficient).
          kiro-cli chat --agent autofix --model claude-opus-4.6 --effort max --no-interactive \
            "$REVIEW_PROMPT" || true

          if [ -s "$KIRO_REVIEW_VERDICT_FILE" ]; then
            VERDICT=$(head -1 "$KIRO_REVIEW_VERDICT_FILE")
            echo "Review verdict: $VERDICT"
            cat "$KIRO_REVIEW_VERDICT_FILE"
            if echo "$VERDICT" | grep -qiF "FAIL"; then
              echo "::warning::Post-queue review FAILED. Commits will still be pushed but review is logged."
              echo "review_passed=false" >> "$GITHUB_OUTPUT"
            else
              echo "review_passed=true" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "::notice::Review agent did not produce a verdict file. Proceeding with push."
            echo "review_passed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Push all queued commits
        id: push
        if: steps.queue.outputs.commits_made != '0' && steps.queue.outputs.commits_made != ''
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
        with:
          timeout_minutes: 3
          max_attempts: 3
          retry_wait_seconds: 10
          command: |
            echo "Pushing $(git log origin/${BRANCH}..HEAD --oneline | wc -l) new commits to origin/${BRANCH}"
            git log origin/${BRANCH}..HEAD --oneline
            git fetch origin "${BRANCH}"
            # If origin advanced (human pushed concurrently), rebase our queued commits on top
            if ! git merge-base --is-ancestor "origin/${BRANCH}" HEAD; then
              git rebase "origin/${BRANCH}" || { git rebase --abort; exit 1; }
            fi
            git push origin "${BRANCH}"

      - name: Notify on push failure
        if: failure() && steps.push.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.KIRO_GITHUB_TOKEN }}
        run: |
          umask 077
          pr_number=$(gh pr list \
            --repo "${{ github.repository }}" \
            --head "${BRANCH}" \
            --state open \
            --json number \
            --jq '.[0].number // empty')
          if [ -n "$pr_number" ]; then
            gh pr comment "$pr_number" \
              --repo "${{ github.repository }}" \
              --body "🤖 **Kiro Autofix queue produced commits but push failed.**

            $(git log origin/${BRANCH}..HEAD --oneline 2>/dev/null | head -10)

            Branch was likely modified concurrently. Manual intervention required.
            Failed run: ${RUN_URL}"
          fi

  # ── Deploy Autofix Precheck: only proceed if the deploy artifact exists ──
  # CI on main can fail at build, lint, security, container, or deploy stages.
  # The deploy autofix is only meaningful for deploy-stage failures, signalled
  # by the presence of the kiro-deploy-diagnostics artifact uploaded by
  # deploy.yml. If CI failed earlier (no deploy run), there is no artifact to
  # download and the reusable workflow's actions/download-artifact step would
  # hard-fail. Probe artifacts here and only dispatch the reusable workflow
  # when the artifact is present.
  kiro-autofix-deploy-precheck:
    name: Kiro Autofix (deploy) — Precheck
    if: >-
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.head_branch == 'main' &&
      github.event.workflow_run.event == 'push'
    runs-on: arc-runner-dind
    timeout-minutes: 5
    permissions:
      actions: read
    outputs:
      artifact-present: ${{ steps.probe.outputs.present }}
    steps:
      - name: Validate required secrets
        env:
          KIRO_GITHUB_TOKEN: ${{ secrets.KIRO_GITHUB_TOKEN }}
          KIRO_API: ${{ secrets.KIRO_API }}
        run: |
          umask 077
          missing=()
          [ -z "${KIRO_GITHUB_TOKEN}" ] && missing+=("KIRO_GITHUB_TOKEN")
          [ -z "${KIRO_API}" ] && missing+=("KIRO_API")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Kiro Autofix cannot run: missing repository secret(s): ${missing[*]}"
            echo "::error::Configure them at Settings -> Secrets and variables -> Actions."
            exit 1
          fi

      - name: Probe for kiro-deploy-diagnostics artifact
        id: probe
        env:
          GH_TOKEN: ${{ secrets.KIRO_GITHUB_TOKEN }}
          CI_RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          umask 077
          present=$(gh api \
            "repos/${{ github.repository }}/actions/runs/${CI_RUN_ID}/artifacts?per_page=100" \
            --jq '[.artifacts[] | select(.name == "kiro-deploy-diagnostics")] | length')
          if [ "${present:-0}" -gt 0 ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
            echo "kiro-deploy-diagnostics found; deploy autofix will run."
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::kiro-deploy-diagnostics not found in run ${CI_RUN_ID}."
            echo "::notice::CI on main failed before the deploy stage produced diagnostics."
            echo "::notice::Build-stage failures on main ARE handled by autofix-build-queue (runs for all branches including main) — check that job's outcome for diag-* artifact processing."
          fi

  # ── Deploy Autofix: triggered when CI fails on main (deploy stage) ──
  # Deploy is a single artifact (kiro-deploy-diagnostics), no queue needed.
  kiro-autofix-deploy:
    name: Kiro Autofix (deploy)
    needs: [kiro-autofix-deploy-precheck]
    if: needs.kiro-autofix-deploy-precheck.outputs.artifact-present == 'true'
    permissions:
      actions: read
      contents: write
      pull-requests: write
    uses: ./.github/workflows/kiro-autofix.yml
    with:
      stage: deploy
      branch: main
      context-artifact: kiro-deploy-diagnostics
      artifact-run-id: ${{ github.event.workflow_run.id }}
      run-url: ${{ github.event.workflow_run.html_url }}
    secrets:
      kiro-api: ${{ secrets.KIRO_API }}
      github-token: ${{ secrets.KIRO_GITHUB_TOKEN }}
