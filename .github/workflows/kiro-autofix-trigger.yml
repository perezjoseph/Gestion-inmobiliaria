name: Kiro Autofix Trigger

# Triggered AFTER the CI/Semgrep workflows complete. Discovers failing-job
# diagnostics artifacts and queues an autofix run per failing job, processed
# strictly sequentially via a matrix with max-parallel: 1. This keeps Kiro's
# context focused — one job's diagnostics per autofix invocation.

on:
  workflow_run:
    workflows: ["CI", "Semgrep"]
    types: [completed]

permissions: {}

# IMPORTANT: cancel-in-progress MUST be false. The matrix queue processes one
# failing-job artifact at a time. If a new workflow_run event fires (e.g. CI
# re-runs after Kiro pushes iteration 1's fix), cancel-in-progress: true would
# kill the still-running queue mid-iteration, breaking the sequential design.
concurrency:
  group: kiro-autofix-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: false

jobs:
  # ── Step 1: Discover all failing-job artifacts on non-main branches ──
  discover-build-failures:
    name: "Discover Build Failures"
    if: >-
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.head_branch != 'main' &&
      (github.event.workflow_run.event != 'pull_request' ||
       github.event.workflow_run.head_repository.full_name == github.repository)
    runs-on: arc-runner-dind
    timeout-minutes: 10
    permissions:
      contents: read
      actions: read
    outputs:
      artifacts: ${{ steps.list.outputs.artifacts }}
      count: ${{ steps.list.outputs.count }}
    steps:
      - name: List failing-job diagnostics artifacts
        id: list
        env:
          GH_TOKEN: ${{ secrets.KIRO_GITHUB_TOKEN }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          REPO: ${{ github.repository }}
        run: |
          umask 077
          # Query GitHub API for all artifacts in the failing run, filter to diag-*.
          # Order matters: build/lint first (most actionable), then containers, then security/codeql.
          ARTIFACTS_JSON=$(gh api \
            "repos/${REPO}/actions/runs/${RUN_ID}/artifacts?per_page=100" \
            --jq '[.artifacts[] | select(.name | startswith("diag-")) | .name]')

          if [ -z "$ARTIFACTS_JSON" ] || [ "$ARTIFACTS_JSON" = "[]" ]; then
            echo "::warning::No diag-* artifacts found in run ${RUN_ID}"
            echo "artifacts=[]" >> "$GITHUB_OUTPUT"
            echo "count=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Sort by priority: build > lint > container > security > semgrep > codeql
          SORTED=$(echo "$ARTIFACTS_JSON" | jq -c '
            sort_by(
              if startswith("diag-build-") then 0
              elif startswith("diag-lint-") then 1
              elif startswith("diag-container-") then 2
              elif startswith("diag-security-") then 3
              elif startswith("diag-semgrep-") then 4
              elif startswith("diag-codeql-") then 5
              else 6 end
            )
          ')

          COUNT=$(echo "$SORTED" | jq 'length')
          echo "artifacts=$SORTED" >> "$GITHUB_OUTPUT"
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"
          echo "Found $COUNT failing-job artifacts (priority-sorted): $SORTED"

  # ── Step 2: Sequential autofix queue — one job per failing artifact ──
  kiro-autofix-build:
    name: "Autofix: ${{ matrix.artifact }}"
    needs: [discover-build-failures]
    if: needs.discover-build-failures.outputs.count != '0' && needs.discover-build-failures.outputs.count != ''
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        artifact: ${{ fromJson(needs.discover-build-failures.outputs.artifacts) }}
    permissions:
      contents: write
      pull-requests: write
    uses: ./.github/workflows/kiro-autofix.yml
    with:
      stage: build
      branch: ${{ github.event.workflow_run.head_branch }}
      context-artifact: ${{ matrix.artifact }}
      artifact-run-id: ${{ github.event.workflow_run.id }}
      run-url: ${{ github.event.workflow_run.html_url }}
    secrets:
      kiro-api: ${{ secrets.KIRO_API }}
      github-token: ${{ secrets.KIRO_GITHUB_TOKEN }}

  # ── Deploy Autofix: triggered when CI fails on main (deploy stage) ──
  # Deploy is a single artifact (kiro-deploy-diagnostics), no queue needed.
  kiro-autofix-deploy:
    name: Kiro Autofix (deploy)
    if: >-
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.head_branch == 'main' &&
      github.event.workflow_run.event == 'push'
    permissions:
      contents: write
      pull-requests: write
    uses: ./.github/workflows/kiro-autofix.yml
    with:
      stage: deploy
      branch: main
      context-artifact: kiro-deploy-diagnostics
      artifact-run-id: ${{ github.event.workflow_run.id }}
      run-url: ${{ github.event.workflow_run.html_url }}
    secrets:
      kiro-api: ${{ secrets.KIRO_API }}
      github-token: ${{ secrets.KIRO_GITHUB_TOKEN }}
