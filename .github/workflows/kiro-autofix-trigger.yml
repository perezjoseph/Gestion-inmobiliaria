name: Kiro Autofix Trigger

# Triggered AFTER the CI/Semgrep workflows complete. Discovers failing-job
# diagnostics artifacts and runs an inline sequential queue: one Kiro
# invocation per failing artifact, one local commit per resolved issue,
# one final push at the end. This keeps each commit focused (one fix per
# artifact) while only triggering CI once at the end of the queue.
#
# REQUIRED SECRETS:
#   KIRO_API       — kiro-cli API key
#   KIRO_GITHUB_TOKEN — fine-grained PAT scoped to THIS repo with:
#                       contents: read+write (push commits)
#                       pull-requests: read+write (comment on PRs)
#                       actions: read (cross-run artifact download)
#                       metadata: read (default)
#                     Do NOT use a classic PAT with org-wide access — the
#                     kiro-cli step runs with --trust-all-tools and could
#                     misuse a broadly-scoped token.
#
# OPT-OUT:
#   - Add the [skip-autofix] PR label, OR
#   - Include [skip-autofix] in the latest commit message
#   The autofix will not run.

on:
  workflow_run:
    workflows: ["CI", "Semgrep"]
    types: [completed]

permissions: {}

# IMPORTANT: cancel-in-progress MUST be false. The queue processes one
# artifact at a time within a single job. If a new workflow_run event
# fires (e.g. CI re-runs after the final push), cancel-in-progress: true
# would kill the still-running queue mid-loop.
concurrency:
  group: kiro-autofix-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: false

env:
  # MAX_QUEUE_RUNS counts distinct queue executions (each may produce many
  # commits). When exceeded, autofix halts and asks for human help.
  MAX_QUEUE_RUNS: "5"
  # Hard cap on prompt size sent to Kiro (per artifact). Avoids context
  # window overflow when diagnostics are unusually verbose.
  MAX_CONTEXT_BYTES: "60000"

jobs:
  autofix-build-queue:
    name: "Sequential Autofix Queue"
    # Runs on any failed CI run including main. On main, fixes are pushed
    # directly to main (kiro-bot has commit access). On non-main branches,
    # fixes are pushed to the same branch the CI ran on. Fork PRs are
    # excluded — we never run autofix against untrusted contributor code.
    if: >-
      github.event.workflow_run.conclusion == 'failure' &&
      (github.event.workflow_run.event != 'pull_request' ||
       github.event.workflow_run.head_repository.full_name == github.repository)
    runs-on: arc-runner-dind
    timeout-minutes: 90
    permissions:
      contents: write
      pull-requests: write
      actions: read
    env:
      RUN_URL: ${{ github.event.workflow_run.html_url }}
      BRANCH: ${{ github.event.workflow_run.head_branch }}
      CI_RUN_ID: ${{ github.event.workflow_run.id }}
    steps:
      # Preflight: fail fast with a clear message if required secrets are
      # missing or empty. Without this, actions/checkout below would die
      # with the opaque "Input required and not supplied: token" error
      # because we explicitly pass token:, and an empty secret resolves
      # to an empty input value rather than falling back to a default.
      - name: Validate required secrets
        env:
          KIRO_GITHUB_TOKEN: ${{ secrets.KIRO_GITHUB_TOKEN }}
          KIRO_API: ${{ secrets.KIRO_API }}
        run: |
          umask 077
          missing=()
          [ -z "${KIRO_GITHUB_TOKEN}" ] && missing+=("KIRO_GITHUB_TOKEN")
          [ -z "${KIRO_API}" ] && missing+=("KIRO_API")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Kiro Autofix cannot run: missing repository secret(s): ${missing[*]}"
            echo "::error::Configure them at Settings -> Secrets and variables -> Actions."
            echo "::error::See the header of .github/workflows/kiro-autofix-trigger.yml for required scopes."
            exit 1
          fi
          echo "All required secrets are configured."

      # persist-credentials: true is required because we git push at the end.
      # All other workflows in this repo use persist-credentials: false.
      - name: Checkout branch
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ env.BRANCH }}
          fetch-depth: 0
          token: ${{ secrets.KIRO_GITHUB_TOKEN }}
          persist-credentials: true

      - name: Check opt-out (label or commit marker)
        id: optout
        env:
          GH_TOKEN: ${{ secrets.KIRO_GITHUB_TOKEN }}
        run: |
          umask 077
          # Check latest commit message
          last_msg=$(git log -1 --format=%B)
          if echo "$last_msg" | grep -qF '[skip-autofix]'; then
            echo "::notice::Autofix skipped: [skip-autofix] marker in latest commit message"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Check PR labels (if a PR exists for this branch)
          pr_labels=$(gh pr list \
            --repo "${{ github.repository }}" \
            --head "${BRANCH}" \
            --state open \
            --json labels \
            --jq '[.[].labels[].name] | join(",")' 2>/dev/null || echo "")
          if echo "$pr_labels" | grep -qF 'skip-autofix'; then
            echo "::notice::Autofix skipped: skip-autofix label on PR"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Count prior queue runs (distinct workflow-run trailers in kiro-bot commits at HEAD)
        id: attempts
        if: steps.optout.outputs.skip == 'false'
        run: |
          umask 077
          # Walk back from HEAD collecting consecutive kiro-bot commits.
          # Group them by their "Workflow run:" trailer — each queue execution
          # produces commits sharing the same trailer URL.
          declare -A seen_runs
          queue_runs=0
          i=0
          while [ "$i" -lt 50 ]; do
            email=$(git log --format='%ae' -n 1 "HEAD~$i" 2>/dev/null || true)
            if [ -z "$email" ]; then break; fi
            case "$email" in
              kiro-bot@*) ;;
              *) break ;;
            esac
            # Extract Workflow run URL from commit message body
            run_url=$(git log --format='%B' -n 1 "HEAD~$i" 2>/dev/null \
              | grep -oP '^Workflow run:\s*\K\S+' | head -1 || true)
            if [ -n "$run_url" ] && [ -z "${seen_runs[$run_url]+x}" ]; then
              seen_runs[$run_url]=1
              queue_runs=$((queue_runs + 1))
            fi
            i=$((i + 1))
          done
          echo "queue_runs=$queue_runs" >> "$GITHUB_OUTPUT"
          echo "Detected $queue_runs distinct prior queue runs at HEAD (max: ${MAX_QUEUE_RUNS})"

          if [ "$queue_runs" -ge "${MAX_QUEUE_RUNS}" ]; then
            echo "exceeded=true" >> "$GITHUB_OUTPUT"
            echo "::warning::Kiro Autofix limit reached: $queue_runs queue runs at HEAD."
          else
            echo "exceeded=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Find related PR
        id: pr
        if: steps.optout.outputs.skip == 'false' && steps.attempts.outputs.exceeded == 'true'
        env:
          GH_TOKEN: ${{ secrets.KIRO_GITHUB_TOKEN }}
        run: |
          umask 077
          pr_number=$(gh pr list \
            --repo "${{ github.repository }}" \
            --head "${BRANCH}" \
            --state open \
            --json number \
            --jq '.[0].number // empty')
          echo "number=${pr_number}" >> "$GITHUB_OUTPUT"

      # Edit existing comment if present, otherwise create — avoids spam
      # when autofix repeatedly hits the limit on the same PR.
      - name: Notify human on PR (max attempts reached)
        if: steps.optout.outputs.skip == 'false' && steps.attempts.outputs.exceeded == 'true' && steps.pr.outputs.number != ''
        env:
          GH_TOKEN: ${{ secrets.KIRO_GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          MARKER: "<!-- kiro-autofix-gave-up -->"
        run: |
          umask 077
          BODY="${MARKER}
          🤖 **Kiro Autofix gave up at the build stage.**

          Attempted ${MAX_QUEUE_RUNS} consecutive queue runs without restoring CI to green. Manual intervention is required.

          - Latest failed run: ${RUN_URL}
          - Branch: \`${BRANCH}\`

          To resume autofix, push a non-bot commit to this branch (the counter resets on any human commit at HEAD), or remove the \`skip-autofix\` label."

          existing=$(gh api \
            "repos/${{ github.repository }}/issues/${PR_NUMBER}/comments?per_page=100" \
            --jq ".[] | select(.body | contains(\"${MARKER}\")) | .id" \
            | head -1)

          if [ -n "$existing" ]; then
            gh api -X PATCH "repos/${{ github.repository }}/issues/comments/${existing}" \
              -f body="$BODY"
            echo "Updated existing autofix-gave-up comment ${existing}"
          else
            gh pr comment "$PR_NUMBER" \
              --repo "${{ github.repository }}" \
              --body "$BODY"
            echo "Created new autofix-gave-up comment"
          fi

      - name: Stop if max attempts exceeded
        if: steps.optout.outputs.skip == 'false' && steps.attempts.outputs.exceeded == 'true'
        run: |
          echo "::error::Kiro Autofix has hit the queue-run limit. Manual intervention required."
          exit 1

      - name: Rust setup
        if: steps.optout.outputs.skip == 'false' && steps.attempts.outputs.exceeded == 'false'
        uses: ./.github/actions/rust-setup
        with:
          components: rustfmt,clippy
          targets: x86_64-unknown-linux-musl,wasm32-unknown-unknown

      - name: List failing-job artifacts from CI run (priority-sorted)
        id: list
        if: steps.optout.outputs.skip == 'false' && steps.attempts.outputs.exceeded == 'false'
        env:
          GH_TOKEN: ${{ secrets.KIRO_GITHUB_TOKEN }}
        run: |
          umask 077
          ARTIFACTS_JSON=$(gh api \
            "repos/${{ github.repository }}/actions/runs/${CI_RUN_ID}/artifacts?per_page=100" \
            --jq '[.artifacts[] | select(.name | startswith("diag-")) | .name]')

          if [ -z "$ARTIFACTS_JSON" ] || [ "$ARTIFACTS_JSON" = "[]" ]; then
            echo "::warning::No diag-* artifacts found in run ${CI_RUN_ID}"
            echo "artifacts=[]" >> "$GITHUB_OUTPUT"
            echo "count=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Priority: build > lint > container > security > semgrep > codeql
          SORTED=$(echo "$ARTIFACTS_JSON" | jq -c '
            sort_by(
              if startswith("diag-build-") then 0
              elif startswith("diag-lint-") then 1
              elif startswith("diag-container-") then 2
              elif startswith("diag-security-") then 3
              elif startswith("diag-semgrep-") then 4
              elif startswith("diag-codeql-") then 5
              else 6 end
            )
          ')

          COUNT=$(echo "$SORTED" | jq 'length')
          echo "artifacts=$SORTED" >> "$GITHUB_OUTPUT"
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"
          echo "Found $COUNT failing-job artifacts (priority-sorted): $SORTED"

      - name: Download all failing-job artifacts
        if: steps.optout.outputs.skip == 'false' && steps.attempts.outputs.exceeded == 'false' && steps.list.outputs.count != '0'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: diag-*
          path: ${{ runner.temp }}/all-diag
          merge-multiple: false
          run-id: ${{ env.CI_RUN_ID }}
          github-token: ${{ secrets.KIRO_GITHUB_TOKEN }}

      - name: Verify downloaded artifacts
        if: steps.optout.outputs.skip == 'false' && steps.attempts.outputs.exceeded == 'false' && steps.list.outputs.count != '0'
        run: |
          echo "=== Downloaded artifact structure ==="
          find "${RUNNER_TEMP}/all-diag" -type f -exec ls -la {} \; 2>/dev/null || echo "No files found"
          echo ""
          for dir in "${RUNNER_TEMP}/all-diag"/*/; do
            [ -d "$dir" ] || continue
            artifact_name=$(basename "$dir")
            ctx="$dir/context.txt"
            if [ -s "$ctx" ]; then
              echo "${artifact_name}/context.txt: $(wc -c < "$ctx") bytes, $(wc -l < "$ctx") lines"
            elif [ -f "$ctx" ]; then
              echo "::warning::${artifact_name}/context.txt exists but is EMPTY (0 bytes)"
            else
              echo "::warning::${artifact_name}/context.txt DOES NOT EXIST"
              echo "  Files in ${artifact_name}/: $(ls "$dir" 2>/dev/null || echo 'none')"
            fi
          done

      - name: Build git history of prior attempts
        id: history
        if: steps.optout.outputs.skip == 'false' && steps.attempts.outputs.exceeded == 'false' && steps.list.outputs.count != '0'
        run: |
          umask 077
          HISTORY_LOG="${RUNNER_TEMP}/git-history.txt"
          {
            echo "=== RECENT COMMITS (last 10) ==="
            git log --format='%h %ae %s%n%b%n---' -n 10
            echo ""
            echo "=== PRIOR KIRO-BOT QUEUE RUNS AT HEAD: ${{ steps.attempts.outputs.queue_runs }} ==="
          } > "$HISTORY_LOG"
          echo "history_log=$HISTORY_LOG" >> "$GITHUB_OUTPUT"

      - name: Configure git identity
        if: steps.optout.outputs.skip == 'false' && steps.attempts.outputs.exceeded == 'false' && steps.list.outputs.count != '0'
        run: |
          git config user.name "kiro-bot"
          git config user.email "kiro-bot@users.noreply.github.com"

      - name: Process queue (one Kiro run + one commit per artifact)
        id: queue
        if: steps.optout.outputs.skip == 'false' && steps.attempts.outputs.exceeded == 'false' && steps.list.outputs.count != '0'
        env:
          KIRO_API_KEY: ${{ secrets.KIRO_API }}
          KIRO_MAX_FIX_ITERATIONS: "3"
          ARTIFACTS_JSON: ${{ steps.list.outputs.artifacts }}
          GIT_HISTORY_FILE: ${{ steps.history.outputs.history_log }}
          QUEUE_RUNS: ${{ steps.attempts.outputs.queue_runs }}
        run: |
          umask 077
          ATTEMPT_DISPLAY=$((QUEUE_RUNS + 1))
          COMMITS_MADE=0
          TOTAL=$(echo "$ARTIFACTS_JSON" | jq 'length')
          POS=0
          FIXED_FILES=""

          # Iterate through artifacts in priority order
          while IFS= read -r artifact; do
            [ -z "$artifact" ] && continue
            POS=$((POS + 1))
            CONTEXT_PATH="${RUNNER_TEMP}/all-diag/${artifact}/context.txt"
            if [ ! -s "$CONTEXT_PATH" ]; then
              # Artifact directory exists but context.txt is empty or missing.
              # Try to find any file in the artifact directory as fallback.
              ALT_FILE=$(find "${RUNNER_TEMP}/all-diag/${artifact}/" -type f -size +0 2>/dev/null | head -1)
              if [ -n "$ALT_FILE" ]; then
                CONTEXT_PATH="$ALT_FILE"
                echo "::notice::Using alternative file from ${artifact}: $(basename "$ALT_FILE")"
              else
                # Generate minimal context from what we know
                CONTEXT_PATH="${RUNNER_TEMP}/all-diag/${artifact}/context-generated.txt"
                mkdir -p "${RUNNER_TEMP}/all-diag/${artifact}"
                {
                  echo "=== JOB: ${artifact} ==="
                  echo "The diagnostic artifact was uploaded but context.txt was empty."
                  echo "This typically means a Docker build/push step failed before any"
                  echo "output files could be captured."
                  echo ""
                  echo "Artifact name: ${artifact}"
                  echo "CI run: ${CI_RUN_ID}"
                  echo "Branch: ${BRANCH}"
                  echo ""
                  echo "Check the GitHub Actions UI for the full build log."
                  echo "Look for Dockerfile issues, base image availability, or registry auth errors."
                } > "$CONTEXT_PATH"
                echo "::warning::Generated fallback context for ${artifact} (original context.txt was empty)"
              fi
            fi

            echo "::group::Processing ${artifact}"

            # Truncate diagnostics if oversized to protect context window.
            CTX_BYTES=$(wc -c < "$CONTEXT_PATH")
            TRUNCATED_CTX="${RUNNER_TEMP}/all-diag/${artifact}/context-truncated.txt"
            if [ "$CTX_BYTES" -gt "${MAX_CONTEXT_BYTES}" ]; then
              echo "::warning::context.txt for ${artifact} is ${CTX_BYTES} bytes; truncating to last ${MAX_CONTEXT_BYTES}"
              tail -c "${MAX_CONTEXT_BYTES}" "$CONTEXT_PATH" > "$TRUNCATED_CTX"
              echo "[NOTE: Earlier diagnostic output was truncated; only the last ${MAX_CONTEXT_BYTES} bytes are shown above.]" >> "$TRUNCATED_CTX"
              EFFECTIVE_CTX="$TRUNCATED_CTX"
            else
              EFFECTIVE_CTX="$CONTEXT_PATH"
            fi

            # Skip artifacts whose errors reference only files already fixed by prior queue items.
            if [ -n "$FIXED_FILES" ]; then
              DIAG_FILES=$(grep -oP '(?:^|\s)(\S+\.(?:rs|ts|tsx|kt|kts))' "$EFFECTIVE_CTX" | sort -u || true)
              ALL_COVERED=true
              while IFS= read -r dfile; do
                [ -z "$dfile" ] && continue
                dfile_trimmed=$(echo "$dfile" | xargs)
                if ! echo "$FIXED_FILES" | grep -qF "$dfile_trimmed"; then
                  ALL_COVERED=false
                  break
                fi
              done <<< "$DIAG_FILES"
              if [ "$ALL_COVERED" = true ] && [ -n "$DIAG_FILES" ]; then
                echo "::notice::Skipping ${artifact}: all referenced files were already fixed by prior queue items"
                echo "::endgroup::"
                continue
              fi
            fi

            # Set environment variables for the agent
            export KIRO_DIAGNOSTICS_FILE="$EFFECTIVE_CTX"
            export KIRO_COMMIT_MSG_FILE="${RUNNER_TEMP}/kiro-commit-message-${artifact}.txt"
            export KIRO_GIT_HISTORY_FILE="$GIT_HISTORY_FILE"

            # Build the positional prompt with context the agent can act on immediately.
            PROMPT="Fix CI failure from artifact '${artifact}' (queue position ${POS}/${TOTAL}). Read the diagnostics file at \$KIRO_DIAGNOSTICS_FILE. Read prior attempt history at \$KIRO_GIT_HISTORY_FILE. Write your commit message to \$KIRO_COMMIT_MSG_FILE when done."

            # Invoke the autofix agent (no per-artifact timeout; job-level
            # timeout-minutes guards against runaway execution).
            AGENT_EXIT=0
            kiro-cli chat --agent autofix --model claude-opus-4.6 --effort max --no-interactive --trust-all-tools \
                "$PROMPT" \
              || AGENT_EXIT=$?

            # Detect ANY change in working tree (tracked, staged, OR untracked).
            git add -A
            if [ -z "$(git status --porcelain)" ]; then
              echo "No changes produced by Kiro for ${artifact}, skipping commit"
              if [ "$AGENT_EXIT" -ne 0 ]; then
                echo "::warning::Agent exited ${AGENT_EXIT} with no changes for ${artifact}; stopping queue."
                echo "::endgroup::"
                break
              fi
              echo "::endgroup::"
              continue
            fi

            # Track which files were fixed for deduplication of later artifacts.
            NEWLY_FIXED=$(git diff --cached --name-only)
            FIXED_FILES="${FIXED_FILES}"$'\n'"${NEWLY_FIXED}"

            # Commit locally — no push yet (push happens once at end of queue).
            # Ensure every queued commit ends with the Workflow run trailer for
            # the queue-run counter to detect.
            if [ -s "$KIRO_COMMIT_MSG_FILE" ]; then
              if ! grep -qF "Workflow run: ${RUN_URL}" "$KIRO_COMMIT_MSG_FILE"; then
                printf '\nWorkflow run: %s\n' "$RUN_URL" >> "$KIRO_COMMIT_MSG_FILE"
              fi
              git commit -F "$KIRO_COMMIT_MSG_FILE"
            else
              echo "::warning::Kiro did not produce a commit message for ${artifact}; using fallback."
              git commit -m "fix(autofix): resolve ${artifact}" -m "Kiro did not write a descriptive commit message. Inspect the diff for details." -m "Workflow run: ${RUN_URL}"
            fi
            COMMITS_MADE=$((COMMITS_MADE + 1))
            echo "Commit ${COMMITS_MADE} created for ${artifact}"

            # Exit code handling: 0 → continue queue; non-zero → stop queue
            if [ "$AGENT_EXIT" -ne 0 ]; then
              echo "::warning::Agent exited ${AGENT_EXIT} for ${artifact}; committed partial fix, stopping queue."
              echo "::endgroup::"
              break
            fi

            echo "::endgroup::"
          done < <(echo "$ARTIFACTS_JSON" | jq -r '.[]')

          echo "commits_made=$COMMITS_MADE" >> "$GITHUB_OUTPUT"
          echo ""
          echo "Queue complete. Created $COMMITS_MADE commits."

      - name: Push all queued commits
        id: push
        if: steps.queue.outputs.commits_made != '0' && steps.queue.outputs.commits_made != ''
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
        with:
          timeout_minutes: 3
          max_attempts: 3
          retry_wait_seconds: 10
          command: |
            echo "Pushing $(git log origin/${BRANCH}..HEAD --oneline | wc -l) new commits to origin/${BRANCH}"
            git log origin/${BRANCH}..HEAD --oneline
            git fetch origin "${BRANCH}"
            # If origin advanced (human pushed concurrently), rebase our queued commits on top
            if ! git merge-base --is-ancestor "origin/${BRANCH}" HEAD; then
              git rebase "origin/${BRANCH}" || { git rebase --abort; exit 1; }
            fi
            git push origin "${BRANCH}"

      - name: Notify on push failure
        if: failure() && steps.push.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.KIRO_GITHUB_TOKEN }}
        run: |
          umask 077
          pr_number=$(gh pr list \
            --repo "${{ github.repository }}" \
            --head "${BRANCH}" \
            --state open \
            --json number \
            --jq '.[0].number // empty')
          if [ -n "$pr_number" ]; then
            gh pr comment "$pr_number" \
              --repo "${{ github.repository }}" \
              --body "🤖 **Kiro Autofix queue produced commits but push failed.**

            $(git log origin/${BRANCH}..HEAD --oneline 2>/dev/null | head -10)

            Branch was likely modified concurrently. Manual intervention required.
            Failed run: ${RUN_URL}"
          fi

  # ── Deploy Autofix Precheck: only proceed if the deploy artifact exists ──
  # CI on main can fail at build, lint, security, container, or deploy stages.
  # The deploy autofix is only meaningful for deploy-stage failures, signalled
  # by the presence of the kiro-deploy-diagnostics artifact uploaded by
  # deploy.yml. If CI failed earlier (no deploy run), there is no artifact to
  # download and the reusable workflow's actions/download-artifact step would
  # hard-fail. Probe artifacts here and only dispatch the reusable workflow
  # when the artifact is present.
  kiro-autofix-deploy-precheck:
    name: Kiro Autofix (deploy) — Precheck
    if: >-
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.head_branch == 'main' &&
      github.event.workflow_run.event == 'push'
    runs-on: arc-runner-dind
    timeout-minutes: 5
    permissions:
      actions: read
    outputs:
      artifact-present: ${{ steps.probe.outputs.present }}
    steps:
      - name: Validate required secrets
        env:
          KIRO_GITHUB_TOKEN: ${{ secrets.KIRO_GITHUB_TOKEN }}
          KIRO_API: ${{ secrets.KIRO_API }}
        run: |
          umask 077
          missing=()
          [ -z "${KIRO_GITHUB_TOKEN}" ] && missing+=("KIRO_GITHUB_TOKEN")
          [ -z "${KIRO_API}" ] && missing+=("KIRO_API")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Kiro Autofix cannot run: missing repository secret(s): ${missing[*]}"
            echo "::error::Configure them at Settings -> Secrets and variables -> Actions."
            exit 1
          fi

      - name: Probe for kiro-deploy-diagnostics artifact
        id: probe
        env:
          GH_TOKEN: ${{ secrets.KIRO_GITHUB_TOKEN }}
          CI_RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          umask 077
          present=$(gh api \
            "repos/${{ github.repository }}/actions/runs/${CI_RUN_ID}/artifacts?per_page=100" \
            --jq '[.artifacts[] | select(.name == "kiro-deploy-diagnostics")] | length')
          if [ "${present:-0}" -gt 0 ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
            echo "kiro-deploy-diagnostics found; deploy autofix will run."
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::kiro-deploy-diagnostics not found in run ${CI_RUN_ID}."
            echo "::notice::CI on main failed before the deploy stage produced diagnostics."
            echo "::notice::Build-stage failures on main ARE handled by autofix-build-queue (runs for all branches including main) — check that job's outcome for diag-* artifact processing."
          fi

  # ── Deploy Autofix: triggered when CI fails on main (deploy stage) ──
  # Deploy is a single artifact (kiro-deploy-diagnostics), no queue needed.
  kiro-autofix-deploy:
    name: Kiro Autofix (deploy)
    needs: [kiro-autofix-deploy-precheck]
    if: needs.kiro-autofix-deploy-precheck.outputs.artifact-present == 'true'
    permissions:
      contents: write
      pull-requests: write
    uses: ./.github/workflows/kiro-autofix.yml
    with:
      stage: deploy
      branch: main
      context-artifact: kiro-deploy-diagnostics
      artifact-run-id: ${{ github.event.workflow_run.id }}
      run-url: ${{ github.event.workflow_run.html_url }}
    secrets:
      kiro-api: ${{ secrets.KIRO_API }}
      github-token: ${{ secrets.KIRO_GITHUB_TOKEN }}
