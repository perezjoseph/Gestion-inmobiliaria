name: CodeQL Analysis

on:
  workflow_call:
    inputs:
      is-fork-pr:
        type: boolean
        required: true

permissions: {}

jobs:
  # ── Rust: build-mode none (no build needed, uses rust-analyzer internally) ──
  analyze-rust:
    name: CodeQL (Rust)
    runs-on: arc-runner-dind
    if: ${{ !inputs.is-fork-pr }}
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Rust setup
        uses: ./.github/actions/rust-setup

      - name: Initialize CodeQL
        uses: github/codeql-action/init@68bde559dea0fdcac2102bfdf6230c5f70eb485e # v4.35.4
        with:
          languages: rust
          build-mode: none

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@68bde559dea0fdcac2102bfdf6230c5f70eb485e # v4.35.4
        with:
          category: codeql-rust

  # ── JavaScript/TypeScript: interpreted (no build needed, but Node.js required for extraction) ──
  # Covers baileys-service (Node.js + TypeScript)
  analyze-javascript:
    name: CodeQL (JavaScript/TypeScript)
    runs-on: arc-runner-dind
    if: ${{ !inputs.is-fork-pr }}
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0.0
        with:
          node-version: "24"

      - name: Initialize CodeQL
        uses: github/codeql-action/init@68bde559dea0fdcac2102bfdf6230c5f70eb485e # v4.35.4
        with:
          languages: javascript-typescript

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@68bde559dea0fdcac2102bfdf6230c5f70eb485e # v4.35.4
        with:
          category: codeql-javascript

  # ── Python: interpreted (no build needed, Python required for extraction) ──
  # Covers ocr-service (FastAPI + PaddleOCR)
  analyze-python:
    name: CodeQL (Python)
    runs-on: arc-runner-dind
    if: ${{ !inputs.is-fork-pr }}
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.10"

      - name: Initialize CodeQL
        uses: github/codeql-action/init@68bde559dea0fdcac2102bfdf6230c5f70eb485e # v4.35.4
        with:
          languages: python

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@68bde559dea0fdcac2102bfdf6230c5f70eb485e # v4.35.4
        with:
          category: codeql-python

  # ── Java/Kotlin: manual build (AGP 9.0 requires Android SDK + specific Gradle invocation) ──
  # Covers android/ multi-module project.
  # Note: autobuild fails because AGP 9.0 has built-in Kotlin support and the
  # CodeQL autobuild runs `clean` which triggers plugin resolution before our
  # Gradle wrapper can configure properly. Manual build mode gives us control.
  analyze-kotlin:
    name: CodeQL (Java/Kotlin)
    runs-on: arc-runner-dind
    if: ${{ !inputs.is-fork-pr }}
    permissions:
      contents: read
      security-events: write
    env:
      JAVA_HOME: ${{ github.workspace }}/android/.jdk/jdk-17.0.18+8
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Android SDK
        run: |
          export ANDROID_HOME="${HOME}/android-sdk"
          mkdir -p "${ANDROID_HOME}/cmdline-tools"
          curl -fsSL "https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip" \
            -o /tmp/cmdline-tools.zip
          unzip -q /tmp/cmdline-tools.zip -d "${ANDROID_HOME}/cmdline-tools"
          mv "${ANDROID_HOME}/cmdline-tools/cmdline-tools" "${ANDROID_HOME}/cmdline-tools/latest"
          yes | "${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager" --licenses > /dev/null 2>&1 || true
          "${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager" \
            "platforms;android-36" "build-tools;36.0.0" > /dev/null 2>&1
          echo "ANDROID_HOME=${ANDROID_HOME}" >> "${GITHUB_ENV}"
          echo "${ANDROID_HOME}/cmdline-tools/latest/bin" >> "${GITHUB_PATH}"
          echo "${ANDROID_HOME}/build-tools/36.0.0" >> "${GITHUB_PATH}"

      - name: Initialize CodeQL
        uses: github/codeql-action/init@68bde559dea0fdcac2102bfdf6230c5f70eb485e # v4.35.4
        with:
          languages: java-kotlin
          build-mode: manual
          config: |
            paths:
              - android

      - name: Build Android project
        run: |
          cd android
          chmod +x gradlew
          ./gradlew --no-daemon compileDebugKotlin compileDebugJavaWithJavac || true

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@68bde559dea0fdcac2102bfdf6230c5f70eb485e # v4.35.4
        with:
          category: codeql-kotlin
