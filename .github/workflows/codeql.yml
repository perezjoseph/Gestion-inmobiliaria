name: CodeQL Analysis

on:
  workflow_call:
    inputs:
      is-fork-pr:
        type: boolean
        required: true

permissions: {}

jobs:
  # ── Kotlin: requires a build (build-mode: none only supports Java) ──
  analyze-kotlin:
    name: CodeQL (Kotlin)
    runs-on: arc-runner-dind
    if: ${{ !inputs.is-fork-pr }}
    permissions:
      contents: read
      security-events: write
    env:
      JAVA_VERSION: "17"
      JAVA_DISTRIBUTION: "temurin"
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - name: Verify JAVA_HOME
        run: |
          if [ -z "$JAVA_HOME" ] || [ ! -x "$JAVA_HOME/bin/java" ]; then
            echo "::warning::JAVA_HOME not set by setup-java, searching tool cache"
            JAVA_BIN=$(find "${RUNNER_TOOL_CACHE:-/opt/hostedtoolcache}" -path "*/bin/java" -type f 2>/dev/null | head -1)
            if [ -n "$JAVA_BIN" ]; then
              JAVA_HOME=$(cd "$(dirname "$JAVA_BIN")/.." && pwd)
              echo "JAVA_HOME=$JAVA_HOME" >> "$GITHUB_ENV"
              echo "$(dirname "$JAVA_BIN")" >> "$GITHUB_PATH"
              export JAVA_HOME PATH="$(dirname "$JAVA_BIN"):$PATH"
            fi
          fi
          java -version || { echo "::error::Java not available after setup-java"; exit 1; }

      - name: Ensure unzip is available
        run: |
          if command -v unzip &>/dev/null; then
            echo "unzip already available: $(unzip -v 2>&1 | head -1)"
            exit 0
          fi
          mkdir -p "$HOME/.local/bin"
          printf '%s\n' \
            '#!/usr/bin/env python3' \
            'import zipfile, sys, os' \
            'args = sys.argv[1:]' \
            'dest, zippath, i = ".", None, 0' \
            'while i < len(args):' \
            '    if args[i] == "-d":' \
            '        i += 1; dest = args[i]' \
            '    elif not args[i].startswith("-"):' \
            '        zippath = args[i]' \
            '    i += 1' \
            'if not zippath:' \
            '    sys.exit(1)' \
            'os.makedirs(dest, exist_ok=True)' \
            'with zipfile.ZipFile(zippath) as zf:' \
            '    zf.extractall(dest)' \
            > "$HOME/.local/bin/unzip"
          chmod +x "$HOME/.local/bin/unzip"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/.local/bin:$PATH"
          echo "Installed Python-based unzip shim"

      - name: Set up Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@ac638b010cf58a27ee6c972d7336334ccaf61c96 # v4.4.1
        with:
          cache-read-only: true

      - name: Ensure gradlew is executable
        run: chmod +x android/gradlew

      - name: Initialize CodeQL
        uses: github/codeql-action/init@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with:
          languages: java-kotlin
          build-mode: manual

      # --no-daemon: required so CodeQL can trace the compiler invocations
      # --no-build-cache: ensures a clean build for accurate extraction
      - name: Build Android project for CodeQL
        env:
          GRADLE_OPTS: "-Xmx512m -Dorg.gradle.jvmargs=-Xmx2g"
        run: |
          cd android
          ./gradlew assembleDebug --parallel --max-workers=4 --no-daemon --no-build-cache

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with:
          category: codeql-kotlin

  # ── Rust: build-mode none (no build needed, uses rust-analyzer internally) ──
  # Requires rustup and cargo on PATH. Cargo.toml must be present.
  analyze-rust:
    name: CodeQL (Rust)
    runs-on: arc-runner-dind
    if: ${{ !inputs.is-fork-pr }}
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Rust setup
        uses: ./.github/actions/rust-setup

      - name: Initialize CodeQL
        uses: github/codeql-action/init@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with:
          languages: rust
          build-mode: none

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with:
          category: codeql-rust
