name: CI
run-name: "CI [${{ github.event_name }}] ${{ github.ref_name }} @ ${{ github.sha }}"

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "LICENSE"
      - ".gitignore"
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "LICENSE"
      - ".gitignore"
  workflow_dispatch:

permissions: {}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ── Stage 0: Path-Based Change Detection ──

  changes:
    name: Detect Changes
    runs-on: arc-runner-dind
    timeout-minutes: 10
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
      pull-requests: read
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      android: ${{ steps.filter.outputs.android }}
      ocr-service: ${{ steps.filter.outputs.ocr-service }}
      baileys-service: ${{ steps.filter.outputs.baileys-service }}
      ci: ${{ steps.filter.outputs.ci }}
      infra: ${{ steps.filter.outputs.infra }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          fetch-depth: 2

      - name: Detect changed paths
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          base: ${{ github.ref_name }}
          filters: |
            backend:
              - 'backend/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
            frontend:
              - 'frontend/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
            ocr-service:
              - 'ocr-service/**'
            android:
              - 'android/**'
            baileys-service:
              - 'baileys-service/**'
            ci:
              - '.github/actions/**'
              - '.github/workflows/build-and-test.yml'
              - '.github/workflows/ci.yml'
              - '.github/workflows/containers.yml'
              - '.github/workflows/deploy.yml'
              - '.github/workflows/security.yml'
            infra:
              - 'infra/**'

  # ── Stage 1: All quality checks in parallel ──

  security:
    name: Security
    needs: [changes]
    permissions:
      actions: read
      contents: read
      pull-requests: write
      security-events: write
    uses: ./.github/workflows/security.yml
    with:
      is-pr: ${{ github.event_name == 'pull_request' }}
      is-fork-pr: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository }}

  # Build & Test runs backend (clippy, test, build in parallel) + frontend.
  # Coverage only runs on production builds (main push) to keep PR feedback fast.
  build-and-test:
    name: Build & Test
    needs: [changes]
    if: >-
      needs.changes.outputs.backend == 'true' ||
      needs.changes.outputs.frontend == 'true' ||
      needs.changes.outputs.ci == 'true'
    permissions:
      actions: read
      contents: read
      id-token: write
      attestations: write
    uses: ./.github/workflows/build-and-test.yml
    with:
      is-fork-pr: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository }}
      is-production: ${{ github.ref == 'refs/heads/main' && github.event_name == 'push' }}
      skip-backend: ${{ needs.changes.outputs.backend != 'true' && needs.changes.outputs.ci != 'true' }}
      skip-frontend: ${{ needs.changes.outputs.frontend != 'true' && needs.changes.outputs.ci != 'true' }}

  # ── Stage 1.5: Sidecar Containers (no Rust dependency, run parallel with build-and-test) ──

  baileys-container:
    name: Baileys Container
    needs: [changes]
    if: >-
      needs.changes.outputs.baileys-service == 'true' ||
      needs.changes.outputs.ci == 'true'
    permissions:
      actions: read
      contents: read
      packages: write
      security-events: write
      id-token: write
      attestations: write
    runs-on: arc-runner-dind
    timeout-minutes: 30
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    env:
      DOCKER_CONTENT_TRUST: "1"
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Build, scan & attest Baileys container
        id: build
        uses: ./.github/actions/container-build-scan
        with:
          image-name: realestate-baileys
          context: ./baileys-service
          dockerfile: ./baileys-service/Dockerfile
          is-production: ${{ github.ref == 'refs/heads/main' && github.event_name == 'push' }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          image-owner: ${{ github.repository_owner }}
          cache-suffix: buildcache-node24
          sarif-category: trivy-baileys-image
          artifact-suffix: container-baileys
          job-name: "baileys-container"

  ocr-container:
    name: OCR Container
    needs: [changes]
    if: >-
      needs.changes.outputs.ocr-service == 'true' ||
      needs.changes.outputs.ci == 'true'
    permissions:
      actions: read
      contents: read
      packages: write
      security-events: write
      id-token: write
      attestations: write
    runs-on: arc-runner-dind
    timeout-minutes: 60
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    env:
      DOCKER_CONTENT_TRUST: "1"
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Build, scan & attest OCR container
        id: build
        uses: ./.github/actions/container-build-scan
        with:
          image-name: realestate-ocr-service
          context: ./ocr-service
          dockerfile: ./ocr-service/Dockerfile
          is-production: ${{ github.ref == 'refs/heads/main' && github.event_name == 'push' }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          image-owner: ${{ github.repository_owner }}
          cache-suffix: buildcache
          sarif-category: trivy-ocr-service-image
          artifact-suffix: container-ocr
          job-name: "ocr-container"

  # ── Stage 2: Container Images (after build-and-test + security pass) ──

  containers:
    name: Containers
    needs: [build-and-test, security, changes]
    if: |
      !cancelled() &&
      needs.build-and-test.result == 'success' &&
      (needs.security.result == 'success' || needs.security.result == 'skipped') &&
      (needs.changes.outputs.backend == 'true' || needs.changes.outputs.ci == 'true')
    permissions:
      actions: read
      contents: read
      packages: write
      security-events: write
      id-token: write
      attestations: write
    uses: ./.github/workflows/containers.yml
    with:
      is-production: ${{ github.ref == 'refs/heads/main' && github.event_name == 'push' }}

  # ── Stage 2.5: Resolve digests for all components ──
  # For components that were rebuilt, use the fresh digest.
  # For components that were skipped, fetch the current 'latest' digest from GHCR.

  resolve-digests:
    name: Resolve Image Digests
    needs: [changes, containers, ocr-container, baileys-container]
    if: |
      !cancelled() &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop') &&
      github.event_name == 'push'
    runs-on: arc-runner-dind
    timeout-minutes: 5
    permissions:
      contents: read
      packages: read
    outputs:
      backend-digest: ${{ steps.resolve.outputs.backend-digest }}
      frontend-digest: ${{ steps.resolve.outputs.frontend-digest }}
      ocr-service-digest: ${{ steps.resolve.outputs.ocr-service-digest }}
      baileys-digest: ${{ steps.resolve.outputs.baileys-digest }}
      should-deploy: ${{ steps.resolve.outputs.should-deploy }}
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve digests
        id: resolve
        env:
          IMAGE_OWNER: ${{ github.repository_owner }}
          CONTAINERS_RESULT: ${{ needs.containers.result }}
          BACKEND_DIGEST_NEW: ${{ needs.containers.outputs.backend-digest }}
          FRONTEND_DIGEST_NEW: ${{ needs.containers.outputs.frontend-digest }}
          OCR_RESULT: ${{ needs.ocr-container.result }}
          OCR_DIGEST_NEW: ${{ needs.ocr-container.outputs.digest }}
          BAILEYS_RESULT: ${{ needs.baileys-container.result }}
          BAILEYS_DIGEST_NEW: ${{ needs.baileys-container.outputs.digest }}
        run: |
          FAILED=false

          # Helper: fetch latest digest from GHCR for a given image
          fetch_latest_digest() {
            local image="$1"
            docker manifest inspect "ghcr.io/${IMAGE_OWNER}/${image}:latest" 2>/dev/null \
              | jq -r '.manifests[0].digest // .config.digest // empty' \
              || true
          }

          # Backend
          if [ "$CONTAINERS_RESULT" = "success" ] && [ -n "$BACKEND_DIGEST_NEW" ]; then
            echo "backend-digest=${BACKEND_DIGEST_NEW}" >> "$GITHUB_OUTPUT"
          else
            DIGEST=$(fetch_latest_digest "realestate-backend")
            if [ -z "$DIGEST" ]; then
              echo "::error::No backend digest available (build skipped and no latest tag in GHCR)"
              FAILED=true
            else
              echo "backend-digest=${DIGEST}" >> "$GITHUB_OUTPUT"
              echo "::notice::Using existing backend digest: ${DIGEST}"
            fi
          fi

          # Frontend
          if [ "$CONTAINERS_RESULT" = "success" ] && [ -n "$FRONTEND_DIGEST_NEW" ]; then
            echo "frontend-digest=${FRONTEND_DIGEST_NEW}" >> "$GITHUB_OUTPUT"
          else
            DIGEST=$(fetch_latest_digest "realestate-frontend")
            if [ -z "$DIGEST" ]; then
              echo "::error::No frontend digest available (build skipped and no latest tag in GHCR)"
              FAILED=true
            else
              echo "frontend-digest=${DIGEST}" >> "$GITHUB_OUTPUT"
              echo "::notice::Using existing frontend digest: ${DIGEST}"
            fi
          fi

          # Baileys
          if [ "$BAILEYS_RESULT" = "success" ] && [ -n "$BAILEYS_DIGEST_NEW" ]; then
            echo "baileys-digest=${BAILEYS_DIGEST_NEW}" >> "$GITHUB_OUTPUT"
          else
            DIGEST=$(fetch_latest_digest "realestate-baileys")
            if [ -z "$DIGEST" ]; then
              echo "::error::No baileys digest available (build skipped and no latest tag in GHCR)"
              FAILED=true
            else
              echo "baileys-digest=${DIGEST}" >> "$GITHUB_OUTPUT"
              echo "::notice::Using existing baileys digest: ${DIGEST}"
            fi
          fi

          # OCR (optional — empty string is acceptable)
          if [ "$OCR_RESULT" = "success" ] && [ -n "$OCR_DIGEST_NEW" ]; then
            echo "ocr-service-digest=${OCR_DIGEST_NEW}" >> "$GITHUB_OUTPUT"
          else
            DIGEST=$(fetch_latest_digest "realestate-ocr-service")
            echo "ocr-service-digest=${DIGEST}" >> "$GITHUB_OUTPUT"
            if [ -n "$DIGEST" ]; then
              echo "::notice::Using existing OCR service digest: ${DIGEST}"
            fi
          fi

          # At least one component must have been rebuilt to justify a deploy
          if [ "$CONTAINERS_RESULT" = "success" ] || [ "$BAILEYS_RESULT" = "success" ] || [ "$OCR_RESULT" = "success" ]; then
            if [ "$FAILED" = "true" ]; then
              echo "should-deploy=false" >> "$GITHUB_OUTPUT"
              exit 1
            fi
            echo "should-deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::No components were rebuilt — skipping deploy"
            echo "should-deploy=false" >> "$GITHUB_OUTPUT"
          fi

  # ── Stage 3: Deploy (after digests are resolved) ──

  deploy:
    name: Deploy
    needs: [resolve-digests]
    if: >-
      needs.resolve-digests.result == 'success' &&
      needs.resolve-digests.outputs.should-deploy == 'true'
    permissions:
      contents: read
      packages: read
    uses: ./.github/workflows/deploy.yml
    with:
      backend-digest: ${{ needs.resolve-digests.outputs.backend-digest }}
      frontend-digest: ${{ needs.resolve-digests.outputs.frontend-digest }}
      ocr-service-digest: ${{ needs.resolve-digests.outputs.ocr-service-digest }}
      baileys-digest: ${{ needs.resolve-digests.outputs.baileys-digest }}
    secrets:
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      KUBECONFIG_DATA: ${{ secrets.KUBECONFIG_DATA }}
      DEV_POSTGRES_PASSWORD: ${{ secrets.DEV_POSTGRES_PASSWORD }}
      DEV_JWT_SECRET: ${{ secrets.DEV_JWT_SECRET }}

  # ── Stage 4: Kiro Autofix ──
  # Autofix is handled by a separate workflow_run-triggered workflow
  # (kiro-autofix-trigger.yml) that fires AFTER this CI workflow completes.
  # This avoids the concurrency group cancel-in-progress race condition
  # where a new push from autofix would cancel the still-running CI run
  # before the autofix jobs could start.
