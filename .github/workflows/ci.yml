name: CI
run-name: "CI [${{ github.event_name }}] ${{ github.ref_name }} @ ${{ github.sha }}"

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "LICENSE"
      - ".gitignore"
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "LICENSE"
      - ".gitignore"
  workflow_dispatch:

permissions: {}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse
  CARGO_NET_GIT_FETCH_WITH_CLI: "true"
  CARGO_HTTP_CHECK_REVOKE: "true"
  CARGO_HTTP_TIMEOUT: "30"
  CARGO_NET_RETRY: "3"
  RUSTFLAGS: "-D warnings"

jobs:
  # ── Stage 0: Path-Based Change Detection ──

  changes:
    name: Detect Changes
    runs-on: arc-runner-dind
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
      pull-requests: read
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      ocr-service: ${{ steps.filter.outputs.ocr-service }}
      ci: ${{ steps.filter.outputs.ci }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Detect changed paths
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
            frontend:
              - 'frontend/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
            ocr-service:
              - 'ocr-service/**'
            ci:
              - '.github/**'

  # ── Stage 1: All quality checks in parallel ──

  security:
    name: Security
    needs: [changes]
    permissions:
      actions: read
      contents: read
      pull-requests: write
      security-events: write
    uses: ./.github/workflows/security.yml
    with:
      is-pr: ${{ github.event_name == 'pull_request' }}
      is-fork-pr: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository }}

  codeql:
    name: CodeQL
    needs: [changes]
    permissions:
      contents: read
      security-events: write
    uses: ./.github/workflows/codeql.yml
    with:
      is-fork-pr: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository }}

  lint:
    name: Lint
    needs: [changes]
    if: >-
      github.event_name != 'pull_request' ||
      needs.changes.outputs.backend == 'true' ||
      needs.changes.outputs.frontend == 'true' ||
      needs.changes.outputs.ci == 'true'
    permissions:
      contents: read
    uses: ./.github/workflows/lint.yml
    with:
      is-fork-pr: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository }}

  # Build & Test runs clippy + tests + release build in unified jobs
  # (one Rust compilation per target instead of three separate ones)
  build-and-test:
    name: Build & Test
    needs: [changes]
    if: >-
      github.event_name != 'pull_request' ||
      needs.changes.outputs.backend == 'true' ||
      needs.changes.outputs.frontend == 'true' ||
      needs.changes.outputs.ci == 'true'
    permissions:
      contents: read
      id-token: write
      attestations: write
    uses: ./.github/workflows/build-and-test.yml
    with:
      is-fork-pr: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository }}
      is-production: ${{ github.ref == 'refs/heads/main' && github.event_name == 'push' }}

  # ── Stage 2: Container Images (after build-and-test + security + lint pass) ──

  containers:
    name: Containers
    needs: [build-and-test, security, lint]
    if: |
      !cancelled() &&
      needs.build-and-test.result == 'success' &&
      (needs.security.result == 'success' || needs.security.result == 'skipped') &&
      (needs.lint.result == 'success' || needs.lint.result == 'skipped')
    permissions:
      contents: read
      packages: write
      security-events: write
      id-token: write
      attestations: write
    uses: ./.github/workflows/containers.yml
    with:
      is-production: ${{ github.ref == 'refs/heads/main' && github.event_name == 'push' }}

  # ── Stage 3: Deploy (after containers are pushed) ──

  deploy:
    name: Deploy
    needs: [containers]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && needs.containers.result == 'success'
    permissions:
      contents: read
      packages: read
    uses: ./.github/workflows/deploy.yml
    with:
      backend-digest: ${{ needs.containers.outputs.backend-digest }}
      frontend-digest: ${{ needs.containers.outputs.frontend-digest }}
      ocr-service-digest: ${{ needs.containers.outputs.ocr-service-digest }}
    secrets:
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      KUBECONFIG_DATA: ${{ secrets.KUBECONFIG_DATA }}
