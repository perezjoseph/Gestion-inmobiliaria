name: CI

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "LICENSE"
      - ".gitignore"
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "LICENSE"
      - ".gitignore"
  workflow_dispatch:
    inputs:
      skip_sonarqube:
        description: "Skip SonarQube analysis"
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  RUSTFLAGS: "-D warnings"

jobs:
  # ── Stage 1: Quality Checks (all run in parallel) ──

  secret-scan:
    name: Secret Scanning (Gitleaks)
    runs-on: [self-hosted, linux]
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Clean workspace
        run: sudo rm -rf "$GITHUB_WORKSPACE"/* "$GITHUB_WORKSPACE"/.* 2>/dev/null || true

      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Install Gitleaks (with checksum verification)
        run: |
          GITLEAKS_VERSION="8.24.3"
          GITLEAKS_SHA256="9991e0b2903da4c8f6122b5c3186448b927a5da4deef1fe45271c3793f4ee29c"
          ARCHIVE="/tmp/gitleaks.tar.gz"
          curl -sSfL -o "$ARCHIVE" \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          echo "${GITLEAKS_SHA256}  ${ARCHIVE}" | sha256sum -c -
          sudo tar xzf "$ARCHIVE" -C /usr/local/bin gitleaks
          rm -f "$ARCHIVE"
          gitleaks version

      - name: Run Gitleaks secret detection
        run: gitleaks detect --source . --verbose --redact --exit-code 1

  commit-lint:
    name: Conventional Commits Check
    runs-on: [self-hosted, linux]
    timeout-minutes: 5
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
    steps:
      - name: Clean workspace
        run: sudo rm -rf "$GITHUB_WORKSPACE"/* "$GITHUB_WORKSPACE"/.* 2>/dev/null || true

      - name: Checkout repository with full history
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Setup Node.js 22 for commitlint
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22

      - name: Install commitlint CLI and conventional config
        run: |
          npm install --ignore-scripts --save-dev @commitlint/{cli,config-conventional}
          echo "module.exports = { extends: ['@commitlint/config-conventional'] };" > commitlint.config.js

      - name: Validate PR commit messages against conventional format
        run: npx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose

  lint:
    name: Code Formatting & Static Analysis
    runs-on: [self-hosted, linux]
    timeout-minutes: 20
    permissions:
      contents: read
    outputs:
      error_log: ${{ steps.collect-errors.outputs.error_log }}
      failed_steps: ${{ steps.collect-errors.outputs.failed_steps }}
      duration: ${{ steps.timing.outputs.duration }}
      cache_hit: ${{ steps.cache.outputs.cache-hit }}
    steps:
      - name: Record start time
        id: start
        run: echo "time=$(date +%s)" >> $GITHUB_OUTPUT

      - name: Clean workspace
        run: sudo rm -rf "$GITHUB_WORKSPACE"/* "$GITHUB_WORKSPACE"/.* 2>/dev/null || true

      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Install Rust stable with rustfmt, clippy, and WASM target
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown

      - name: Restore cargo cache
        id: cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-lint-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-lint-
            ${{ runner.os }}-cargo-

      - name: Verify rustfmt formatting across all crates
        id: fmt
        if: always()
        run: |
          if ! cargo fmt --all -- --check 2>&1 | tee /tmp/fmt-output.txt; then
            echo "::error::Code formatting check failed. Run 'cargo fmt --all' to fix."
            exit 1
          fi

      - name: Run clippy lints on backend
        id: clippy_backend
        if: always()
        run: |
          if ! cargo clippy --locked -p realestate-backend -- -D warnings 2>&1 | tee /tmp/clippy-backend-output.txt; then
            echo "::error::Backend clippy found warnings/errors."
            exit 1
          fi

      - name: Run clippy lints on frontend WASM target
        id: clippy_frontend
        if: always()
        run: |
          if ! cargo clippy --locked -p realestate-frontend --target wasm32-unknown-unknown -- -D warnings 2>&1 | tee /tmp/clippy-frontend-output.txt; then
            echo "::error::Frontend clippy found warnings/errors."
            exit 1
          fi

      - name: Write lint summary
        if: always()
        run: |
          {
            echo "## Lint Results"
            echo "| Check | Status |"
            echo "|-------|--------|"
            echo "| rustfmt | ${{ steps.fmt.outcome == 'success' && '✅ Pass' || '❌ Fail' }} |"
            echo "| clippy (backend) | ${{ steps.clippy_backend.outcome == 'success' && '✅ Pass' || '❌ Fail' }} |"
            echo "| clippy (frontend) | ${{ steps.clippy_frontend.outcome == 'success' && '✅ Pass' || '❌ Fail' }} |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Collect lint errors for notification
        id: collect-errors
        if: always() && (steps.fmt.outcome == 'failure' || steps.clippy_backend.outcome == 'failure' || steps.clippy_frontend.outcome == 'failure')
        run: |
          ERROR=""
          FAILED=""
          if [ "${{ steps.fmt.outcome }}" = "failure" ]; then
            FAILED="${FAILED}fmt-check,"
            ERROR="${ERROR}[fmt-check] $(head -c 1500 /tmp/fmt-output.txt 2>/dev/null || echo 'cargo fmt found formatting issues.')"$'\n\n'
          fi
          if [ "${{ steps.clippy_backend.outcome }}" = "failure" ]; then
            FAILED="${FAILED}clippy-backend,"
            ERROR="${ERROR}[clippy-backend] $(head -c 1500 /tmp/clippy-backend-output.txt 2>/dev/null || echo 'Backend clippy failed.')"$'\n\n'
          fi
          if [ "${{ steps.clippy_frontend.outcome }}" = "failure" ]; then
            FAILED="${FAILED}clippy-frontend,"
            ERROR="${ERROR}[clippy-frontend] $(head -c 1500 /tmp/clippy-frontend-output.txt 2>/dev/null || echo 'Frontend clippy failed.')"$'\n\n'
          fi
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "failed_steps=${FAILED%,}" >> $GITHUB_OUTPUT
          echo "error_log<<$EOF" >> $GITHUB_OUTPUT
          echo "$ERROR" >> $GITHUB_OUTPUT
          echo "$EOF" >> $GITHUB_OUTPUT

      - name: Record duration
        id: timing
        if: always()
        run: echo "duration=$(( $(date +%s) - ${{ steps.start.outputs.time }} ))s" >> $GITHUB_OUTPUT

      - name: Fail job if any lint step failed
        if: always() && (steps.fmt.outcome == 'failure' || steps.clippy_backend.outcome == 'failure' || steps.clippy_frontend.outcome == 'failure')
        run: exit 1

  test-backend:
    name: Backend Unit & Integration Tests
    runs-on: [self-hosted, linux, docker]
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      DATABASE_URL: postgresql://realestate:realestate_dev_password@localhost:5432/realestate
      JWT_SECRET: ci_test_secret_not_for_production
      SERVER_PORT: 8080
      CORS_ORIGIN: http://localhost:8080
    outputs:
      error_log: ${{ steps.collect-errors.outputs.error_log }}
      duration: ${{ steps.timing.outputs.duration }}
      cache_hit: ${{ steps.cache.outputs.cache-hit }}
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: realestate
          POSTGRES_USER: realestate
          POSTGRES_PASSWORD: realestate_dev_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U realestate"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Record start time
        id: start
        run: echo "time=$(date +%s)" >> $GITHUB_OUTPUT

      - name: Clean workspace
        run: sudo rm -rf "$GITHUB_WORKSPACE"/* "$GITHUB_WORKSPACE"/.* 2>/dev/null || true

      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Restore cargo cache
        id: cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-test-
            ${{ runner.os }}-cargo-

      - name: Run backend tests
        id: backend-tests
        run: cargo test --locked -p realestate-backend --all-targets 2>&1 | tee /tmp/test-backend-output.txt

      - name: Generate test coverage report (LCOV)
        id: coverage
        if: success()
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          if ! command -v cargo-tarpaulin &>/dev/null; then
            TARPAULIN_VERSION="0.32.7"
            curl -sSfL "https://github.com/xd009642/tarpaulin/releases/download/${TARPAULIN_VERSION}/cargo-tarpaulin-x86_64-unknown-linux-musl.tar.gz" \
              | tar xz -C "$HOME/.cargo/bin" 2>/dev/null \
              || cargo install cargo-tarpaulin --locked
          fi
          mkdir -p coverage
          cargo tarpaulin -p realestate-backend --out lcov --output-dir coverage/ --skip-clean 2>&1 | tee /tmp/tarpaulin-output.txt || true
          if [ -f coverage/lcov.info ]; then
            echo "generated=true" >> $GITHUB_OUTPUT
            LINES=$(grep -c "^DA:" coverage/lcov.info 2>/dev/null || echo 0)
            echo "Coverage report generated: $LINES lines tracked"
          else
            echo "generated=false" >> $GITHUB_OUTPUT
            echo "::warning::Coverage report was not generated"
          fi

      - name: Upload coverage artifact
        if: always() && steps.coverage.outputs.generated == 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: backend-coverage
          path: coverage/lcov.info
          retention-days: 1

      - name: Write test summary
        if: always()
        run: |
          {
            echo "## Backend Test Results"
            if [ "${{ steps.backend-tests.outcome }}" = "success" ]; then
              PASS=$(grep -c "^test .* ok$" /tmp/test-backend-output.txt 2>/dev/null || echo "?")
              echo "✅ All tests passed ($PASS tests)"
            else
              FAIL_COUNT=$(grep -c "^test .* FAILED$" /tmp/test-backend-output.txt 2>/dev/null || echo "?")
              echo "❌ $FAIL_COUNT test(s) failed"
              echo '```'
              grep "^test .* FAILED$" /tmp/test-backend-output.txt 2>/dev/null | head -20 || true
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Record duration
        id: timing
        if: always()
        run: echo "duration=$(( $(date +%s) - ${{ steps.start.outputs.time }} ))s" >> $GITHUB_OUTPUT

      - name: Collect backend test errors for notification
        id: collect-errors
        if: failure()
        run: |
          ERROR=""
          [ -f /tmp/test-backend-output.txt ] && ERROR="$(tail -c 3000 /tmp/test-backend-output.txt)"
          if [ -z "$ERROR" ]; then
            ERROR="Backend tests failed but no captured output. Run cargo test -p realestate-backend --all-targets to reproduce."
          fi
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "error_log<<$EOF" >> $GITHUB_OUTPUT
          echo "$ERROR" >> $GITHUB_OUTPUT
          echo "$EOF" >> $GITHUB_OUTPUT

  test-frontend:
    name: Frontend WASM Compilation & Tests
    runs-on: [self-hosted, linux]
    timeout-minutes: 20
    permissions:
      contents: read
    outputs:
      error_log: ${{ steps.collect-errors.outputs.error_log }}
      duration: ${{ steps.timing.outputs.duration }}
      cache_hit: ${{ steps.cache.outputs.cache-hit }}
    steps:
      - name: Record start time
        id: start
        run: echo "time=$(date +%s)" >> $GITHUB_OUTPUT

      - name: Clean workspace
        run: sudo rm -rf "$GITHUB_WORKSPACE"/* "$GITHUB_WORKSPACE"/.* 2>/dev/null || true

      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Install Rust stable with WASM target
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: wasm32-unknown-unknown

      - name: Restore cargo cache
        id: cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-frontend-test-v2-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-frontend-test-v2-
            ${{ runner.os }}-cargo-

      - name: Run frontend tests (native target)
        id: frontend-tests
        run: cargo test --locked -p realestate-frontend --all-targets 2>&1 | tee /tmp/test-frontend-output.txt

      - name: Write test summary
        if: always()
        run: |
          {
            echo "## Frontend Test Results"
            if [ "${{ steps.frontend-tests.outcome }}" = "success" ]; then
              PASS=$(grep -c "^test .* ok$" /tmp/test-frontend-output.txt 2>/dev/null || echo "?")
              echo "✅ All tests passed ($PASS tests)"
            else
              FAIL_COUNT=$(grep -c "^test .* FAILED$" /tmp/test-frontend-output.txt 2>/dev/null || echo "?")
              echo "❌ $FAIL_COUNT test(s) failed"
              echo '```'
              grep "^test .* FAILED$" /tmp/test-frontend-output.txt 2>/dev/null | head -20 || true
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Record duration
        id: timing
        if: always()
        run: echo "duration=$(( $(date +%s) - ${{ steps.start.outputs.time }} ))s" >> $GITHUB_OUTPUT

      - name: Collect frontend test errors for notification
        id: collect-errors
        if: failure()
        run: |
          ERROR=""
          [ -f /tmp/test-frontend-output.txt ] && ERROR="$(tail -c 3000 /tmp/test-frontend-output.txt)"
          if [ -z "$ERROR" ]; then
            ERROR="Frontend tests failed but no captured output. Run cargo test -p realestate-frontend --all-targets to reproduce."
          fi
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "error_log<<$EOF" >> $GITHUB_OUTPUT
          echo "$ERROR" >> $GITHUB_OUTPUT
          echo "$EOF" >> $GITHUB_OUTPUT

  quality-gate:
    name: Dependency Security & Health Check
    runs-on: [self-hosted, linux, docker]
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write
    outputs:
      error_log: ${{ steps.collect-errors.outputs.error_log }}
      failed_steps: ${{ steps.collect-errors.outputs.failed_steps }}
      duration: ${{ steps.timing.outputs.duration }}
    steps:
      - name: Record start time
        id: start
        run: echo "time=$(date +%s)" >> $GITHUB_OUTPUT

      - name: Clean workspace
        run: sudo rm -rf "$GITHUB_WORKSPACE"/* "$GITHUB_WORKSPACE"/.* 2>/dev/null || true

      - name: Clean up OWASP reports from previous runs
        run: sudo rm -rf reports/

      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
          clean: false

      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Install cargo-audit for CVE scanning
        id: install_audit
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          if command -v cargo-audit &>/dev/null && cargo audit --version &>/dev/null; then
            echo "cargo-audit already installed: $(cargo audit --version)"
            echo "installed=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          rm -f "$HOME/.cargo/bin/cargo-audit"
          mkdir -p "$HOME/.cargo/bin"
          AUDIT_VERSION="0.22.1"
          INSTALLED=false
          for VARIANT in musl gnu; do
            URL="https://github.com/rustsec/rustsec/releases/download/cargo-audit%2Fv${AUDIT_VERSION}/cargo-audit-x86_64-unknown-linux-${VARIANT}-v${AUDIT_VERSION}.tgz"
            if curl -sSfL --retry 3 --retry-delay 10 --connect-timeout 30 -o /tmp/cargo-audit.tgz "$URL" 2>/tmp/install-audit-output.txt; then
              if tar xzf /tmp/cargo-audit.tgz --strip-components=1 -C "$HOME/.cargo/bin/" 2>>/tmp/install-audit-output.txt; then
                chmod +x "$HOME/.cargo/bin/cargo-audit"
                if cargo audit --version &>/dev/null; then
                  INSTALLED=true
                  break
                fi
                rm -f "$HOME/.cargo/bin/cargo-audit"
              fi
            fi
          done
          if [ "$INSTALLED" = "false" ]; then
            if cargo install cargo-audit --locked 2>&1 | tee -a /tmp/install-audit-output.txt; then
              INSTALLED=true
            fi
          fi
          if [ "$INSTALLED" = "true" ] && command -v cargo-audit &>/dev/null; then
            cargo audit --version
            echo "installed=true" >> $GITHUB_OUTPUT
          else
            echo "::warning::cargo-audit installation failed -- skipping CVE scan"
            echo "installed=false" >> $GITHUB_OUTPUT
          fi

      - name: Scan Rust dependencies for known vulnerabilities (CVEs)
        id: cargo_audit
        if: always() && steps.install_audit.outputs.installed == 'true'
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          cargo audit 2>&1 | tee /tmp/audit-output.txt

      - name: Install cargo-deny for supply chain policy checks
        id: install_deny
        if: always()
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          if command -v cargo-deny &>/dev/null; then
            echo "cargo-deny already installed: $(cargo-deny --version)"
            echo "installed=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          DENY_VERSION="0.16.4"
          URL="https://github.com/EmbarkStudios/cargo-deny/releases/download/${DENY_VERSION}/cargo-deny-${DENY_VERSION}-x86_64-unknown-linux-musl.tar.gz"
          if curl -sSfL --retry 3 -o /tmp/cargo-deny.tar.gz "$URL"; then
            tar xzf /tmp/cargo-deny.tar.gz --strip-components=1 -C "$HOME/.cargo/bin/" 2>/dev/null
            chmod +x "$HOME/.cargo/bin/cargo-deny"
            rm -f /tmp/cargo-deny.tar.gz
          fi
          if command -v cargo-deny &>/dev/null; then
            cargo-deny --version
            echo "installed=true" >> $GITHUB_OUTPUT
          else
            cargo install cargo-deny --locked 2>/dev/null && echo "installed=true" >> $GITHUB_OUTPUT || echo "installed=false" >> $GITHUB_OUTPUT
          fi

      - name: Run cargo-deny supply chain checks (advisories, licenses, bans, sources)
        id: cargo_deny
        if: always() && steps.install_deny.outputs.installed == 'true'
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          cargo deny check 2>&1 | tee /tmp/deny-output.txt

      - name: OWASP dependency scan (fail on CVSS >= 7)
        id: owasp
        if: always()
        uses: dependency-check/Dependency-Check_Action@1e54355a8b4c8abaa8cc7d0b70aa655a3bb15a6c # main
        with:
          project: realestate
          path: .
          format: HTML
          args: >-
            --enableExperimental
            --failOnCVSS 7
            --exclude target/**
            --exclude node_modules/**
            --exclude dist/**

      - name: Upload OWASP vulnerability report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: owasp-dependency-check-report
          path: reports/
          retention-days: 7

      - name: Install Trivy for IaC scanning
        id: install_trivy
        if: always()
        run: |
          TRIVY_VERSION="0.69.3"
          TRIVY_SHA256="1816b632dfe529869c740c0913e36bd1629cb7688bd5634f4a858c1d57c88b75"
          if command -v trivy &>/dev/null && [ "$(trivy --version 2>/dev/null | grep -oP '\d+\.\d+\.\d+')" = "$TRIVY_VERSION" ]; then
            echo "installed=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          ARCHIVE="/tmp/trivy.tar.gz"
          curl -sSfL -o "$ARCHIVE" \
            "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz"
          echo "${TRIVY_SHA256}  ${ARCHIVE}" | sha256sum -c -
          sudo tar xzf "$ARCHIVE" -C /usr/local/bin trivy
          rm -f "$ARCHIVE"
          echo "installed=true" >> $GITHUB_OUTPUT

      - name: Scan Dockerfiles and docker-compose for misconfigurations (Trivy)
        id: trivy_iac
        if: always() && steps.install_trivy.outputs.installed == 'true'
        run: |
          trivy fs --scanners misconfig --exit-code 1 --severity CRITICAL,HIGH \
            --no-progress --format table \
            --include-non-failures \
            Dockerfile.backend Dockerfile.frontend docker-compose.prod.yml docker-compose.dev.yml 2>&1 | tee /tmp/trivy-iac-output.txt

      - name: Generate cargo-audit SARIF report
        id: cargo_audit_sarif
        if: always() && steps.install_audit.outputs.installed == 'true'
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          cargo audit --json 2>/dev/null | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          sarif = {
            '\$schema': 'https://raw.githubusercontent.com/oasis-tcs/sarif-spec/main/sarif-2.1/schema/sarif-schema-2.1.0.json',
            'version': '2.1.0',
            'runs': [{
              'tool': {'driver': {'name': 'cargo-audit', 'version': '0.22.1', 'rules': []}},
              'results': []
            }]
          }
          rules = {}
          for vuln in data.get('vulnerabilities', {}).get('list', []):
            adv = vuln.get('advisory', {})
            vid = adv.get('id', 'UNKNOWN')
            pkg = vuln.get('package', {})
            if vid not in rules:
              rules[vid] = {
                'id': vid,
                'shortDescription': {'text': adv.get('title', vid)},
                'helpUri': adv.get('url', ''),
                'properties': {'tags': ['security', 'vulnerability']}
              }
            sarif['runs'][0]['results'].append({
              'ruleId': vid,
              'level': 'error',
              'message': {'text': f\"{adv.get('title', '')} in {pkg.get('name', '?')} {pkg.get('version', '?')}\"},
              'locations': [{'physicalLocation': {'artifactLocation': {'uri': 'Cargo.lock'}, 'region': {'startLine': 1}}}]
            })
          sarif['runs'][0]['tool']['driver']['rules'] = list(rules.values())
          json.dump(sarif, sys.stdout, indent=2)
          " > cargo-audit.sarif 2>/dev/null || echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"cargo-audit","rules":[]}},"results":[]}]}' > cargo-audit.sarif

      - name: Upload cargo-audit SARIF to GitHub Security
        if: always() && steps.install_audit.outputs.installed == 'true'
        uses: github/codeql-action/upload-sarif@ff0a06e83cb2de871e5a09832bc6a81e7276941f # v3.28.18
        with:
          sarif_file: cargo-audit.sarif
          category: cargo-audit
        continue-on-error: true

      - name: Write quality gate summary
        if: always()
        run: |
          {
            echo "## Dependency Security Results"
            echo "| Check | Status |"
            echo "|-------|--------|"
            echo "| cargo audit | ${{ steps.cargo_audit.outcome == 'success' && '✅ Pass' || (steps.install_audit.outputs.installed != 'true' && '⏭️ Skipped' || '❌ Fail') }} |"
            echo "| cargo deny | ${{ steps.cargo_deny.outcome == 'success' && '✅ Pass' || (steps.install_deny.outputs.installed != 'true' && '⏭️ Skipped' || '❌ Fail') }} |"
            echo "| OWASP scan | ${{ steps.owasp.outcome == 'success' && '✅ Pass' || '❌ Fail' }} |"
            echo "| Trivy IaC scan | ${{ steps.trivy_iac.outcome == 'success' && '✅ Pass' || (steps.install_trivy.outputs.installed != 'true' && '⏭️ Skipped' || '⚠️ Findings') }} |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Collect quality-gate errors for notification
        id: collect-errors
        if: always() && (steps.cargo_audit.outcome == 'failure' || steps.cargo_deny.outcome == 'failure' || steps.owasp.outcome == 'failure' || steps.trivy_iac.outcome == 'failure')
        run: |
          ERROR=""
          FAILED=""
          if [ "${{ steps.cargo_audit.outcome }}" = "failure" ]; then
            FAILED="${FAILED}cargo-audit,"
            ERROR="${ERROR}[cargo-audit] $(head -c 2000 /tmp/audit-output.txt 2>/dev/null || echo 'cargo audit found vulnerabilities.')"$'\n\n'
          fi
          if [ "${{ steps.install_audit.outputs.installed }}" = "false" ]; then
            ERROR="${ERROR}[cargo-audit] Skipped -- installation failed (non-blocking warning)."$'\n\n'
          fi
          if [ "${{ steps.cargo_deny.outcome }}" = "failure" ]; then
            FAILED="${FAILED}cargo-deny,"
            ERROR="${ERROR}[cargo-deny] $(head -c 2000 /tmp/deny-output.txt 2>/dev/null || echo 'cargo deny found policy violations.')"$'\n\n'
          fi
          if [ "${{ steps.owasp.outcome }}" = "failure" ]; then
            FAILED="${FAILED}owasp-scan,"
            ERROR="${ERROR}[owasp-scan] OWASP dependency check failed with CVSS >= 7. See uploaded report artifact for details."$'\n\n'
          fi
          if [ "${{ steps.trivy_iac.outcome }}" = "failure" ]; then
            FAILED="${FAILED}trivy-iac,"
            ERROR="${ERROR}[trivy-iac] $(head -c 2000 /tmp/trivy-iac-output.txt 2>/dev/null || echo 'Trivy found Dockerfile/compose misconfigurations.')"$'\n\n'
          fi
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "failed_steps=${FAILED%,}" >> $GITHUB_OUTPUT
          echo "error_log<<$EOF" >> $GITHUB_OUTPUT
          echo "$ERROR" >> $GITHUB_OUTPUT
          echo "$EOF" >> $GITHUB_OUTPUT

      - name: Record duration
        id: timing
        if: always()
        run: echo "duration=$(( $(date +%s) - ${{ steps.start.outputs.time }} ))s" >> $GITHUB_OUTPUT

      - name: Fail job if any quality step failed
        if: always() && (steps.cargo_audit.outcome == 'failure' || steps.cargo_deny.outcome == 'failure' || steps.owasp.outcome == 'failure' || steps.trivy_iac.outcome == 'failure')
        run: exit 1

  sonarqube:
    name: SonarQube Code Quality & Coverage Analysis
    runs-on: [self-hosted, linux, sonarqube]
    timeout-minutes: 20
    permissions:
      contents: read
    continue-on-error: true
    needs: [test-backend]
    if: ${{ !(inputs.skip_sonarqube || false) }}
    outputs:
      duration: ${{ steps.timing.outputs.duration }}
    steps:
      - name: Record start time
        id: start
        run: echo "time=$(date +%s)" >> $GITHUB_OUTPUT

      - name: Clean workspace
        run: sudo rm -rf "$GITHUB_WORKSPACE"/* "$GITHUB_WORKSPACE"/.* 2>/dev/null || true

      - name: Checkout repository with full history for blame analysis
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Download backend coverage report
        id: download-coverage
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: backend-coverage
          path: coverage/
        continue-on-error: true

      - name: Verify SonarQube server is reachable
        run: |
          SONAR_URL="http://192.168.88.25:9000"
          for i in $(seq 1 12); do
            STATUS=$(curl -sf --connect-timeout 5 --max-time 10 "$SONAR_URL/api/system/status" 2>/dev/null | jq -r '.status // "UNREACHABLE"')
            if [ "$STATUS" = "UP" ]; then
              echo "SonarQube is ready."
              exit 0
            fi
            echo "Attempt $i/12 -- status: $STATUS. Retrying in 5s..."
            sleep 5
          done
          echo "::error::SonarQube at $SONAR_URL did not respond within ~60 seconds"
          exit 1

      - name: Bootstrap SonarQube project and token
        id: sonar-bootstrap
        run: |
          SONAR_URL="http://192.168.88.25:9000"
          TOKEN="${{ secrets.SONAR_TOKEN }}"

          if [ -n "$TOKEN" ]; then
            echo "Using existing SONAR_TOKEN secret."
            echo "::add-mask::$TOKEN"
            echo "token=$TOKEN" >> $GITHUB_OUTPUT
            exit 0
          fi

          ADMIN_PASS="${{ secrets.SONAR_ADMIN_PASSWORD }}"
          if [ -z "$ADMIN_PASS" ]; then
            echo "::error::Neither SONAR_TOKEN nor SONAR_ADMIN_PASSWORD is set. Configure one in GitHub repository secrets."
            exit 1
          fi

          curl -sf -u "admin:${ADMIN_PASS}" -X POST \
            "$SONAR_URL/api/projects/create?name=Gestion+Inmobiliaria&project=gestion-inmobiliaria" \
            2>/dev/null || echo "Project already exists."

          DEFAULT_QG=$(curl -sf -u "admin:${ADMIN_PASS}" \
            "$SONAR_URL/api/qualitygates/list" | jq -r '.qualitygates[] | select(.isDefault==true) | .name' 2>/dev/null || echo "Sonar way")
          if [ -n "$DEFAULT_QG" ]; then
            curl -sf -u "admin:${ADMIN_PASS}" -X POST \
              "$SONAR_URL/api/qualitygates/select?projectKey=gestion-inmobiliaria&gateName=$(echo "$DEFAULT_QG" | jq -sRr @uri)" \
              2>/dev/null || echo "Quality gate already assigned."
          fi

          curl -sf -u "admin:${ADMIN_PASS}" -X POST \
            "$SONAR_URL/api/user_tokens/revoke?name=ci-token" 2>/dev/null || true
          TOKEN=$(curl -sf -u "admin:${ADMIN_PASS}" -X POST \
            "$SONAR_URL/api/user_tokens/generate?name=ci-token" \
            | jq -r '.token')

          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Run SonarQube static analysis scan
        id: sonar-scan
        env:
          HAS_COVERAGE: ${{ steps.download-coverage.outcome == 'success' }}
        run: |
          COVERAGE_ARGS=""
          if [ "$HAS_COVERAGE" = "true" ] && [ -f coverage/lcov.info ]; then
            echo "Coverage report found -- including in SonarQube analysis"
            COVERAGE_ARGS="-Dsonar.rust.lcov.reportPaths=/usr/src/coverage/lcov.info"
          fi
          docker run --rm \
            --network host \
            --security-opt no-new-privileges \
            --cap-drop ALL \
            --read-only \
            --memory 1g \
            --tmpfs /tmp:rw,noexec,nosuid,nodev \
            -e SONAR_TOKEN="${{ steps.sonar-bootstrap.outputs.token }}" \
            -e SONAR_HOST_URL="http://192.168.88.25:9000" \
            -v "${{ github.workspace }}:/usr/src" \
            sonarsource/sonar-scanner-cli:11.3@sha256:7462f132388135e32b948f8f18ff0db9ae28a87c6777f1df5b2207e04a6d7c5c \
            -Dsonar.projectBaseDir=/usr/src \
            -Dsonar.qualitygate.wait=true \
            -Dsonar.qualitygate.timeout=300 \
            $COVERAGE_ARGS

      - name: Fetch SonarQube results and notify
        if: always()
        env:
          SONAR_TOKEN: ${{ steps.sonar-bootstrap.outputs.token }}
          SCAN_OUTCOME: ${{ steps.sonar-scan.outcome }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
        run: |
          SONAR_URL="http://192.168.88.25:9000"
          GATE_STATUS="UNKNOWN"

          if [ "$SCAN_OUTCOME" = "success" ]; then
            GATE_STATUS="OK"
          fi

          if [ "$GATE_STATUS" = "UNKNOWN" ]; then
            REPORT_FILE=$(find . -name 'report-task.txt' -path '*scannerwork*' -print -quit 2>/dev/null)
            if [ -n "$REPORT_FILE" ] && [ -f "$REPORT_FILE" ]; then
              CE_TASK_ID=$(grep '^ceTaskId=' "$REPORT_FILE" | cut -d= -f2)
              if [ -n "$CE_TASK_ID" ]; then
                for i in $(seq 1 60); do
                  CE_RESPONSE=$(curl -sf -u "$SONAR_TOKEN:" \
                    "$SONAR_URL/api/ce/task?id=$CE_TASK_ID" 2>/dev/null || echo '{}')
                  CE_STATUS=$(echo "$CE_RESPONSE" | jq -r '.task.status // "UNKNOWN"')
                  if [ "$CE_STATUS" = "SUCCESS" ]; then
                    ANALYSIS_ID=$(echo "$CE_RESPONSE" | jq -r '.task.analysisId // empty')
                    if [ -n "$ANALYSIS_ID" ]; then
                      GATE=$(curl -sf -u "$SONAR_TOKEN:" \
                        "$SONAR_URL/api/qualitygates/project_status?analysisId=$ANALYSIS_ID" 2>/dev/null || echo '{}')
                      GATE_STATUS=$(echo "$GATE" | jq -r '.projectStatus.status // "UNKNOWN"')
                    fi
                    break
                  elif [ "$CE_STATUS" = "FAILED" ] || [ "$CE_STATUS" = "CANCELED" ]; then
                    echo "::warning::SonarQube CE task ended with status: $CE_STATUS"
                    GATE_STATUS="ERROR"
                    break
                  fi
                  sleep 5
                done
              fi
            fi
          fi

          if [ "$GATE_STATUS" = "UNKNOWN" ]; then
            for i in $(seq 1 30); do
              GATE=$(curl -sf -u "$SONAR_TOKEN:" \
                "$SONAR_URL/api/qualitygates/project_status?projectKey=gestion-inmobiliaria" 2>/dev/null || echo '{}')
              GATE_STATUS=$(echo "$GATE" | jq -r '.projectStatus.status // "UNKNOWN"')
              if [ "$GATE_STATUS" != "UNKNOWN" ] && [ "$GATE_STATUS" != "NONE" ]; then
                break
              fi
              sleep 5
            done
          fi

          if [ "$GATE_STATUS" = "UNKNOWN" ] || [ "$GATE_STATUS" = "NONE" ]; then
            if [ "$SCAN_OUTCOME" = "success" ]; then
              GATE_STATUS="OK"
            elif [ "$SCAN_OUTCOME" = "skipped" ] || [ -z "$SCAN_OUTCOME" ]; then
              echo "::warning::SonarQube scan was skipped -- treating gate as OK (non-blocking)."
              GATE_STATUS="OK"
            fi
          fi

          echo "Final quality gate status: $GATE_STATUS"

          ISSUES=$(curl -sf -u "$SONAR_TOKEN:" \
            "$SONAR_URL/api/issues/search?projectKeys=gestion-inmobiliaria&resolved=false&ps=50&s=SEVERITY&asc=false" 2>/dev/null || echo '{}')
          TOTAL=$(echo "$ISSUES" | jq -r '.total // 0')
          SUMMARY=$(echo "$ISSUES" | jq -r '
            [.issues // [] | group_by(.severity) | .[] |
              {severity: .[0].severity, count: length}] |
            map("\(.count) \(.severity)") | join(", ")' 2>/dev/null || echo "Could not parse issues")

          # Write summary
          {
            echo "## SonarQube Results"
            echo "- Quality Gate: **$GATE_STATUS**"
            echo "- Open Issues: **$TOTAL** ($SUMMARY)"
            if [ "$GATE_STATUS" = "ERROR" ]; then
              echo ""
              echo "### Top Issues"
              echo '```'
              echo "$ISSUES" | jq -r '.issues[:10] | .[] | "\(.severity) \(.component | split(":") | last):\(.line // "?") \(.message)"' 2>/dev/null || true
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$GATE_STATUS" = "ERROR" ]; then
            TOP_ISSUES=$(echo "$ISSUES" | jq -r '
              [.issues[:20] | .[] |
                "\(.severity) | \(.component | split(":") | last):\(.line // "?") | \(.message)"] |
              join("\n")' 2>/dev/null || echo "")
            ERROR_LOG="Quality Gate: ${GATE_STATUS}\nTotal open issues: ${TOTAL}\nBreakdown: ${SUMMARY}\n\nTop issues:\n${TOP_ISSUES}"

            PAYLOAD=$(jq -n \
              --arg job "sonarqube" \
              --arg step "quality-gate-${GATE_STATUS}" \
              --arg error_log "$ERROR_LOG" \
              --arg run_url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
              --arg commit "${{ github.sha }}" \
              --arg branch "${{ github.ref_name }}" \
              --arg actor "${{ github.actor }}" \
              '{job: $job, step: $step, error_log: $error_log, run_url: $run_url, commit: $commit, branch: $branch, actor: $actor}')

            SIGNATURE=$(printf '%s' "$PAYLOAD" | openssl dgst -sha256 -hmac "${WEBHOOK_SECRET}" | awk '{print $NF}')
            curl -s --connect-timeout 5 --max-time 10 -X POST http://${{ secrets.WEBHOOK_HOST }}:9090/ci-failure \
              -H "Content-Type: application/json" \
              -H "X-Signature-256: sha256=$SIGNATURE" \
              -d "$PAYLOAD" || echo "Webhook unreachable -- skipping notification"

            echo "::error::SonarQube quality gate failed"
            exit 1
          fi

      - name: Record duration
        id: timing
        if: always()
        run: echo "duration=$(( $(date +%s) - ${{ steps.start.outputs.time }} ))s" >> $GITHUB_OUTPUT

  # ── Stage 2: Build (runs only after all quality checks pass) ──

  build-frontend:
    name: Frontend WASM Release Build
    runs-on: [self-hosted, linux]
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
      attestations: write
    outputs:
      error_log: ${{ steps.collect-errors.outputs.error_log }}
      duration: ${{ steps.timing.outputs.duration }}
      cache_hit: ${{ steps.cache.outputs.cache-hit }}
    needs: [secret-scan, commit-lint, lint, test-backend, test-frontend, quality-gate, sonarqube]
    if: |
      always() &&
      needs.secret-scan.result == 'success' &&
      needs.lint.result == 'success' &&
      needs.test-backend.result == 'success' &&
      needs.test-frontend.result == 'success' &&
      needs.quality-gate.result == 'success' &&
      (needs.commit-lint.result == 'success' || needs.commit-lint.result == 'skipped')
    steps:
      - name: Record start time
        id: start
        run: echo "time=$(date +%s)" >> $GITHUB_OUTPUT

      - name: Clean workspace
        run: sudo rm -rf "$GITHUB_WORKSPACE"/* "$GITHUB_WORKSPACE"/.* 2>/dev/null || true

      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Install Rust stable with WASM target
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install Trunk WASM bundler
        uses: jetli/trunk-action@1346cc09eace4beb84e403e199a471346d4684c9 # v0.5.1

      - name: Restore cargo cache
        id: cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-wasm-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-wasm-
            ${{ runner.os }}-cargo-

      - name: Build optimized WASM frontend bundle
        run: trunk build --release 2>&1 | tee /tmp/build-frontend-output.txt
        working-directory: frontend

      - name: Scan frontend dist for leaked secrets
        run: |
          if command -v gitleaks &>/dev/null; then
            gitleaks detect --source frontend/dist --no-git --verbose --redact --exit-code 1
          else
            GITLEAKS_VERSION="8.24.3"
            GITLEAKS_SHA256="9991e0b2903da4c8f6122b5c3186448b927a5da4deef1fe45271c3793f4ee29c"
            ARCHIVE="/tmp/gitleaks.tar.gz"
            curl -sSfL -o "$ARCHIVE" \
              "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
            echo "${GITLEAKS_SHA256}  ${ARCHIVE}" | sha256sum -c -
            sudo tar xzf "$ARCHIVE" -C /usr/local/bin gitleaks
            rm -f "$ARCHIVE"
            gitleaks detect --source frontend/dist --no-git --verbose --redact --exit-code 1
          fi

      - name: Upload frontend dist artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

      - name: Attest frontend build provenance
        uses: actions/attest-build-provenance@c074443f1aee8d4aeeae555aebba3282517141b2 # v2.2.3
        with:
          subject-path: frontend/dist/

      - name: Record duration
        id: timing
        if: always()
        run: echo "duration=$(( $(date +%s) - ${{ steps.start.outputs.time }} ))s" >> $GITHUB_OUTPUT

      - name: Collect frontend build errors for notification
        id: collect-errors
        if: failure()
        run: |
          ERROR=""
          [ -f /tmp/build-frontend-output.txt ] && ERROR="$(tail -c 3000 /tmp/build-frontend-output.txt)"
          if [ -z "$ERROR" ]; then
            ERROR="Frontend WASM build failed but no captured output. Run trunk build --release in frontend/ to reproduce."
          fi
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "error_log<<$EOF" >> $GITHUB_OUTPUT
          echo "$ERROR" >> $GITHUB_OUTPUT
          echo "$EOF" >> $GITHUB_OUTPUT

  build-backend:
    name: Backend Release Build
    runs-on: [self-hosted, linux]
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
      attestations: write
    outputs:
      error_log: ${{ steps.collect-errors.outputs.error_log }}
      duration: ${{ steps.timing.outputs.duration }}
      cache_hit: ${{ steps.cache.outputs.cache-hit }}
    needs: [secret-scan, commit-lint, lint, test-backend, test-frontend, quality-gate, sonarqube]
    if: |
      always() &&
      needs.secret-scan.result == 'success' &&
      needs.lint.result == 'success' &&
      needs.test-backend.result == 'success' &&
      needs.test-frontend.result == 'success' &&
      needs.quality-gate.result == 'success' &&
      (needs.commit-lint.result == 'success' || needs.commit-lint.result == 'skipped')
    steps:
      - name: Record start time
        id: start
        run: echo "time=$(date +%s)" >> $GITHUB_OUTPUT

      - name: Clean workspace
        run: sudo rm -rf "$GITHUB_WORKSPACE"/* "$GITHUB_WORKSPACE"/.* 2>/dev/null || true

      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Restore cargo cache
        id: cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-backend-build-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-backend-build-
            ${{ runner.os }}-cargo-

      - name: Build optimized backend binary
        run: cargo build --locked -p realestate-backend --release 2>&1 | tee /tmp/build-backend-output.txt

      - name: Scan backend build output for leaked secrets
        run: |
          if command -v gitleaks &>/dev/null; then
            gitleaks detect --source target/release --no-git --verbose --redact --exit-code 1
          else
            GITLEAKS_VERSION="8.24.3"
            GITLEAKS_SHA256="9991e0b2903da4c8f6122b5c3186448b927a5da4deef1fe45271c3793f4ee29c"
            ARCHIVE="/tmp/gitleaks.tar.gz"
            curl -sSfL -o "$ARCHIVE" \
              "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
            echo "${GITLEAKS_SHA256}  ${ARCHIVE}" | sha256sum -c -
            sudo tar xzf "$ARCHIVE" -C /usr/local/bin gitleaks
            rm -f "$ARCHIVE"
            gitleaks detect --source target/release --no-git --verbose --redact --exit-code 1
          fi

      - name: Upload backend binary artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: backend-binary
          path: target/release/realestate-backend
          retention-days: 7

      - name: Attest backend build provenance
        uses: actions/attest-build-provenance@c074443f1aee8d4aeeae555aebba3282517141b2 # v2.2.3
        with:
          subject-path: target/release/realestate-backend

      - name: Record duration
        id: timing
        if: always()
        run: echo "duration=$(( $(date +%s) - ${{ steps.start.outputs.time }} ))s" >> $GITHUB_OUTPUT

      - name: Collect backend build errors for notification
        id: collect-errors
        if: failure()
        run: |
          ERROR=""
          [ -f /tmp/build-backend-output.txt ] && ERROR="$(tail -c 3000 /tmp/build-backend-output.txt)"
          if [ -z "$ERROR" ]; then
            ERROR="Backend release build failed but no captured output. Run cargo build -p realestate-backend --release to reproduce."
          fi
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "error_log<<$EOF" >> $GITHUB_OUTPUT
          echo "$ERROR" >> $GITHUB_OUTPUT
          echo "$EOF" >> $GITHUB_OUTPUT

  # ── Stage 3: Container Images (parallel, runs after builds pass, main branch only) ──

  container-image-backend:
    name: Build & Push Backend Image to GHCR
    runs-on: [self-hosted, linux, docker]
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write
      security-events: write
      id-token: write
      attestations: write
    outputs:
      digest: ${{ steps.push-backend.outputs.digest }}
    needs: [build-backend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Clean workspace
        run: sudo rm -rf "$GITHUB_WORKSPACE"/* "$GITHUB_WORKSPACE"/.* 2>/dev/null || true

      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - name: Build backend image (local)
        uses: docker/build-push-action@263435318d21b8e681c14492fe198e19c3bc4c94 # v6.18.0
        with:
          context: .
          file: Dockerfile.backend
          load: true
          tags: ghcr.io/${{ github.repository_owner }}/realestate-backend:${{ github.sha }}

      - name: Install Trivy (with checksum verification)
        run: |
          TRIVY_VERSION="0.69.3"
          TRIVY_SHA256="1816b632dfe529869c740c0913e36bd1629cb7688bd5634f4a858c1d57c88b75"
          if ! command -v trivy &>/dev/null || [ "$(trivy --version 2>/dev/null | grep -oP '\d+\.\d+\.\d+')" != "$TRIVY_VERSION" ]; then
            ARCHIVE="/tmp/trivy.tar.gz"
            curl -sSfL -o "$ARCHIVE" \
              "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz"
            echo "${TRIVY_SHA256}  ${ARCHIVE}" | sha256sum -c -
            sudo tar xzf "$ARCHIVE" -C /usr/local/bin trivy
            rm -f "$ARCHIVE"
          fi
          trivy --version

      - name: Scan backend image for vulnerabilities (Trivy)
        run: |
          trivy image --exit-code 1 --severity CRITICAL,HIGH --ignore-unfixed --no-progress \
            --format table \
            ghcr.io/${{ github.repository_owner }}/realestate-backend:${{ github.sha }}

      - name: Generate Trivy SARIF report for backend image
        if: always()
        run: |
          trivy image --severity CRITICAL,HIGH,MEDIUM --ignore-unfixed --no-progress \
            --format sarif --output trivy-backend.sarif \
            ghcr.io/${{ github.repository_owner }}/realestate-backend:${{ github.sha }} || true

      - name: Generate SBOM for backend image (SPDX)
        if: always()
        run: |
          trivy image --format spdx-json --output backend-sbom.spdx.json \
            --no-progress \
            ghcr.io/${{ github.repository_owner }}/realestate-backend:${{ github.sha }} || true

      - name: Upload backend SBOM artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: backend-sbom
          path: backend-sbom.spdx.json
          retention-days: 30

      - name: Upload Trivy SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@ff0a06e83cb2de871e5a09832bc6a81e7276941f # v3.28.18
        with:
          sarif_file: trivy-backend.sarif
          category: trivy-backend
        continue-on-error: true

      - name: Push backend image to GHCR
        id: push-backend
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/realestate-backend:${{ github.sha }}
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' \
            ghcr.io/${{ github.repository_owner }}/realestate-backend:${{ github.sha }} 2>/dev/null \
            | grep -oP 'sha256:[a-f0-9]+' || true)
          echo "digest=${DIGEST}" >> $GITHUB_OUTPUT

      - name: Attest backend container image provenance
        if: steps.push-backend.outputs.digest != ''
        uses: actions/attest-build-provenance@c074443f1aee8d4aeeae555aebba3282517141b2 # v2.2.3
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/realestate-backend
          subject-digest: ${{ steps.push-backend.outputs.digest }}
          push-to-registry: true

  container-image-frontend:
    name: Build & Push Frontend Image to GHCR
    runs-on: [self-hosted, linux, docker]
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write
      security-events: write
      id-token: write
      attestations: write
    outputs:
      digest: ${{ steps.push-frontend.outputs.digest }}
    needs: [build-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Clean workspace
        run: sudo rm -rf "$GITHUB_WORKSPACE"/* "$GITHUB_WORKSPACE"/.* 2>/dev/null || true

      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - name: Build frontend image (local)
        uses: docker/build-push-action@263435318d21b8e681c14492fe198e19c3bc4c94 # v6.18.0
        with:
          context: .
          file: Dockerfile.frontend
          load: true
          tags: ghcr.io/${{ github.repository_owner }}/realestate-frontend:${{ github.sha }}

      - name: Install Trivy (with checksum verification)
        run: |
          TRIVY_VERSION="0.69.3"
          TRIVY_SHA256="1816b632dfe529869c740c0913e36bd1629cb7688bd5634f4a858c1d57c88b75"
          if ! command -v trivy &>/dev/null || [ "$(trivy --version 2>/dev/null | grep -oP '\d+\.\d+\.\d+')" != "$TRIVY_VERSION" ]; then
            ARCHIVE="/tmp/trivy.tar.gz"
            curl -sSfL -o "$ARCHIVE" \
              "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz"
            echo "${TRIVY_SHA256}  ${ARCHIVE}" | sha256sum -c -
            sudo tar xzf "$ARCHIVE" -C /usr/local/bin trivy
            rm -f "$ARCHIVE"
          fi
          trivy --version

      - name: Scan frontend image for vulnerabilities (Trivy)
        run: |
          trivy image --exit-code 1 --severity CRITICAL,HIGH --ignore-unfixed --no-progress \
            --format table \
            ghcr.io/${{ github.repository_owner }}/realestate-frontend:${{ github.sha }}

      - name: Generate Trivy SARIF report for frontend image
        if: always()
        run: |
          trivy image --severity CRITICAL,HIGH,MEDIUM --ignore-unfixed --no-progress \
            --format sarif --output trivy-frontend.sarif \
            ghcr.io/${{ github.repository_owner }}/realestate-frontend:${{ github.sha }} || true

      - name: Generate SBOM for frontend image (SPDX)
        if: always()
        run: |
          trivy image --format spdx-json --output frontend-sbom.spdx.json \
            --no-progress \
            ghcr.io/${{ github.repository_owner }}/realestate-frontend:${{ github.sha }} || true

      - name: Upload frontend SBOM artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: frontend-sbom
          path: frontend-sbom.spdx.json
          retention-days: 30

      - name: Upload Trivy SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@ff0a06e83cb2de871e5a09832bc6a81e7276941f # v3.28.18
        with:
          sarif_file: trivy-frontend.sarif
          category: trivy-frontend
        continue-on-error: true

      - name: Push frontend image to GHCR
        id: push-frontend
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/realestate-frontend:${{ github.sha }}
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' \
            ghcr.io/${{ github.repository_owner }}/realestate-frontend:${{ github.sha }} 2>/dev/null \
            | grep -oP 'sha256:[a-f0-9]+' || true)
          echo "digest=${DIGEST}" >> $GITHUB_OUTPUT

      - name: Attest frontend container image provenance
        if: steps.push-frontend.outputs.digest != ''
        uses: actions/attest-build-provenance@c074443f1aee8d4aeeae555aebba3282517141b2 # v2.2.3
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/realestate-frontend
          subject-digest: ${{ steps.push-frontend.outputs.digest }}
          push-to-registry: true

  # ── Stage 4: Deploy (runs after both images are pushed) ──

  deploy:
    name: Deploy to Production
    runs-on: [self-hosted, linux, sonarqube]
    timeout-minutes: 10
    permissions:
      contents: read
      packages: read
    needs: [container-image-backend, container-image-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Clean workspace
        run: sudo rm -rf "$GITHUB_WORKSPACE"/* "$GITHUB_WORKSPACE"/.* 2>/dev/null || true

      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull latest images and deploy
        env:
          POSTGRES_PASSWORD: ${{ secrets.PROD_POSTGRES_PASSWORD }}
          JWT_SECRET: ${{ secrets.PROD_JWT_SECRET }}
          IMAGE_TAG: ${{ github.sha }}
          BACKEND_DIGEST: ${{ needs.container-image-backend.outputs.digest }}
          FRONTEND_DIGEST: ${{ needs.container-image-frontend.outputs.digest }}
        run: |
          # Capture current image digests for rollback
          PREV_BACKEND=$(docker compose -f docker-compose.prod.yml images backend --format json 2>/dev/null | jq -r '.[0].ID // empty' || true)
          PREV_FRONTEND=$(docker compose -f docker-compose.prod.yml images frontend --format json 2>/dev/null | jq -r '.[0].ID // empty' || true)
          echo "PREV_BACKEND=$PREV_BACKEND" >> "$GITHUB_ENV"
          echo "PREV_FRONTEND=$PREV_FRONTEND" >> "$GITHUB_ENV"

          # Pull by digest when available to prevent TOCTOU between scan and deploy
          if [ -n "$BACKEND_DIGEST" ]; then
            echo "Pulling backend by digest: $BACKEND_DIGEST"
            docker pull "ghcr.io/${{ github.repository_owner }}/realestate-backend${BACKEND_DIGEST}"
            docker tag "ghcr.io/${{ github.repository_owner }}/realestate-backend${BACKEND_DIGEST}" \
              "ghcr.io/${{ github.repository_owner }}/realestate-backend:${IMAGE_TAG}"
          fi
          if [ -n "$FRONTEND_DIGEST" ]; then
            echo "Pulling frontend by digest: $FRONTEND_DIGEST"
            docker pull "ghcr.io/${{ github.repository_owner }}/realestate-frontend${FRONTEND_DIGEST}"
            docker tag "ghcr.io/${{ github.repository_owner }}/realestate-frontend${FRONTEND_DIGEST}" \
              "ghcr.io/${{ github.repository_owner }}/realestate-frontend:${IMAGE_TAG}"
          fi

          # Fall back to tag-based pull if digests unavailable
          if [ -z "$BACKEND_DIGEST" ] || [ -z "$FRONTEND_DIGEST" ]; then
            echo "::warning::Digest unavailable for one or both images -- falling back to tag pull"
            docker compose -f docker-compose.prod.yml pull
          fi

          docker compose -f docker-compose.prod.yml up -d --no-build --remove-orphans
          docker compose -f docker-compose.prod.yml ps

      - name: Verify deployment health
        id: health-check
        env:
          POSTGRES_PASSWORD: ${{ secrets.PROD_POSTGRES_PASSWORD }}
          JWT_SECRET: ${{ secrets.PROD_JWT_SECRET }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          echo "Waiting for services to initialize..."
          sleep 10
          BACKEND_OK=false
          for i in $(seq 1 30); do
            if docker compose -f docker-compose.prod.yml exec -T backend curl -sf --max-time 5 http://localhost:8080/health >/dev/null 2>&1; then
              BACKEND_OK=true
              echo "Backend health check passed on attempt $i"
              break
            fi
            echo "Attempt $i/30 -- backend not ready, waiting 5s..."
            sleep 5
          done
          if [ "$BACKEND_OK" = "false" ]; then
            echo "::error::Backend health check failed after 150 seconds"
            echo "Container status:"
            docker compose -f docker-compose.prod.yml ps
            echo "Backend logs (last 50 lines):"
            docker compose -f docker-compose.prod.yml logs --tail=50 backend
            exit 1
          fi

      - name: Rollback on health check failure
        if: failure() && steps.health-check.outcome == 'failure'
        env:
          POSTGRES_PASSWORD: ${{ secrets.PROD_POSTGRES_PASSWORD }}
          JWT_SECRET: ${{ secrets.PROD_JWT_SECRET }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          echo "::warning::Health check failed -- rolling back to previous images"
          if [ -n "$PREV_BACKEND" ] || [ -n "$PREV_FRONTEND" ]; then
            docker compose -f docker-compose.prod.yml down
            docker compose -f docker-compose.prod.yml up -d --no-build --remove-orphans 2>/dev/null || true
            echo "Rollback attempted. Verify manually."
          else
            echo "No previous images recorded -- stopping failed deployment"
            docker compose -f docker-compose.prod.yml down
          fi

  notify-failure:
    name: Failure Notification Webhook
    runs-on: [self-hosted, linux]
    timeout-minutes: 5
    permissions:
      contents: read
    env:
      WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
    needs: [secret-scan, commit-lint, lint, test-backend, test-frontend, quality-gate, sonarqube, build-frontend, build-backend, container-image-backend, container-image-frontend, deploy]
    if: always() && contains(needs.*.result, 'failure')
    steps:
      - name: Notify -- secret scanning detected leaked secrets
        if: always() && needs.secret-scan.result == 'failure'
        run: |
          PAYLOAD=$(jq -n \
            --arg job "secret-scan" \
            --arg step "gitleaks" \
            --arg error_log "Gitleaks detected secrets in the repository. Review the secret-scan job output and rotate any exposed credentials immediately." \
            --arg run_url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --arg commit "${{ github.sha }}" \
            --arg branch "${{ github.ref_name }}" \
            --arg actor "${{ github.actor }}" \
            '{job: $job, step: $step, error_log: $error_log, run_url: $run_url, commit: $commit, branch: $branch, actor: $actor}')
          SIGNATURE=$(printf '%s' "$PAYLOAD" | openssl dgst -sha256 -hmac "${WEBHOOK_SECRET}" | awk '{print $NF}')
          curl -s --connect-timeout 5 --max-time 10 -X POST http://${{ secrets.WEBHOOK_HOST }}:9090/ci-failure \
            -H "Content-Type: application/json" \
            -H "X-Signature-256: sha256=$SIGNATURE" \
            -d "$PAYLOAD" || echo "Webhook unreachable -- skipping notification"

      - name: Notify -- conventional commit validation failed
        if: always() && needs.commit-lint.result == 'failure'
        run: |
          PAYLOAD=$(jq -n \
            --arg job "commit-lint" \
            --arg step "commitlint" \
            --arg error_log "Commit message lint failed. Commit messages must follow conventional commits format (feat:, fix:, chore:, etc.)." \
            --arg run_url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --arg commit "${{ github.sha }}" \
            --arg branch "${{ github.ref_name }}" \
            --arg actor "${{ github.actor }}" \
            '{job: $job, step: $step, error_log: $error_log, run_url: $run_url, commit: $commit, branch: $branch, actor: $actor}')
          SIGNATURE=$(printf '%s' "$PAYLOAD" | openssl dgst -sha256 -hmac "${WEBHOOK_SECRET}" | awk '{print $NF}')
          curl -s --connect-timeout 5 --max-time 10 -X POST http://${{ secrets.WEBHOOK_HOST }}:9090/ci-failure \
            -H "Content-Type: application/json" \
            -H "X-Signature-256: sha256=$SIGNATURE" \
            -d "$PAYLOAD" || echo "Webhook unreachable -- skipping notification"

      - name: Notify -- code formatting or clippy lint failed
        if: always() && needs.lint.result == 'failure'
        env:
          ERROR_LOG: ${{ needs.lint.outputs.error_log }}
          FAILED_STEPS: ${{ needs.lint.outputs.failed_steps }}
        run: |
          if [ -z "$ERROR_LOG" ]; then
            ERROR_LOG="Lint job failed but no captured output. Run cargo fmt --all -- --check and cargo clippy --workspace -- -D warnings to reproduce."
          fi
          STEP="${FAILED_STEPS:-clippy-or-fmt}"
          PAYLOAD=$(jq -n --arg job "lint" --arg step "$STEP" --arg error_log "$ERROR_LOG" \
            --arg run_url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --arg commit "${{ github.sha }}" --arg branch "${{ github.ref_name }}" --arg actor "${{ github.actor }}" \
            '{job: $job, step: $step, error_log: $error_log, run_url: $run_url, commit: $commit, branch: $branch, actor: $actor}')
          SIGNATURE=$(printf '%s' "$PAYLOAD" | openssl dgst -sha256 -hmac "${WEBHOOK_SECRET}" | awk '{print $NF}')
          curl -s --connect-timeout 5 --max-time 10 -X POST http://${{ secrets.WEBHOOK_HOST }}:9090/ci-failure \
            -H "Content-Type: application/json" \
            -H "X-Signature-256: sha256=$SIGNATURE" \
            -d "$PAYLOAD" || echo "Webhook unreachable -- skipping notification"

      - name: Notify -- backend tests failed
        if: always() && needs.test-backend.result == 'failure'
        env:
          ERROR_LOG: ${{ needs.test-backend.outputs.error_log }}
        run: |
          if [ -z "$ERROR_LOG" ]; then
            ERROR_LOG="Backend tests failed but no captured output. Run cargo test -p realestate-backend --all-targets to reproduce."
          fi
          PAYLOAD=$(jq -n --arg job "test-backend" --arg step "cargo-test" --arg error_log "$ERROR_LOG" \
            --arg run_url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --arg commit "${{ github.sha }}" --arg branch "${{ github.ref_name }}" --arg actor "${{ github.actor }}" \
            '{job: $job, step: $step, error_log: $error_log, run_url: $run_url, commit: $commit, branch: $branch, actor: $actor}')
          SIGNATURE=$(printf '%s' "$PAYLOAD" | openssl dgst -sha256 -hmac "${WEBHOOK_SECRET}" | awk '{print $NF}')
          curl -s --connect-timeout 5 --max-time 10 -X POST http://${{ secrets.WEBHOOK_HOST }}:9090/ci-failure \
            -H "Content-Type: application/json" \
            -H "X-Signature-256: sha256=$SIGNATURE" \
            -d "$PAYLOAD" || echo "Webhook unreachable -- skipping notification"

      - name: Notify -- frontend tests failed
        if: always() && needs.test-frontend.result == 'failure'
        env:
          ERROR_LOG: ${{ needs.test-frontend.outputs.error_log }}
        run: |
          if [ -z "$ERROR_LOG" ]; then
            ERROR_LOG="Frontend tests failed but no captured output. Run cargo test -p realestate-frontend --all-targets to reproduce."
          fi
          PAYLOAD=$(jq -n --arg job "test-frontend" --arg step "cargo-test" --arg error_log "$ERROR_LOG" \
            --arg run_url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --arg commit "${{ github.sha }}" --arg branch "${{ github.ref_name }}" --arg actor "${{ github.actor }}" \
            '{job: $job, step: $step, error_log: $error_log, run_url: $run_url, commit: $commit, branch: $branch, actor: $actor}')
          SIGNATURE=$(printf '%s' "$PAYLOAD" | openssl dgst -sha256 -hmac "${WEBHOOK_SECRET}" | awk '{print $NF}')
          curl -s --connect-timeout 5 --max-time 10 -X POST http://${{ secrets.WEBHOOK_HOST }}:9090/ci-failure \
            -H "Content-Type: application/json" \
            -H "X-Signature-256: sha256=$SIGNATURE" \
            -d "$PAYLOAD" || echo "Webhook unreachable -- skipping notification"

      - name: Notify -- dependency security gate failed
        if: always() && needs.quality-gate.result == 'failure'
        env:
          ERROR_LOG: ${{ needs.quality-gate.outputs.error_log }}
          FAILED_STEPS: ${{ needs.quality-gate.outputs.failed_steps }}
        run: |
          if [ -z "$ERROR_LOG" ]; then
            ERROR_LOG="Quality gate failed but no captured output. Run cargo audit and check OWASP scan to reproduce."
          fi
          STEP="${FAILED_STEPS:-audit-or-owasp}"
          PAYLOAD=$(jq -n --arg job "quality-gate" --arg step "$STEP" --arg error_log "$ERROR_LOG" \
            --arg run_url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --arg commit "${{ github.sha }}" --arg branch "${{ github.ref_name }}" --arg actor "${{ github.actor }}" \
            '{job: $job, step: $step, error_log: $error_log, run_url: $run_url, commit: $commit, branch: $branch, actor: $actor}')
          SIGNATURE=$(printf '%s' "$PAYLOAD" | openssl dgst -sha256 -hmac "${WEBHOOK_SECRET}" | awk '{print $NF}')
          curl -s --connect-timeout 5 --max-time 10 -X POST http://${{ secrets.WEBHOOK_HOST }}:9090/ci-failure \
            -H "Content-Type: application/json" \
            -H "X-Signature-256: sha256=$SIGNATURE" \
            -d "$PAYLOAD" || echo "Webhook unreachable -- skipping notification"

      - name: Notify -- frontend WASM build failed
        if: always() && needs.build-frontend.result == 'failure'
        env:
          ERROR_LOG: ${{ needs.build-frontend.outputs.error_log }}
        run: |
          if [ -z "$ERROR_LOG" ]; then
            ERROR_LOG="Frontend WASM build failed but no captured output. Run trunk build --release in frontend/ to reproduce."
          fi
          PAYLOAD=$(jq -n --arg job "build-frontend" --arg step "trunk-build" --arg error_log "$ERROR_LOG" \
            --arg run_url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --arg commit "${{ github.sha }}" --arg branch "${{ github.ref_name }}" --arg actor "${{ github.actor }}" \
            '{job: $job, step: $step, error_log: $error_log, run_url: $run_url, commit: $commit, branch: $branch, actor: $actor}')
          SIGNATURE=$(printf '%s' "$PAYLOAD" | openssl dgst -sha256 -hmac "${WEBHOOK_SECRET}" | awk '{print $NF}')
          curl -s --connect-timeout 5 --max-time 10 -X POST http://${{ secrets.WEBHOOK_HOST }}:9090/ci-failure \
            -H "Content-Type: application/json" \
            -H "X-Signature-256: sha256=$SIGNATURE" \
            -d "$PAYLOAD" || echo "Webhook unreachable -- skipping notification"

      - name: Notify -- backend release build failed
        if: always() && needs.build-backend.result == 'failure'
        env:
          ERROR_LOG: ${{ needs.build-backend.outputs.error_log }}
        run: |
          if [ -z "$ERROR_LOG" ]; then
            ERROR_LOG="Backend release build failed but no captured output. Run cargo build -p realestate-backend --release to reproduce."
          fi
          PAYLOAD=$(jq -n --arg job "build-backend" --arg step "cargo-build" --arg error_log "$ERROR_LOG" \
            --arg run_url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --arg commit "${{ github.sha }}" --arg branch "${{ github.ref_name }}" --arg actor "${{ github.actor }}" \
            '{job: $job, step: $step, error_log: $error_log, run_url: $run_url, commit: $commit, branch: $branch, actor: $actor}')
          SIGNATURE=$(printf '%s' "$PAYLOAD" | openssl dgst -sha256 -hmac "${WEBHOOK_SECRET}" | awk '{print $NF}')
          curl -s --connect-timeout 5 --max-time 10 -X POST http://${{ secrets.WEBHOOK_HOST }}:9090/ci-failure \
            -H "Content-Type: application/json" \
            -H "X-Signature-256: sha256=$SIGNATURE" \
            -d "$PAYLOAD" || echo "Webhook unreachable -- skipping notification"

      - name: Notify -- SonarQube analysis failed
        if: always() && needs.sonarqube.result == 'failure'
        run: |
          PAYLOAD=$(jq -n \
            --arg job "sonarqube" \
            --arg step "sonar-scan" \
            --arg error_log "SonarQube analysis failed. Check SonarQube server status and scan configuration." \
            --arg run_url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --arg commit "${{ github.sha }}" \
            --arg branch "${{ github.ref_name }}" \
            --arg actor "${{ github.actor }}" \
            '{job: $job, step: $step, error_log: $error_log, run_url: $run_url, commit: $commit, branch: $branch, actor: $actor}')
          SIGNATURE=$(printf '%s' "$PAYLOAD" | openssl dgst -sha256 -hmac "${WEBHOOK_SECRET}" | awk '{print $NF}')
          curl -s --connect-timeout 5 --max-time 10 -X POST http://${{ secrets.WEBHOOK_HOST }}:9090/ci-failure \
            -H "Content-Type: application/json" \
            -H "X-Signature-256: sha256=$SIGNATURE" \
            -d "$PAYLOAD" || echo "Webhook unreachable -- skipping notification"

      - name: Notify -- backend container image build/scan failed
        if: always() && needs.container-image-backend.result == 'failure'
        run: |
          PAYLOAD=$(jq -n \
            --arg job "container-image-backend" \
            --arg step "docker-build-scan" \
            --arg error_log "Backend container image build or Trivy vulnerability scan failed. Check the container-image-backend job output for details." \
            --arg run_url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --arg commit "${{ github.sha }}" \
            --arg branch "${{ github.ref_name }}" \
            --arg actor "${{ github.actor }}" \
            '{job: $job, step: $step, error_log: $error_log, run_url: $run_url, commit: $commit, branch: $branch, actor: $actor}')
          SIGNATURE=$(printf '%s' "$PAYLOAD" | openssl dgst -sha256 -hmac "${WEBHOOK_SECRET}" | awk '{print $NF}')
          curl -s --connect-timeout 5 --max-time 10 -X POST http://${{ secrets.WEBHOOK_HOST }}:9090/ci-failure \
            -H "Content-Type: application/json" \
            -H "X-Signature-256: sha256=$SIGNATURE" \
            -d "$PAYLOAD" || echo "Webhook unreachable -- skipping notification"

      - name: Notify -- frontend container image build/scan failed
        if: always() && needs.container-image-frontend.result == 'failure'
        run: |
          PAYLOAD=$(jq -n \
            --arg job "container-image-frontend" \
            --arg step "docker-build-scan" \
            --arg error_log "Frontend container image build or Trivy vulnerability scan failed. Check the container-image-frontend job output for details." \
            --arg run_url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --arg commit "${{ github.sha }}" \
            --arg branch "${{ github.ref_name }}" \
            --arg actor "${{ github.actor }}" \
            '{job: $job, step: $step, error_log: $error_log, run_url: $run_url, commit: $commit, branch: $branch, actor: $actor}')
          SIGNATURE=$(printf '%s' "$PAYLOAD" | openssl dgst -sha256 -hmac "${WEBHOOK_SECRET}" | awk '{print $NF}')
          curl -s --connect-timeout 5 --max-time 10 -X POST http://${{ secrets.WEBHOOK_HOST }}:9090/ci-failure \
            -H "Content-Type: application/json" \
            -H "X-Signature-256: sha256=$SIGNATURE" \
            -d "$PAYLOAD" || echo "Webhook unreachable -- skipping notification"

      - name: Notify -- production deployment failed
        if: always() && needs.deploy.result == 'failure'
        run: |
          PAYLOAD=$(jq -n \
            --arg job "deploy" \
            --arg step "docker-compose-deploy" \
            --arg error_log "Production deployment failed. Check docker compose logs and service health on the deployment target." \
            --arg run_url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --arg commit "${{ github.sha }}" \
            --arg branch "${{ github.ref_name }}" \
            --arg actor "${{ github.actor }}" \
            '{job: $job, step: $step, error_log: $error_log, run_url: $run_url, commit: $commit, branch: $branch, actor: $actor}')
          SIGNATURE=$(printf '%s' "$PAYLOAD" | openssl dgst -sha256 -hmac "${WEBHOOK_SECRET}" | awk '{print $NF}')
          curl -s --connect-timeout 5 --max-time 10 -X POST http://${{ secrets.WEBHOOK_HOST }}:9090/ci-failure \
            -H "Content-Type: application/json" \
            -H "X-Signature-256: sha256=$SIGNATURE" \
            -d "$PAYLOAD" || echo "Webhook unreachable -- skipping notification"

      - name: Write failure summary
        if: always()
        run: |
          {
            echo "## Pipeline Failure Summary"
            echo "| Job | Result |"
            echo "|-----|--------|"
            for JOB in commit-lint lint test-backend test-frontend quality-gate sonarqube build-frontend build-backend container-image-backend container-image-frontend deploy; do
              case "$JOB" in
                commit-lint) RESULT="${{ needs.commit-lint.result }}" ;;
                lint) RESULT="${{ needs.lint.result }}" ;;
                test-backend) RESULT="${{ needs.test-backend.result }}" ;;
                test-frontend) RESULT="${{ needs.test-frontend.result }}" ;;
                quality-gate) RESULT="${{ needs.quality-gate.result }}" ;;
                sonarqube) RESULT="${{ needs.sonarqube.result }}" ;;
                build-frontend) RESULT="${{ needs.build-frontend.result }}" ;;
                build-backend) RESULT="${{ needs.build-backend.result }}" ;;
                container-image-backend) RESULT="${{ needs.container-image-backend.result }}" ;;
                container-image-frontend) RESULT="${{ needs.container-image-frontend.result }}" ;;
                deploy) RESULT="${{ needs.deploy.result }}" ;;
              esac
              case "$RESULT" in
                success) ICON="✅" ;;
                failure) ICON="❌" ;;
                cancelled) ICON="⏹️" ;;
                skipped) ICON="⏭️" ;;
                *) ICON="❓" ;;
              esac
              echo "| $JOB | $ICON $RESULT |"
            done
            echo ""
            echo "Commit: \`${{ github.sha }}\` by @${{ github.actor }}"
          } >> "$GITHUB_STEP_SUMMARY"

  # ── Stage 3: Pipeline Self-Improvement (runs after everything else) ──

  pipeline-improve:
    name: CI/CD Pipeline Self-Improvement
    runs-on: [self-hosted, linux]
    timeout-minutes: 10
    permissions:
      contents: read
    env:
      WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
    needs: [secret-scan, commit-lint, lint, test-backend, test-frontend, quality-gate, sonarqube, build-frontend, build-backend, container-image-backend, container-image-frontend, deploy, notify-failure]
    if: always() && github.ref == 'refs/heads/main'
    steps:
      - name: Clean workspace
        run: sudo rm -rf "$GITHUB_WORKSPACE"/* "$GITHUB_WORKSPACE"/.* 2>/dev/null || true

      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Collect SonarQube open issues
        id: sonar-issues
        run: |
          SONAR_URL="http://192.168.88.25:9000"
          TOKEN="${{ secrets.SONAR_TOKEN }}"
          PROJECT_KEY="gestion-inmobiliaria"

          if [ -z "$TOKEN" ]; then
            ADMIN_PASS="${{ secrets.SONAR_ADMIN_PASSWORD }}"
            if [ -z "$ADMIN_PASS" ]; then
              echo "sonar_report=SonarQube credentials unavailable -- skipping issue collection." >> $GITHUB_OUTPUT
              exit 0
            fi
            TOKEN=$(curl -sf -u "admin:${ADMIN_PASS}" -X POST \
              "$SONAR_URL/api/user_tokens/generate?name=ci-improve-token" 2>/dev/null \
              | jq -r '.token // empty' || true)
            if [ -z "$TOKEN" ]; then
              echo "sonar_report=SonarQube token unavailable -- skipping issue collection." >> $GITHUB_OUTPUT
              exit 0
            fi
            echo "temp_token=true" >> $GITHUB_OUTPUT
          fi

          ISSUES_JSON=$(curl -sf -u "$TOKEN:" \
            "$SONAR_URL/api/issues/search?projectKeys=${PROJECT_KEY}&resolved=false&ps=100&s=SEVERITY&asc=false&statuses=OPEN,CONFIRMED,REOPENED" \
            2>/dev/null || echo '{}')

          TOTAL=$(echo "$ISSUES_JSON" | jq -r '.total // 0')
          BREAKDOWN=$(echo "$ISSUES_JSON" | jq -r '
            [.issues // [] | group_by(.severity) | .[] |
              {severity: .[0].severity, count: length}] |
            map("\(.count) \(.severity)") | join(", ")' 2>/dev/null || echo "unknown")

          ISSUE_LIST=$(echo "$ISSUES_JSON" | jq -r '
            [.issues[:80] | .[] |
              "\(.severity) | \(.component | split(":") | last):\(.line // "?") | \(.rule) | \(.message)"] |
            join("\n")' 2>/dev/null || echo "")

          HOTSPOTS_JSON=$(curl -sf -u "$TOKEN:" \
            "$SONAR_URL/api/hotspots/search?projectKey=${PROJECT_KEY}&status=TO_REVIEW&ps=50" \
            2>/dev/null || echo '{}')

          HOTSPOT_TOTAL=$(echo "$HOTSPOTS_JSON" | jq -r '.paging.total // 0')
          HOTSPOT_LIST=$(echo "$HOTSPOTS_JSON" | jq -r '
            [.hotspots[:30] | .[] |
              "\(.vulnerabilityProbability) | \(.component | split(":") | last):\(.line // "?") | \(.securityCategory) | \(.message)"] |
            join("\n")' 2>/dev/null || echo "")

          SONAR_REPORT="SonarQube Open Issues Report (project: ${PROJECT_KEY}):\n"
          SONAR_REPORT="${SONAR_REPORT}Total open issues: ${TOTAL}\n"
          SONAR_REPORT="${SONAR_REPORT}Breakdown: ${BREAKDOWN}\n\n"
          SONAR_REPORT="${SONAR_REPORT}Issues (severity | file:line | rule | message):\n${ISSUE_LIST}\n\n"
          SONAR_REPORT="${SONAR_REPORT}Security Hotspots to review: ${HOTSPOT_TOTAL}\n"
          SONAR_REPORT="${SONAR_REPORT}Hotspots (risk | file:line | category | message):\n${HOTSPOT_LIST}"

          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "sonar_report<<$EOF" >> $GITHUB_OUTPUT
          echo -e "$SONAR_REPORT" >> $GITHUB_OUTPUT
          echo "$EOF" >> $GITHUB_OUTPUT

      - name: Determine improvement focus from pipeline results
        id: analyze
        env:
          LINT_ERRORS: ${{ needs.lint.outputs.error_log }}
          BACKEND_TEST_ERRORS: ${{ needs.test-backend.outputs.error_log }}
          FRONTEND_TEST_ERRORS: ${{ needs.test-frontend.outputs.error_log }}
          QUALITY_ERRORS: ${{ needs.quality-gate.outputs.error_log }}
          BUILD_FE_ERRORS: ${{ needs.build-frontend.outputs.error_log }}
          BUILD_BE_ERRORS: ${{ needs.build-backend.outputs.error_log }}
        run: |
          FOCUS="general"
          REPORT=""

          REPORT="${REPORT}Pipeline Run Summary:\n"
          REPORT="${REPORT}  Job                | Result   | Duration | Cache\n"
          REPORT="${REPORT}  -------------------|----------|----------|------\n"
          REPORT="${REPORT}  lint               | ${{ needs.lint.result }} | ${{ needs.lint.outputs.duration || 'n/a' }} | ${{ needs.lint.outputs.cache_hit == 'true' && 'HIT' || 'MISS' }}\n"
          REPORT="${REPORT}  test-backend       | ${{ needs.test-backend.result }} | ${{ needs.test-backend.outputs.duration || 'n/a' }} | ${{ needs.test-backend.outputs.cache_hit == 'true' && 'HIT' || 'MISS' }}\n"
          REPORT="${REPORT}  test-frontend      | ${{ needs.test-frontend.result }} | ${{ needs.test-frontend.outputs.duration || 'n/a' }} | ${{ needs.test-frontend.outputs.cache_hit == 'true' && 'HIT' || 'MISS' }}\n"
          REPORT="${REPORT}  quality-gate       | ${{ needs.quality-gate.result }} | ${{ needs.quality-gate.outputs.duration || 'n/a' }} | n/a\n"
          REPORT="${REPORT}  sonarqube          | ${{ needs.sonarqube.result }} | ${{ needs.sonarqube.outputs.duration || 'n/a' }} | n/a\n"
          REPORT="${REPORT}  build-frontend     | ${{ needs.build-frontend.result }} | ${{ needs.build-frontend.outputs.duration || 'n/a' }} | ${{ needs.build-frontend.outputs.cache_hit == 'true' && 'HIT' || 'MISS' }}\n"
          REPORT="${REPORT}  build-backend      | ${{ needs.build-backend.result }} | ${{ needs.build-backend.outputs.duration || 'n/a' }} | ${{ needs.build-backend.outputs.cache_hit == 'true' && 'HIT' || 'MISS' }}\n"

          # Collect error logs from all failed jobs
          ERRORS=""
          if [ "${{ needs.lint.result }}" = "failure" ] && [ -n "$LINT_ERRORS" ]; then
            ERRORS="${ERRORS}\n--- LINT ERRORS ---\n${LINT_ERRORS}\n"
          fi
          if [ "${{ needs.test-backend.result }}" = "failure" ] && [ -n "$BACKEND_TEST_ERRORS" ]; then
            ERRORS="${ERRORS}\n--- BACKEND TEST ERRORS ---\n${BACKEND_TEST_ERRORS}\n"
          fi
          if [ "${{ needs.test-frontend.result }}" = "failure" ] && [ -n "$FRONTEND_TEST_ERRORS" ]; then
            ERRORS="${ERRORS}\n--- FRONTEND TEST ERRORS ---\n${FRONTEND_TEST_ERRORS}\n"
          fi
          if [ "${{ needs.quality-gate.result }}" = "failure" ] && [ -n "$QUALITY_ERRORS" ]; then
            ERRORS="${ERRORS}\n--- QUALITY GATE ERRORS ---\n${QUALITY_ERRORS}\n"
          fi
          if [ "${{ needs.build-frontend.result }}" = "failure" ] && [ -n "$BUILD_FE_ERRORS" ]; then
            ERRORS="${ERRORS}\n--- BUILD FRONTEND ERRORS ---\n${BUILD_FE_ERRORS}\n"
          fi
          if [ "${{ needs.build-backend.result }}" = "failure" ] && [ -n "$BUILD_BE_ERRORS" ]; then
            ERRORS="${ERRORS}\n--- BUILD BACKEND ERRORS ---\n${BUILD_BE_ERRORS}\n"
          fi

          if [ -n "$ERRORS" ]; then
            REPORT="${REPORT}\nFailed Job Error Logs:${ERRORS}\n"
          fi

          if [ "${{ needs.quality-gate.result }}" = "failure" ] || [ "${{ needs.secret-scan.result }}" = "failure" ]; then
            FOCUS="security"
          elif [ "${{ needs.lint.result }}" = "failure" ] || [ "${{ needs.test-backend.result }}" = "failure" ] || [ "${{ needs.test-frontend.result }}" = "failure" ]; then
            FOCUS="bugs"
          elif [ "${{ needs.build-frontend.result }}" = "failure" ] || [ "${{ needs.build-backend.result }}" = "failure" ]; then
            FOCUS="pipeline"
          else
            FOCUS="security,pipeline,reporting,sonarqube"
          fi

          REPORT="${REPORT}\nFocus: ${FOCUS}\n"
          REPORT="${REPORT}Trigger: ${{ github.event_name }} on ${{ github.ref }}\n"
          REPORT="${REPORT}Commit: ${{ github.sha }}\n"

          echo "focus=$FOCUS" >> $GITHUB_OUTPUT
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "report<<$EOF" >> $GITHUB_OUTPUT
          echo -e "$REPORT" >> $GITHUB_OUTPUT
          echo "$EOF" >> $GITHUB_OUTPUT

      - name: Send pipeline improvement request to webhook
        env:
          FOCUS: ${{ steps.analyze.outputs.focus }}
          REPORT: ${{ steps.analyze.outputs.report }}
          SONAR_REPORT: ${{ steps.sonar-issues.outputs.sonar_report }}
        run: |
          PAYLOAD=$(jq -n \
            --arg focus "$FOCUS" \
            --arg pipeline_report "$REPORT" \
            --arg sonar_report "$SONAR_REPORT" \
            --arg run_url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            '{focus: $focus, pipeline_report: $pipeline_report, sonar_report: $sonar_report, run_url: $run_url}')

          SIGNATURE=$(printf '%s' "$PAYLOAD" | openssl dgst -sha256 -hmac "${WEBHOOK_SECRET}" | awk '{print $NF}')
          curl -s --connect-timeout 5 --max-time 10 -X POST http://${{ secrets.WEBHOOK_HOST }}:9090/ci-improve \
            -H "Content-Type: application/json" \
            -H "X-Signature-256: sha256=$SIGNATURE" \
            -d "$PAYLOAD" || echo "Webhook unreachable -- skipping pipeline improvement"

      - name: Send SonarQube issues to dedicated fix webhook
        env:
          SONAR_REPORT: ${{ steps.sonar-issues.outputs.sonar_report }}
        run: |
          if [ -z "$SONAR_REPORT" ] || echo "$SONAR_REPORT" | grep -q "unavailable"; then
            echo "No SonarQube data available -- skipping sonar-fix webhook"
            exit 0
          fi

          if echo "$SONAR_REPORT" | grep -q "Total open issues: 0"; then
            echo "No open SonarQube issues -- skipping sonar-fix webhook"
            exit 0
          fi

          PAYLOAD=$(jq -n \
            --arg sonar_report "$SONAR_REPORT" \
            --arg run_url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            '{sonar_report: $sonar_report, run_url: $run_url}')

          SIGNATURE=$(printf '%s' "$PAYLOAD" | openssl dgst -sha256 -hmac "${WEBHOOK_SECRET}" | awk '{print $NF}')
          curl -s --connect-timeout 5 --max-time 10 -X POST http://${{ secrets.WEBHOOK_HOST }}:9090/sonar-fix \
            -H "Content-Type: application/json" \
            -H "X-Signature-256: sha256=$SIGNATURE" \
            -d "$PAYLOAD" || echo "Webhook unreachable -- skipping SonarQube fix"

      - name: Revoke temporary SonarQube token
        if: always() && steps.sonar-issues.outputs.temp_token == 'true'
        run: |
          ADMIN_PASS="${{ secrets.SONAR_ADMIN_PASSWORD }}"
          if [ -n "$ADMIN_PASS" ]; then
            curl -sf -u "admin:${ADMIN_PASS}" -X POST \
              "http://192.168.88.25:9000/api/user_tokens/revoke?name=ci-improve-token" 2>/dev/null || true
          fi
