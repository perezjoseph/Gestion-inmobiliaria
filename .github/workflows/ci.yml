name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  DATABASE_URL: postgresql://realestate:realestate_dev_password@localhost:5432/realestate
  JWT_SECRET: ci_test_secret_not_for_production
  SERVER_PORT: 8080
  CORS_ORIGIN: http://localhost:8080

jobs:
  # ── Stage 1: Quality Checks (all run in parallel) ──

  commit-lint:
    name: Conventional Commits Check
    runs-on: [self-hosted, linux]
    if: github.event_name == 'pull_request'
    steps:
      - name: Clean workspace of root-owned files from Docker jobs
        run: sudo rm -rf "$GITHUB_WORKSPACE"/* "$GITHUB_WORKSPACE"/.* 2>/dev/null || true

      - name: Checkout repository with full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js 22 for commitlint
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install commitlint CLI and conventional config
        run: |
          npm install --save-dev @commitlint/{cli,config-conventional}
          echo "module.exports = { extends: ['@commitlint/config-conventional'] };" > commitlint.config.js

      - name: Validate PR commit messages against conventional format
        run: npx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose

  lint:
    name: Code Formatting & Static Analysis
    runs-on: [self-hosted, linux]
    outputs:
      error_log: ${{ steps.collect-errors.outputs.error_log }}
      failed_steps: ${{ steps.collect-errors.outputs.failed_steps }}
    steps:
      - name: Clean workspace of root-owned files from Docker jobs
        run: sudo rm -rf "$GITHUB_WORKSPACE"/* "$GITHUB_WORKSPACE"/.* 2>/dev/null || true

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable with rustfmt, clippy, and WASM target
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown

      - name: Restore cargo cache (registry, git, build artifacts)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-lint-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-lint-

      - name: Verify rustfmt formatting across all crates
        id: fmt
        if: always()
        run: cargo fmt --all -- --check 2>&1 | tee /tmp/fmt-output.txt

      - name: Run clippy lints on backend (warnings as errors)
        id: clippy_backend
        if: always()
        run: cargo clippy -p realestate-backend -- -D warnings 2>&1 | tee /tmp/clippy-backend-output.txt

      - name: Run clippy lints on frontend WASM target (warnings as errors)
        id: clippy_frontend
        if: always()
        run: cargo clippy -p realestate-frontend --target wasm32-unknown-unknown -- -D warnings 2>&1 | tee /tmp/clippy-frontend-output.txt

      - name: Collect lint errors for notification
        id: collect-errors
        if: always() && (steps.fmt.outcome == 'failure' || steps.clippy_backend.outcome == 'failure' || steps.clippy_frontend.outcome == 'failure')
        run: |
          ERROR=""
          FAILED=""
          if [ "${{ steps.fmt.outcome }}" = "failure" ]; then
            FAILED="${FAILED}fmt-check,"
            ERROR="${ERROR}[fmt-check] $(head -c 1500 /tmp/fmt-output.txt 2>/dev/null || echo 'cargo fmt found formatting issues.')"$'\n\n'
          fi
          if [ "${{ steps.clippy_backend.outcome }}" = "failure" ]; then
            FAILED="${FAILED}clippy-backend,"
            ERROR="${ERROR}[clippy-backend] $(head -c 1500 /tmp/clippy-backend-output.txt 2>/dev/null || echo 'Backend clippy failed.')"$'\n\n'
          fi
          if [ "${{ steps.clippy_frontend.outcome }}" = "failure" ]; then
            FAILED="${FAILED}clippy-frontend,"
            ERROR="${ERROR}[clippy-frontend] $(head -c 1000 /tmp/clippy-frontend-output.txt 2>/dev/null || echo 'Frontend clippy failed.')"$'\n\n'
          fi
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "failed_steps=${FAILED%,}" >> $GITHUB_OUTPUT
          echo "error_log<<$EOF" >> $GITHUB_OUTPUT
          echo "$ERROR" >> $GITHUB_OUTPUT
          echo "$EOF" >> $GITHUB_OUTPUT

      - name: Fail job if any lint step failed
        if: always() && (steps.fmt.outcome == 'failure' || steps.clippy_backend.outcome == 'failure' || steps.clippy_frontend.outcome == 'failure')
        run: exit 1

  test-backend:
    name: Backend Unit & Integration Tests
    runs-on: [self-hosted, linux, docker]
    outputs:
      error_log: ${{ steps.collect-errors.outputs.error_log }}
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: realestate
          POSTGRES_USER: realestate
          POSTGRES_PASSWORD: realestate_dev_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U realestate"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Clean workspace of root-owned files from Docker jobs
        run: sudo rm -rf "$GITHUB_WORKSPACE"/* "$GITHUB_WORKSPACE"/.* 2>/dev/null || true

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Restore cargo cache (registry, git, build artifacts)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-test-

      - name: Run backend unit and integration tests against PostgreSQL
        run: cargo test -p realestate-backend --all-targets 2>&1 | tee /tmp/test-backend-output.txt

      - name: Collect backend test errors for notification
        id: collect-errors
        if: failure()
        run: |
          ERROR=""
          [ -f /tmp/test-backend-output.txt ] && ERROR="$(tail -c 3000 /tmp/test-backend-output.txt)"
          if [ -z "$ERROR" ]; then
            ERROR="Backend tests failed but no captured output. Run cargo test -p realestate-backend --all-targets to reproduce."
          fi
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "error_log<<$EOF" >> $GITHUB_OUTPUT
          echo "$ERROR" >> $GITHUB_OUTPUT
          echo "$EOF" >> $GITHUB_OUTPUT

  test-frontend:
    name: Frontend WASM Compilation & Tests
    runs-on: [self-hosted, linux]
    outputs:
      error_log: ${{ steps.collect-errors.outputs.error_log }}
    steps:
      - name: Clean workspace of root-owned files from Docker jobs
        run: sudo rm -rf "$GITHUB_WORKSPACE"/* "$GITHUB_WORKSPACE"/.* 2>/dev/null || true

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable with WASM target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Restore cargo cache (registry, git, build artifacts)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-frontend-test-v2-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-frontend-test-v2-

      - name: Run frontend tests (native target)
        run: cargo test -p realestate-frontend --all-targets 2>&1 | tee /tmp/test-frontend-output.txt

      - name: Collect frontend test errors for notification
        id: collect-errors
        if: failure()
        run: |
          ERROR=""
          [ -f /tmp/test-frontend-output.txt ] && ERROR="$(tail -c 3000 /tmp/test-frontend-output.txt)"
          if [ -z "$ERROR" ]; then
            ERROR="Frontend tests failed but no captured output. Run cargo test -p realestate-frontend --all-targets to reproduce."
          fi
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "error_log<<$EOF" >> $GITHUB_OUTPUT
          echo "$ERROR" >> $GITHUB_OUTPUT
          echo "$EOF" >> $GITHUB_OUTPUT

  quality-gate:
    name: Dependency Security & Health Check
    runs-on: [self-hosted, linux, docker]
    outputs:
      error_log: ${{ steps.collect-errors.outputs.error_log }}
      failed_steps: ${{ steps.collect-errors.outputs.failed_steps }}
    steps:
      - name: Clean workspace of root-owned files from Docker jobs
        run: sudo rm -rf "$GITHUB_WORKSPACE"/* "$GITHUB_WORKSPACE"/.* 2>/dev/null || true

      - name: Clean up OWASP reports from previous runs
        run: sudo rm -rf reports/

      - name: Checkout repository for dependency scanning
        uses: actions/checkout@v4
        with:
          clean: false

      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit for CVE scanning
        id: install_audit
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          if command -v cargo-audit &>/dev/null && cargo audit --version &>/dev/null; then
            echo "cargo-audit already installed: $(cargo audit --version)"
            echo "installed=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          rm -f "$HOME/.cargo/bin/cargo-audit"
          mkdir -p "$HOME/.cargo/bin"
          AUDIT_VERSION="0.22.1"
          echo "Downloading pre-built cargo-audit v${AUDIT_VERSION}..."
          INSTALLED=false
          for VARIANT in musl gnu; do
            URL="https://github.com/rustsec/rustsec/releases/download/cargo-audit%2Fv${AUDIT_VERSION}/cargo-audit-x86_64-unknown-linux-${VARIANT}-v${AUDIT_VERSION}.tgz"
            if curl -sSfL --retry 3 --retry-delay 10 --connect-timeout 30 -o /tmp/cargo-audit.tgz "$URL" 2>/tmp/install-audit-output.txt; then
              if tar xzf /tmp/cargo-audit.tgz --strip-components=1 -C "$HOME/.cargo/bin/" 2>>/tmp/install-audit-output.txt; then
                chmod +x "$HOME/.cargo/bin/cargo-audit"
                if cargo audit --version &>/dev/null; then
                  INSTALLED=true
                  break
                else
                  echo "Binary extracted but not executable, trying next variant..." | tee -a /tmp/install-audit-output.txt
                  rm -f "$HOME/.cargo/bin/cargo-audit"
                fi
              fi
            fi
            echo "Failed to download ${VARIANT} variant, trying next..." | tee -a /tmp/install-audit-output.txt
          done
          if [ "$INSTALLED" = "false" ]; then
            echo "Pre-built binaries failed, trying cargo install..." | tee -a /tmp/install-audit-output.txt
            if cargo install cargo-audit --locked 2>&1 | tee -a /tmp/install-audit-output.txt; then
              INSTALLED=true
            fi
          fi
          if [ "$INSTALLED" = "true" ] && command -v cargo-audit &>/dev/null; then
            cargo audit --version
            echo "installed=true" >> $GITHUB_OUTPUT
          else
            echo "::warning::cargo-audit installation failed — skipping CVE scan"
            echo "installed=false" >> $GITHUB_OUTPUT
          fi

      - name: Scan Rust dependencies for known vulnerabilities (CVEs)
        id: cargo_audit
        if: always() && steps.install_audit.outputs.installed == 'true'
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          cargo audit 2>&1 | tee /tmp/audit-output.txt

      - name: Check for unused dependencies in Cargo.toml
        id: cargo_udeps
        if: always()
        run: |
          cargo install cargo-udeps --locked || true
          cargo +nightly udeps --all-targets 2>&1 | tee /tmp/udeps-output.txt || echo "cargo-udeps requires nightly, skipping if unavailable"

      - name: OWASP dependency scan (fail on CVSS >= 7)
        id: owasp
        if: always()
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: realestate
          path: .
          format: HTML
          args: >-
            --enableExperimental
            --failOnCVSS 7
            --exclude target/**
            --exclude node_modules/**
            --exclude dist/**

      - name: Upload OWASP vulnerability report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owasp-dependency-check-report
          path: reports/
          retention-days: 7

      - name: Collect quality-gate errors for notification
        id: collect-errors
        if: always() && (steps.cargo_audit.outcome == 'failure' || steps.cargo_udeps.outcome == 'failure' || steps.owasp.outcome == 'failure')
        run: |
          ERROR=""
          FAILED=""
          if [ "${{ steps.cargo_audit.outcome }}" = "failure" ]; then
            FAILED="${FAILED}cargo-audit,"
            ERROR="${ERROR}[cargo-audit] $(head -c 2000 /tmp/audit-output.txt 2>/dev/null || echo 'cargo audit found vulnerabilities.')"$'\n\n'
          fi
          if [ "${{ steps.install_audit.outputs.installed }}" = "false" ]; then
            ERROR="${ERROR}[cargo-audit] Skipped — installation failed (non-blocking warning)."$'\n\n'
          fi
          if [ "${{ steps.cargo_udeps.outcome }}" = "failure" ]; then
            FAILED="${FAILED}cargo-udeps,"
            ERROR="${ERROR}[cargo-udeps] $(head -c 1000 /tmp/udeps-output.txt 2>/dev/null || echo 'Unused dependency check failed.')"$'\n\n'
          fi
          if [ "${{ steps.owasp.outcome }}" = "failure" ]; then
            FAILED="${FAILED}owasp-scan,"
            ERROR="${ERROR}[owasp-scan] OWASP dependency check failed with CVSS >= 7. See uploaded report artifact for details."$'\n\n'
          fi
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "failed_steps=${FAILED%,}" >> $GITHUB_OUTPUT
          echo "error_log<<$EOF" >> $GITHUB_OUTPUT
          echo "$ERROR" >> $GITHUB_OUTPUT
          echo "$EOF" >> $GITHUB_OUTPUT

      - name: Fail job if any quality step failed
        if: always() && (steps.cargo_audit.outcome == 'failure' || steps.cargo_udeps.outcome == 'failure' || steps.owasp.outcome == 'failure')
        run: exit 1

  sonarqube:
    name: SonarQube Code Quality & Coverage Analysis
    runs-on: [self-hosted, linux, sonarqube]
    continue-on-error: true
    steps:
      - name: Clean workspace of root-owned files from Docker jobs
        run: sudo rm -rf "$GITHUB_WORKSPACE"/* "$GITHUB_WORKSPACE"/.* 2>/dev/null || true

      - name: Checkout repository with full history for blame analysis
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Using external SonarQube at 192.168.88.25:9000 ──
      # To switch to a local docker-compose instance, uncomment the two steps
      # below and change SONAR_URL references from 192.168.88.25 to localhost.

      # - name: Set vm.max_map_count for Elasticsearch
      #   run: |
      #     CURRENT=$(cat /proc/sys/vm/max_map_count)
      #     if [ "$CURRENT" -lt 524288 ]; then
      #       echo "Setting vm.max_map_count=524288 (current: $CURRENT)"
      #       sudo sysctl -w vm.max_map_count=524288 || echo "::warning::Could not set vm.max_map_count"
      #     fi

      # - name: Deploy SonarQube via docker-compose
      #   run: |
      #     docker compose -f .github/docker-compose.sonarqube.yml up -d
      #     echo "Waiting for SonarQube to be ready..."
      #     for i in $(seq 1 40); do
      #       STATUS=$(curl -sf --connect-timeout 5 --max-time 10 http://localhost:9000/api/system/status 2>/dev/null | grep -o '"status":"[^"]*"' | cut -d'"' -f4 || true)
      #       if [ "$STATUS" = "UP" ]; then echo "SonarQube is ready."; exit 0; fi
      #       echo "Attempt $i/40 — status: ${STATUS:-unreachable}. Retrying in 10s..."
      #       sleep 10
      #     done
      #     echo "::error::SonarQube did not become ready within ~7 minutes"
      #     docker compose -f .github/docker-compose.sonarqube.yml logs sonarqube | tail -50
      #     exit 1

      - name: Verify SonarQube server is reachable
        run: |
          SONAR_URL="http://192.168.88.25:9000"
          echo "Checking SonarQube at $SONAR_URL ..."
          for i in $(seq 1 12); do
            STATUS=$(curl -sf --connect-timeout 5 --max-time 10 "$SONAR_URL/api/system/status" 2>/dev/null | grep -o '"status":"[^"]*"' | cut -d'"' -f4 || true)
            if [ "$STATUS" = "UP" ]; then
              echo "SonarQube is ready."
              exit 0
            fi
            echo "Attempt $i/12 — status: ${STATUS:-unreachable}. Retrying in 5s..."
            sleep 5
          done
          echo "::error::SonarQube at $SONAR_URL did not respond within ~60 seconds"
          exit 1

      - name: Bootstrap SonarQube project and token
        id: sonar-bootstrap
        run: |
          SONAR_URL="http://192.168.88.25:9000"
          ADMIN_PASS="${{ secrets.SONAR_ADMIN_PASSWORD || 'SonarAdmin2025!' }}"

          # Create project if it doesn't exist
          curl -sf -u "admin:${ADMIN_PASS}" -X POST \
            "$SONAR_URL/api/projects/create?name=Gestion+Inmobiliaria&project=gestion-inmobiliaria" \
            2>/dev/null || echo "Project already exists."

          # Assign the default quality gate to the project
          DEFAULT_QG=$(curl -sf -u "admin:${ADMIN_PASS}" \
            "$SONAR_URL/api/qualitygates/list" | jq -r '.qualitygates[] | select(.isDefault==true) | .name' 2>/dev/null || echo "Sonar way")
          if [ -n "$DEFAULT_QG" ]; then
            curl -sf -u "admin:${ADMIN_PASS}" -X POST \
              "$SONAR_URL/api/qualitygates/select?projectKey=gestion-inmobiliaria&gateName=$(echo "$DEFAULT_QG" | jq -sRr @uri)" \
              2>/dev/null || echo "Quality gate already assigned."
          fi

          # Use existing token from secrets, or generate one via admin API
          TOKEN="${{ secrets.SONAR_TOKEN }}"
          if [ -z "$TOKEN" ]; then
            curl -sf -u "admin:${ADMIN_PASS}" -X POST \
              "$SONAR_URL/api/user_tokens/revoke?name=ci-token" 2>/dev/null || true
            TOKEN=$(curl -sf -u "admin:${ADMIN_PASS}" -X POST \
              "$SONAR_URL/api/user_tokens/generate?name=ci-token" \
              | jq -r '.token')
            echo "::warning::No SONAR_TOKEN secret set. Generated ephemeral token. Add SONAR_TOKEN to GitHub secrets for stable config."
          fi

          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Run SonarQube static analysis scan
        id: sonar-scan
        run: |
          docker run --rm \
            --network host \
            -e SONAR_TOKEN="${{ steps.sonar-bootstrap.outputs.token }}" \
            -e SONAR_HOST_URL="http://192.168.88.25:9000" \
            -v "${{ github.workspace }}:/usr/src" \
            sonarsource/sonar-scanner-cli:latest \
            -Dsonar.projectBaseDir=/usr/src \
            -Dsonar.qualitygate.wait=true \
            -Dsonar.qualitygate.timeout=300

      - name: Fetch SonarQube results and notify
        if: always()
        env:
          SONAR_TOKEN: ${{ steps.sonar-bootstrap.outputs.token }}
          SCAN_OUTCOME: ${{ steps.sonar-scan.outcome }}
        run: |
          SONAR_URL="http://192.168.88.25:9000"
          GATE_STATUS="UNKNOWN"

          if [ "$SCAN_OUTCOME" = "success" ]; then
            echo "Scan step passed with qualitygate.wait=true — gate is OK."
            GATE_STATUS="OK"
          fi

          if [ "$GATE_STATUS" = "UNKNOWN" ]; then
            REPORT_FILE=$(find . -name 'report-task.txt' -path '*scannerwork*' -print -quit 2>/dev/null)
            if [ -n "$REPORT_FILE" ] && [ -f "$REPORT_FILE" ]; then
              CE_TASK_ID=$(grep '^ceTaskId=' "$REPORT_FILE" | cut -d= -f2)
              echo "Found CE task ID: $CE_TASK_ID"

              if [ -n "$CE_TASK_ID" ]; then
                for i in $(seq 1 60); do
                  CE_RESPONSE=$(curl -sf -u "$SONAR_TOKEN:" \
                    "$SONAR_URL/api/ce/task?id=$CE_TASK_ID" 2>/dev/null || echo '{}')
                  CE_STATUS=$(echo "$CE_RESPONSE" | jq -r '.task.status // "UNKNOWN"')
                  echo "CE task status: $CE_STATUS (attempt $i/60)"
                  if [ "$CE_STATUS" = "SUCCESS" ]; then
                    ANALYSIS_ID=$(echo "$CE_RESPONSE" | jq -r '.task.analysisId // empty')
                    if [ -n "$ANALYSIS_ID" ]; then
                      GATE=$(curl -sf -u "$SONAR_TOKEN:" \
                        "$SONAR_URL/api/qualitygates/project_status?analysisId=$ANALYSIS_ID" 2>/dev/null || echo '{}')
                      GATE_STATUS=$(echo "$GATE" | jq -r '.projectStatus.status // "UNKNOWN"')
                    fi
                    break
                  elif [ "$CE_STATUS" = "FAILED" ] || [ "$CE_STATUS" = "CANCELED" ]; then
                    echo "::warning::SonarQube CE task ended with status: $CE_STATUS"
                    GATE_STATUS="ERROR"
                    break
                  fi
                  sleep 5
                done
              fi
            fi
          fi

          if [ "$GATE_STATUS" = "UNKNOWN" ]; then
            echo "Falling back to project-level quality gate query..."
            for i in $(seq 1 30); do
              GATE=$(curl -sf -u "$SONAR_TOKEN:" \
                "$SONAR_URL/api/qualitygates/project_status?projectKey=gestion-inmobiliaria" 2>/dev/null || echo '{}')
              GATE_STATUS=$(echo "$GATE" | jq -r '.projectStatus.status // "UNKNOWN"')
              if [ "$GATE_STATUS" != "UNKNOWN" ] && [ "$GATE_STATUS" != "NONE" ]; then
                break
              fi
              echo "Quality gate status: $GATE_STATUS, waiting 5s (attempt $i/30)..."
              sleep 5
            done
          fi

          if [ "$GATE_STATUS" = "UNKNOWN" ] || [ "$GATE_STATUS" = "NONE" ]; then
            if [ "$SCAN_OUTCOME" = "success" ]; then
              echo "Gate status unresolvable but scan succeeded — treating as OK."
              GATE_STATUS="OK"
            elif [ "$SCAN_OUTCOME" = "skipped" ] || [ "$SCAN_OUTCOME" = "" ]; then
              echo "::warning::SonarQube scan was skipped — treating gate as OK (non-blocking)."
              GATE_STATUS="OK"
            fi
          fi

          echo "Final quality gate status: $GATE_STATUS"

          ISSUES=$(curl -sf -u "$SONAR_TOKEN:" \
            "$SONAR_URL/api/issues/search?projectKeys=gestion-inmobiliaria&resolved=false&ps=50&s=SEVERITY&asc=false" 2>/dev/null || echo '{}')
          TOTAL=$(echo "$ISSUES" | jq -r '.total // 0')

          SUMMARY=$(echo "$ISSUES" | jq -r '
            [.issues // [] | group_by(.severity) | .[] |
              {severity: .[0].severity, count: length}] |
            map("\(.count) \(.severity)") | join(", ")' 2>/dev/null || echo "Could not parse issues")

          TOP_ISSUES=$(echo "$ISSUES" | jq -r '
            [.issues[:20] | .[] |
              "\(.severity) | \(.component | split(":") | last):\(.line // "?") | \(.message)"] |
            join("\n")' 2>/dev/null || echo "")

          ERROR_LOG="Quality Gate: ${GATE_STATUS}\nTotal open issues: ${TOTAL}\nBreakdown: ${SUMMARY}\n\nTop issues:\n${TOP_ISSUES}"

          if [ "$GATE_STATUS" = "ERROR" ]; then
            PAYLOAD=$(jq -n \
              --arg job "sonarqube" \
              --arg step "quality-gate-${GATE_STATUS}" \
              --arg error_log "$ERROR_LOG" \
              --arg run_url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
              '{job: $job, step: $step, error_log: $error_log, run_url: $run_url}')

            curl -s --connect-timeout 5 --max-time 10 -X POST http://${{ secrets.WEBHOOK_HOST }}:9090/ci-failure \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD" || echo "Webhook unreachable — skipping notification"

            echo "::error::SonarQube quality gate failed"
            exit 1
          fi

  # ── Stage 2: Build (runs only after all quality checks pass) ──

  build-frontend:
    name: Frontend WASM Release Build
    runs-on: [self-hosted, linux]
    outputs:
      error_log: ${{ steps.collect-errors.outputs.error_log }}
    needs: [commit-lint, lint, test-backend, test-frontend, quality-gate, sonarqube]
    if: always() && !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled')
    steps:
      - name: Clean workspace of root-owned files from Docker jobs
        run: sudo rm -rf "$GITHUB_WORKSPACE"/* "$GITHUB_WORKSPACE"/.* 2>/dev/null || true

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable with WASM target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install Trunk WASM bundler
        uses: jetli/trunk-action@v0.5.0

      - name: Restore cargo cache (registry, git, build artifacts)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-wasm-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-wasm-

      - name: Build optimized WASM frontend bundle
        run: trunk build --release 2>&1 | tee /tmp/build-frontend-output.txt
        working-directory: frontend

      - name: Upload frontend dist as build artifact (7-day retention)
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

      - name: Collect frontend build errors for notification
        id: collect-errors
        if: failure()
        run: |
          ERROR=""
          [ -f /tmp/build-frontend-output.txt ] && ERROR="$(tail -c 3000 /tmp/build-frontend-output.txt)"
          if [ -z "$ERROR" ]; then
            ERROR="Frontend WASM build failed but no captured output. Run trunk build --release in frontend/ to reproduce."
          fi
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "error_log<<$EOF" >> $GITHUB_OUTPUT
          echo "$ERROR" >> $GITHUB_OUTPUT
          echo "$EOF" >> $GITHUB_OUTPUT

  build-backend:
    name: Backend Release Build
    runs-on: [self-hosted, linux]
    outputs:
      error_log: ${{ steps.collect-errors.outputs.error_log }}
    needs: [commit-lint, lint, test-backend, test-frontend, quality-gate, sonarqube]
    if: always() && !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled')
    steps:
      - name: Clean workspace of root-owned files from Docker jobs
        run: sudo rm -rf "$GITHUB_WORKSPACE"/* "$GITHUB_WORKSPACE"/.* 2>/dev/null || true

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Restore cargo cache (registry, git, build artifacts)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-backend-build-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-backend-build-

      - name: Build optimized backend binary
        run: cargo build -p realestate-backend --release 2>&1 | tee /tmp/build-backend-output.txt

      - name: Upload backend binary as build artifact (7-day retention)
        uses: actions/upload-artifact@v4
        with:
          name: backend-binary
          path: target/release/realestate-backend
          retention-days: 7

      - name: Collect backend build errors for notification
        id: collect-errors
        if: failure()
        run: |
          ERROR=""
          [ -f /tmp/build-backend-output.txt ] && ERROR="$(tail -c 3000 /tmp/build-backend-output.txt)"
          if [ -z "$ERROR" ]; then
            ERROR="Backend release build failed but no captured output. Run cargo build -p realestate-backend --release to reproduce."
          fi
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "error_log<<$EOF" >> $GITHUB_OUTPUT
          echo "$ERROR" >> $GITHUB_OUTPUT
          echo "$EOF" >> $GITHUB_OUTPUT

  notify-failure:
    name: Failure Notification Webhook
    runs-on: [self-hosted, linux]
    needs: [commit-lint, lint, test-backend, test-frontend, quality-gate, sonarqube, build-frontend, build-backend]
    if: always() && (contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled'))
    steps:
      - name: Notify — conventional commit validation failed
        if: always() && needs.commit-lint.result == 'failure'
        run: |
          curl -s --connect-timeout 5 --max-time 10 -X POST http://${{ secrets.WEBHOOK_HOST }}:9090/ci-failure \
            -H "Content-Type: application/json" \
            -d '{
              "job": "commit-lint",
              "step": "commitlint",
              "error_log": "Commit message lint failed. Commit messages must follow conventional commits format (feat:, fix:, chore:, etc.).",
              "run_url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }' || echo "Webhook unreachable — skipping notification"

      - name: Notify — code formatting or clippy lint failed
        if: always() && needs.lint.result == 'failure'
        env:
          ERROR_LOG: ${{ needs.lint.outputs.error_log }}
          FAILED_STEPS: ${{ needs.lint.outputs.failed_steps }}
        run: |
          if [ -z "$ERROR_LOG" ]; then
            ERROR_LOG="Lint job failed but no captured output. Run cargo fmt --all -- --check and cargo clippy --workspace -- -D warnings to reproduce."
          fi
          STEP="${FAILED_STEPS:-clippy-or-fmt}"
          PAYLOAD=$(jq -n --arg job "lint" --arg step "$STEP" --arg error_log "$ERROR_LOG" --arg run_url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            '{job: $job, step: $step, error_log: $error_log, run_url: $run_url}')
          curl -s --connect-timeout 5 --max-time 10 -X POST http://${{ secrets.WEBHOOK_HOST }}:9090/ci-failure \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" || echo "Webhook unreachable — skipping notification"

      - name: Notify — backend tests failed
        if: always() && needs.test-backend.result == 'failure'
        env:
          ERROR_LOG: ${{ needs.test-backend.outputs.error_log }}
        run: |
          if [ -z "$ERROR_LOG" ]; then
            ERROR_LOG="Backend tests failed but no captured output. Run cargo test -p realestate-backend --all-targets to reproduce."
          fi
          PAYLOAD=$(jq -n --arg job "test-backend" --arg step "cargo-test" --arg error_log "$ERROR_LOG" --arg run_url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            '{job: $job, step: $step, error_log: $error_log, run_url: $run_url}')
          curl -s --connect-timeout 5 --max-time 10 -X POST http://${{ secrets.WEBHOOK_HOST }}:9090/ci-failure \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" || echo "Webhook unreachable — skipping notification"

      - name: Notify — frontend tests failed
        if: always() && needs.test-frontend.result == 'failure'
        env:
          ERROR_LOG: ${{ needs.test-frontend.outputs.error_log }}
        run: |
          if [ -z "$ERROR_LOG" ]; then
            ERROR_LOG="Frontend tests failed but no captured output. Run cargo test -p realestate-frontend --all-targets to reproduce."
          fi
          PAYLOAD=$(jq -n --arg job "test-frontend" --arg step "cargo-test" --arg error_log "$ERROR_LOG" --arg run_url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            '{job: $job, step: $step, error_log: $error_log, run_url: $run_url}')
          curl -s --connect-timeout 5 --max-time 10 -X POST http://${{ secrets.WEBHOOK_HOST }}:9090/ci-failure \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" || echo "Webhook unreachable — skipping notification"

      - name: Notify — dependency security gate failed
        if: always() && needs.quality-gate.result == 'failure'
        env:
          ERROR_LOG: ${{ needs.quality-gate.outputs.error_log }}
          FAILED_STEPS: ${{ needs.quality-gate.outputs.failed_steps }}
        run: |
          if [ -z "$ERROR_LOG" ]; then
            ERROR_LOG="Quality gate failed but no captured output. Run cargo audit and check OWASP scan to reproduce."
          fi
          STEP="${FAILED_STEPS:-audit-or-owasp}"
          PAYLOAD=$(jq -n --arg job "quality-gate" --arg step "$STEP" --arg error_log "$ERROR_LOG" --arg run_url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            '{job: $job, step: $step, error_log: $error_log, run_url: $run_url}')
          curl -s --connect-timeout 5 --max-time 10 -X POST http://${{ secrets.WEBHOOK_HOST }}:9090/ci-failure \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" || echo "Webhook unreachable — skipping notification"

      - name: Notify — frontend WASM build failed
        if: always() && needs.build-frontend.result == 'failure'
        env:
          ERROR_LOG: ${{ needs.build-frontend.outputs.error_log }}
        run: |
          if [ -z "$ERROR_LOG" ]; then
            ERROR_LOG="Frontend WASM build failed but no captured output. Run trunk build --release in frontend/ to reproduce."
          fi
          PAYLOAD=$(jq -n --arg job "build-frontend" --arg step "trunk-build" --arg error_log "$ERROR_LOG" --arg run_url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            '{job: $job, step: $step, error_log: $error_log, run_url: $run_url}')
          curl -s --connect-timeout 5 --max-time 10 -X POST http://${{ secrets.WEBHOOK_HOST }}:9090/ci-failure \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" || echo "Webhook unreachable — skipping notification"

      - name: Notify — backend release build failed
        if: always() && needs.build-backend.result == 'failure'
        env:
          ERROR_LOG: ${{ needs.build-backend.outputs.error_log }}
        run: |
          if [ -z "$ERROR_LOG" ]; then
            ERROR_LOG="Backend release build failed but no captured output. Run cargo build -p realestate-backend --release to reproduce."
          fi
          PAYLOAD=$(jq -n --arg job "build-backend" --arg step "cargo-build" --arg error_log "$ERROR_LOG" --arg run_url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            '{job: $job, step: $step, error_log: $error_log, run_url: $run_url}')
          curl -s --connect-timeout 5 --max-time 10 -X POST http://${{ secrets.WEBHOOK_HOST }}:9090/ci-failure \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" || echo "Webhook unreachable — skipping notification"

      - name: Notify — SonarQube analysis failed
        if: always() && needs.sonarqube.result == 'failure'
        run: |
          curl -s --connect-timeout 5 --max-time 10 -X POST http://${{ secrets.WEBHOOK_HOST }}:9090/ci-failure \
            -H "Content-Type: application/json" \
            -d '{
              "job": "sonarqube",
              "step": "sonar-scan",
              "error_log": "SonarQube analysis failed. Check SonarQube server status and scan configuration.",
              "run_url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }' || echo "Webhook unreachable — skipping notification"

  # ── Stage 3: Pipeline Self-Improvement (runs after everything else) ──

  pipeline-improve:
    name: CI/CD Pipeline Self-Improvement
    runs-on: [self-hosted, linux]
    needs: [commit-lint, lint, test-backend, test-frontend, quality-gate, sonarqube, build-frontend, build-backend, notify-failure]
    if: always() && github.ref == 'refs/heads/main'
    steps:
      - name: Clean workspace
        run: sudo rm -rf "$GITHUB_WORKSPACE"/* "$GITHUB_WORKSPACE"/.* 2>/dev/null || true

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Collect SonarQube open issues
        id: sonar-issues
        run: |
          SONAR_URL="http://192.168.88.25:9000"
          TOKEN="${{ secrets.SONAR_TOKEN }}"
          PROJECT_KEY="gestion-inmobiliaria"

          if [ -z "$TOKEN" ]; then
            ADMIN_PASS="${{ secrets.SONAR_ADMIN_PASSWORD || 'SonarAdmin2025!' }}"
            TOKEN=$(curl -sf -u "admin:${ADMIN_PASS}" -X POST \
              "$SONAR_URL/api/user_tokens/generate?name=ci-improve-token" 2>/dev/null \
              | jq -r '.token // empty' || true)
            if [ -z "$TOKEN" ]; then
              echo "sonar_report=SonarQube token unavailable — skipping issue collection." >> $GITHUB_OUTPUT
              exit 0
            fi
          fi

          # Fetch open issues sorted by severity (worst first), up to 100
          ISSUES_JSON=$(curl -sf -u "$TOKEN:" \
            "$SONAR_URL/api/issues/search?projectKeys=${PROJECT_KEY}&resolved=false&ps=100&s=SEVERITY&asc=false&statuses=OPEN,CONFIRMED,REOPENED" \
            2>/dev/null || echo '{}')

          TOTAL=$(echo "$ISSUES_JSON" | jq -r '.total // 0')

          BREAKDOWN=$(echo "$ISSUES_JSON" | jq -r '
            [.issues // [] | group_by(.severity) | .[] |
              {severity: .[0].severity, count: length}] |
            map("\(.count) \(.severity)") | join(", ")' 2>/dev/null || echo "unknown")

          # Build detailed issue list: severity | file:line | rule | message
          ISSUE_LIST=$(echo "$ISSUES_JSON" | jq -r '
            [.issues[:80] | .[] |
              "\(.severity) | \(.component | split(":") | last):\(.line // "?") | \(.rule) | \(.message)"] |
            join("\n")' 2>/dev/null || echo "")

          # Fetch security hotspots
          HOTSPOTS_JSON=$(curl -sf -u "$TOKEN:" \
            "$SONAR_URL/api/hotspots/search?projectKey=${PROJECT_KEY}&status=TO_REVIEW&ps=50" \
            2>/dev/null || echo '{}')

          HOTSPOT_TOTAL=$(echo "$HOTSPOTS_JSON" | jq -r '.paging.total // 0')

          HOTSPOT_LIST=$(echo "$HOTSPOTS_JSON" | jq -r '
            [.hotspots[:30] | .[] |
              "\(.vulnerabilityProbability) | \(.component | split(":") | last):\(.line // "?") | \(.securityCategory) | \(.message)"] |
            join("\n")' 2>/dev/null || echo "")

          SONAR_REPORT="SonarQube Open Issues Report (project: ${PROJECT_KEY}):\n"
          SONAR_REPORT="${SONAR_REPORT}Total open issues: ${TOTAL}\n"
          SONAR_REPORT="${SONAR_REPORT}Breakdown: ${BREAKDOWN}\n\n"
          SONAR_REPORT="${SONAR_REPORT}Issues (severity | file:line | rule | message):\n${ISSUE_LIST}\n\n"
          SONAR_REPORT="${SONAR_REPORT}Security Hotspots to review: ${HOTSPOT_TOTAL}\n"
          SONAR_REPORT="${SONAR_REPORT}Hotspots (risk | file:line | category | message):\n${HOTSPOT_LIST}"

          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "sonar_report<<$EOF" >> $GITHUB_OUTPUT
          echo -e "$SONAR_REPORT" >> $GITHUB_OUTPUT
          echo "$EOF" >> $GITHUB_OUTPUT

      - name: Determine improvement focus from pipeline results
        id: analyze
        run: |
          FOCUS="general"
          REPORT=""

          # Collect job outcomes
          REPORT="${REPORT}Pipeline Run Summary:\n"
          REPORT="${REPORT}  commit-lint:    ${{ needs.commit-lint.result }}\n"
          REPORT="${REPORT}  lint:           ${{ needs.lint.result }}\n"
          REPORT="${REPORT}  test-backend:   ${{ needs.test-backend.result }}\n"
          REPORT="${REPORT}  test-frontend:  ${{ needs.test-frontend.result }}\n"
          REPORT="${REPORT}  quality-gate:   ${{ needs.quality-gate.result }}\n"
          REPORT="${REPORT}  sonarqube:      ${{ needs.sonarqube.result }}\n"
          REPORT="${REPORT}  build-frontend: ${{ needs.build-frontend.result }}\n"
          REPORT="${REPORT}  build-backend:  ${{ needs.build-backend.result }}\n"

          # Determine focus based on what failed
          if [ "${{ needs.quality-gate.result }}" = "failure" ]; then
            FOCUS="security"
            REPORT="${REPORT}\nSecurity-related job failed. Focus on dependency vulnerabilities, audit findings, and OWASP results.\n"
            if [ -n "${{ needs.quality-gate.outputs.error_log }}" ]; then
              REPORT="${REPORT}Quality gate errors: ${{ needs.quality-gate.outputs.error_log }}\n"
            fi
          elif [ "${{ needs.lint.result }}" = "failure" ] || [ "${{ needs.test-backend.result }}" = "failure" ] || [ "${{ needs.test-frontend.result }}" = "failure" ]; then
            FOCUS="bugs"
            REPORT="${REPORT}\nCode quality jobs failed. Focus on improving error detection, test reliability, and lint coverage.\n"
          elif [ "${{ needs.build-frontend.result }}" = "failure" ] || [ "${{ needs.build-backend.result }}" = "failure" ]; then
            FOCUS="pipeline"
            REPORT="${REPORT}\nBuild jobs failed. Focus on build reliability, caching, and error reporting.\n"
          else
            FOCUS="security,pipeline,reporting"
            REPORT="${REPORT}\nAll jobs passed. Focus on proactive security hardening, pipeline optimization, and reporting improvements.\n"
          fi

          # Add workflow file metadata
          REPORT="${REPORT}\nWorkflow file: .github/workflows/ci.yml\n"
          REPORT="${REPORT}Webhook listener: scripts/quality-webhook-listener.py\n"
          REPORT="${REPORT}Trigger: ${{ github.event_name }} on ${{ github.ref }}\n"
          REPORT="${REPORT}Commit: ${{ github.sha }}\n"

          echo "focus=$FOCUS" >> $GITHUB_OUTPUT
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "report<<$EOF" >> $GITHUB_OUTPUT
          echo -e "$REPORT" >> $GITHUB_OUTPUT
          echo "$EOF" >> $GITHUB_OUTPUT

      - name: Send pipeline improvement request to webhook
        env:
          FOCUS: ${{ steps.analyze.outputs.focus }}
          REPORT: ${{ steps.analyze.outputs.report }}
        run: |
          PAYLOAD=$(jq -n \
            --arg focus "$FOCUS" \
            --arg pipeline_report "$REPORT" \
            --arg run_url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            '{focus: $focus, pipeline_report: $pipeline_report, run_url: $run_url}')

          curl -s --connect-timeout 5 --max-time 10 -X POST http://${{ secrets.WEBHOOK_HOST }}:9090/ci-improve \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" || echo "Webhook unreachable — skipping pipeline improvement"

      - name: Send SonarQube issues to dedicated fix webhook
        env:
          SONAR_REPORT: ${{ steps.sonar-issues.outputs.sonar_report }}
        run: |
          if [ -z "$SONAR_REPORT" ] || echo "$SONAR_REPORT" | grep -q "token unavailable"; then
            echo "No SonarQube data available — skipping sonar-fix webhook"
            exit 0
          fi

          # Only send if there are actual open issues
          if echo "$SONAR_REPORT" | grep -q "Total open issues: 0"; then
            echo "No open SonarQube issues — skipping sonar-fix webhook"
            exit 0
          fi

          PAYLOAD=$(jq -n \
            --arg sonar_report "$SONAR_REPORT" \
            --arg run_url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            '{sonar_report: $sonar_report, run_url: $run_url}')

          curl -s --connect-timeout 5 --max-time 10 -X POST http://${{ secrets.WEBHOOK_HOST }}:9090/sonar-fix \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" || echo "Webhook unreachable — skipping SonarQube fix"
