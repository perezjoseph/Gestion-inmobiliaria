name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  DATABASE_URL: postgresql://realestate:realestate_dev_password@localhost:5432/realestate
  JWT_SECRET: ci_test_secret_not_for_production
  SERVER_PORT: 8080
  CORS_ORIGIN: http://localhost:8080

jobs:
  commit-lint:
    name: Commit Message Lint
    runs-on: [self-hosted, linux]
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install commitlint
        run: |
          npm install --save-dev @commitlint/{cli,config-conventional}
          echo "module.exports = { extends: ['@commitlint/config-conventional'] };" > commitlint.config.js

      - name: Lint commit messages
        run: npx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose

  lint:
    name: Lint & Format
    runs-on: [self-hosted, linux]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-lint-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-lint-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy (backend)
        run: cargo clippy -p realestate-backend -- -D warnings

      - name: Clippy (frontend)
        run: cargo clippy -p realestate-frontend --target wasm32-unknown-unknown -- -D warnings

  test-backend:
    name: Backend Tests
    runs-on: [self-hosted, linux]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: realestate
          POSTGRES_USER: realestate
          POSTGRES_PASSWORD: realestate_dev_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U realestate"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-test-

      - name: Run backend unit & integration tests
        run: cargo test -p realestate-backend --all-targets

  test-frontend:
    name: Frontend Property Tests
    runs-on: [self-hosted, linux]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-frontend-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-frontend-test-

      - name: Run frontend tests
        run: cargo test -p realestate-frontend --all-targets

  quality-gate:
    name: Quality Gate
    runs-on: [self-hosted, linux]
    needs: [lint, test-backend, test-frontend]
    steps:
      - name: Verify all checks passed
        run: echo "All lint and test jobs passed"

      - name: Check dependency advisories
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked || true

      - name: Audit dependencies
        run: cargo audit

      - name: Check for unused dependencies
        run: |
          cargo install cargo-udeps --locked || true
          cargo +nightly udeps --all-targets 2>&1 || echo "cargo-udeps requires nightly, skipping if unavailable"

      - name: OWASP dependency check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: realestate
          path: .
          format: HTML
          args: >-
            --enableExperimental
            --failOnCVSS 7

      - name: Upload OWASP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owasp-dependency-check-report
          path: reports/
          retention-days: 7

  sonarqube:
    name: SonarQube Analysis
    runs-on: [self-hosted, linux, sonarqube]
    needs: [lint, test-backend, test-frontend]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: http://localhost:9000

  build-frontend:
    name: Build Frontend (WASM)
    runs-on: [self-hosted, linux]
    needs: [quality-gate]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install Trunk
        uses: jetli/trunk-action@v0.5.0

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-wasm-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-wasm-

      - name: Build frontend
        run: trunk build --release
        working-directory: frontend

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  notify-failure:
    name: Notify Kiro on Failure
    runs-on: [self-hosted, linux]
    needs: [commit-lint, lint, test-backend, test-frontend, quality-gate, sonarqube, build-frontend]
    if: always() && contains(needs.*.result, 'failure')
    steps:
      - name: Notify commit lint failure
        if: always() && needs.commit-lint.result == 'failure'
        run: |
          curl -s --connect-timeout 5 --max-time 10 -X POST http://${{ secrets.WEBHOOK_HOST }}:9090/ci-failure \
            -H "Content-Type: application/json" \
            -d '{
              "job": "commit-lint",
              "step": "commitlint",
              "error_log": "Commit message lint failed. Commit messages must follow conventional commits format (feat:, fix:, chore:, etc.).",
              "run_url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }' || echo "Webhook unreachable — skipping notification"

      - name: Notify lint failure
        if: always() && needs.lint.result == 'failure'
        run: |
          curl -s --connect-timeout 5 --max-time 10 -X POST http://${{ secrets.WEBHOOK_HOST }}:9090/ci-failure \
            -H "Content-Type: application/json" \
            -d '{
              "job": "lint",
              "step": "clippy-or-fmt",
              "error_log": "Lint job failed. Check cargo fmt --all -- --check and cargo clippy --workspace -- -D warnings",
              "run_url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }' || echo "Webhook unreachable — skipping notification"

      - name: Notify backend test failure
        if: always() && needs.test-backend.result == 'failure'
        run: |
          curl -s --connect-timeout 5 --max-time 10 -X POST http://${{ secrets.WEBHOOK_HOST }}:9090/ci-failure \
            -H "Content-Type: application/json" \
            -d '{
              "job": "test-backend",
              "step": "cargo-test",
              "error_log": "Backend tests failed. Run cargo test -p realestate-backend --all-targets to reproduce.",
              "run_url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }' || echo "Webhook unreachable — skipping notification"

      - name: Notify frontend test failure
        if: always() && needs.test-frontend.result == 'failure'
        run: |
          curl -s --connect-timeout 5 --max-time 10 -X POST http://${{ secrets.WEBHOOK_HOST }}:9090/ci-failure \
            -H "Content-Type: application/json" \
            -d '{
              "job": "test-frontend",
              "step": "cargo-test",
              "error_log": "Frontend property tests failed. Run cargo test -p realestate-frontend --all-targets to reproduce.",
              "run_url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }' || echo "Webhook unreachable — skipping notification"

      - name: Notify quality gate failure
        if: always() && needs.quality-gate.result == 'failure'
        run: |
          curl -s --connect-timeout 5 --max-time 10 -X POST http://${{ secrets.WEBHOOK_HOST }}:9090/ci-failure \
            -H "Content-Type: application/json" \
            -d '{
              "job": "quality-gate",
              "step": "audit-or-owasp",
              "error_log": "Quality gate failed. Check cargo audit, cargo-udeps, or OWASP dependency check.",
              "run_url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }' || echo "Webhook unreachable — skipping notification"

      - name: Notify build failure
        if: always() && needs.build-frontend.result == 'failure'
        run: |
          curl -s --connect-timeout 5 --max-time 10 -X POST http://${{ secrets.WEBHOOK_HOST }}:9090/ci-failure \
            -H "Content-Type: application/json" \
            -d '{
              "job": "build-frontend",
              "step": "trunk-build",
              "error_log": "Frontend WASM build failed. Run trunk build --release in frontend/ to reproduce.",
              "run_url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }' || echo "Webhook unreachable — skipping notification"

      - name: Notify sonarqube failure
        if: always() && needs.sonarqube.result == 'failure'
        run: |
          curl -s --connect-timeout 5 --max-time 10 -X POST http://${{ secrets.WEBHOOK_HOST }}:9090/ci-failure \
            -H "Content-Type: application/json" \
            -d '{
              "job": "sonarqube",
              "step": "sonar-scan",
              "error_log": "SonarQube analysis failed. Check SonarQube server status and scan configuration.",
              "run_url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }' || echo "Webhook unreachable — skipping notification"
