name: CI
run-name: "CI [${{ github.event_name }}] ${{ github.ref_name }} @ ${{ github.sha }}"

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "LICENSE"
      - ".gitignore"
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "LICENSE"
      - ".gitignore"
  workflow_dispatch:
    inputs:
      skip_sonarqube:
        description: "Skip SonarQube analysis"
        type: boolean
        default: false

permissions: {}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse
  CARGO_NET_GIT_FETCH_WITH_CLI: "true"
  CARGO_HTTP_CHECK_REVOKE: "true"
  CARGO_HTTP_TIMEOUT: "30"
  CARGO_NET_RETRY: "3"
  RUSTFLAGS: "-D warnings"

jobs:
  # ── Stage 0: Runner Disk Cleanup ──

  runner-cleanup:
    name: Runner Disk Cleanup
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 5
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
    steps:
      - name: Check disk space
        run: |
          CHECK_PATH="/tmp"
          AVAIL_KB=$(df -k "$CHECK_PATH" | awk 'NR==2 {print $4}')
          AVAIL_MB=$((AVAIL_KB / 1024))
          echo "Available disk space on $CHECK_PATH: ${AVAIL_MB}MB"
          echo "Disk space OK (${AVAIL_MB}MB) -- self-hosted runner."

  # ── Stage 0.5: Path-Based Change Detection ──

  changes:
    name: Detect Changes
    needs: [runner-cleanup]
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 3
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
      pull-requests: read
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      android: ${{ steps.filter.outputs.android }}
      ci: ${{ steps.filter.outputs.ci }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Detect changed paths
        uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
            frontend:
              - 'frontend/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
            android:
              - 'android/**'
            ci:
              - '.github/**'

  # ── Stage 1: Quality Checks (parallel) ──

  security:
    name: Security
    needs: [runner-cleanup, changes]
    permissions:
      actions: read
      contents: read
      pull-requests: write
      security-events: write
    uses: ./.github/workflows/security.yml
    with:
      is-pr: ${{ github.event_name == 'pull_request' }}
      is-fork-pr: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository }}
    secrets: inherit

  lint:
    name: Lint
    needs: [runner-cleanup, changes]
    if: >-
      github.event_name != 'pull_request' ||
      needs.changes.outputs.backend == 'true' ||
      needs.changes.outputs.frontend == 'true' ||
      needs.changes.outputs.ci == 'true'
    permissions:
      contents: read
    uses: ./.github/workflows/lint.yml
    with:
      is-fork-pr: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository }}
    secrets: inherit

  tests:
    name: Tests
    needs: [runner-cleanup, changes]
    if: >-
      github.event_name != 'pull_request' ||
      needs.changes.outputs.backend == 'true' ||
      needs.changes.outputs.frontend == 'true' ||
      needs.changes.outputs.ci == 'true'
    permissions:
      contents: read
    uses: ./.github/workflows/test.yml
    with:
      is-fork-pr: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository }}
    secrets: inherit

  # ── Stage 1.5: SonarQube (after lint + tests) ──

  sonarqube:
    name: SonarQube
    needs: [lint, tests, changes]
    if: >-
      always() && (
        github.event_name != 'pull_request' ||
        needs.changes.outputs.backend == 'true' ||
        needs.changes.outputs.frontend == 'true' ||
        needs.changes.outputs.android == 'true' ||
        needs.lint.result == 'success' ||
        needs.tests.result == 'success'
      )
    permissions:
      contents: read
    uses: ./.github/workflows/sonarqube.yml
    with:
      skip-sonarqube: ${{ inputs.skip_sonarqube || false }}
      lint-result: ${{ needs.lint.outputs.result || needs.lint.result }}
      test-backend-result: ${{ needs.tests.outputs.test-backend-result || needs.tests.result }}
      test-frontend-result: ${{ needs.tests.outputs.test-frontend-result || needs.tests.result }}
      coverage-backend-result: ${{ needs.tests.outputs.test-backend-result || 'skipped' }}
    secrets: inherit

  # ── Stage 2: Build (after lint passes) ──

  build:
    name: Build
    needs: [lint, changes]
    if: >-
      always() && (
        needs.lint.outputs.result == 'success' || needs.lint.result == 'skipped'
      ) && (
        github.event_name != 'pull_request' ||
        needs.changes.outputs.backend == 'true' ||
        needs.changes.outputs.frontend == 'true' ||
        needs.changes.outputs.ci == 'true'
      )
    permissions:
      contents: read
      id-token: write
      attestations: write
    uses: ./.github/workflows/build.yml
    secrets: inherit

  # ── Stage 3: Container Images (after builds + security + tests pass, main only) ──

  containers:
    name: Containers
    needs: [build, security, tests]
    if: |
      always() &&
      github.ref == 'refs/heads/main' && github.event_name == 'push' &&
      needs.build.result == 'success' &&
      (needs.security.result == 'success' || needs.security.result == 'skipped') &&
      needs.tests.result == 'success'
    permissions:
      contents: read
      packages: write
      security-events: write
      id-token: write
      attestations: write
    uses: ./.github/workflows/containers.yml
    secrets: inherit

  # ── Stage 4: Deploy (after containers are pushed) ──

  deploy:
    name: Deploy
    needs: [containers]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && needs.containers.result == 'success'
    permissions:
      contents: read
      packages: read
    uses: ./.github/workflows/deploy.yml
    with:
      backend-digest: ${{ needs.containers.outputs.backend-digest }}
      frontend-digest: ${{ needs.containers.outputs.frontend-digest }}
    secrets: inherit

  # ── Stage 5: Pipeline Self-Improvement (after everything) ──

  pipeline-improve:
    name: Pipeline Improve
    needs: [security, lint, tests, sonarqube, build, containers, deploy, changes]
    if: always()
    permissions:
      contents: read
    uses: ./.github/workflows/pipeline-improve.yml
    with:
      secret-scan-result: ${{ needs.security.outputs.secret-scan-result || '' }}
      dependency-review-result: ${{ needs.security.outputs.dependency-review-result || '' }}
      lint-result: ${{ needs.lint.outputs.result || needs.lint.result }}
      test-backend-result: ${{ needs.tests.outputs.test-backend-result || '' }}
      test-frontend-result: ${{ needs.tests.outputs.test-frontend-result || '' }}
      quality-gate-result: ${{ needs.security.outputs.quality-gate-result || '' }}
      sonarqube-result: ${{ needs.sonarqube.outputs.result || needs.sonarqube.result }}
      build-frontend-result: ${{ needs.build.outputs.build-frontend-result || '' }}
      build-backend-result: ${{ needs.build.outputs.build-backend-result || '' }}
      container-backend-result: ${{ needs.containers.result || '' }}
      container-frontend-result: ${{ needs.containers.result || '' }}
      deploy-result: ${{ needs.deploy.result || '' }}
      lint-error-log: ${{ needs.lint.outputs.error_log || '' }}
      test-backend-error-log: ${{ needs.tests.outputs.test-backend-error-log || '' }}
      test-frontend-error-log: ${{ needs.tests.outputs.test-frontend-error-log || '' }}
      quality-gate-error-log: ${{ needs.security.outputs.quality-gate-error-log || '' }}
      deprecation-report: ${{ needs.security.outputs.deprecation-report || '' }}
      build-frontend-error-log: ${{ needs.build.outputs.build-frontend-error-log || '' }}
      build-backend-error-log: ${{ needs.build.outputs.build-backend-error-log || '' }}
      lint-duration: ${{ needs.lint.outputs.duration || '' }}
      test-backend-duration: ${{ needs.tests.outputs.test-backend-duration || '' }}
      test-frontend-duration: ${{ needs.tests.outputs.test-frontend-duration || '' }}
      quality-gate-duration: ${{ needs.security.outputs.quality-gate-duration || '' }}
      sonarqube-duration: ${{ needs.sonarqube.outputs.duration || '' }}
      build-frontend-duration: ${{ needs.build.outputs.build-frontend-duration || '' }}
      build-backend-duration: ${{ needs.build.outputs.build-backend-duration || '' }}
    secrets: inherit
