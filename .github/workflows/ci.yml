name: CI
run-name: "CI [${{ github.event_name }}] ${{ github.ref_name }} @ ${{ github.sha }}"

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "LICENSE"
      - ".gitignore"
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "LICENSE"
      - ".gitignore"
  workflow_dispatch:

permissions: {}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ── Stage 0: Path-Based Change Detection ──

  changes:
    name: Detect Changes
    runs-on: arc-runner-dind
    timeout-minutes: 10
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
      pull-requests: read
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      android: ${{ steps.filter.outputs.android }}
      ocr-service: ${{ steps.filter.outputs.ocr-service }}
      baileys-service: ${{ steps.filter.outputs.baileys-service }}
      ci: ${{ steps.filter.outputs.ci }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Detect changed paths
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
            frontend:
              - 'frontend/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
            ocr-service:
              - 'ocr-service/**'
            android:
              - 'android/**'
            baileys-service:
              - 'baileys-service/**'
            ci:
              - '.github/**'

  # ── Stage 1: All quality checks in parallel ──

  security:
    name: Security
    needs: [changes]
    permissions:
      actions: read
      contents: read
      pull-requests: write
      security-events: write
    uses: ./.github/workflows/security.yml
    with:
      is-pr: ${{ github.event_name == 'pull_request' }}
      is-fork-pr: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository }}

  # Build & Test runs backend (clippy, test, build in parallel) + frontend.
  # Coverage only runs on production builds (main push) to keep PR feedback fast.
  build-and-test:
    name: Build & Test
    needs: [changes]
    if: >-
      github.event_name != 'pull_request' ||
      needs.changes.outputs.backend == 'true' ||
      needs.changes.outputs.frontend == 'true' ||
      needs.changes.outputs.ci == 'true'
    permissions:
      actions: read
      contents: read
      id-token: write
      attestations: write
    uses: ./.github/workflows/build-and-test.yml
    with:
      is-fork-pr: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository }}
      is-production: ${{ github.ref == 'refs/heads/main' && github.event_name == 'push' }}
      skip-backend: ${{ github.event_name == 'pull_request' && needs.changes.outputs.backend != 'true' && needs.changes.outputs.ci != 'true' }}
      skip-frontend: ${{ github.event_name == 'pull_request' && needs.changes.outputs.frontend != 'true' && needs.changes.outputs.ci != 'true' }}

  # ── Stage 1.5: Sidecar Containers (no Rust dependency, run parallel with build-and-test) ──

  baileys-container:
    name: Baileys Container
    needs: [changes]
    if: >-
      github.event_name != 'pull_request' ||
      needs.changes.outputs.baileys-service == 'true' ||
      needs.changes.outputs.ci == 'true'
    permissions:
      actions: read
      contents: read
      packages: write
      security-events: write
      id-token: write
      attestations: write
    runs-on: arc-runner-dind
    timeout-minutes: 30
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    env:
      DOCKER_CONTENT_TRUST: "1"
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Build, scan & attest Baileys container
        id: build
        uses: ./.github/actions/container-build-scan
        with:
          image-name: realestate-baileys
          context: ./baileys-service
          dockerfile: ./baileys-service/Dockerfile
          is-production: ${{ github.ref == 'refs/heads/main' && github.event_name == 'push' }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          image-owner: ${{ github.repository_owner }}
          cache-suffix: buildcache-node24
          sarif-category: trivy-baileys-image
          artifact-suffix: container-baileys
          job-name: "baileys-container"

  ocr-container:
    name: OCR Container
    needs: [changes]
    if: >-
      github.event_name != 'pull_request' ||
      needs.changes.outputs.ocr-service == 'true' ||
      needs.changes.outputs.ci == 'true'
    permissions:
      actions: read
      contents: read
      packages: write
      security-events: write
      id-token: write
      attestations: write
    runs-on: arc-runner-dind
    timeout-minutes: 60
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    env:
      DOCKER_CONTENT_TRUST: "1"
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Build, scan & attest OCR container
        id: build
        uses: ./.github/actions/container-build-scan
        with:
          image-name: realestate-ocr-service
          context: ./ocr-service
          dockerfile: ./ocr-service/Dockerfile
          is-production: ${{ github.ref == 'refs/heads/main' && github.event_name == 'push' }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          image-owner: ${{ github.repository_owner }}
          cache-suffix: buildcache
          sarif-category: trivy-ocr-service-image
          artifact-suffix: container-ocr
          job-name: "ocr-container"

  # ── Stage 2: Container Images (after build-and-test + security pass) ──
  # On PRs, only run when both backend and frontend artifacts are available (neither skipped).
  # On main pushes, always run (skip inputs are always false).

  containers:
    name: Containers
    needs: [build-and-test, security, changes]
    if: |
      !cancelled() &&
      needs.build-and-test.result == 'success' &&
      (needs.security.result == 'success' || needs.security.result == 'skipped') &&
      (github.event_name != 'pull_request' || (needs.changes.outputs.backend == 'true' || needs.changes.outputs.ci == 'true'))
    permissions:
      actions: read
      contents: read
      packages: write
      security-events: write
      id-token: write
      attestations: write
    uses: ./.github/workflows/containers.yml
    with:
      is-production: ${{ github.ref == 'refs/heads/main' && github.event_name == 'push' }}

  # ── Stage 3: Deploy (after all containers are pushed) ──

  deploy:
    name: Deploy
    needs: [containers, ocr-container, baileys-container]
    if: >-
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop') &&
      github.event_name == 'push' &&
      needs.containers.result == 'success' &&
      (needs.ocr-container.result == 'success' || needs.ocr-container.result == 'skipped') &&
      (needs.baileys-container.result == 'success' || needs.baileys-container.result == 'skipped')
    permissions:
      contents: read
      packages: read
    uses: ./.github/workflows/deploy.yml
    with:
      backend-digest: ${{ needs.containers.outputs.backend-digest }}
      frontend-digest: ${{ needs.containers.outputs.frontend-digest }}
      ocr-service-digest: ${{ needs.ocr-container.outputs.digest || '' }}
      baileys-digest: ${{ needs.baileys-container.outputs.digest }}
    secrets:
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      KUBECONFIG_DATA: ${{ secrets.KUBECONFIG_DATA }}
      DEV_POSTGRES_PASSWORD: ${{ secrets.DEV_POSTGRES_PASSWORD }}
      DEV_JWT_SECRET: ${{ secrets.DEV_JWT_SECRET }}

  # ── Stage 4: Kiro Autofix ──
  # Autofix is handled by a separate workflow_run-triggered workflow
  # (kiro-autofix-trigger.yml) that fires AFTER this CI workflow completes.
  # This avoids the concurrency group cancel-in-progress race condition
  # where a new push from autofix would cancel the still-running CI run
  # before the autofix jobs could start.
