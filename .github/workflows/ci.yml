name: CI
run-name: "CI [${{ github.event_name }}] ${{ github.ref_name }} @ ${{ github.sha }}"

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "LICENSE"
      - ".gitignore"
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "LICENSE"
      - ".gitignore"
  workflow_dispatch:
    inputs:
      skip_sonarqube:
        description: "Skip SonarQube analysis"
        type: boolean
        default: false

permissions: {}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse
  CARGO_NET_GIT_FETCH_WITH_CLI: "true"
  CARGO_HTTP_CHECK_REVOKE: "true"
  CARGO_HTTP_TIMEOUT: "30"
  CARGO_NET_RETRY: "3"
  RUSTFLAGS: "-D warnings"
  SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

jobs:
  # ── Stage 1: Quality Checks (all run in parallel) ──

  secret-scan:
    name: Secret Scanning (Gitleaks)
    runs-on: ${{ github.actor == 'dependabot[bot]' && 'ubuntu-latest' || fromJSON('["self-hosted","linux"]') }}
    timeout-minutes: 10
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
    steps:
      - name: Clean workspace
        run: |
          if [ -z "$GITHUB_WORKSPACE" ] || [ "$GITHUB_WORKSPACE" = "/" ]; then
            echo "::error::GITHUB_WORKSPACE is empty or root -- aborting cleanup"
            exit 1
          fi
          rm -rf "${GITHUB_WORKSPACE:?}"/* "${GITHUB_WORKSPACE:?}"/.* 2>/dev/null || true

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Install Gitleaks (with checksum verification)
        timeout-minutes: 3
        run: |
          GITLEAKS_VERSION="8.24.3"
          GITLEAKS_SHA256="9991e0b2903da4c8f6122b5c3186448b927a5da4deef1fe45271c3793f4ee29c"
          ARCHIVE="${RUNNER_TEMP}/gitleaks.tar.gz"
          curl -sSfL --proto =https --connect-timeout 15 --max-time 120 -o "$ARCHIVE" \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          echo "${GITLEAKS_SHA256}  ${ARCHIVE}" | sha256sum -c -
          mkdir -p "${HOME}/.local/bin"
          tar xzf "$ARCHIVE" --no-same-owner --no-same-permissions -C "${HOME}/.local/bin" gitleaks
          rm -f "$ARCHIVE"
          export PATH="${HOME}/.local/bin:$PATH"
          echo "${HOME}/.local/bin" >> "$GITHUB_PATH"
          gitleaks version

      - name: Run Gitleaks secret detection
        run: gitleaks detect --source . --verbose --redact --exit-code 1

  dependency-review:
    name: Dependency Review (PR)
    runs-on: ${{ github.actor == 'dependabot[bot]' && 'ubuntu-latest' || fromJSON('["self-hosted","linux"]') }}
    timeout-minutes: 10
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Review dependency changes for vulnerabilities and license issues
        uses: actions/dependency-review-action@da24556b548a50705dd671f47852072ea4c105d9 # v4.7.1
        with:
          fail-on-severity: high
          deny-licenses: AGPL-3.0, GPL-3.0, GPL-2.0
          comment-summary-in-pr: on-failure

  lint:
    name: Code Formatting & Static Analysis
    runs-on: ${{ github.actor == 'dependabot[bot]' && 'ubuntu-latest' || fromJSON('["self-hosted","linux"]') }}
    timeout-minutes: 20
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
    outputs:
      error_log: ${{ steps.collect-errors.outputs.error_log }}
      failed_steps: ${{ steps.collect-errors.outputs.failed_steps }}
      duration: ${{ steps.timing.outputs.duration }}
      cache_hit: ${{ steps.cache.outputs.cache-hit }}
    steps:
      - name: Record start time
        id: start
        run: echo "time=$(date +%s)" >> $GITHUB_OUTPUT

      - name: Clean workspace
        run: |
          if [ -z "$GITHUB_WORKSPACE" ] || [ "$GITHUB_WORKSPACE" = "/" ]; then
            echo "::error::GITHUB_WORKSPACE is empty or root -- aborting cleanup"
            exit 1
          fi
          rm -rf "${GITHUB_WORKSPACE:?}"/* "${GITHUB_WORKSPACE:?}"/.* 2>/dev/null || true

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Rust stable with rustfmt, clippy, and WASM target
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown

      - name: Restore cargo cache
        id: cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: v2-${{ runner.os }}-cargo-lint-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            v2-${{ runner.os }}-cargo-lint-
            v2-${{ runner.os }}-cargo-

      - name: Verify rustfmt formatting across all crates
        id: fmt
        if: always()
        timeout-minutes: 5
        run: |
          umask 077
          if ! cargo fmt --all -- --check 2>&1 | tee "${RUNNER_TEMP}/fmt-output.txt"; then
            echo "::error::Code formatting check failed. Run 'cargo fmt --all' to fix."
            exit 1
          fi

      - name: Run clippy lints on backend
        id: clippy_backend
        if: always()
        timeout-minutes: 15
        run: |
          umask 077
          set +e
          cargo clippy --locked -p realestate-backend --message-format=json -- -D warnings \
            > "${RUNNER_TEMP}/clippy-backend.json" 2>"${RUNNER_TEMP}/clippy-backend-stderr.txt"
          RESULT=$?
          set -e
          jq -r 'select(.reason == "compiler-message") | .message.rendered // empty' \
            "${RUNNER_TEMP}/clippy-backend.json" > "${RUNNER_TEMP}/clippy-backend-output.txt" 2>/dev/null || true
          if [ $RESULT -ne 0 ]; then
            cat "${RUNNER_TEMP}/clippy-backend-output.txt"
            echo "::error::Backend clippy found warnings/errors."
            exit 1
          fi

      - name: Run clippy lints on frontend WASM target
        id: clippy_frontend
        if: always()
        timeout-minutes: 15
        run: |
          umask 077
          set +e
          cargo clippy --locked -p realestate-frontend --target wasm32-unknown-unknown --message-format=json -- -D warnings \
            > "${RUNNER_TEMP}/clippy-frontend.json" 2>"${RUNNER_TEMP}/clippy-frontend-stderr.txt"
          RESULT=$?
          set -e
          jq -r 'select(.reason == "compiler-message") | .message.rendered // empty' \
            "${RUNNER_TEMP}/clippy-frontend.json" > "${RUNNER_TEMP}/clippy-frontend-output.txt" 2>/dev/null || true
          if [ $RESULT -ne 0 ]; then
            cat "${RUNNER_TEMP}/clippy-frontend-output.txt"
            echo "::error::Frontend clippy found warnings/errors."
            exit 1
          fi

      - name: Assemble clippy JSON report for SonarQube
        if: always()
        run: |
          cat "${RUNNER_TEMP}/clippy-backend.json" "${RUNNER_TEMP}/clippy-frontend.json" > clippy-report.json 2>/dev/null || true

      - name: Write lint summary
        if: always()
        run: |
          {
            echo "## Lint Results"
            echo "| Check | Status |"
            echo "|-------|--------|"
            echo "| rustfmt | ${{ steps.fmt.outcome == 'success' && '✅ Pass' || '❌ Fail' }} |"
            echo "| clippy (backend) | ${{ steps.clippy_backend.outcome == 'success' && '✅ Pass' || '❌ Fail' }} |"
            echo "| clippy (frontend) | ${{ steps.clippy_frontend.outcome == 'success' && '✅ Pass' || '❌ Fail' }} |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Collect lint errors for notification
        id: collect-errors
        if: always() && (steps.fmt.outcome == 'failure' || steps.clippy_backend.outcome == 'failure' || steps.clippy_frontend.outcome == 'failure')
        run: |
          ERROR=""
          FAILED=""
          if [ "${{ steps.fmt.outcome }}" = "failure" ]; then
            FAILED="${FAILED}fmt-check,"
            ERROR="${ERROR}[fmt-check] $(head -c 1500 "${RUNNER_TEMP}/fmt-output.txt" 2>/dev/null || echo 'cargo fmt found formatting issues.')"$'\n\n'
          fi
          if [ "${{ steps.clippy_backend.outcome }}" = "failure" ]; then
            FAILED="${FAILED}clippy-backend,"
            ERROR="${ERROR}[clippy-backend] $(head -c 1500 "${RUNNER_TEMP}/clippy-backend-output.txt" 2>/dev/null || echo 'Backend clippy failed.')"$'\n\n'
          fi
          if [ "${{ steps.clippy_frontend.outcome }}" = "failure" ]; then
            FAILED="${FAILED}clippy-frontend,"
            ERROR="${ERROR}[clippy-frontend] $(head -c 1500 "${RUNNER_TEMP}/clippy-frontend-output.txt" 2>/dev/null || echo 'Frontend clippy failed.')"$'\n\n'
          fi
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "failed_steps=${FAILED%,}" >> $GITHUB_OUTPUT
          echo "error_log<<$EOF" >> $GITHUB_OUTPUT
          echo "$ERROR" >> $GITHUB_OUTPUT
          echo "$EOF" >> $GITHUB_OUTPUT

      - name: Record duration
        id: timing
        if: always()
        run: echo "duration=$(( $(date +%s) - ${{ steps.start.outputs.time }} ))s" >> $GITHUB_OUTPUT

      - name: Fail job if any lint step failed
        if: always() && (steps.fmt.outcome == 'failure' || steps.clippy_backend.outcome == 'failure' || steps.clippy_frontend.outcome == 'failure')
        run: exit 1

      - name: Upload clippy report for SonarQube
        if: always() && hashFiles('clippy-report.json') != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: clippy-report
          path: clippy-report.json
          retention-days: 1
          overwrite: false
          if-no-files-found: warn

      - name: Clean up sensitive temp files
        if: always()
        run: rm -f "${RUNNER_TEMP}/fmt-output.txt" "${RUNNER_TEMP}/clippy-backend-output.txt" "${RUNNER_TEMP}/clippy-frontend-output.txt" "${RUNNER_TEMP}/clippy-backend.json" "${RUNNER_TEMP}/clippy-frontend.json" "${RUNNER_TEMP}/clippy-backend-stderr.txt" "${RUNNER_TEMP}/clippy-frontend-stderr.txt"

  test-backend:
    name: Backend Unit & Integration Tests
    runs-on: ${{ github.actor == 'dependabot[bot]' && 'ubuntu-latest' || fromJSON('["self-hosted","linux","docker"]') }}
    timeout-minutes: 30
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
    env:
      DATABASE_URL: postgresql://realestate:realestate_dev_password@localhost:5432/realestate
      SERVER_PORT: 8080
      CORS_ORIGIN: http://localhost:8080
    outputs:
      error_log: ${{ steps.collect-errors.outputs.error_log }}
      duration: ${{ steps.timing.outputs.duration }}
      cache_hit: ${{ steps.cache.outputs.cache-hit }}
    services:
      postgres:
        image: postgres:16@sha256:5a65324fe84dc41709ff914e90b07f3e2f577073ed27bf917d4873aca0c9ec51
        env:
          POSTGRES_DB: realestate
          POSTGRES_USER: realestate
          POSTGRES_PASSWORD: realestate_dev_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U realestate"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          --security-opt no-new-privileges
          --pids-limit 256
          --memory 512m
          --memory-swap 512m
          --shm-size 128m
          --cap-drop ALL
          --cap-add CHOWN
          --cap-add DAC_OVERRIDE
          --cap-add FOWNER
          --cap-add SETGID
          --cap-add SETUID
    steps:
      - name: Record start time
        id: start
        run: echo "time=$(date +%s)" >> $GITHUB_OUTPUT

      - name: Clean workspace
        run: |
          if [ -z "$GITHUB_WORKSPACE" ] || [ "$GITHUB_WORKSPACE" = "/" ]; then
            echo "::error::GITHUB_WORKSPACE is empty or root -- aborting cleanup"
            exit 1
          fi
          rm -rf "${GITHUB_WORKSPACE:?}"/* "${GITHUB_WORKSPACE:?}"/.* 2>/dev/null || true

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Restore cargo cache
        id: cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: v2-${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            v2-${{ runner.os }}-cargo-test-
            v2-${{ runner.os }}-cargo-

      - name: Mask test database credentials
        run: |
          echo "::add-mask::realestate_dev_password"
          echo "::add-mask::postgresql://realestate:realestate_dev_password@localhost:5432/realestate"

      - name: Generate random JWT secret for test isolation
        run: |
          JWT_SECRET=$(openssl rand -hex 32)
          echo "::add-mask::$JWT_SECRET"
          echo "JWT_SECRET=$JWT_SECRET" >> "$GITHUB_ENV"

      - name: Run backend tests
        id: backend-tests
        timeout-minutes: 25
        run: |
          umask 077
          cargo test --locked -p realestate-backend --all-targets 2>&1 | tee "${RUNNER_TEMP}/test-backend-output.txt"

      - name: Verify Cargo.lock was not modified during tests
        run: |
          if ! git diff --exit-code Cargo.lock; then
            echo "::error::Cargo.lock was modified during tests -- lockfile integrity violation"
            exit 1
          fi

      - name: Generate test coverage report (LCOV)
        id: coverage
        if: success()
        run: |
          umask 077
          export PATH="$HOME/.cargo/bin:$PATH"
          if ! command -v cargo-tarpaulin &>/dev/null; then
            TARPAULIN_VERSION="0.32.7"
            TARPAULIN_SHA256="67a61b2b271488e2d0cb718ccec384d0f296703f3c810f80ea5d46484c5d463b"
            ARCHIVE="${RUNNER_TEMP}/cargo-tarpaulin.tar.gz"
            mkdir -p "$HOME/.cargo/bin"
            if curl -sSfL --proto =https --retry 3 --connect-timeout 15 --max-time 120 -o "$ARCHIVE" \
              "https://github.com/xd009642/tarpaulin/releases/download/${TARPAULIN_VERSION}/cargo-tarpaulin-x86_64-unknown-linux-musl.tar.gz"; then
              if echo "${TARPAULIN_SHA256}  ${ARCHIVE}" | sha256sum -c -; then
                tar xzf "$ARCHIVE" --no-same-owner -C "$HOME/.cargo/bin" 2>/dev/null
              else
                echo "::warning::Tarpaulin checksum mismatch -- falling back to cargo install"
                rm -f "$ARCHIVE"
                cargo install cargo-tarpaulin --locked
              fi
              rm -f "$ARCHIVE"
            else
              cargo install cargo-tarpaulin --locked
            fi
          fi
          mkdir -p coverage
          cargo tarpaulin --locked -p realestate-backend --out lcov --output-dir coverage/ --skip-clean 2>&1 | tee "${RUNNER_TEMP}/tarpaulin-output.txt" || true
          if [ -f coverage/lcov.info ]; then
            echo "generated=true" >> $GITHUB_OUTPUT
            LINES=$(grep -c "^DA:" coverage/lcov.info 2>/dev/null || echo 0)
            echo "Coverage report generated: $LINES lines tracked"
          else
            echo "generated=false" >> $GITHUB_OUTPUT
            echo "::warning::Coverage report was not generated"
          fi

      - name: Verify Cargo.lock was not modified during coverage
        if: always() && steps.coverage.outputs.generated == 'true'
        run: |
          if ! git diff --exit-code Cargo.lock; then
            echo "::error::Cargo.lock was modified during coverage -- lockfile integrity violation"
            exit 1
          fi

      - name: Scan coverage artifact for leaked secrets
        if: always() && steps.coverage.outputs.generated == 'true'
        run: |
          if command -v gitleaks &>/dev/null; then
            gitleaks detect --source coverage/ --no-git --verbose --redact --exit-code 1
          else
            echo "::warning::gitleaks not available -- skipping coverage secret scan"
          fi

      - name: Upload coverage artifact
        if: always() && steps.coverage.outputs.generated == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: backend-coverage
          path: coverage/lcov.info
          retention-days: 1
          overwrite: false
          if-no-files-found: warn

      - name: Write test summary
        if: always()
        run: |
          {
            echo "## Backend Test Results"
            if [ "${{ steps.backend-tests.outcome }}" = "success" ]; then
              PASS=$(grep -c "^test .* ok$" "${RUNNER_TEMP}/test-backend-output.txt" 2>/dev/null || echo "?")
              echo "✅ All tests passed ($PASS tests)"
            else
              FAIL_COUNT=$(grep -c "^test .* FAILED$" "${RUNNER_TEMP}/test-backend-output.txt" 2>/dev/null || echo "?")
              echo "❌ $FAIL_COUNT test(s) failed"
              echo '```'
              grep "^test .* FAILED$" "${RUNNER_TEMP}/test-backend-output.txt" 2>/dev/null | head -20 || true
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Record duration
        id: timing
        if: always()
        run: echo "duration=$(( $(date +%s) - ${{ steps.start.outputs.time }} ))s" >> $GITHUB_OUTPUT

      - name: Collect backend test errors for notification
        id: collect-errors
        if: failure()
        run: |
          ERROR=""
          [ -f "${RUNNER_TEMP}/test-backend-output.txt" ] && ERROR="$(tail -c 3000 "${RUNNER_TEMP}/test-backend-output.txt")"
          if [ -z "$ERROR" ]; then
            ERROR="Backend tests failed but no captured output. Run cargo test -p realestate-backend --all-targets to reproduce."
          fi
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "error_log<<$EOF" >> $GITHUB_OUTPUT
          echo "$ERROR" >> $GITHUB_OUTPUT
          echo "$EOF" >> $GITHUB_OUTPUT

      - name: Clean up sensitive temp files
        if: always()
        run: rm -f "${RUNNER_TEMP}/test-backend-output.txt" "${RUNNER_TEMP}/tarpaulin-output.txt"

  test-frontend:
    name: Frontend WASM Compilation & Tests
    runs-on: ${{ github.actor == 'dependabot[bot]' && 'ubuntu-latest' || fromJSON('["self-hosted","linux"]') }}
    timeout-minutes: 20
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
    outputs:
      error_log: ${{ steps.collect-errors.outputs.error_log }}
      duration: ${{ steps.timing.outputs.duration }}
      cache_hit: ${{ steps.cache.outputs.cache-hit }}
    steps:
      - name: Record start time
        id: start
        run: echo "time=$(date +%s)" >> $GITHUB_OUTPUT

      - name: Clean workspace
        run: |
          if [ -z "$GITHUB_WORKSPACE" ] || [ "$GITHUB_WORKSPACE" = "/" ]; then
            echo "::error::GITHUB_WORKSPACE is empty or root -- aborting cleanup"
            exit 1
          fi
          rm -rf "${GITHUB_WORKSPACE:?}"/* "${GITHUB_WORKSPACE:?}"/.* 2>/dev/null || true

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Rust stable with WASM target
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: wasm32-unknown-unknown

      - name: Restore cargo cache
        id: cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: v2-${{ runner.os }}-cargo-frontend-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            v2-${{ runner.os }}-cargo-frontend-test-
            v2-${{ runner.os }}-cargo-

      - name: Run frontend tests (native target)
        id: frontend-tests
        timeout-minutes: 15
        run: |
          umask 077
          cargo test --locked -p realestate-frontend --all-targets 2>&1 | tee "${RUNNER_TEMP}/test-frontend-output.txt"

      - name: Verify Cargo.lock was not modified during tests
        run: |
          if ! git diff --exit-code Cargo.lock; then
            echo "::error::Cargo.lock was modified during tests -- lockfile integrity violation"
            exit 1
          fi

      - name: Write test summary
        if: always()
        run: |
          {
            echo "## Frontend Test Results"
            if [ "${{ steps.frontend-tests.outcome }}" = "success" ]; then
              PASS=$(grep -c "^test .* ok$" "${RUNNER_TEMP}/test-frontend-output.txt" 2>/dev/null || echo "?")
              echo "✅ All tests passed ($PASS tests)"
            else
              FAIL_COUNT=$(grep -c "^test .* FAILED$" "${RUNNER_TEMP}/test-frontend-output.txt" 2>/dev/null || echo "?")
              echo "❌ $FAIL_COUNT test(s) failed"
              echo '```'
              grep "^test .* FAILED$" "${RUNNER_TEMP}/test-frontend-output.txt" 2>/dev/null | head -20 || true
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Record duration
        id: timing
        if: always()
        run: echo "duration=$(( $(date +%s) - ${{ steps.start.outputs.time }} ))s" >> $GITHUB_OUTPUT

      - name: Collect frontend test errors for notification
        id: collect-errors
        if: failure()
        run: |
          ERROR=""
          [ -f "${RUNNER_TEMP}/test-frontend-output.txt" ] && ERROR="$(tail -c 3000 "${RUNNER_TEMP}/test-frontend-output.txt")"
          if [ -z "$ERROR" ]; then
            ERROR="Frontend tests failed but no captured output. Run cargo test -p realestate-frontend --all-targets to reproduce."
          fi
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "error_log<<$EOF" >> $GITHUB_OUTPUT
          echo "$ERROR" >> $GITHUB_OUTPUT
          echo "$EOF" >> $GITHUB_OUTPUT

      - name: Clean up sensitive temp files
        if: always()
        run: rm -f "${RUNNER_TEMP}/test-frontend-output.txt"

  quality-gate:
    name: Dependency Security & Health Check
    runs-on: ${{ github.actor == 'dependabot[bot]' && 'ubuntu-latest' || fromJSON('["self-hosted","linux","docker"]') }}
    timeout-minutes: 30
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      actions: read
      contents: read
      security-events: write
    outputs:
      error_log: ${{ steps.collect-errors.outputs.error_log }}
      failed_steps: ${{ steps.collect-errors.outputs.failed_steps }}
      duration: ${{ steps.timing.outputs.duration }}
    steps:
      - name: Record start time
        id: start
        run: echo "time=$(date +%s)" >> $GITHUB_OUTPUT

      - name: Clean workspace
        run: |
          if [ -z "$GITHUB_WORKSPACE" ] || [ "$GITHUB_WORKSPACE" = "/" ]; then
            echo "::error::GITHUB_WORKSPACE is empty or root -- aborting cleanup"
            exit 1
          fi
          rm -rf "${GITHUB_WORKSPACE:?}"/* "${GITHUB_WORKSPACE:?}"/.* 2>/dev/null || true

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          clean: false

      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Install cargo-audit for CVE scanning
        id: install_audit
        timeout-minutes: 5
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          if command -v cargo-audit &>/dev/null && cargo audit --version &>/dev/null; then
            echo "cargo-audit already installed: $(cargo audit --version)"
            echo "installed=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          rm -f "$HOME/.cargo/bin/cargo-audit"
          mkdir -p "$HOME/.cargo/bin"
          AUDIT_VERSION="0.22.1"
          AUDIT_SHA256_musl="c32506f338bdcdaef5a17fb9f33abb6ecf9561324cfd34237fd335f9283a1eab"
          AUDIT_SHA256_gnu="1890badd5f15831a9af4b074399fcd21e6f7c0fe42c84e9254cdffc9f813765c"
          INSTALLED=false
          for VARIANT in musl gnu; do
            URL="https://github.com/rustsec/rustsec/releases/download/cargo-audit%2Fv${AUDIT_VERSION}/cargo-audit-x86_64-unknown-linux-${VARIANT}-v${AUDIT_VERSION}.tgz"
            EXPECTED_SHA=$(eval echo "\$AUDIT_SHA256_${VARIANT}")
            if curl -sSfL --proto =https --retry 3 --retry-delay 10 --connect-timeout 30 -o "${RUNNER_TEMP}/cargo-audit.tgz" "$URL" 2>"${RUNNER_TEMP}/install-audit-output.txt"; then
              if ! echo "${EXPECTED_SHA}  ${RUNNER_TEMP}/cargo-audit.tgz" | sha256sum -c -; then
                echo "::warning::Checksum mismatch for cargo-audit ${VARIANT} binary -- skipping"
                rm -f "${RUNNER_TEMP}/cargo-audit.tgz"
                continue
              fi
              if tar xzf "${RUNNER_TEMP}/cargo-audit.tgz" --no-same-owner --strip-components=1 -C "$HOME/.cargo/bin/" 2>>"${RUNNER_TEMP}/install-audit-output.txt"; then
                chmod +x "$HOME/.cargo/bin/cargo-audit"
                if cargo audit --version &>/dev/null; then
                  INSTALLED=true
                  break
                fi
                rm -f "$HOME/.cargo/bin/cargo-audit"
              fi
            fi
          done
          if [ "$INSTALLED" = "false" ]; then
            if cargo install cargo-audit --locked 2>&1 | tee -a "${RUNNER_TEMP}/install-audit-output.txt"; then
              INSTALLED=true
            fi
          fi
          if [ "$INSTALLED" = "true" ] && command -v cargo-audit &>/dev/null; then
            cargo audit --version
            echo "installed=true" >> $GITHUB_OUTPUT
          else
            echo "::warning::cargo-audit installation failed -- skipping CVE scan"
            echo "installed=false" >> $GITHUB_OUTPUT
          fi

      - name: Scan Rust dependencies for known vulnerabilities (CVEs)
        id: cargo_audit
        if: always() && steps.install_audit.outputs.installed == 'true'
        timeout-minutes: 5
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          cargo audit --deny yanked --deny unmaintained --deny unsound 2>&1 | tee "${RUNNER_TEMP}/audit-output.txt"

      - name: Install cargo-deny for supply chain policy checks
        id: install_deny
        if: always()
        timeout-minutes: 5
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          if command -v cargo-deny &>/dev/null; then
            echo "cargo-deny already installed: $(cargo-deny --version)"
            echo "installed=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          DENY_VERSION="0.16.4"
          DENY_SHA256="28b7f8e12df46a9ce186547e38278c851905fc4bda59a0cc57d2aade9fdf6962"
          URL="https://github.com/EmbarkStudios/cargo-deny/releases/download/${DENY_VERSION}/cargo-deny-${DENY_VERSION}-x86_64-unknown-linux-musl.tar.gz"
          if curl -sSfL --proto =https --retry 3 --connect-timeout 15 --max-time 120 -o "${RUNNER_TEMP}/cargo-deny.tar.gz" "$URL"; then
            echo "${DENY_SHA256}  ${RUNNER_TEMP}/cargo-deny.tar.gz" | sha256sum -c -
            tar xzf "${RUNNER_TEMP}/cargo-deny.tar.gz" --no-same-owner --strip-components=1 -C "$HOME/.cargo/bin/" 2>/dev/null
            chmod +x "$HOME/.cargo/bin/cargo-deny"
            rm -f "${RUNNER_TEMP}/cargo-deny.tar.gz"
          fi
          if command -v cargo-deny &>/dev/null; then
            cargo-deny --version
            echo "installed=true" >> $GITHUB_OUTPUT
          else
            cargo install cargo-deny --locked 2>/dev/null && echo "installed=true" >> $GITHUB_OUTPUT || echo "installed=false" >> $GITHUB_OUTPUT
          fi

      - name: Run cargo-deny supply chain checks (advisories, licenses, bans, sources)
        id: cargo_deny
        if: always() && steps.install_deny.outputs.installed == 'true'
        timeout-minutes: 5
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          cargo deny check 2>&1 | tee "${RUNNER_TEMP}/deny-output.txt"

      - name: Install Trivy for IaC scanning
        id: install_trivy
        if: always()
        timeout-minutes: 3
        run: |
          TRIVY_VERSION="0.69.3"
          TRIVY_SHA256="1816b632dfe529869c740c0913e36bd1629cb7688bd5634f4a858c1d57c88b75"
          if command -v trivy &>/dev/null && [ "$(trivy --version 2>/dev/null | grep -oP '\d+\.\d+\.\d+')" = "$TRIVY_VERSION" ]; then
            echo "installed=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          ARCHIVE="${RUNNER_TEMP}/trivy.tar.gz"
          curl -sSfL --proto =https --connect-timeout 15 --max-time 120 -o "$ARCHIVE" \
            "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz"
          echo "${TRIVY_SHA256}  ${ARCHIVE}" | sha256sum -c -
          mkdir -p "${HOME}/.local/bin"
          tar xzf "$ARCHIVE" --no-same-owner --no-same-permissions -C "${HOME}/.local/bin" trivy
          rm -f "$ARCHIVE"
          export PATH="${HOME}/.local/bin:$PATH"
          echo "${HOME}/.local/bin" >> "$GITHUB_PATH"
          echo "installed=true" >> $GITHUB_OUTPUT

      - name: Scan Dockerfiles and docker-compose for misconfigurations (Trivy)
        id: trivy_iac
        if: always() && steps.install_trivy.outputs.installed == 'true'
        timeout-minutes: 5
        run: |
          trivy fs --scanners misconfig --exit-code 1 --severity CRITICAL,HIGH \
            --no-progress --format table \
            --include-non-failures \
            Dockerfile.backend Dockerfile.frontend docker-compose.prod.yml docker-compose.dev.yml 2>&1 | tee "${RUNNER_TEMP}/trivy-iac-output.txt"

      - name: Generate Trivy IaC SARIF report
        if: always() && steps.install_trivy.outputs.installed == 'true'
        run: |
          umask 077
          trivy fs --scanners misconfig --severity CRITICAL,HIGH,MEDIUM \
            --no-progress --format sarif --output trivy-iac.sarif \
            Dockerfile.backend Dockerfile.frontend docker-compose.prod.yml docker-compose.dev.yml || true

      - name: Upload Trivy IaC SARIF to GitHub Security
        if: always() && steps.install_trivy.outputs.installed == 'true' && hashFiles('trivy-iac.sarif') != ''
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1
        with:
          sarif_file: trivy-iac.sarif
          category: trivy-iac
        continue-on-error: true

      - name: Scan source code for embedded secrets (Trivy)
        id: trivy_secret
        if: always() && steps.install_trivy.outputs.installed == 'true'
        timeout-minutes: 5
        run: |
          trivy fs --scanners secret --exit-code 1 --no-progress --format table \
            --skip-dirs target --skip-dirs node_modules --skip-dirs dist --skip-dirs .git \
            . 2>&1 | tee "${RUNNER_TEMP}/trivy-secret-output.txt"

      - name: Generate cargo-audit SARIF report
        id: cargo_audit_sarif
        if: always() && steps.install_audit.outputs.installed == 'true'
        run: |
          umask 077
          export PATH="$HOME/.cargo/bin:$PATH"
          cargo audit --json 2>/dev/null | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          sarif = {
            '\$schema': 'https://raw.githubusercontent.com/oasis-tcs/sarif-spec/main/sarif-2.1/schema/sarif-schema-2.1.0.json',
            'version': '2.1.0',
            'runs': [{
              'tool': {'driver': {'name': 'cargo-audit', 'version': '0.22.1', 'rules': []}},
              'results': []
            }]
          }
          rules = {}
          for vuln in data.get('vulnerabilities', {}).get('list', []):
            adv = vuln.get('advisory', {})
            vid = adv.get('id', 'UNKNOWN')
            pkg = vuln.get('package', {})
            if vid not in rules:
              rules[vid] = {
                'id': vid,
                'shortDescription': {'text': adv.get('title', vid)},
                'helpUri': adv.get('url', ''),
                'properties': {'tags': ['security', 'vulnerability']}
              }
            sarif['runs'][0]['results'].append({
              'ruleId': vid,
              'level': 'error',
              'message': {'text': f\"{adv.get('title', '')} in {pkg.get('name', '?')} {pkg.get('version', '?')}\"},
              'locations': [{'physicalLocation': {'artifactLocation': {'uri': 'Cargo.lock'}, 'region': {'startLine': 1}}}]
            })
          sarif['runs'][0]['tool']['driver']['rules'] = list(rules.values())
          json.dump(sarif, sys.stdout, indent=2)
          " > cargo-audit.sarif 2>/dev/null || echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"cargo-audit","rules":[]}},"results":[]}]}' > cargo-audit.sarif

      - name: Upload cargo-audit SARIF to GitHub Security
        if: always() && steps.install_audit.outputs.installed == 'true' && hashFiles('cargo-audit.sarif') != ''
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1
        with:
          sarif_file: cargo-audit.sarif
          category: cargo-audit
        continue-on-error: true

      - name: Generate cargo-deny SARIF report
        id: cargo_deny_sarif
        if: always() && steps.install_deny.outputs.installed == 'true'
        run: |
          umask 077
          export PATH="$HOME/.cargo/bin:$PATH"
          cargo deny check 2>&1 | python3 -c "
          import sys, json, re
          sarif = {
            '\$schema': 'https://raw.githubusercontent.com/oasis-tcs/sarif-spec/main/sarif-2.1/schema/sarif-schema-2.1.0.json',
            'version': '2.1.0',
            'runs': [{'tool': {'driver': {'name': 'cargo-deny', 'rules': []}}, 'results': []}]
          }
          for line in sys.stdin:
            line = line.strip()
            if not line or line.startswith('advisories') or line.startswith('licenses') or line.startswith('bans') or line.startswith('sources'):
              continue
            m = re.match(r'^(warning|error)\[([^\]]+)\]:\s*(.+)', line)
            if m:
              level = 'error' if m.group(1) == 'error' else 'warning'
              rule_id = m.group(2)
              msg = m.group(3)
              sarif['runs'][0]['results'].append({
                'ruleId': rule_id,
                'level': level,
                'message': {'text': msg},
                'locations': [{'physicalLocation': {'artifactLocation': {'uri': 'Cargo.lock'}, 'region': {'startLine': 1}}}]
              })
          json.dump(sarif, sys.stdout, indent=2)
          " > cargo-deny.sarif 2>/dev/null || echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"cargo-deny","rules":[]}},"results":[]}]}' > cargo-deny.sarif

      - name: Upload cargo-deny SARIF to GitHub Security
        if: always() && steps.install_deny.outputs.installed == 'true' && hashFiles('cargo-deny.sarif') != ''
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1
        with:
          sarif_file: cargo-deny.sarif
          category: cargo-deny
        continue-on-error: true

      - name: Write quality gate summary
        if: always()
        run: |
          {
            echo "## Dependency Security Results"
            echo "| Check | Status |"
            echo "|-------|--------|"
            echo "| cargo audit | ${{ steps.cargo_audit.outcome == 'success' && '✅ Pass' || (steps.install_audit.outputs.installed != 'true' && '⏭️ Skipped' || '❌ Fail') }} |"
            echo "| cargo deny | ${{ steps.cargo_deny.outcome == 'success' && '✅ Pass' || (steps.install_deny.outputs.installed != 'true' && '⏭️ Skipped' || '❌ Fail') }} |"
            echo "| Trivy IaC scan | ${{ steps.trivy_iac.outcome == 'success' && '✅ Pass' || (steps.install_trivy.outputs.installed != 'true' && '⏭️ Skipped' || '⚠️ Findings') }} |"
            echo "| Trivy secret scan | ${{ steps.trivy_secret.outcome == 'success' && '✅ Pass' || (steps.install_trivy.outputs.installed != 'true' && '⏭️ Skipped' || '❌ Fail') }} |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Collect quality-gate errors for notification
        id: collect-errors
        if: always() && (steps.cargo_audit.outcome == 'failure' || steps.cargo_deny.outcome == 'failure' || steps.trivy_iac.outcome == 'failure' || steps.trivy_secret.outcome == 'failure')
        run: |
          ERROR=""
          FAILED=""
          if [ "${{ steps.cargo_audit.outcome }}" = "failure" ]; then
            FAILED="${FAILED}cargo-audit,"
            ERROR="${ERROR}[cargo-audit] $(head -c 2000 "${RUNNER_TEMP}/audit-output.txt" 2>/dev/null || echo 'cargo audit found vulnerabilities.')"$'\n\n'
          fi
          if [ "${{ steps.install_audit.outputs.installed }}" = "false" ]; then
            ERROR="${ERROR}[cargo-audit] Skipped -- installation failed (non-blocking warning)."$'\n\n'
          fi
          if [ "${{ steps.cargo_deny.outcome }}" = "failure" ]; then
            FAILED="${FAILED}cargo-deny,"
            ERROR="${ERROR}[cargo-deny] $(head -c 2000 "${RUNNER_TEMP}/deny-output.txt" 2>/dev/null || echo 'cargo deny found policy violations.')"$'\n\n'
          fi
          if [ "${{ steps.trivy_iac.outcome }}" = "failure" ]; then
            FAILED="${FAILED}trivy-iac,"
            ERROR="${ERROR}[trivy-iac] $(head -c 2000 "${RUNNER_TEMP}/trivy-iac-output.txt" 2>/dev/null || echo 'Trivy found Dockerfile/compose misconfigurations.')"$'\n\n'
          fi
          if [ "${{ steps.trivy_secret.outcome }}" = "failure" ]; then
            FAILED="${FAILED}trivy-secret,"
            ERROR="${ERROR}[trivy-secret] $(head -c 2000 "${RUNNER_TEMP}/trivy-secret-output.txt" 2>/dev/null || echo 'Trivy found embedded secrets in source code.')"$'\n\n'
          fi
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "failed_steps=${FAILED%,}" >> $GITHUB_OUTPUT
          echo "error_log<<$EOF" >> $GITHUB_OUTPUT
          echo "$ERROR" >> $GITHUB_OUTPUT
          echo "$EOF" >> $GITHUB_OUTPUT

      - name: Record duration
        id: timing
        if: always()
        run: echo "duration=$(( $(date +%s) - ${{ steps.start.outputs.time }} ))s" >> $GITHUB_OUTPUT

      - name: Fail job if any quality step failed
        if: always() && (steps.cargo_audit.outcome == 'failure' || steps.cargo_deny.outcome == 'failure' || steps.trivy_iac.outcome == 'failure' || steps.trivy_secret.outcome == 'failure')
        run: exit 1

      - name: Clean up sensitive temp files
        if: always()
        run: |
          rm -f "${RUNNER_TEMP}/audit-output.txt" "${RUNNER_TEMP}/deny-output.txt" "${RUNNER_TEMP}/trivy-iac-output.txt" "${RUNNER_TEMP}/trivy-secret-output.txt" "${RUNNER_TEMP}/install-audit-output.txt" "${RUNNER_TEMP}/cargo-audit.tgz" "${RUNNER_TEMP}/cargo-deny.tar.gz"
          rm -f cargo-audit.sarif cargo-deny.sarif trivy-iac.sarif

  sonarqube:
    name: SonarQube Code Quality & Coverage Analysis
    runs-on: ${{ github.actor == 'dependabot[bot]' && 'ubuntu-latest' || fromJSON('["self-hosted","linux","sonarqube"]') }}
    timeout-minutes: 20
    permissions:
      contents: read
    env:
      DOCKER_CONTENT_TRUST: "1"
    needs: [lint, test-backend, test-frontend]
    if: |
      always() &&
      !(inputs.skip_sonarqube || false) &&
      (needs.test-backend.result == 'success' || needs.test-frontend.result == 'success' || needs.lint.result == 'success' ||
       (needs.test-backend.result != 'failure' && needs.test-frontend.result != 'failure' && needs.lint.result != 'failure'))
    outputs:
      duration: ${{ steps.timing.outputs.duration }}
    steps:
      - name: Record start time
        id: start
        run: echo "time=$(date +%s)" >> $GITHUB_OUTPUT

      - name: Clean workspace
        run: |
          if [ -z "$GITHUB_WORKSPACE" ] || [ "$GITHUB_WORKSPACE" = "/" ]; then
            echo "::error::GITHUB_WORKSPACE is empty or root -- aborting cleanup"
            exit 1
          fi
          rm -rf "${GITHUB_WORKSPACE:?}"/* "${GITHUB_WORKSPACE:?}"/.* 2>/dev/null || true

      - name: Checkout repository with full history for blame analysis
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Download backend coverage report
        id: download-coverage
        if: needs.test-backend.result == 'success'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: backend-coverage
          path: coverage/
        continue-on-error: true

      - name: Download clippy report
        id: download-clippy
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: clippy-report
          path: .
        continue-on-error: true

      - name: Set up JDK 17 for Android analysis
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@ac638b010cf58a27ee6c972d7336334ccaf61c96 # v4.4.1
        with:
          cache-read-only: true

      - name: Generate Android Lint XML report
        id: android-lint-xml
        timeout-minutes: 15
        working-directory: android
        run: |
          umask 077
          ./gradlew :app:lintDebug --no-daemon --stacktrace 2>/dev/null || true
        continue-on-error: true

      - name: Generate detekt XML report
        id: detekt-xml
        timeout-minutes: 10
        working-directory: android
        run: |
          umask 077
          ./gradlew detekt --no-daemon --stacktrace 2>/dev/null || true
        continue-on-error: true

      - name: Validate SONAR_HOST_URL format
        id: sonar-url-check
        run: |
          if [ -z "$SONAR_HOST_URL" ]; then
            echo "::warning::SONAR_HOST_URL is not set -- skipping SonarQube scan"
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          if ! echo "$SONAR_HOST_URL" | grep -qE '^https?://[a-zA-Z0-9._-]+(:[0-9]{1,5})?(/[a-zA-Z0-9._/-]*)?$'; then
            echo "::error::SONAR_HOST_URL has invalid format -- possible SSRF vector"
            exit 1
          fi
          echo "skip=false" >> $GITHUB_OUTPUT

      - name: Verify SonarQube server is reachable
        id: sonar-reachable
        if: steps.sonar-url-check.outputs.skip != 'true'
        timeout-minutes: 2
        run: |
          SONAR_URL="${SONAR_HOST_URL}"
          for i in $(seq 1 12); do
            RESPONSE=$(curl -sf --connect-timeout 5 --max-time 10 "$SONAR_URL/api/system/status" 2>/dev/null) || RESPONSE=""
            if [ -n "$RESPONSE" ]; then
              STATUS=$(echo "$RESPONSE" | jq -r '.status // "UNREACHABLE"' 2>/dev/null) || STATUS="UNREACHABLE"
            else
              STATUS="UNREACHABLE"
            fi
            if [ "$STATUS" = "UP" ]; then
              echo "SonarQube is ready."
              echo "reachable=true" >> $GITHUB_OUTPUT
              exit 0
            fi
            echo "Attempt $i/12 -- status: $STATUS. Retrying in 5s..."
            sleep 5
          done
          echo "::warning::SonarQube at $SONAR_URL did not respond within ~60 seconds -- skipping analysis"
          echo "reachable=false" >> $GITHUB_OUTPUT

      - name: Bootstrap SonarQube project and token
        id: sonar-bootstrap
        if: steps.sonar-url-check.outputs.skip != 'true' && steps.sonar-reachable.outputs.reachable == 'true'
        timeout-minutes: 2
        run: |
          SONAR_URL="${SONAR_HOST_URL}"
          TOKEN="${{ secrets.SONAR_TOKEN }}"

          if [ -n "$TOKEN" ]; then
            echo "Using existing SONAR_TOKEN secret."
            echo "::add-mask::$TOKEN"
            {
              echo "SONAR_ANALYSIS_TOKEN=$TOKEN"
            } >> "$GITHUB_ENV"
            exit 0
          fi

          ADMIN_PASS="${{ secrets.SONAR_ADMIN_PASSWORD }}"
          if [ -z "$ADMIN_PASS" ]; then
            echo "::error::Neither SONAR_TOKEN nor SONAR_ADMIN_PASSWORD is set. Configure one in GitHub repository secrets."
            exit 1
          fi

          curl -sf --connect-timeout 10 --max-time 30 -u "admin:${ADMIN_PASS}" -X POST \
            "$SONAR_URL/api/projects/create?name=Gestion+Inmobiliaria&project=gestion-inmobiliaria" \
            2>/dev/null || echo "Project already exists."

          DEFAULT_QG=$(curl -sf --connect-timeout 10 --max-time 30 -u "admin:${ADMIN_PASS}" \
            "$SONAR_URL/api/qualitygates/list" 2>/dev/null || echo '{}')
          DEFAULT_QG=$(echo "$DEFAULT_QG" | jq -r '.qualitygates[] | select(.isDefault==true) | .name' 2>/dev/null || echo "Sonar way")
          if [ -z "$DEFAULT_QG" ]; then DEFAULT_QG="Sonar way"; fi
          if [ -n "$DEFAULT_QG" ]; then
            curl -sf --connect-timeout 10 --max-time 30 -u "admin:${ADMIN_PASS}" -X POST \
              "$SONAR_URL/api/qualitygates/select?projectKey=gestion-inmobiliaria&gateName=$(echo "$DEFAULT_QG" | jq -sRr @uri)" \
              2>/dev/null || echo "Quality gate already assigned."
          fi

          TOKEN_NAME="ci-token-${{ github.run_id }}"
          curl -sf --connect-timeout 10 --max-time 30 -u "admin:${ADMIN_PASS}" -X POST \
            "$SONAR_URL/api/user_tokens/revoke?name=${TOKEN_NAME}" 2>/dev/null || true
          TOKEN_RESPONSE=$(curl -sf --connect-timeout 10 --max-time 30 -u "admin:${ADMIN_PASS}" -X POST \
            "$SONAR_URL/api/user_tokens/generate?name=${TOKEN_NAME}" 2>/dev/null) || TOKEN_RESPONSE=""
          TOKEN=$(echo "$TOKEN_RESPONSE" | jq -r '.token' 2>/dev/null) || TOKEN=""

          if [ -z "$TOKEN" ] || [ "$TOKEN" = "null" ]; then
            echo "::error::Failed to generate SonarQube token"
            exit 1
          fi

          echo "::add-mask::$TOKEN"
          {
            echo "SONAR_ANALYSIS_TOKEN=$TOKEN"
          } >> "$GITHUB_ENV"

      - name: Run SonarQube static analysis scan
        id: sonar-scan
        if: steps.sonar-url-check.outputs.skip != 'true' && steps.sonar-reachable.outputs.reachable == 'true'
        env:
          HAS_COVERAGE: ${{ steps.download-coverage.outcome == 'success' }}
          IS_PR: ${{ github.event_name == 'pull_request' }}
          PR_KEY: ${{ github.event.pull_request.number }}
          PR_BRANCH: ${{ github.head_ref }}
          PR_BASE: ${{ github.base_ref }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          SCAN_ARGS=()
          SCAN_ARGS+=("-Dsonar.projectBaseDir=/usr/src")
          SCAN_ARGS+=("-Dsonar.qualitygate.wait=true")
          SCAN_ARGS+=("-Dsonar.qualitygate.timeout=300")
          if [ "$HAS_COVERAGE" = "true" ] && [ -f coverage/lcov.info ]; then
            echo "Coverage report found -- including in SonarQube analysis"
            SCAN_ARGS+=("-Dsonar.rust.lcov.reportPaths=/usr/src/coverage/lcov.info")
          fi
          if [ -f clippy-report.json ]; then
            echo "Clippy report found -- including in SonarQube analysis"
            SCAN_ARGS+=("-Dsonar.rust.clippy.reportPaths=/usr/src/clippy-report.json")
          fi
          if [ -f android/app/build/reports/lint-results-debug.xml ]; then
            echo "Android Lint XML report found -- including in SonarQube analysis"
            SCAN_ARGS+=("-Dsonar.androidLint.reportPaths=/usr/src/android/app/build/reports/lint-results-debug.xml")
          fi
          if [ -f android/build/reports/detekt/detekt.xml ]; then
            echo "Detekt report found -- including in SonarQube analysis"
            SCAN_ARGS+=("-Dsonar.kotlin.detekt.reportPaths=/usr/src/android/build/reports/detekt/detekt.xml")
          fi
          if [ "$IS_PR" = "true" ] && [ -n "$PR_KEY" ]; then
            echo "PR detected (#${PR_KEY}) -- enabling PR decoration"
            SCAN_ARGS+=("-Dsonar.pullrequest.key=${PR_KEY}")
            SCAN_ARGS+=("-Dsonar.pullrequest.branch=${PR_BRANCH}")
            SCAN_ARGS+=("-Dsonar.pullrequest.base=${PR_BASE}")
          else
            BRANCH_NAME="${GITHUB_REF_NAME}"
            if [ -n "$BRANCH_NAME" ]; then
              echo "Branch push detected -- setting sonar.branch.name=$BRANCH_NAME"
              SCAN_ARGS+=("-Dsonar.branch.name=${BRANCH_NAME}")
            fi
          fi
          docker run --rm \
            --network host \
            --security-opt no-new-privileges \
            --cap-drop ALL \
            --read-only \
            --user 1000:1000 \
            --memory 1g \
            --memory-swap 1g \
            --cpus 2 \
            --pids-limit 256 \
            --tmpfs /tmp:rw,noexec,nosuid,nodev,size=256m,uid=1000,gid=1000 \
            --tmpfs /opt/sonar-scanner/.sonar:rw,nosuid,nodev,size=512m,uid=1000,gid=1000 \
            --tmpfs /home/scanner:rw,noexec,nosuid,nodev,size=64m,uid=1000,gid=1000 \
            -e SONAR_TOKEN="${SONAR_ANALYSIS_TOKEN}" \
            -e SONAR_HOST_URL="${SONAR_HOST_URL}" \
            -e SONAR_SCANNER_JAVA_EXE_PATH="/opt/java/openjdk/bin/java" \
            -e HOME=/home/scanner \
            -v "${GITHUB_WORKSPACE}:/usr/src" \
            sonarsource/sonar-scanner-cli:11.3@sha256:7462f132388135e32b948f8f18ff0db9ae28a87c6777f1df5b2207e04a6d7c5c \
            "${SCAN_ARGS[@]}"

      - name: Report SonarQube analysis completeness
        if: always() && steps.sonar-url-check.outputs.skip != 'true' && steps.sonar-reachable.outputs.reachable == 'true'
        env:
          COVERAGE_OK: ${{ steps.download-coverage.outcome == 'success' }}
          CLIPPY_OK: ${{ steps.download-clippy.outcome == 'success' }}
          LINT_RESULT: ${{ needs.lint.result }}
          TEST_BACKEND_RESULT: ${{ needs.test-backend.result }}
        run: |
          MISSING=0
          {
            echo "## SonarQube Analysis Completeness"
            echo "| Report | Status | Source Job |"
            echo "|--------|--------|------------|"
            if [ "$COVERAGE_OK" = "true" ] && [ -f coverage/lcov.info ]; then
              echo "| Coverage (lcov) | ✅ Imported | test-backend |"
            else
              echo "| Coverage (lcov) | ⚠️ Missing | test-backend ($TEST_BACKEND_RESULT) |"
              MISSING=$((MISSING + 1))
            fi
            if [ "$CLIPPY_OK" = "true" ] && [ -f clippy-report.json ]; then
              echo "| Clippy report | ✅ Imported | lint |"
            else
              echo "| Clippy report | ⚠️ Missing | lint ($LINT_RESULT) |"
              MISSING=$((MISSING + 1))
            fi
            if [ -f android/app/build/reports/lint-results-debug.xml ]; then
              echo "| Android Lint | ✅ Imported | sonarqube (local) |"
            else
              echo "| Android Lint | ⏭️ Not generated | sonarqube (local) |"
            fi
            if [ -f android/build/reports/detekt/detekt.xml ]; then
              echo "| Detekt | ✅ Imported | sonarqube (local) |"
            else
              echo "| Detekt | ⏭️ Not generated | sonarqube (local) |"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
          if [ "$MISSING" -gt 0 ]; then
            echo "::warning::SonarQube analysis is incomplete -- $MISSING Rust report(s) missing due to cancelled/failed upstream jobs"
          fi

      - name: Fetch SonarQube results and notify
        if: always() && steps.sonar-url-check.outputs.skip != 'true' && steps.sonar-reachable.outputs.reachable == 'true'
        timeout-minutes: 8
        env:
          SONAR_TOKEN: ${{ env.SONAR_ANALYSIS_TOKEN }}
          SCAN_OUTCOME: ${{ steps.sonar-scan.outcome }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
          WEBHOOK_HOST: ${{ secrets.WEBHOOK_HOST }}
          GH_SERVER_URL: ${{ github.server_url }}
          GH_REPOSITORY: ${{ github.repository }}
          GH_RUN_ID: ${{ github.run_id }}
          GH_SHA: ${{ github.sha }}
          GH_REF_NAME: ${{ github.ref_name }}
          GH_ACTOR: ${{ github.actor }}
        run: |
          SONAR_URL="${SONAR_HOST_URL}"
          GATE_STATUS="UNKNOWN"

          if [ "$SCAN_OUTCOME" = "success" ]; then
            GATE_STATUS="OK"
          fi

          if [ "$GATE_STATUS" = "UNKNOWN" ]; then
            REPORT_FILE=$(find . -name 'report-task.txt' -path '*scannerwork*' -print -quit 2>/dev/null)
            if [ -n "$REPORT_FILE" ] && [ -f "$REPORT_FILE" ]; then
              CE_TASK_ID=$(grep '^ceTaskId=' "$REPORT_FILE" | cut -d= -f2)
              if [ -n "$CE_TASK_ID" ]; then
                for i in $(seq 1 60); do
                  CE_RESPONSE=$(curl -sf --connect-timeout 10 --max-time 30 -u "$SONAR_TOKEN:" \
                    "$SONAR_URL/api/ce/task?id=$CE_TASK_ID" 2>/dev/null || echo '{}')
                  CE_STATUS=$(echo "$CE_RESPONSE" | jq -r '.task.status // "UNKNOWN"')
                  if [ "$CE_STATUS" = "SUCCESS" ]; then
                    ANALYSIS_ID=$(echo "$CE_RESPONSE" | jq -r '.task.analysisId // empty')
                    if [ -n "$ANALYSIS_ID" ]; then
                      GATE=$(curl -sf --connect-timeout 10 --max-time 30 -u "$SONAR_TOKEN:" \
                        "$SONAR_URL/api/qualitygates/project_status?analysisId=$ANALYSIS_ID" 2>/dev/null || echo '{}')
                      GATE_STATUS=$(echo "$GATE" | jq -r '.projectStatus.status // "UNKNOWN"')
                    fi
                    break
                  elif [ "$CE_STATUS" = "FAILED" ] || [ "$CE_STATUS" = "CANCELED" ]; then
                    echo "::warning::SonarQube CE task ended with status: $CE_STATUS"
                    GATE_STATUS="ERROR"
                    break
                  fi
                  sleep 5
                done
              fi
            fi
          fi

          if [ "$GATE_STATUS" = "UNKNOWN" ]; then
            for i in $(seq 1 30); do
              GATE=$(curl -sf --connect-timeout 10 --max-time 30 -u "$SONAR_TOKEN:" \
                "$SONAR_URL/api/qualitygates/project_status?projectKey=gestion-inmobiliaria" 2>/dev/null || echo '{}')
              GATE_STATUS=$(echo "$GATE" | jq -r '.projectStatus.status // "UNKNOWN"')
              if [ "$GATE_STATUS" != "UNKNOWN" ] && [ "$GATE_STATUS" != "NONE" ]; then
                break
              fi
              sleep 5
            done
          fi

          if [ "$GATE_STATUS" = "UNKNOWN" ] || [ "$GATE_STATUS" = "NONE" ]; then
            if [ "$SCAN_OUTCOME" = "success" ]; then
              GATE_STATUS="OK"
            elif [ "$SCAN_OUTCOME" = "skipped" ] || [ -z "$SCAN_OUTCOME" ]; then
              echo "::warning::SonarQube scan was skipped -- treating gate as OK (non-blocking)."
              GATE_STATUS="OK"
            fi
          fi

          echo "Final quality gate status: $GATE_STATUS"

          ISSUES=$(curl -sf --connect-timeout 10 --max-time 30 -u "$SONAR_TOKEN:" \
            "$SONAR_URL/api/issues/search?projectKeys=gestion-inmobiliaria&resolved=false&ps=50&s=SEVERITY&asc=false" 2>/dev/null || echo '{}')
          TOTAL=$(echo "$ISSUES" | jq -r '.total // 0')
          SUMMARY=$(echo "$ISSUES" | jq -r '
            [.issues // [] | group_by(.severity) | .[] |
              {severity: .[0].severity, count: length}] |
            map("\(.count) \(.severity)") | join(", ")' 2>/dev/null || echo "Could not parse issues")

          # Fetch coverage metrics
          MEASURES=$(curl -sf --connect-timeout 10 --max-time 30 -u "$SONAR_TOKEN:" \
            "$SONAR_URL/api/measures/component?component=gestion-inmobiliaria&metricKeys=coverage,lines_to_cover,uncovered_lines,duplicated_lines_density,ncloc" 2>/dev/null || echo '{}')
          COVERAGE=$(echo "$MEASURES" | jq -r '.component.measures[]? | select(.metric=="coverage") | .value // "N/A"' 2>/dev/null || echo "N/A")
          NCLOC=$(echo "$MEASURES" | jq -r '.component.measures[]? | select(.metric=="ncloc") | .value // "N/A"' 2>/dev/null || echo "N/A")
          DUPLICATION=$(echo "$MEASURES" | jq -r '.component.measures[]? | select(.metric=="duplicated_lines_density") | .value // "N/A"' 2>/dev/null || echo "N/A")

          # Write summary
          {
            echo "## SonarQube Results"
            echo "- Quality Gate: **$GATE_STATUS**"
            echo "- Open Issues: **$TOTAL** ($SUMMARY)"
            if [ "$COVERAGE" != "N/A" ]; then
              echo "- Coverage: **${COVERAGE}%**"
            fi
            if [ "$NCLOC" != "N/A" ]; then
              echo "- Lines of Code: **$NCLOC**"
            fi
            if [ "$DUPLICATION" != "N/A" ]; then
              echo "- Duplication: **${DUPLICATION}%**"
            fi
            echo "- [View Dashboard](${SONAR_HOST_URL}/dashboard?id=gestion-inmobiliaria)"
            if [ "$GATE_STATUS" = "ERROR" ]; then
              echo ""
              echo "### Top Issues"
              echo '```'
              echo "$ISSUES" | jq -r '.issues[:10] | .[] | "\(.severity) \(.component | split(":") | last):\(.line // "?") \(.message)"' 2>/dev/null || true
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$GATE_STATUS" = "ERROR" ]; then
            TOP_ISSUES=$(echo "$ISSUES" | jq -r '
              [.issues[:20] | .[] |
                "\(.severity) | \(.component | split(":") | last):\(.line // "?") | \(.message)"] |
              join("\n")' 2>/dev/null || echo "")
            ERROR_LOG="Quality Gate: ${GATE_STATUS}\nTotal open issues: ${TOTAL}\nBreakdown: ${SUMMARY}\n\nTop issues:\n${TOP_ISSUES}"

            PAYLOAD=$(jq -n \
              --arg job "sonarqube" \
              --arg step "quality-gate-${GATE_STATUS}" \
              --arg error_log "$ERROR_LOG" \
              --arg run_url "${GH_SERVER_URL}/${GH_REPOSITORY}/actions/runs/${GH_RUN_ID}" \
              --arg commit "$GH_SHA" \
              --arg branch "$GH_REF_NAME" \
              --arg actor "$GH_ACTOR" \
              '{job: $job, step: $step, error_log: $error_log, run_url: $run_url, commit: $commit, branch: $branch, actor: $actor}')

            SIGNATURE=$(printf '%s' "$PAYLOAD" | openssl dgst -sha256 -hmac "${WEBHOOK_SECRET}" | awk '{print $NF}')
            curl -s --connect-timeout 5 --max-time 10 -X POST http://${WEBHOOK_HOST}:9090/ci-failure \
              -H "Content-Type: application/json" \
              -H "X-Signature-256: sha256=$SIGNATURE" \
              -d "$PAYLOAD" || echo "Webhook unreachable -- skipping notification"

            echo "::error::SonarQube quality gate failed"
            exit 1
          fi

      - name: Revoke bootstrap SonarQube token
        if: always() && steps.sonar-url-check.outputs.skip != 'true' && steps.sonar-reachable.outputs.reachable == 'true' && env.SONAR_ANALYSIS_TOKEN != ''
        run: |
          TOKEN="${{ secrets.SONAR_TOKEN }}"
          if [ -n "$TOKEN" ]; then
            echo "Using persistent SONAR_TOKEN -- skipping revocation"
            exit 0
          fi
          ADMIN_PASS="${{ secrets.SONAR_ADMIN_PASSWORD }}"
          TOKEN_NAME="ci-token-${{ github.run_id }}"
          if [ -n "$ADMIN_PASS" ]; then
            curl -sf --connect-timeout 10 --max-time 30 -u "admin:${ADMIN_PASS}" -X POST \
              "${SONAR_HOST_URL}/api/user_tokens/revoke?name=${TOKEN_NAME}" 2>/dev/null || true
            echo "Bootstrap token revoked."
          fi

      - name: Record duration
        id: timing
        if: always()
        run: echo "duration=$(( $(date +%s) - ${{ steps.start.outputs.time }} ))s" >> $GITHUB_OUTPUT

  # ── Stage 2: Build (runs only after all quality checks pass) ──

  build-frontend:
    name: Frontend WASM Release Build
    runs-on: ${{ github.actor == 'dependabot[bot]' && 'ubuntu-latest' || fromJSON('["self-hosted","linux"]') }}
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
      attestations: write
    outputs:
      error_log: ${{ steps.collect-errors.outputs.error_log }}
      duration: ${{ steps.timing.outputs.duration }}
      cache_hit: ${{ steps.cache.outputs.cache-hit }}
    needs: [secret-scan, dependency-review, lint, test-backend, test-frontend, quality-gate, sonarqube]
    if: |
      always() &&
      needs.secret-scan.result == 'success' &&
      needs.lint.result == 'success' &&
      needs.test-backend.result == 'success' &&
      needs.test-frontend.result == 'success' &&
      needs.quality-gate.result == 'success' &&
      (needs.dependency-review.result == 'success' || needs.dependency-review.result == 'skipped') &&
      (needs.sonarqube.result == 'success' || needs.sonarqube.result == 'skipped' || needs.sonarqube.result == 'cancelled')
    steps:
      - name: Record start time
        id: start
        run: echo "time=$(date +%s)" >> $GITHUB_OUTPUT

      - name: Clean workspace
        run: |
          if [ -z "$GITHUB_WORKSPACE" ] || [ "$GITHUB_WORKSPACE" = "/" ]; then
            echo "::error::GITHUB_WORKSPACE is empty or root -- aborting cleanup"
            exit 1
          fi
          rm -rf "${GITHUB_WORKSPACE:?}"/* "${GITHUB_WORKSPACE:?}"/.* 2>/dev/null || true

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Rust stable with WASM target
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install Trunk WASM bundler
        uses: jetli/trunk-action@1346cc09eace4beb84e403e199a471346d4684c9 # v0.5.1

      - name: Restore cargo cache
        id: cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: v2-${{ runner.os }}-cargo-wasm-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            v2-${{ runner.os }}-cargo-wasm-
            v2-${{ runner.os }}-cargo-

      - name: Build optimized WASM frontend bundle
        timeout-minutes: 25
        run: trunk build --release 2>&1 | tee "${RUNNER_TEMP}/build-frontend-output.txt"
        working-directory: frontend

      - name: Verify Cargo.lock was not modified during build
        run: |
          if ! git diff --exit-code Cargo.lock; then
            echo "::error::Cargo.lock was modified during build -- lockfile integrity violation"
            exit 1
          fi

      - name: Scan frontend dist for leaked secrets
        run: |
          if command -v gitleaks &>/dev/null; then
            gitleaks detect --source frontend/dist --no-git --verbose --redact --exit-code 1
          else
            GITLEAKS_VERSION="8.24.3"
            GITLEAKS_SHA256="9991e0b2903da4c8f6122b5c3186448b927a5da4deef1fe45271c3793f4ee29c"
            ARCHIVE="${RUNNER_TEMP}/gitleaks.tar.gz"
            curl -sSfL --proto =https --connect-timeout 15 --max-time 120 -o "$ARCHIVE" \
              "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
            echo "${GITLEAKS_SHA256}  ${ARCHIVE}" | sha256sum -c -
            mkdir -p "${HOME}/.local/bin"
          tar xzf "$ARCHIVE" --no-same-owner --no-same-permissions -C "${HOME}/.local/bin" gitleaks
            rm -f "$ARCHIVE"
            export PATH="${HOME}/.local/bin:$PATH"
          echo "${HOME}/.local/bin" >> "$GITHUB_PATH"
            gitleaks detect --source frontend/dist --no-git --verbose --redact --exit-code 1
          fi

      - name: Generate SHA256 checksums for frontend dist
        run: |
          umask 077
          cd frontend/dist
          find . -type f -exec sha256sum {} \; > ../frontend-dist.sha256
          echo "Frontend dist checksums ($(wc -l < ../frontend-dist.sha256) files):"
          head -20 ../frontend-dist.sha256

      - name: Generate SBOM for frontend dist (SPDX)
        run: |
          umask 077
          TRIVY_VERSION="0.69.3"
          TRIVY_SHA256="1816b632dfe529869c740c0913e36bd1629cb7688bd5634f4a858c1d57c88b75"
          if ! command -v trivy &>/dev/null; then
            ARCHIVE="${RUNNER_TEMP}/trivy.tar.gz"
            curl -sSfL --proto =https --connect-timeout 15 --max-time 120 -o "$ARCHIVE" \
              "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz"
            echo "${TRIVY_SHA256}  ${ARCHIVE}" | sha256sum -c -
            mkdir -p "${HOME}/.local/bin"
          tar xzf "$ARCHIVE" --no-same-owner --no-same-permissions -C "${HOME}/.local/bin" trivy
            rm -f "$ARCHIVE"
            export PATH="${HOME}/.local/bin:$PATH"
          echo "${HOME}/.local/bin" >> "$GITHUB_PATH"
          fi
          trivy rootfs --format spdx-json --output frontend-build-sbom.spdx.json \
            --no-progress frontend/dist/ || true

      - name: Check for sensitive files in frontend dist
        run: |
          FOUND=$(find frontend/dist/ -type f \( -name '.env*' -o -name '*.key' -o -name '*.pem' -o -name '*.p12' -o -name '*.pfx' -o -name 'id_rsa*' -o -name '*.secret' \) 2>/dev/null || true)
          if [ -n "$FOUND" ]; then
            echo "::error::Sensitive files found in frontend dist:"
            echo "$FOUND"
            exit 1
          fi

      - name: Upload frontend dist artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: frontend-dist
          path: |
            frontend/dist/
            frontend/frontend-dist.sha256
          retention-days: 3
          overwrite: false
          if-no-files-found: error

      - name: Upload frontend build SBOM
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: frontend-build-sbom
          path: frontend-build-sbom.spdx.json
          retention-days: 30
          overwrite: false
          if-no-files-found: warn

      - name: Attest frontend build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: frontend/dist/

      - name: Record duration
        id: timing
        if: always()
        run: echo "duration=$(( $(date +%s) - ${{ steps.start.outputs.time }} ))s" >> $GITHUB_OUTPUT

      - name: Collect frontend build errors for notification
        id: collect-errors
        if: failure()
        run: |
          ERROR=""
          [ -f "${RUNNER_TEMP}/build-frontend-output.txt" ] && ERROR="$(tail -c 3000 "${RUNNER_TEMP}/build-frontend-output.txt")"
          if [ -z "$ERROR" ]; then
            ERROR="Frontend WASM build failed but no captured output. Run trunk build --release in frontend/ to reproduce."
          fi
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "error_log<<$EOF" >> $GITHUB_OUTPUT
          echo "$ERROR" >> $GITHUB_OUTPUT
          echo "$EOF" >> $GITHUB_OUTPUT

  build-backend:
    name: Backend Release Build
    runs-on: ${{ github.actor == 'dependabot[bot]' && 'ubuntu-latest' || fromJSON('["self-hosted","linux"]') }}
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
      attestations: write
    outputs:
      error_log: ${{ steps.collect-errors.outputs.error_log }}
      duration: ${{ steps.timing.outputs.duration }}
      cache_hit: ${{ steps.cache.outputs.cache-hit }}
    needs: [secret-scan, dependency-review, lint, test-backend, test-frontend, quality-gate, sonarqube]
    if: |
      always() &&
      needs.secret-scan.result == 'success' &&
      needs.lint.result == 'success' &&
      needs.test-backend.result == 'success' &&
      needs.test-frontend.result == 'success' &&
      needs.quality-gate.result == 'success' &&
      (needs.dependency-review.result == 'success' || needs.dependency-review.result == 'skipped') &&
      (needs.sonarqube.result == 'success' || needs.sonarqube.result == 'skipped' || needs.sonarqube.result == 'cancelled')
    steps:
      - name: Record start time
        id: start
        run: echo "time=$(date +%s)" >> $GITHUB_OUTPUT

      - name: Clean workspace
        run: |
          if [ -z "$GITHUB_WORKSPACE" ] || [ "$GITHUB_WORKSPACE" = "/" ]; then
            echo "::error::GITHUB_WORKSPACE is empty or root -- aborting cleanup"
            exit 1
          fi
          rm -rf "${GITHUB_WORKSPACE:?}"/* "${GITHUB_WORKSPACE:?}"/.* 2>/dev/null || true

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Restore cargo cache
        id: cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: v2-${{ runner.os }}-cargo-backend-build-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            v2-${{ runner.os }}-cargo-backend-build-
            v2-${{ runner.os }}-cargo-

      - name: Build optimized backend binary
        timeout-minutes: 25
        run: cargo build --frozen -p realestate-backend --release 2>&1 | tee "${RUNNER_TEMP}/build-backend-output.txt"

      - name: Scan backend build output for leaked secrets
        run: |
          if command -v gitleaks &>/dev/null; then
            gitleaks detect --source target/release --no-git --verbose --redact --exit-code 1
          else
            GITLEAKS_VERSION="8.24.3"
            GITLEAKS_SHA256="9991e0b2903da4c8f6122b5c3186448b927a5da4deef1fe45271c3793f4ee29c"
            ARCHIVE="${RUNNER_TEMP}/gitleaks.tar.gz"
            curl -sSfL --proto =https --connect-timeout 15 --max-time 120 -o "$ARCHIVE" \
              "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
            echo "${GITLEAKS_SHA256}  ${ARCHIVE}" | sha256sum -c -
            mkdir -p "${HOME}/.local/bin"
          tar xzf "$ARCHIVE" --no-same-owner --no-same-permissions -C "${HOME}/.local/bin" gitleaks
            rm -f "$ARCHIVE"
            export PATH="${HOME}/.local/bin:$PATH"
          echo "${HOME}/.local/bin" >> "$GITHUB_PATH"
            gitleaks detect --source target/release --no-git --verbose --redact --exit-code 1
          fi

      - name: Generate SHA256 checksum for backend binary
        run: |
          umask 077
          sha256sum target/release/realestate-backend > target/release/realestate-backend.sha256
          echo "Backend binary checksum:"
          cat target/release/realestate-backend.sha256

      - name: Generate SBOM for backend binary (SPDX)
        run: |
          umask 077
          TRIVY_VERSION="0.69.3"
          TRIVY_SHA256="1816b632dfe529869c740c0913e36bd1629cb7688bd5634f4a858c1d57c88b75"
          if ! command -v trivy &>/dev/null; then
            ARCHIVE="${RUNNER_TEMP}/trivy.tar.gz"
            curl -sSfL --proto =https --connect-timeout 15 --max-time 120 -o "$ARCHIVE" \
              "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz"
            echo "${TRIVY_SHA256}  ${ARCHIVE}" | sha256sum -c -
            mkdir -p "${HOME}/.local/bin"
          tar xzf "$ARCHIVE" --no-same-owner --no-same-permissions -C "${HOME}/.local/bin" trivy
            rm -f "$ARCHIVE"
            export PATH="${HOME}/.local/bin:$PATH"
          echo "${HOME}/.local/bin" >> "$GITHUB_PATH"
          fi
          trivy rootfs --format spdx-json --output backend-build-sbom.spdx.json \
            --no-progress target/release/realestate-backend || true

      - name: Scan backend binary for vulnerabilities (Trivy)
        run: |
          trivy rootfs --exit-code 1 --severity CRITICAL,HIGH --ignore-unfixed \
            --no-progress --format table \
            target/release/realestate-backend || true

      - name: Check for sensitive files in backend release
        run: |
          FOUND=$(find target/release/ -maxdepth 1 -type f \( -name '.env*' -o -name '*.key' -o -name '*.pem' -o -name '*.p12' -o -name '*.pfx' -o -name 'id_rsa*' -o -name '*.secret' \) 2>/dev/null || true)
          if [ -n "$FOUND" ]; then
            echo "::error::Sensitive files found in backend release:"
            echo "$FOUND"
            exit 1
          fi

      - name: Upload backend binary artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: backend-binary
          path: |
            target/release/realestate-backend
            target/release/realestate-backend.sha256
          retention-days: 3
          overwrite: false
          if-no-files-found: error

      - name: Upload backend build SBOM
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: backend-build-sbom
          path: backend-build-sbom.spdx.json
          retention-days: 30
          overwrite: false
          if-no-files-found: warn

      - name: Attest backend build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: target/release/realestate-backend

      - name: Record duration
        id: timing
        if: always()
        run: echo "duration=$(( $(date +%s) - ${{ steps.start.outputs.time }} ))s" >> $GITHUB_OUTPUT

      - name: Collect backend build errors for notification
        id: collect-errors
        if: failure()
        run: |
          ERROR=""
          [ -f "${RUNNER_TEMP}/build-backend-output.txt" ] && ERROR="$(tail -c 3000 "${RUNNER_TEMP}/build-backend-output.txt")"
          if [ -z "$ERROR" ]; then
            ERROR="Backend release build failed but no captured output. Run cargo build -p realestate-backend --release to reproduce."
          fi
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "error_log<<$EOF" >> $GITHUB_OUTPUT
          echo "$ERROR" >> $GITHUB_OUTPUT
          echo "$EOF" >> $GITHUB_OUTPUT

  # ── Stage 3: Container Images (parallel, runs after builds pass, main branch only) ──

  container-image-backend:
    name: Build & Push Backend Image to GHCR
    runs-on: ${{ github.actor == 'dependabot[bot]' && 'ubuntu-latest' || fromJSON('["self-hosted","linux","docker"]') }}
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write
      security-events: write
      id-token: write
      attestations: write
    env:
      DOCKER_CONTENT_TRUST: "1"
      IMAGE_OWNER: ${{ github.repository_owner }}
      IMAGE_TAG: ${{ github.sha }}
    outputs:
      digest: ${{ steps.push-backend.outputs.digest }}
    needs: [build-backend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Clean workspace
        run: |
          if [ -z "$GITHUB_WORKSPACE" ] || [ "$GITHUB_WORKSPACE" = "/" ]; then
            echo "::error::GITHUB_WORKSPACE is empty or root -- aborting cleanup"
            exit 1
          fi
          rm -rf "${GITHUB_WORKSPACE:?}"/* "${GITHUB_WORKSPACE:?}"/.* 2>/dev/null || true

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - name: Build backend image (local)
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: Dockerfile.backend
          load: true
          tags: ghcr.io/${{ env.IMAGE_OWNER }}/realestate-backend:${{ github.sha }}
          provenance: mode=max
          sbom: true

      - name: Install Trivy (with checksum verification)
        timeout-minutes: 3
        run: |
          TRIVY_VERSION="0.69.3"
          TRIVY_SHA256="1816b632dfe529869c740c0913e36bd1629cb7688bd5634f4a858c1d57c88b75"
          if ! command -v trivy &>/dev/null || [ "$(trivy --version 2>/dev/null | grep -oP '\d+\.\d+\.\d+')" != "$TRIVY_VERSION" ]; then
            ARCHIVE="${RUNNER_TEMP}/trivy.tar.gz"
            curl -sSfL --proto =https --connect-timeout 15 --max-time 120 -o "$ARCHIVE" \
              "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz"
            echo "${TRIVY_SHA256}  ${ARCHIVE}" | sha256sum -c -
            mkdir -p "${HOME}/.local/bin"
          tar xzf "$ARCHIVE" --no-same-owner --no-same-permissions -C "${HOME}/.local/bin" trivy
            rm -f "$ARCHIVE"
            export PATH="${HOME}/.local/bin:$PATH"
          echo "${HOME}/.local/bin" >> "$GITHUB_PATH"
          fi
          trivy --version

      - name: Scan backend image for vulnerabilities (Trivy)
        run: |
          trivy image --exit-code 1 --severity CRITICAL,HIGH --ignore-unfixed --no-progress \
            --format table \
            ghcr.io/${IMAGE_OWNER}/realestate-backend:${IMAGE_TAG}

      - name: Generate Trivy SARIF report for backend image
        if: always()
        run: |
          trivy image --severity CRITICAL,HIGH,MEDIUM --ignore-unfixed --no-progress \
            --format sarif --output trivy-backend.sarif \
            ghcr.io/${IMAGE_OWNER}/realestate-backend:${IMAGE_TAG} || true

      - name: Generate SBOM for backend image (SPDX)
        if: always()
        run: |
          trivy image --format spdx-json --output backend-sbom.spdx.json \
            --no-progress \
            ghcr.io/${IMAGE_OWNER}/realestate-backend:${IMAGE_TAG} || true

      - name: Upload backend SBOM artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: backend-sbom
          path: backend-sbom.spdx.json
          retention-days: 30
          overwrite: false
          if-no-files-found: warn

      - name: Upload Trivy SARIF to GitHub Security
        if: always() && hashFiles('trivy-backend.sarif') != ''
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1
        with:
          sarif_file: trivy-backend.sarif
          category: trivy-backend
        continue-on-error: true

      - name: Push backend image to GHCR
        id: push-backend
        run: |
          docker push ghcr.io/${IMAGE_OWNER}/realestate-backend:${IMAGE_TAG}
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' \
            ghcr.io/${IMAGE_OWNER}/realestate-backend:${IMAGE_TAG} 2>/dev/null \
            | grep -oP 'sha256:[a-f0-9]+' || true)
          echo "digest=${DIGEST}" >> $GITHUB_OUTPUT

      - name: Attest backend container image provenance
        if: steps.push-backend.outputs.digest != ''
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ghcr.io/${IMAGE_OWNER}/realestate-backend
          subject-digest: ${{ steps.push-backend.outputs.digest }}
          push-to-registry: true

      - name: Clean up docker images on self-hosted runner
        if: always()
        run: |
          docker rmi "ghcr.io/${IMAGE_OWNER}/realestate-backend:${IMAGE_TAG}" 2>/dev/null || true
          docker builder prune -f --filter "until=24h" 2>/dev/null || true

      - name: Clean up docker credentials
        if: always()
        run: docker logout ghcr.io 2>/dev/null || true

  container-image-frontend:
    name: Build & Push Frontend Image to GHCR
    runs-on: ${{ github.actor == 'dependabot[bot]' && 'ubuntu-latest' || fromJSON('["self-hosted","linux","docker"]') }}
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write
      security-events: write
      id-token: write
      attestations: write
    env:
      DOCKER_CONTENT_TRUST: "1"
      IMAGE_OWNER: ${{ github.repository_owner }}
      IMAGE_TAG: ${{ github.sha }}
    outputs:
      digest: ${{ steps.push-frontend.outputs.digest }}
    needs: [build-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Clean workspace
        run: |
          if [ -z "$GITHUB_WORKSPACE" ] || [ "$GITHUB_WORKSPACE" = "/" ]; then
            echo "::error::GITHUB_WORKSPACE is empty or root -- aborting cleanup"
            exit 1
          fi
          rm -rf "${GITHUB_WORKSPACE:?}"/* "${GITHUB_WORKSPACE:?}"/.* 2>/dev/null || true

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - name: Build frontend image (local)
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: Dockerfile.frontend
          load: true
          tags: ghcr.io/${{ env.IMAGE_OWNER }}/realestate-frontend:${{ github.sha }}
          provenance: mode=max
          sbom: true

      - name: Install Trivy (with checksum verification)
        timeout-minutes: 3
        run: |
          TRIVY_VERSION="0.69.3"
          TRIVY_SHA256="1816b632dfe529869c740c0913e36bd1629cb7688bd5634f4a858c1d57c88b75"
          if ! command -v trivy &>/dev/null || [ "$(trivy --version 2>/dev/null | grep -oP '\d+\.\d+\.\d+')" != "$TRIVY_VERSION" ]; then
            ARCHIVE="${RUNNER_TEMP}/trivy.tar.gz"
            curl -sSfL --proto =https --connect-timeout 15 --max-time 120 -o "$ARCHIVE" \
              "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz"
            echo "${TRIVY_SHA256}  ${ARCHIVE}" | sha256sum -c -
            mkdir -p "${HOME}/.local/bin"
          tar xzf "$ARCHIVE" --no-same-owner --no-same-permissions -C "${HOME}/.local/bin" trivy
            rm -f "$ARCHIVE"
            export PATH="${HOME}/.local/bin:$PATH"
          echo "${HOME}/.local/bin" >> "$GITHUB_PATH"
          fi
          trivy --version

      - name: Scan frontend image for vulnerabilities (Trivy)
        run: |
          trivy image --exit-code 1 --severity CRITICAL,HIGH --ignore-unfixed --no-progress \
            --format table \
            ghcr.io/${IMAGE_OWNER}/realestate-frontend:${IMAGE_TAG}

      - name: Generate Trivy SARIF report for frontend image
        if: always()
        run: |
          trivy image --severity CRITICAL,HIGH,MEDIUM --ignore-unfixed --no-progress \
            --format sarif --output trivy-frontend.sarif \
            ghcr.io/${IMAGE_OWNER}/realestate-frontend:${IMAGE_TAG} || true

      - name: Generate SBOM for frontend image (SPDX)
        if: always()
        run: |
          trivy image --format spdx-json --output frontend-sbom.spdx.json \
            --no-progress \
            ghcr.io/${IMAGE_OWNER}/realestate-frontend:${IMAGE_TAG} || true

      - name: Upload frontend SBOM artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: frontend-sbom
          path: frontend-sbom.spdx.json
          retention-days: 30
          overwrite: false
          if-no-files-found: warn

      - name: Upload Trivy SARIF to GitHub Security
        if: always() && hashFiles('trivy-frontend.sarif') != ''
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1
        with:
          sarif_file: trivy-frontend.sarif
          category: trivy-frontend
        continue-on-error: true

      - name: Push frontend image to GHCR
        id: push-frontend
        run: |
          docker push ghcr.io/${IMAGE_OWNER}/realestate-frontend:${IMAGE_TAG}
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' \
            ghcr.io/${IMAGE_OWNER}/realestate-frontend:${IMAGE_TAG} 2>/dev/null \
            | grep -oP 'sha256:[a-f0-9]+' || true)
          echo "digest=${DIGEST}" >> $GITHUB_OUTPUT

      - name: Attest frontend container image provenance
        if: steps.push-frontend.outputs.digest != ''
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ghcr.io/${IMAGE_OWNER}/realestate-frontend
          subject-digest: ${{ steps.push-frontend.outputs.digest }}
          push-to-registry: true

      - name: Clean up docker images on self-hosted runner
        if: always()
        run: |
          docker rmi "ghcr.io/${IMAGE_OWNER}/realestate-frontend:${IMAGE_TAG}" 2>/dev/null || true
          docker builder prune -f --filter "until=24h" 2>/dev/null || true

      - name: Clean up docker credentials
        if: always()
        run: docker logout ghcr.io 2>/dev/null || true

  # ── Stage 4: Deploy (runs after both images are pushed) ──

  deploy:
    name: Deploy to Production
    runs-on: ${{ github.actor == 'dependabot[bot]' && 'ubuntu-latest' || fromJSON('["self-hosted","linux","sonarqube"]') }}
    timeout-minutes: 10
    environment: production
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    permissions:
      contents: read
      packages: read
    env:
      DOCKER_CONTENT_TRUST: "1"
      IMAGE_OWNER: ${{ github.repository_owner }}
    needs: [container-image-backend, container-image-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Clean workspace
        run: |
          if [ -z "$GITHUB_WORKSPACE" ] || [ "$GITHUB_WORKSPACE" = "/" ]; then
            echo "::error::GITHUB_WORKSPACE is empty or root -- aborting cleanup"
            exit 1
          fi
          rm -rf "${GITHUB_WORKSPACE:?}"/* "${GITHUB_WORKSPACE:?}"/.* 2>/dev/null || true

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify build provenance attestations
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BACKEND_DIGEST: ${{ needs.container-image-backend.outputs.digest }}
          FRONTEND_DIGEST: ${{ needs.container-image-frontend.outputs.digest }}
        run: |
          VERIFIED=true
          if [ -n "$BACKEND_DIGEST" ]; then
            echo "Verifying backend attestation..."
            if ! gh attestation verify "oci://ghcr.io/${IMAGE_OWNER}/realestate-backend@${BACKEND_DIGEST}" \
              --owner "${IMAGE_OWNER}" 2>&1; then
              echo "::error::Backend attestation verification failed"
              VERIFIED=false
            fi
          else
            echo "::error::Backend digest unavailable -- cannot verify provenance"
            VERIFIED=false
          fi
          if [ -n "$FRONTEND_DIGEST" ]; then
            echo "Verifying frontend attestation..."
            if ! gh attestation verify "oci://ghcr.io/${IMAGE_OWNER}/realestate-frontend@${FRONTEND_DIGEST}" \
              --owner "${IMAGE_OWNER}" 2>&1; then
              echo "::error::Frontend attestation verification failed"
              VERIFIED=false
            fi
          else
            echo "::error::Frontend digest unavailable -- cannot verify provenance"
            VERIFIED=false
          fi
          if [ "$VERIFIED" = "false" ]; then
            exit 1
          fi

      - name: Mask production secrets
        run: |
          echo "::add-mask::${{ secrets.PROD_POSTGRES_PASSWORD }}"
          echo "::add-mask::${{ secrets.PROD_JWT_SECRET }}"

      - name: Pull latest images and deploy
        env:
          POSTGRES_PASSWORD: ${{ secrets.PROD_POSTGRES_PASSWORD }}
          JWT_SECRET: ${{ secrets.PROD_JWT_SECRET }}
          IMAGE_TAG: ${{ github.sha }}
          BACKEND_DIGEST: ${{ needs.container-image-backend.outputs.digest }}
          FRONTEND_DIGEST: ${{ needs.container-image-frontend.outputs.digest }}
        run: |
          umask 077
          # Capture current image digests for rollback
          PREV_BACKEND=$(docker compose -f docker-compose.prod.yml images backend --format json 2>/dev/null | jq -r '.[0].ID // empty' || true)
          PREV_FRONTEND=$(docker compose -f docker-compose.prod.yml images frontend --format json 2>/dev/null | jq -r '.[0].ID // empty' || true)
          echo "PREV_BACKEND=$PREV_BACKEND" >> "$GITHUB_ENV"
          echo "PREV_FRONTEND=$PREV_FRONTEND" >> "$GITHUB_ENV"

          # Pull by digest when available to prevent TOCTOU between scan and deploy
          if [ -n "$BACKEND_DIGEST" ]; then
            echo "Pulling backend by digest: $BACKEND_DIGEST"
            docker pull "ghcr.io/${IMAGE_OWNER}/realestate-backend@${BACKEND_DIGEST}"
            docker tag "ghcr.io/${IMAGE_OWNER}/realestate-backend@${BACKEND_DIGEST}" \
              "ghcr.io/${IMAGE_OWNER}/realestate-backend:${IMAGE_TAG}"
          fi
          if [ -n "$FRONTEND_DIGEST" ]; then
            echo "Pulling frontend by digest: $FRONTEND_DIGEST"
            docker pull "ghcr.io/${IMAGE_OWNER}/realestate-frontend@${FRONTEND_DIGEST}"
            docker tag "ghcr.io/${IMAGE_OWNER}/realestate-frontend@${FRONTEND_DIGEST}" \
              "ghcr.io/${IMAGE_OWNER}/realestate-frontend:${IMAGE_TAG}"
          fi

          # Fall back to tag-based pull if digests unavailable
          if [ -z "$BACKEND_DIGEST" ] || [ -z "$FRONTEND_DIGEST" ]; then
            echo "::warning::Digest unavailable for one or both images -- falling back to tag pull"
            docker compose -f docker-compose.prod.yml pull
          fi

          docker compose -f docker-compose.prod.yml up -d --no-build --pull never --remove-orphans
          docker compose -f docker-compose.prod.yml ps

      - name: Verify deployment health
        id: health-check
        timeout-minutes: 4
        env:
          POSTGRES_PASSWORD: ${{ secrets.PROD_POSTGRES_PASSWORD }}
          JWT_SECRET: ${{ secrets.PROD_JWT_SECRET }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          umask 077
          echo "Waiting for services to initialize..."
          sleep 10
          BACKEND_OK=false
          for i in $(seq 1 30); do
            if docker compose -f docker-compose.prod.yml exec -T backend curl -sf --max-time 5 http://localhost:8080/health >/dev/null 2>&1; then
              BACKEND_OK=true
              echo "Backend health check passed on attempt $i"
              break
            fi
            echo "Attempt $i/30 -- backend not ready, waiting 5s..."
            sleep 5
          done
          if [ "$BACKEND_OK" = "false" ]; then
            echo "::error::Backend health check failed after 150 seconds"
            echo "Container status:"
            docker compose -f docker-compose.prod.yml ps
            echo "Backend logs (last 50 lines):"
            docker compose -f docker-compose.prod.yml logs --tail=50 backend
            exit 1
          fi

      - name: Rollback on health check failure
        if: failure() && steps.health-check.outcome == 'failure'
        timeout-minutes: 3
        env:
          POSTGRES_PASSWORD: ${{ secrets.PROD_POSTGRES_PASSWORD }}
          JWT_SECRET: ${{ secrets.PROD_JWT_SECRET }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          umask 077
          echo "::warning::Health check failed -- rolling back to previous images"
          if [ -n "$PREV_BACKEND" ] || [ -n "$PREV_FRONTEND" ]; then
            docker compose -f docker-compose.prod.yml down
            docker compose -f docker-compose.prod.yml up -d --no-build --remove-orphans 2>/dev/null || true
            echo "Rollback attempted. Verify manually."
          else
            echo "No previous images recorded -- stopping failed deployment"
            docker compose -f docker-compose.prod.yml down
          fi

      - name: Clean up docker credentials
        if: always()
        run: docker logout ghcr.io 2>/dev/null || true

  notify-failure:
    name: Failure Notification Webhook
    runs-on: ${{ github.actor == 'dependabot[bot]' && 'ubuntu-latest' || fromJSON('["self-hosted","linux"]') }}
    timeout-minutes: 5
    permissions: {}
    env:
      WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
      WEBHOOK_HOST: ${{ secrets.WEBHOOK_HOST }}
      GH_SERVER_URL: ${{ github.server_url }}
      GH_REPOSITORY: ${{ github.repository }}
      GH_RUN_ID: ${{ github.run_id }}
      GH_SHA: ${{ github.sha }}
      GH_REF_NAME: ${{ github.ref_name }}
      GH_ACTOR: ${{ github.actor }}
    needs: [secret-scan, dependency-review, lint, test-backend, test-frontend, quality-gate, sonarqube, build-frontend, build-backend, container-image-backend, container-image-frontend, deploy]
    if: always() && contains(needs.*.result, 'failure')
    steps:
      - name: Define payload sanitizer
        id: sanitizer
        run: |
          # Define sanitizer as a shell function (avoids TOCTOU race with /tmp file on shared runners)
          # Each subsequent step sources this function inline via heredoc
          echo "Sanitizer defined as inline function in each notification step"
      - name: Validate webhook configuration
        id: webhook-check
        run: |
          if [ -z "$WEBHOOK_SECRET" ] || [ -z "$WEBHOOK_HOST" ]; then
            echo "::warning::WEBHOOK_SECRET or WEBHOOK_HOST not configured -- skipping all notifications"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
      - name: Notify -- secret scanning detected leaked secrets
        if: always() && needs.secret-scan.result == 'failure' && steps.webhook-check.outputs.skip != 'true'
        run: |
          sanitize_payload() {
            sed -E \
              -e 's/(password|secret|token|key|credential|authorization)[=: ]+[^ "]+/\1=***REDACTED***/gi' \
              -e 's/ghp_[A-Za-z0-9_]+/***REDACTED***/g' \
              -e 's/ghs_[A-Za-z0-9_]+/***REDACTED***/g' \
              -e 's/gho_[A-Za-z0-9_]+/***REDACTED***/g' \
              -e 's/ghu_[A-Za-z0-9_]+/***REDACTED***/g' \
              -e 's/github_pat_[A-Za-z0-9_]+/***REDACTED***/g' \
              -e 's/Bearer [A-Za-z0-9._\-]+/Bearer ***REDACTED***/g' \
              -e 's|postgresql://[^@[:space:]]+"*|postgresql://***:***@***REDACTED***|g'
          }
          PAYLOAD=$(jq -n \
            --arg job "secret-scan" \
            --arg step "gitleaks" \
            --arg error_log "Gitleaks detected secrets in the repository. Review the secret-scan job output and rotate any exposed credentials immediately." \
            --arg run_url "${GH_SERVER_URL}/${GH_REPOSITORY}/actions/runs/${GH_RUN_ID}" \
            --arg commit "$GH_SHA" \
            --arg branch "$GH_REF_NAME" \
            --arg actor "$GH_ACTOR" \
            '{job: $job, step: $step, error_log: $error_log, run_url: $run_url, commit: $commit, branch: $branch, actor: $actor}')
          SIGNATURE=$(printf '%s' "$PAYLOAD" | openssl dgst -sha256 -hmac "${WEBHOOK_SECRET}" | awk '{print $NF}')
          curl -s --connect-timeout 5 --max-time 10 -X POST http://${WEBHOOK_HOST}:9090/ci-failure \
            -H "Content-Type: application/json" \
            -H "X-Signature-256: sha256=$SIGNATURE" \
            -d "$PAYLOAD" || echo "Webhook unreachable -- skipping notification"

      - name: Notify -- code formatting or clippy lint failed
        if: always() && needs.lint.result == 'failure' && steps.webhook-check.outputs.skip != 'true'
        env:
          ERROR_LOG: ${{ needs.lint.outputs.error_log }}
          FAILED_STEPS: ${{ needs.lint.outputs.failed_steps }}
        run: |
          sanitize_payload() { sed -E -e 's/(password|secret|token|key|credential|authorization)[=: ]+[^ "]+/\1=***REDACTED***/gi' -e 's/ghp_[A-Za-z0-9_]+/***REDACTED***/g' -e 's/ghs_[A-Za-z0-9_]+/***REDACTED***/g' -e 's/gho_[A-Za-z0-9_]+/***REDACTED***/g' -e 's/ghu_[A-Za-z0-9_]+/***REDACTED***/g' -e 's/github_pat_[A-Za-z0-9_]+/***REDACTED***/g' -e 's/Bearer [A-Za-z0-9._\-]+/Bearer ***REDACTED***/g' -e 's|postgresql://[^@[:space:]]+"*|postgresql://***:***@***REDACTED***|g'; }
          if [ -z "$ERROR_LOG" ]; then
            ERROR_LOG="Lint job failed but no captured output. Run cargo fmt --all -- --check and cargo clippy --workspace -- -D warnings to reproduce."
          fi
          ERROR_LOG=$(printf '%s' "$ERROR_LOG" | sanitize_payload)
          STEP="${FAILED_STEPS:-clippy-or-fmt}"
          PAYLOAD=$(jq -n --arg job "lint" --arg step "$STEP" --arg error_log "$ERROR_LOG" \
            --arg run_url "${GH_SERVER_URL}/${GH_REPOSITORY}/actions/runs/${GH_RUN_ID}" \
            --arg commit "$GH_SHA" --arg branch "$GH_REF_NAME" --arg actor "$GH_ACTOR" \
            '{job: $job, step: $step, error_log: $error_log, run_url: $run_url, commit: $commit, branch: $branch, actor: $actor}')
          SIGNATURE=$(printf '%s' "$PAYLOAD" | openssl dgst -sha256 -hmac "${WEBHOOK_SECRET}" | awk '{print $NF}')
          curl -s --connect-timeout 5 --max-time 10 -X POST http://${WEBHOOK_HOST}:9090/ci-failure \
            -H "Content-Type: application/json" \
            -H "X-Signature-256: sha256=$SIGNATURE" \
            -d "$PAYLOAD" || echo "Webhook unreachable -- skipping notification"

      - name: Notify -- backend tests failed
        if: always() && needs.test-backend.result == 'failure' && steps.webhook-check.outputs.skip != 'true'
        env:
          ERROR_LOG: ${{ needs.test-backend.outputs.error_log }}
        run: |
          sanitize_payload() { sed -E -e 's/(password|secret|token|key|credential|authorization)[=: ]+[^ "]+/\1=***REDACTED***/gi' -e 's/ghp_[A-Za-z0-9_]+/***REDACTED***/g' -e 's/ghs_[A-Za-z0-9_]+/***REDACTED***/g' -e 's/gho_[A-Za-z0-9_]+/***REDACTED***/g' -e 's/ghu_[A-Za-z0-9_]+/***REDACTED***/g' -e 's/github_pat_[A-Za-z0-9_]+/***REDACTED***/g' -e 's/Bearer [A-Za-z0-9._\-]+/Bearer ***REDACTED***/g' -e 's|postgresql://[^@[:space:]]+"*|postgresql://***:***@***REDACTED***|g'; }
          if [ -z "$ERROR_LOG" ]; then
            ERROR_LOG="Backend tests failed but no captured output. Run cargo test -p realestate-backend --all-targets to reproduce."
          fi
          ERROR_LOG=$(printf '%s' "$ERROR_LOG" | sanitize_payload)
          PAYLOAD=$(jq -n --arg job "test-backend" --arg step "cargo-test" --arg error_log "$ERROR_LOG" \
            --arg run_url "${GH_SERVER_URL}/${GH_REPOSITORY}/actions/runs/${GH_RUN_ID}" \
            --arg commit "$GH_SHA" --arg branch "$GH_REF_NAME" --arg actor "$GH_ACTOR" \
            '{job: $job, step: $step, error_log: $error_log, run_url: $run_url, commit: $commit, branch: $branch, actor: $actor}')
          SIGNATURE=$(printf '%s' "$PAYLOAD" | openssl dgst -sha256 -hmac "${WEBHOOK_SECRET}" | awk '{print $NF}')
          curl -s --connect-timeout 5 --max-time 10 -X POST http://${WEBHOOK_HOST}:9090/ci-failure \
            -H "Content-Type: application/json" \
            -H "X-Signature-256: sha256=$SIGNATURE" \
            -d "$PAYLOAD" || echo "Webhook unreachable -- skipping notification"

      - name: Notify -- frontend tests failed
        if: always() && needs.test-frontend.result == 'failure' && steps.webhook-check.outputs.skip != 'true'
        env:
          ERROR_LOG: ${{ needs.test-frontend.outputs.error_log }}
        run: |
          sanitize_payload() { sed -E -e 's/(password|secret|token|key|credential|authorization)[=: ]+[^ "]+/\1=***REDACTED***/gi' -e 's/ghp_[A-Za-z0-9_]+/***REDACTED***/g' -e 's/ghs_[A-Za-z0-9_]+/***REDACTED***/g' -e 's/gho_[A-Za-z0-9_]+/***REDACTED***/g' -e 's/ghu_[A-Za-z0-9_]+/***REDACTED***/g' -e 's/github_pat_[A-Za-z0-9_]+/***REDACTED***/g' -e 's/Bearer [A-Za-z0-9._\-]+/Bearer ***REDACTED***/g' -e 's|postgresql://[^@[:space:]]+"*|postgresql://***:***@***REDACTED***|g'; }
          if [ -z "$ERROR_LOG" ]; then
            ERROR_LOG="Frontend tests failed but no captured output. Run cargo test -p realestate-frontend --all-targets to reproduce."
          fi
          ERROR_LOG=$(printf '%s' "$ERROR_LOG" | sanitize_payload)
          PAYLOAD=$(jq -n --arg job "test-frontend" --arg step "cargo-test" --arg error_log "$ERROR_LOG" \
            --arg run_url "${GH_SERVER_URL}/${GH_REPOSITORY}/actions/runs/${GH_RUN_ID}" \
            --arg commit "$GH_SHA" --arg branch "$GH_REF_NAME" --arg actor "$GH_ACTOR" \
            '{job: $job, step: $step, error_log: $error_log, run_url: $run_url, commit: $commit, branch: $branch, actor: $actor}')
          SIGNATURE=$(printf '%s' "$PAYLOAD" | openssl dgst -sha256 -hmac "${WEBHOOK_SECRET}" | awk '{print $NF}')
          curl -s --connect-timeout 5 --max-time 10 -X POST http://${WEBHOOK_HOST}:9090/ci-failure \
            -H "Content-Type: application/json" \
            -H "X-Signature-256: sha256=$SIGNATURE" \
            -d "$PAYLOAD" || echo "Webhook unreachable -- skipping notification"

      - name: Notify -- dependency security gate failed
        if: always() && needs.quality-gate.result == 'failure' && steps.webhook-check.outputs.skip != 'true'
        env:
          ERROR_LOG: ${{ needs.quality-gate.outputs.error_log }}
          FAILED_STEPS: ${{ needs.quality-gate.outputs.failed_steps }}
        run: |
          sanitize_payload() { sed -E -e 's/(password|secret|token|key|credential|authorization)[=: ]+[^ "]+/\1=***REDACTED***/gi' -e 's/ghp_[A-Za-z0-9_]+/***REDACTED***/g' -e 's/ghs_[A-Za-z0-9_]+/***REDACTED***/g' -e 's/gho_[A-Za-z0-9_]+/***REDACTED***/g' -e 's/ghu_[A-Za-z0-9_]+/***REDACTED***/g' -e 's/github_pat_[A-Za-z0-9_]+/***REDACTED***/g' -e 's/Bearer [A-Za-z0-9._\-]+/Bearer ***REDACTED***/g' -e 's|postgresql://[^@[:space:]]+"*|postgresql://***:***@***REDACTED***|g'; }
          if [ -z "$ERROR_LOG" ]; then
            ERROR_LOG="Quality gate failed but no captured output. Run cargo audit and cargo deny to reproduce."
          fi
          ERROR_LOG=$(printf '%s' "$ERROR_LOG" | sanitize_payload)
          STEP="${FAILED_STEPS:-audit-or-deny}"
          PAYLOAD=$(jq -n --arg job "quality-gate" --arg step "$STEP" --arg error_log "$ERROR_LOG" \
            --arg run_url "${GH_SERVER_URL}/${GH_REPOSITORY}/actions/runs/${GH_RUN_ID}" \
            --arg commit "$GH_SHA" --arg branch "$GH_REF_NAME" --arg actor "$GH_ACTOR" \
            '{job: $job, step: $step, error_log: $error_log, run_url: $run_url, commit: $commit, branch: $branch, actor: $actor}')
          SIGNATURE=$(printf '%s' "$PAYLOAD" | openssl dgst -sha256 -hmac "${WEBHOOK_SECRET}" | awk '{print $NF}')
          curl -s --connect-timeout 5 --max-time 10 -X POST http://${WEBHOOK_HOST}:9090/ci-failure \
            -H "Content-Type: application/json" \
            -H "X-Signature-256: sha256=$SIGNATURE" \
            -d "$PAYLOAD" || echo "Webhook unreachable -- skipping notification"

      - name: Notify -- frontend WASM build failed
        if: always() && needs.build-frontend.result == 'failure' && steps.webhook-check.outputs.skip != 'true'
        env:
          ERROR_LOG: ${{ needs.build-frontend.outputs.error_log }}
        run: |
          sanitize_payload() { sed -E -e 's/(password|secret|token|key|credential|authorization)[=: ]+[^ "]+/\1=***REDACTED***/gi' -e 's/ghp_[A-Za-z0-9_]+/***REDACTED***/g' -e 's/ghs_[A-Za-z0-9_]+/***REDACTED***/g' -e 's/gho_[A-Za-z0-9_]+/***REDACTED***/g' -e 's/ghu_[A-Za-z0-9_]+/***REDACTED***/g' -e 's/github_pat_[A-Za-z0-9_]+/***REDACTED***/g' -e 's/Bearer [A-Za-z0-9._\-]+/Bearer ***REDACTED***/g' -e 's|postgresql://[^@[:space:]]+"*|postgresql://***:***@***REDACTED***|g'; }
          if [ -z "$ERROR_LOG" ]; then
            ERROR_LOG="Frontend WASM build failed but no captured output. Run trunk build --release in frontend/ to reproduce."
          fi
          ERROR_LOG=$(printf '%s' "$ERROR_LOG" | sanitize_payload)
          PAYLOAD=$(jq -n --arg job "build-frontend" --arg step "trunk-build" --arg error_log "$ERROR_LOG" \
            --arg run_url "${GH_SERVER_URL}/${GH_REPOSITORY}/actions/runs/${GH_RUN_ID}" \
            --arg commit "$GH_SHA" --arg branch "$GH_REF_NAME" --arg actor "$GH_ACTOR" \
            '{job: $job, step: $step, error_log: $error_log, run_url: $run_url, commit: $commit, branch: $branch, actor: $actor}')
          SIGNATURE=$(printf '%s' "$PAYLOAD" | openssl dgst -sha256 -hmac "${WEBHOOK_SECRET}" | awk '{print $NF}')
          curl -s --connect-timeout 5 --max-time 10 -X POST http://${WEBHOOK_HOST}:9090/ci-failure \
            -H "Content-Type: application/json" \
            -H "X-Signature-256: sha256=$SIGNATURE" \
            -d "$PAYLOAD" || echo "Webhook unreachable -- skipping notification"

      - name: Notify -- backend release build failed
        if: always() && needs.build-backend.result == 'failure' && steps.webhook-check.outputs.skip != 'true'
        env:
          ERROR_LOG: ${{ needs.build-backend.outputs.error_log }}
        run: |
          sanitize_payload() { sed -E -e 's/(password|secret|token|key|credential|authorization)[=: ]+[^ "]+/\1=***REDACTED***/gi' -e 's/ghp_[A-Za-z0-9_]+/***REDACTED***/g' -e 's/ghs_[A-Za-z0-9_]+/***REDACTED***/g' -e 's/gho_[A-Za-z0-9_]+/***REDACTED***/g' -e 's/ghu_[A-Za-z0-9_]+/***REDACTED***/g' -e 's/github_pat_[A-Za-z0-9_]+/***REDACTED***/g' -e 's/Bearer [A-Za-z0-9._\-]+/Bearer ***REDACTED***/g' -e 's|postgresql://[^@[:space:]]+"*|postgresql://***:***@***REDACTED***|g'; }
          if [ -z "$ERROR_LOG" ]; then
            ERROR_LOG="Backend release build failed but no captured output. Run cargo build -p realestate-backend --release to reproduce."
          fi
          ERROR_LOG=$(printf '%s' "$ERROR_LOG" | sanitize_payload)
          PAYLOAD=$(jq -n --arg job "build-backend" --arg step "cargo-build" --arg error_log "$ERROR_LOG" \
            --arg run_url "${GH_SERVER_URL}/${GH_REPOSITORY}/actions/runs/${GH_RUN_ID}" \
            --arg commit "$GH_SHA" --arg branch "$GH_REF_NAME" --arg actor "$GH_ACTOR" \
            '{job: $job, step: $step, error_log: $error_log, run_url: $run_url, commit: $commit, branch: $branch, actor: $actor}')
          SIGNATURE=$(printf '%s' "$PAYLOAD" | openssl dgst -sha256 -hmac "${WEBHOOK_SECRET}" | awk '{print $NF}')
          curl -s --connect-timeout 5 --max-time 10 -X POST http://${WEBHOOK_HOST}:9090/ci-failure \
            -H "Content-Type: application/json" \
            -H "X-Signature-256: sha256=$SIGNATURE" \
            -d "$PAYLOAD" || echo "Webhook unreachable -- skipping notification"

      - name: Notify -- SonarQube analysis failed
        if: always() && needs.sonarqube.result == 'failure' && steps.webhook-check.outputs.skip != 'true'
        run: |
          PAYLOAD=$(jq -n \
            --arg job "sonarqube" \
            --arg step "sonar-scan" \
            --arg error_log "SonarQube analysis failed. Check SonarQube server status and scan configuration." \
            --arg run_url "${GH_SERVER_URL}/${GH_REPOSITORY}/actions/runs/${GH_RUN_ID}" \
            --arg commit "$GH_SHA" \
            --arg branch "$GH_REF_NAME" \
            --arg actor "$GH_ACTOR" \
            '{job: $job, step: $step, error_log: $error_log, run_url: $run_url, commit: $commit, branch: $branch, actor: $actor}')
          SIGNATURE=$(printf '%s' "$PAYLOAD" | openssl dgst -sha256 -hmac "${WEBHOOK_SECRET}" | awk '{print $NF}')
          curl -s --connect-timeout 5 --max-time 10 -X POST http://${WEBHOOK_HOST}:9090/ci-failure \
            -H "Content-Type: application/json" \
            -H "X-Signature-256: sha256=$SIGNATURE" \
            -d "$PAYLOAD" || echo "Webhook unreachable -- skipping notification"

      - name: Notify -- backend container image build/scan failed
        if: always() && needs.container-image-backend.result == 'failure' && steps.webhook-check.outputs.skip != 'true'
        run: |
          PAYLOAD=$(jq -n \
            --arg job "container-image-backend" \
            --arg step "docker-build-scan" \
            --arg error_log "Backend container image build or Trivy vulnerability scan failed. Check the container-image-backend job output for details." \
            --arg run_url "${GH_SERVER_URL}/${GH_REPOSITORY}/actions/runs/${GH_RUN_ID}" \
            --arg commit "$GH_SHA" \
            --arg branch "$GH_REF_NAME" \
            --arg actor "$GH_ACTOR" \
            '{job: $job, step: $step, error_log: $error_log, run_url: $run_url, commit: $commit, branch: $branch, actor: $actor}')
          SIGNATURE=$(printf '%s' "$PAYLOAD" | openssl dgst -sha256 -hmac "${WEBHOOK_SECRET}" | awk '{print $NF}')
          curl -s --connect-timeout 5 --max-time 10 -X POST http://${WEBHOOK_HOST}:9090/ci-failure \
            -H "Content-Type: application/json" \
            -H "X-Signature-256: sha256=$SIGNATURE" \
            -d "$PAYLOAD" || echo "Webhook unreachable -- skipping notification"

      - name: Notify -- frontend container image build/scan failed
        if: always() && needs.container-image-frontend.result == 'failure' && steps.webhook-check.outputs.skip != 'true'
        run: |
          PAYLOAD=$(jq -n \
            --arg job "container-image-frontend" \
            --arg step "docker-build-scan" \
            --arg error_log "Frontend container image build or Trivy vulnerability scan failed. Check the container-image-frontend job output for details." \
            --arg run_url "${GH_SERVER_URL}/${GH_REPOSITORY}/actions/runs/${GH_RUN_ID}" \
            --arg commit "$GH_SHA" \
            --arg branch "$GH_REF_NAME" \
            --arg actor "$GH_ACTOR" \
            '{job: $job, step: $step, error_log: $error_log, run_url: $run_url, commit: $commit, branch: $branch, actor: $actor}')
          SIGNATURE=$(printf '%s' "$PAYLOAD" | openssl dgst -sha256 -hmac "${WEBHOOK_SECRET}" | awk '{print $NF}')
          curl -s --connect-timeout 5 --max-time 10 -X POST http://${WEBHOOK_HOST}:9090/ci-failure \
            -H "Content-Type: application/json" \
            -H "X-Signature-256: sha256=$SIGNATURE" \
            -d "$PAYLOAD" || echo "Webhook unreachable -- skipping notification"

      - name: Notify -- production deployment failed
        if: always() && needs.deploy.result == 'failure' && steps.webhook-check.outputs.skip != 'true'
        run: |
          PAYLOAD=$(jq -n \
            --arg job "deploy" \
            --arg step "docker-compose-deploy" \
            --arg error_log "Production deployment failed. Check docker compose logs and service health on the deployment target." \
            --arg run_url "${GH_SERVER_URL}/${GH_REPOSITORY}/actions/runs/${GH_RUN_ID}" \
            --arg commit "$GH_SHA" \
            --arg branch "$GH_REF_NAME" \
            --arg actor "$GH_ACTOR" \
            '{job: $job, step: $step, error_log: $error_log, run_url: $run_url, commit: $commit, branch: $branch, actor: $actor}')
          SIGNATURE=$(printf '%s' "$PAYLOAD" | openssl dgst -sha256 -hmac "${WEBHOOK_SECRET}" | awk '{print $NF}')
          curl -s --connect-timeout 5 --max-time 10 -X POST http://${WEBHOOK_HOST}:9090/ci-failure \
            -H "Content-Type: application/json" \
            -H "X-Signature-256: sha256=$SIGNATURE" \
            -d "$PAYLOAD" || echo "Webhook unreachable -- skipping notification"

      - name: Write failure summary
        if: always()
        run: |
          {
            echo "## Pipeline Failure Summary"
            echo "| Job | Result |"
            echo "|-----|--------|"
            for JOB in lint test-backend test-frontend quality-gate sonarqube build-frontend build-backend container-image-backend container-image-frontend deploy; do
              case "$JOB" in
                lint) RESULT="${{ needs.lint.result }}" ;;
                test-backend) RESULT="${{ needs.test-backend.result }}" ;;
                test-frontend) RESULT="${{ needs.test-frontend.result }}" ;;
                quality-gate) RESULT="${{ needs.quality-gate.result }}" ;;
                sonarqube) RESULT="${{ needs.sonarqube.result }}" ;;
                build-frontend) RESULT="${{ needs.build-frontend.result }}" ;;
                build-backend) RESULT="${{ needs.build-backend.result }}" ;;
                container-image-backend) RESULT="${{ needs.container-image-backend.result }}" ;;
                container-image-frontend) RESULT="${{ needs.container-image-frontend.result }}" ;;
                deploy) RESULT="${{ needs.deploy.result }}" ;;
              esac
              case "$RESULT" in
                success) ICON="✅" ;;
                failure) ICON="❌" ;;
                cancelled) ICON="⏹️" ;;
                skipped) ICON="⏭️" ;;
                *) ICON="❓" ;;
              esac
              echo "| $JOB | $ICON $RESULT |"
            done
            echo ""
            echo "Commit: \`${GH_SHA}\` by @${GH_ACTOR}"
          } >> "$GITHUB_STEP_SUMMARY"

  # ── Stage 3: Pipeline Self-Improvement (runs after everything else) ──

  pipeline-improve:
    name: CI/CD Pipeline Self-Improvement
    runs-on: ${{ github.actor == 'dependabot[bot]' && 'ubuntu-latest' || fromJSON('["self-hosted","linux"]') }}
    timeout-minutes: 10
    permissions:
      contents: read
    env:
      WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
      WEBHOOK_HOST: ${{ secrets.WEBHOOK_HOST }}
      GH_SERVER_URL: ${{ github.server_url }}
      GH_REPOSITORY: ${{ github.repository }}
      GH_RUN_ID: ${{ github.run_id }}
      GH_SHA: ${{ github.sha }}
      GH_REF_NAME: ${{ github.ref_name }}
      GH_ACTOR: ${{ github.actor }}
      GH_EVENT_NAME: ${{ github.event_name }}
      GH_REF: ${{ github.ref }}
    needs: [secret-scan, dependency-review, lint, test-backend, test-frontend, quality-gate, sonarqube, build-frontend, build-backend, container-image-backend, container-image-frontend, deploy, notify-failure]
    if: |
      always() &&
      github.ref == 'refs/heads/main' &&
      !contains(github.event.head_commit.message, 'ci: improve pipeline') &&
      !contains(github.event.head_commit.message, 'fix: resolve CI failures (auto-fix)')
    steps:
      - name: Validate webhook configuration
        id: webhook-check
        run: |
          if [ -z "$WEBHOOK_SECRET" ] || [ -z "$WEBHOOK_HOST" ]; then
            echo "::warning::WEBHOOK_SECRET or WEBHOOK_HOST not configured -- skipping improvement webhooks"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Collect SonarQube open issues
        id: sonar-issues
        if: steps.webhook-check.outputs.skip != 'true'
        run: |
          SONAR_URL="${SONAR_HOST_URL}"
          TOKEN="${{ secrets.SONAR_TOKEN }}"
          PROJECT_KEY="gestion-inmobiliaria"

          if [ -z "$TOKEN" ]; then
            ADMIN_PASS="${{ secrets.SONAR_ADMIN_PASSWORD }}"
            if [ -z "$ADMIN_PASS" ]; then
              echo "sonar_report=SonarQube credentials unavailable -- skipping issue collection." >> $GITHUB_OUTPUT
              exit 0
            fi
            TOKEN_NAME="ci-improve-${GH_RUN_ID}"
            curl -sf --connect-timeout 10 --max-time 30 -u "admin:${ADMIN_PASS}" -X POST \
              "$SONAR_URL/api/user_tokens/revoke?name=${TOKEN_NAME}" 2>/dev/null || true
            TOKEN_RESPONSE=$(curl -sf --connect-timeout 10 --max-time 30 -u "admin:${ADMIN_PASS}" -X POST \
              "$SONAR_URL/api/user_tokens/generate?name=${TOKEN_NAME}" 2>/dev/null) || TOKEN_RESPONSE=""
            TOKEN=$(echo "$TOKEN_RESPONSE" | jq -r '.token // empty' 2>/dev/null) || TOKEN=""
            if [ -z "$TOKEN" ]; then
              echo "sonar_report=SonarQube token unavailable -- skipping issue collection." >> $GITHUB_OUTPUT
              exit 0
            fi
            echo "::add-mask::$TOKEN"
            echo "temp_token=true" >> $GITHUB_OUTPUT
            echo "token_name=${TOKEN_NAME}" >> $GITHUB_OUTPUT
          fi

          ISSUES_JSON=$(curl -sf --connect-timeout 10 --max-time 30 -u "$TOKEN:" \
            "$SONAR_URL/api/issues/search?projectKeys=${PROJECT_KEY}&resolved=false&ps=100&s=SEVERITY&asc=false&statuses=OPEN,CONFIRMED,REOPENED" \
            2>/dev/null || echo '{}')

          TOTAL=$(echo "$ISSUES_JSON" | jq -r '.total // 0')
          BREAKDOWN=$(echo "$ISSUES_JSON" | jq -r '
            [.issues // [] | group_by(.severity) | .[] |
              {severity: .[0].severity, count: length}] |
            map("\(.count) \(.severity)") | join(", ")' 2>/dev/null || echo "unknown")

          ISSUE_LIST=$(echo "$ISSUES_JSON" | jq -r '
            [.issues[:80] | .[] |
              "\(.severity) | \(.component | split(":") | last):\(.line // "?") | \(.rule) | \(.message)"] |
            join("\n")' 2>/dev/null || echo "")

          HOTSPOTS_JSON=$(curl -sf --connect-timeout 10 --max-time 30 -u "$TOKEN:" \
            "$SONAR_URL/api/hotspots/search?projectKey=${PROJECT_KEY}&status=TO_REVIEW&ps=50" \
            2>/dev/null || echo '{}')

          HOTSPOT_TOTAL=$(echo "$HOTSPOTS_JSON" | jq -r '.paging.total // 0')
          HOTSPOT_LIST=$(echo "$HOTSPOTS_JSON" | jq -r '
            [.hotspots[:30] | .[] |
              "\(.vulnerabilityProbability) | \(.component | split(":") | last):\(.line // "?") | \(.securityCategory) | \(.message)"] |
            join("\n")' 2>/dev/null || echo "")

          SONAR_REPORT="SonarQube Open Issues Report (project: ${PROJECT_KEY}):\n"
          SONAR_REPORT="${SONAR_REPORT}Total open issues: ${TOTAL}\n"
          SONAR_REPORT="${SONAR_REPORT}Breakdown: ${BREAKDOWN}\n\n"
          SONAR_REPORT="${SONAR_REPORT}Issues (severity | file:line | rule | message):\n${ISSUE_LIST}\n\n"
          SONAR_REPORT="${SONAR_REPORT}Security Hotspots to review: ${HOTSPOT_TOTAL}\n"
          SONAR_REPORT="${SONAR_REPORT}Hotspots (risk | file:line | category | message):\n${HOTSPOT_LIST}"

          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "sonar_report<<$EOF" >> $GITHUB_OUTPUT
          echo -e "$SONAR_REPORT" >> $GITHUB_OUTPUT
          echo "$EOF" >> $GITHUB_OUTPUT

      - name: Determine improvement focus from pipeline results
        id: analyze
        if: steps.webhook-check.outputs.skip != 'true'
        env:
          LINT_ERRORS: ${{ needs.lint.outputs.error_log }}
          BACKEND_TEST_ERRORS: ${{ needs.test-backend.outputs.error_log }}
          FRONTEND_TEST_ERRORS: ${{ needs.test-frontend.outputs.error_log }}
          QUALITY_ERRORS: ${{ needs.quality-gate.outputs.error_log }}
          BUILD_FE_ERRORS: ${{ needs.build-frontend.outputs.error_log }}
          BUILD_BE_ERRORS: ${{ needs.build-backend.outputs.error_log }}
        run: |
          # Sanitize secrets from error logs before sending to webhook
          sanitize_log() {
            sed -E \
              -e 's/(password|secret|token|key|credential|authorization)[=: ]+[^ "]+/\1=***REDACTED***/gi' \
              -e 's/ghp_[A-Za-z0-9_]+/***REDACTED***/g' \
              -e 's/ghs_[A-Za-z0-9_]+/***REDACTED***/g' \
              -e 's/gho_[A-Za-z0-9_]+/***REDACTED***/g' \
              -e 's/ghu_[A-Za-z0-9_]+/***REDACTED***/g' \
              -e 's/github_pat_[A-Za-z0-9_]+/***REDACTED***/g' \
              -e 's/Bearer [A-Za-z0-9._\-]+/Bearer ***REDACTED***/g' \
              -e 's/postgresql:\/\/[^@]+@/postgresql:\/\/***:***@/g'
          }

          FOCUS="general"
          REPORT=""

          REPORT="${REPORT}Pipeline Run Summary:\n"
          REPORT="${REPORT}  Job                | Result   | Duration | Cache\n"
          REPORT="${REPORT}  -------------------|----------|----------|------\n"
          REPORT="${REPORT}  secret-scan        | ${{ needs.secret-scan.result }} | n/a | n/a\n"
          REPORT="${REPORT}  dependency-review  | ${{ needs.dependency-review.result }} | n/a | n/a\n"
          REPORT="${REPORT}  lint               | ${{ needs.lint.result }} | ${{ needs.lint.outputs.duration || 'n/a' }} | ${{ needs.lint.outputs.cache_hit == 'true' && 'HIT' || 'MISS' }}\n"
          REPORT="${REPORT}  test-backend       | ${{ needs.test-backend.result }} | ${{ needs.test-backend.outputs.duration || 'n/a' }} | ${{ needs.test-backend.outputs.cache_hit == 'true' && 'HIT' || 'MISS' }}\n"
          REPORT="${REPORT}  test-frontend      | ${{ needs.test-frontend.result }} | ${{ needs.test-frontend.outputs.duration || 'n/a' }} | ${{ needs.test-frontend.outputs.cache_hit == 'true' && 'HIT' || 'MISS' }}\n"
          REPORT="${REPORT}  quality-gate       | ${{ needs.quality-gate.result }} | ${{ needs.quality-gate.outputs.duration || 'n/a' }} | n/a\n"
          REPORT="${REPORT}  sonarqube          | ${{ needs.sonarqube.result }} | ${{ needs.sonarqube.outputs.duration || 'n/a' }} | n/a\n"
          REPORT="${REPORT}  build-frontend     | ${{ needs.build-frontend.result }} | ${{ needs.build-frontend.outputs.duration || 'n/a' }} | ${{ needs.build-frontend.outputs.cache_hit == 'true' && 'HIT' || 'MISS' }}\n"
          REPORT="${REPORT}  build-backend      | ${{ needs.build-backend.result }} | ${{ needs.build-backend.outputs.duration || 'n/a' }} | ${{ needs.build-backend.outputs.cache_hit == 'true' && 'HIT' || 'MISS' }}\n"

          # Collect error logs from all failed jobs (sanitized)
          ERRORS=""
          if [ "${{ needs.lint.result }}" = "failure" ] && [ -n "$LINT_ERRORS" ]; then
            SANITIZED=$(printf '%s' "$LINT_ERRORS" | sanitize_log)
            ERRORS="${ERRORS}\n--- LINT ERRORS ---\n${SANITIZED}\n"
          fi
          if [ "${{ needs.test-backend.result }}" = "failure" ] && [ -n "$BACKEND_TEST_ERRORS" ]; then
            SANITIZED=$(printf '%s' "$BACKEND_TEST_ERRORS" | sanitize_log)
            ERRORS="${ERRORS}\n--- BACKEND TEST ERRORS ---\n${SANITIZED}\n"
          fi
          if [ "${{ needs.test-frontend.result }}" = "failure" ] && [ -n "$FRONTEND_TEST_ERRORS" ]; then
            SANITIZED=$(printf '%s' "$FRONTEND_TEST_ERRORS" | sanitize_log)
            ERRORS="${ERRORS}\n--- FRONTEND TEST ERRORS ---\n${SANITIZED}\n"
          fi
          if [ "${{ needs.quality-gate.result }}" = "failure" ] && [ -n "$QUALITY_ERRORS" ]; then
            SANITIZED=$(printf '%s' "$QUALITY_ERRORS" | sanitize_log)
            ERRORS="${ERRORS}\n--- QUALITY GATE ERRORS ---\n${SANITIZED}\n"
          fi
          if [ "${{ needs.build-frontend.result }}" = "failure" ] && [ -n "$BUILD_FE_ERRORS" ]; then
            SANITIZED=$(printf '%s' "$BUILD_FE_ERRORS" | sanitize_log)
            ERRORS="${ERRORS}\n--- BUILD FRONTEND ERRORS ---\n${SANITIZED}\n"
          fi
          if [ "${{ needs.build-backend.result }}" = "failure" ] && [ -n "$BUILD_BE_ERRORS" ]; then
            SANITIZED=$(printf '%s' "$BUILD_BE_ERRORS" | sanitize_log)
            ERRORS="${ERRORS}\n--- BUILD BACKEND ERRORS ---\n${SANITIZED}\n"
          fi

          if [ -n "$ERRORS" ]; then
            REPORT="${REPORT}\nFailed Job Error Logs:${ERRORS}\n"
          fi

          if [ "${{ needs.quality-gate.result }}" = "failure" ] || [ "${{ needs.secret-scan.result }}" = "failure" ]; then
            FOCUS="security"
          elif [ "${{ needs.lint.result }}" = "failure" ] || [ "${{ needs.test-backend.result }}" = "failure" ] || [ "${{ needs.test-frontend.result }}" = "failure" ]; then
            FOCUS="bugs"
          elif [ "${{ needs.build-frontend.result }}" = "failure" ] || [ "${{ needs.build-backend.result }}" = "failure" ]; then
            FOCUS="pipeline"
          else
            FOCUS="security,pipeline,reporting,sonarqube"
          fi

          REPORT="${REPORT}\nFocus: ${FOCUS}\n"
          REPORT="${REPORT}Trigger: ${GH_EVENT_NAME} on ${GH_REF}\n"
          REPORT="${REPORT}Commit: ${GH_SHA}\n"

          echo "focus=$FOCUS" >> $GITHUB_OUTPUT
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "report<<$EOF" >> $GITHUB_OUTPUT
          echo -e "$REPORT" >> $GITHUB_OUTPUT
          echo "$EOF" >> $GITHUB_OUTPUT

      - name: Write pipeline summary
        if: always()
        run: |
          {
            echo "## CI Pipeline Summary"
            echo "| Job | Result | Duration | Cache |"
            echo "|-----|--------|----------|-------|"
            echo "| secret-scan | ${{ needs.secret-scan.result }} | -- | -- |"
            echo "| lint | ${{ needs.lint.result }} | ${{ needs.lint.outputs.duration || 'n/a' }} | ${{ needs.lint.outputs.cache_hit == 'true' && 'HIT' || 'MISS' }} |"
            echo "| test-backend | ${{ needs.test-backend.result }} | ${{ needs.test-backend.outputs.duration || 'n/a' }} | ${{ needs.test-backend.outputs.cache_hit == 'true' && 'HIT' || 'MISS' }} |"
            echo "| test-frontend | ${{ needs.test-frontend.result }} | ${{ needs.test-frontend.outputs.duration || 'n/a' }} | ${{ needs.test-frontend.outputs.cache_hit == 'true' && 'HIT' || 'MISS' }} |"
            echo "| quality-gate | ${{ needs.quality-gate.result }} | ${{ needs.quality-gate.outputs.duration || 'n/a' }} | -- |"
            echo "| sonarqube | ${{ needs.sonarqube.result }} | ${{ needs.sonarqube.outputs.duration || 'n/a' }} | -- |"
            echo "| build-frontend | ${{ needs.build-frontend.result }} | ${{ needs.build-frontend.outputs.duration || 'n/a' }} | ${{ needs.build-frontend.outputs.cache_hit == 'true' && 'HIT' || 'MISS' }} |"
            echo "| build-backend | ${{ needs.build-backend.result }} | ${{ needs.build-backend.outputs.duration || 'n/a' }} | ${{ needs.build-backend.outputs.cache_hit == 'true' && 'HIT' || 'MISS' }} |"
            echo "| container-backend | ${{ needs.container-image-backend.result }} | -- | -- |"
            echo "| container-frontend | ${{ needs.container-image-frontend.result }} | -- | -- |"
            echo "| deploy | ${{ needs.deploy.result }} | -- | -- |"
            echo ""
            echo "Commit: \`${GH_SHA}\` by @${GH_ACTOR} on \`${GH_REF_NAME}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Detect concurrency cancellation
        id: concurrency-check
        if: steps.webhook-check.outputs.skip != 'true'
        run: |
          CANCELLED=0
          TOTAL=0
          for R in "${{ needs.lint.result }}" "${{ needs.test-backend.result }}" "${{ needs.test-frontend.result }}" "${{ needs.quality-gate.result }}" "${{ needs.sonarqube.result }}" "${{ needs.build-frontend.result }}" "${{ needs.build-backend.result }}"; do
            TOTAL=$((TOTAL + 1))
            [ "$R" = "cancelled" ] && CANCELLED=$((CANCELLED + 1))
          done
          HAS_FAILURE=false
          for R in "${{ needs.lint.result }}" "${{ needs.test-backend.result }}" "${{ needs.test-frontend.result }}" "${{ needs.quality-gate.result }}"; do
            [ "$R" = "failure" ] && HAS_FAILURE=true
          done
          if [ "$CANCELLED" -ge 4 ] && [ "$HAS_FAILURE" = "false" ]; then
            echo "::notice::${CANCELLED}/${TOTAL} jobs cancelled with no core failures -- concurrency cancellation detected, skipping webhooks"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Send pipeline improvement request to webhook
        if: steps.webhook-check.outputs.skip != 'true' && steps.concurrency-check.outputs.skip != 'true'
        env:
          FOCUS: ${{ steps.analyze.outputs.focus }}
          REPORT: ${{ steps.analyze.outputs.report }}
          SONAR_REPORT: ${{ steps.sonar-issues.outputs.sonar_report }}
        run: |
          PAYLOAD=$(jq -n \
            --arg focus "$FOCUS" \
            --arg pipeline_report "$REPORT" \
            --arg sonar_report "$SONAR_REPORT" \
            --arg run_url "${GH_SERVER_URL}/${GH_REPOSITORY}/actions/runs/${GH_RUN_ID}" \
            '{focus: $focus, pipeline_report: $pipeline_report, sonar_report: $sonar_report, run_url: $run_url}')

          SIGNATURE=$(printf '%s' "$PAYLOAD" | openssl dgst -sha256 -hmac "${WEBHOOK_SECRET}" | awk '{print $NF}')
          curl -s --connect-timeout 5 --max-time 10 -X POST http://${WEBHOOK_HOST}:9090/ci-improve \
            -H "Content-Type: application/json" \
            -H "X-Signature-256: sha256=$SIGNATURE" \
            -d "$PAYLOAD" || echo "Webhook unreachable -- skipping pipeline improvement"

      - name: Send SonarQube issues to dedicated fix webhook
        if: steps.webhook-check.outputs.skip != 'true' && steps.concurrency-check.outputs.skip != 'true'
        env:
          SONAR_REPORT: ${{ steps.sonar-issues.outputs.sonar_report }}
        run: |
          if [ -z "$SONAR_REPORT" ] || echo "$SONAR_REPORT" | grep -q "unavailable"; then
            echo "No SonarQube data available -- skipping sonar-fix webhook"
            exit 0
          fi

          if echo "$SONAR_REPORT" | grep -q "Total open issues: 0"; then
            echo "No open SonarQube issues -- skipping sonar-fix webhook"
            exit 0
          fi

          PAYLOAD=$(jq -n \
            --arg sonar_report "$SONAR_REPORT" \
            --arg run_url "${GH_SERVER_URL}/${GH_REPOSITORY}/actions/runs/${GH_RUN_ID}" \
            '{sonar_report: $sonar_report, run_url: $run_url}')

          SIGNATURE=$(printf '%s' "$PAYLOAD" | openssl dgst -sha256 -hmac "${WEBHOOK_SECRET}" | awk '{print $NF}')
          curl -s --connect-timeout 5 --max-time 10 -X POST http://${WEBHOOK_HOST}:9090/sonar-fix \
            -H "Content-Type: application/json" \
            -H "X-Signature-256: sha256=$SIGNATURE" \
            -d "$PAYLOAD" || echo "Webhook unreachable -- skipping SonarQube fix"

      - name: Revoke temporary SonarQube token
        if: always() && steps.sonar-issues.outputs.temp_token == 'true'
        run: |
          ADMIN_PASS="${{ secrets.SONAR_ADMIN_PASSWORD }}"
          TOKEN_NAME="${{ steps.sonar-issues.outputs.token_name }}"
          if [ -n "$ADMIN_PASS" ] && [ -n "$TOKEN_NAME" ]; then
            curl -sf --connect-timeout 10 --max-time 30 -u "admin:${ADMIN_PASS}" -X POST \
              "${SONAR_HOST_URL}/api/user_tokens/revoke?name=${TOKEN_NAME}" 2>/dev/null || true
          fi
