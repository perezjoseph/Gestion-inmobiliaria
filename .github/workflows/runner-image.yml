name: Runner Image

on:
  push:
    branches: [main]
    paths:
      - "infra/docker/Dockerfile.runner"
      - ".github/workflows/runner-image.yml"
  workflow_dispatch:

permissions: {}

concurrency:
  group: runner-image-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build-runner-image:
    name: Build Runner Image
    runs-on: arc-runner-dind
    timeout-minutes: 15
    permissions:
      contents: write
      packages: write
    env:
      IMAGE_OWNER: ${{ github.repository_owner }}
      IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/realestate-runner
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Build and push runner image
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v6.18.0
        with:
          context: .
          file: infra/docker/Dockerfile.runner
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache,mode=max

      - name: Update runner scale set values with new image tag
        run: |
          NEW_TAG="${{ github.sha }}"
          VALUES_FILE="infra/k8s/arc-v2/runner-scale-set-values.yml"

          sed -i "s|image: ${IMAGE_NAME}:.*|image: ${IMAGE_NAME}:${NEW_TAG}|g" "$VALUES_FILE"

          if git diff --quiet "$VALUES_FILE"; then
            echo "No changes to values file (tag already current)"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add "$VALUES_FILE"
            git commit -m "chore(runner): pin image to ${NEW_TAG:0:12}" \
              -m "Auto-updated by runner-image workflow after successful build."
            git push origin main
          fi

      - name: Credential cleanup
        if: always()
        run: |
          docker logout ghcr.io 2>/dev/null || true
          rm -f "${HOME}/.docker/config.json" 2>/dev/null || true
