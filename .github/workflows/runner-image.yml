name: Runner Image

on:
  push:
    branches: [main]
    paths:
      - 'infra/docker/Dockerfile.runner'
      - '.github/workflows/runner-image.yml'
  workflow_dispatch:

permissions: {}

concurrency:
  group: runner-image-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build-runner-image:
    name: Build Runner Image
    runs-on: arc-runner-dind
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
    env:
      IMAGE_OWNER: ${{ github.repository_owner }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Build and push runner image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v6.18.0
        with:
          context: .
          file: infra/docker/Dockerfile.runner
          push: true
          tags: |
            ghcr.io/${{ env.IMAGE_OWNER }}/realestate-runner:latest
            ghcr.io/${{ env.IMAGE_OWNER }}/realestate-runner:${{ github.sha }}
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/realestate-runner:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/realestate-runner:buildcache,mode=max

      - name: Credential cleanup
        if: always()
        run: |
          docker logout ghcr.io 2>/dev/null || true
          rm -f "${HOME}/.docker/config.json" 2>/dev/null || true
