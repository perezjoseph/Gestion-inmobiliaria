name: Runner Image

on:
  push:
    branches: [main]
    paths:
      - 'infra/docker/Dockerfile.runner'
      - '.github/workflows/runner-image.yml'
  workflow_dispatch:

permissions: {}

concurrency:
  group: runner-image-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build-runner-image:
    name: Build Runner Image
    runs-on: arc-runner-dind
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
    env:
      IMAGE_OWNER: ${{ github.repository_owner }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build and push runner image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v6.18.0
        with:
          context: .
          file: infra/docker/Dockerfile.runner
          push: true
          tags: |
            ghcr.io/${{ env.IMAGE_OWNER }}/realestate-runner:latest
            ghcr.io/${{ env.IMAGE_OWNER }}/realestate-runner:${{ github.sha }}
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/realestate-runner:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/realestate-runner:buildcache,mode=min

      - name: Credential cleanup
        if: always()
        run: |
          docker logout ghcr.io 2>/dev/null || true
          rm -f "${HOME}/.docker/config.json" 2>/dev/null || true
