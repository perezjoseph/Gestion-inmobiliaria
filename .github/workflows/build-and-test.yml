name: Build & Test

on:
  workflow_call:
    inputs:
      is-fork-pr:
        type: boolean
        required: true
      is-production:
        description: "Whether this is a production build (main push). Controls SBOM generation, coverage, and attestation."
        type: boolean
        required: false
        default: false
      skip-backend:
        description: "Skip backend jobs (no backend files changed)."
        type: boolean
        required: false
        default: false
      skip-frontend:
        description: "Skip frontend jobs (no frontend files changed)."
        type: boolean
        required: false
        default: false
    outputs:
      backend-clippy:
        description: "Backend clippy result"
        value: ${{ jobs.backend-clippy.result }}
      backend-test:
        description: "Backend test result"
        value: ${{ jobs.backend-test.result }}
      backend-build:
        description: "Backend build result"
        value: ${{ jobs.backend-build.result }}

permissions: {}

env:
  # Match parallelism to ARC runner pod CPU allocation.
  # Prevents over-subscription when cargo detects the node's full CPU count.
  CARGO_BUILD_JOBS: "4"

jobs:
  # ── Backend Clippy (compiles with musl target to warm sccache for release build) ──
  backend-clippy:
    name: Backend Clippy
    runs-on: arc-runner-dind
    timeout-minutes: 30
    if: ${{ !inputs.is-fork-pr && !inputs.skip-backend }}
    permissions:
      actions: read
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Rust setup
        id: rust-setup
        uses: ./.github/actions/rust-setup
        with:
          components: clippy
          targets: x86_64-unknown-linux-musl

      - name: Clippy backend
        id: clippy
        run: |
          umask 077
          set +e
          cargo clippy --locked -p realestate-backend --target x86_64-unknown-linux-musl --message-format=json -- -D warnings \
            > "${RUNNER_TEMP}/clippy-backend.json" 2>"${RUNNER_TEMP}/clippy-backend-stderr.txt"
          RESULT=$?
          set -e
          jq -r 'select(.reason == "compiler-message") | .message.rendered // empty' \
            "${RUNNER_TEMP}/clippy-backend.json" > "${RUNNER_TEMP}/clippy-backend-output.txt" 2>/dev/null || true
          if [ $RESULT -ne 0 ]; then
            if [ -s "${RUNNER_TEMP}/clippy-backend-output.txt" ]; then
              cat "${RUNNER_TEMP}/clippy-backend-output.txt"
            else
              echo "--- stderr (no clippy JSON output -- likely a cargo-level error) ---"
              cat "${RUNNER_TEMP}/clippy-backend-stderr.txt" 2>/dev/null || true
            fi
            echo "::error::backend clippy found warnings/errors."
            exit 1
          fi

      - name: Upload clippy backend report
        if: "!cancelled() && hashFiles(format('{0}/clippy-backend.json', runner.temp)) != ''"
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: clippy-backend-report
          path: ${{ runner.temp }}/clippy-backend.json
          retention-days: 1

      - name: Collect diagnostics
        if: failure()
        uses: ./.github/actions/collect-diagnostics
        with:
          job-name: "build-and-test / backend-clippy"
          artifact-suffix: clippy-backend
          step-outcomes: |
            clippy=${{ steps.clippy.outcome }}
          output-files: |
            ${{ runner.temp }}/clippy-backend-output.txt
            ${{ runner.temp }}/clippy-backend-stderr.txt

  # ── Backend Tests (parallel with clippy and build) ──
  # On PRs: runs tests with cargo-nextest (parallel processes, sccache enabled, fast).
  # On main: runs tests with llvm-cov coverage (sccache disabled, slower but only on merge).
  backend-test:
    name: Backend Test
    runs-on: arc-runner-dind
    timeout-minutes: 30
    if: ${{ !inputs.is-fork-pr && !inputs.skip-backend }}
    permissions:
      actions: read
      contents: read
    env:
      SERVER_PORT: "8080"
      CORS_ORIGIN: http://localhost:8080
    services:
      postgres:
        image: postgres:16@sha256:5a65324fe84dc41709ff914e90b07f3e2f577073ed27bf917d4873aca0c9ec51
        env:
          POSTGRES_DB: realestate
          POSTGRES_USER: realestate
          POSTGRES_PASSWORD: realestate_dev_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U realestate"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
          --health-start-period 30s
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Rust setup
        id: rust-setup
        uses: ./.github/actions/rust-setup
        with:
          components: llvm-tools-preview
          targets: ""

      - name: Mask database credentials
        run: |
          echo "::add-mask::realestate_dev_password"
          echo "::add-mask::realestate"

      - name: Set database URL
        run: echo "DATABASE_URL=postgresql://realestate:realestate_dev_password@localhost:5432/realestate" >> $GITHUB_ENV

      - name: Generate JWT secret for tests
        run: |
          JWT_SECRET=$(openssl rand -hex 32)
          echo "::add-mask::$JWT_SECRET"
          echo "JWT_SECRET=$JWT_SECRET" >> $GITHUB_ENV

      - name: Wait for Postgres port
        run: |
          for i in $(seq 1 15); do
            if bash -c 'echo > /dev/tcp/localhost/5432' 2>/dev/null; then
              echo "Postgres port ready"
              exit 0
            fi
            sleep 1
          done
          echo "::error::Postgres port not reachable after 15 seconds"
          echo "Postgres port not reachable after 15 attempts (15s)" > "${RUNNER_TEMP}/wait-postgres-output.txt"
          docker ps -a >> "${RUNNER_TEMP}/wait-postgres-output.txt" 2>&1 || true
          echo "---" >> "${RUNNER_TEMP}/wait-postgres-output.txt"
          docker logs $(docker ps -aq --filter "ancestor=postgres:16" | head -1) >> "${RUNNER_TEMP}/wait-postgres-output.txt" 2>&1 || true
          exit 1

      # ── Coverage path (production only) ──
      - name: Verify cargo-llvm-cov available
        if: inputs.is-production
        id: install-llvm-cov
        run: |
          if command -v cargo-llvm-cov &>/dev/null; then
            echo "cargo-llvm-cov already available: $(cargo-llvm-cov --version)"
          else
            echo "::error::cargo-llvm-cov not found — expected prebaked in runner image"
            exit 1
          fi

      - name: Clean stale llvm-cov target artifacts
        if: inputs.is-production
        run: |
          COV_TARGET="${CARGO_TARGET_DIR:-target}/llvm-cov-target"
          if [ -d "$COV_TARGET" ]; then
            echo "Removing stale llvm-cov-target: $COV_TARGET"
            rm -rf "$COV_TARGET"
          fi

      - name: Run tests with coverage (llvm-cov)
        if: inputs.is-production
        id: tests-coverage
        env:
          PROPTEST_CASES: "10"
          RUSTC_WRAPPER: ""
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
        with:
          timeout_minutes: 30
          max_attempts: 2
          command: |
            mkdir -p coverage
            cargo llvm-cov nextest --locked -p realestate-backend \
              --lcov --output-path coverage/lcov.info 2>&1 | tee "${RUNNER_TEMP}/test-backend-output.txt"
            exit ${PIPESTATUS[0]}

      - name: Upload coverage artifact
        if: inputs.is-production && steps.tests-coverage.outcome == 'success'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: backend-coverage
          path: coverage/lcov.info
          retention-days: 7

      # ── Fast path (PRs — no coverage, sccache enabled, cargo-nextest for parallel execution) ──
      - name: Verify cargo-nextest available
        if: ${{ !inputs.is-production }}
        run: |
          if command -v cargo-nextest &>/dev/null; then
            echo "cargo-nextest already available: $(cargo-nextest --version)"
          else
            echo "::error::cargo-nextest not found — expected prebaked in runner image"
            exit 1
          fi

      - name: Run tests (nextest)
        if: ${{ !inputs.is-production }}
        id: tests-fast
        env:
          PROPTEST_CASES: "5"
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
        with:
          timeout_minutes: 30
          max_attempts: 2
          command: |
            cargo nextest run --locked -p realestate-backend 2>&1 | tee "${RUNNER_TEMP}/test-backend-output.txt"
            exit ${PIPESTATUS[0]}

      - name: Collect diagnostics
        if: failure()
        uses: ./.github/actions/collect-diagnostics
        with:
          job-name: "build-and-test / backend-test"
          artifact-suffix: test-backend
          step-outcomes: |
            tests-coverage=${{ steps.tests-coverage.outcome }}
            tests-fast=${{ steps.tests-fast.outcome }}
          output-files: |
            ${{ runner.temp }}/test-backend-output.txt
            ${{ runner.temp }}/wait-postgres-output.txt

  # ── Backend Release Build (parallel with tests, benefits from sccache warmed by clippy on same runner pool) ──
  backend-build:
    name: Backend Build
    runs-on: arc-runner-dind
    timeout-minutes: 30
    if: ${{ !inputs.is-fork-pr && !inputs.skip-backend }}
    permissions:
      actions: read
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Rust setup
        id: rust-setup
        uses: ./.github/actions/rust-setup
        with:
          components: ""
          targets: x86_64-unknown-linux-musl

      - name: Build backend release binary
        id: build
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
        with:
          timeout_minutes: 30
          max_attempts: 2
          command: |
            cargo build --locked -p realestate-backend --profile ci-release --target x86_64-unknown-linux-musl 2>&1 | tee "${RUNNER_TEMP}/build-backend-output.txt"
            exit ${PIPESTATUS[0]}

      - name: Verify Cargo.lock is up to date
        run: |
          if ! git diff --quiet Cargo.lock; then
            echo "::error::Cargo.lock is out of date. Run 'cargo update' locally and commit the changes."
            git diff Cargo.lock
            exit 1
          fi

      - name: Install security tools
        if: inputs.is-production
        uses: ./.github/actions/install-security-tools
        with:
          trivy: "true"

      - name: Generate SBOM
        if: inputs.is-production
        run: |
          umask 077
          trivy fs --format cyclonedx --output backend-sbom.cdx.json .

      - name: Upload backend binary artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4.6.2
        with:
          name: backend-binary
          path: ${{ env.CARGO_TARGET_DIR || 'target' }}/x86_64-unknown-linux-musl/ci-release/realestate-backend
          retention-days: 7
          if-no-files-found: error

      - name: Upload backend SBOM
        if: inputs.is-production
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4.6.2
        with:
          name: backend-sbom
          path: backend-sbom.cdx.json
          retention-days: 30

      - name: Attest build provenance
        if: inputs.is-production
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: ${{ env.CARGO_TARGET_DIR || 'target' }}/x86_64-unknown-linux-musl/ci-release/realestate-backend
          push-to-registry: false

      - name: Collect diagnostics
        if: failure()
        uses: ./.github/actions/collect-diagnostics
        with:
          job-name: "build-and-test / backend-build"
          artifact-suffix: build-backend
          step-outcomes: |
            build=${{ steps.build.outcome }}
          output-files: |
            ${{ runner.temp }}/build-backend-output.txt

  # ── Backend Summary (runs after all backend jobs) ──
  backend-summary:
    name: Backend Summary
    runs-on: arc-runner-dind
    timeout-minutes: 5
    if: ${{ !cancelled() && !inputs.is-fork-pr && !inputs.skip-backend }}
    needs: [backend-clippy, backend-test, backend-build]
    permissions:
      contents: read
    steps:
      - name: Write backend summary
        run: |
          {
            echo "## Backend Results"
            echo "| Check | Status |"
            echo "|-------|--------|"
            echo "| Clippy | ${{ needs.backend-clippy.result == 'success' && '✅ Pass' || '❌ Fail' }} |"
            echo "| Tests | ${{ needs.backend-test.result == 'success' && '✅ Pass' || '❌ Fail' }} |"
            echo "| Release Build | ${{ needs.backend-build.result == 'success' && '✅ Pass' || '❌ Fail' }} |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail if any backend job failed
        if: ${{ needs.backend-clippy.result == 'failure' || needs.backend-test.result == 'failure' || needs.backend-build.result == 'failure' }}
        run: |
          echo "::error::One or more backend jobs failed"
          exit 1

  # ── Frontend: clippy → test → trunk release build ──
  # Single Rust compilation warms sccache; subsequent steps are near-instant.
  frontend:
    name: Frontend (Clippy + Test + Build)
    runs-on: arc-runner-dind
    timeout-minutes: 45
    if: ${{ !inputs.is-fork-pr && !inputs.skip-frontend }}
    permissions:
      actions: read
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Rust setup
        id: rust-setup
        uses: ./.github/actions/rust-setup
        with:
          components: clippy
          targets: wasm32-unknown-unknown

      # ── Phase 1: Clippy (compiles everything, warms sccache) ──
      - name: Clippy frontend
        id: clippy
        run: |
          umask 077
          set +e
          cargo clippy --locked --target wasm32-unknown-unknown -p realestate-frontend --message-format=json -- -D warnings \
            > "${RUNNER_TEMP}/clippy-frontend.json" 2>"${RUNNER_TEMP}/clippy-frontend-stderr.txt"
          RESULT=$?
          set -e
          jq -r 'select(.reason == "compiler-message") | .message.rendered // empty' \
            "${RUNNER_TEMP}/clippy-frontend.json" > "${RUNNER_TEMP}/clippy-frontend-output.txt" 2>/dev/null || true
          if [ $RESULT -ne 0 ]; then
            if [ -s "${RUNNER_TEMP}/clippy-frontend-output.txt" ]; then
              cat "${RUNNER_TEMP}/clippy-frontend-output.txt"
            else
              echo "--- stderr (no clippy JSON output -- likely a cargo-level error) ---"
              cat "${RUNNER_TEMP}/clippy-frontend-stderr.txt" 2>/dev/null || true
            fi
            echo "::error::frontend clippy found warnings/errors."
            exit 1
          fi

      - name: Upload clippy frontend report
        if: "!cancelled() && hashFiles(format('{0}/clippy-frontend.json', runner.temp)) != ''"
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: clippy-frontend-report
          path: ${{ runner.temp }}/clippy-frontend.json
          retention-days: 1

      # ── Phase 2: Tests ──
      - name: Run frontend tests
        id: tests
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
        with:
          timeout_minutes: 30
          max_attempts: 2
          command: |
            cargo nextest run --locked -p realestate-frontend --all-targets 2>&1 | tee "${RUNNER_TEMP}/test-frontend-output.txt"
            exit ${PIPESTATUS[0]}

      # ── Phase 3: Trunk release build (sccache makes this fast) ──
      - name: Verify Trunk available
        id: install-trunk
        run: |
          if command -v trunk &>/dev/null; then
            echo "trunk already available: $(trunk --version)"
          else
            echo "::error::trunk not found — expected prebaked in runner image"
            exit 1
          fi

      - name: Pre-install wasm-bindgen-cli
        run: |
          export PATH="${HOME}/.local/bin:$HOME/.cargo/bin:$PATH"
          WASM_BINDGEN_VERSION=$(grep -A1 '^name = "wasm-bindgen"' Cargo.lock | grep -oP 'version = "\K[^"]+')
          if [ -z "$WASM_BINDGEN_VERSION" ]; then
            echo "::error::Could not determine wasm-bindgen version from Cargo.lock"
            exit 1
          fi
          if ! wasm-bindgen --version 2>/dev/null | grep -q "$WASM_BINDGEN_VERSION"; then
            cargo install wasm-bindgen-cli --version "$WASM_BINDGEN_VERSION" --locked
          fi

      - name: Build frontend with Trunk
        id: build
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
        with:
          timeout_minutes: 30
          max_attempts: 2
          command: |
            export PATH="${HOME}/.local/bin:$HOME/.cargo/bin:$PATH"
            cd frontend/
            trunk build --release 2>&1 | tee "${RUNNER_TEMP}/build-frontend-output.txt"
            exit ${PIPESTATUS[0]}

      - name: Install security tools
        if: inputs.is-production
        uses: ./.github/actions/install-security-tools
        with:
          trivy: "true"

      - name: Generate SBOM
        if: inputs.is-production
        run: |
          umask 077
          trivy fs --format cyclonedx --output frontend-sbom.cdx.json frontend/

      - name: Upload frontend dist artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4.6.2
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7
          if-no-files-found: error

      - name: Upload frontend SBOM
        if: inputs.is-production
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4.6.2
        with:
          name: frontend-sbom
          path: frontend-sbom.cdx.json
          retention-days: 30

      - name: Attest build provenance
        if: inputs.is-production
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: frontend/dist/
          push-to-registry: false

      - name: Collect diagnostics
        if: failure()
        uses: ./.github/actions/collect-diagnostics
        with:
          job-name: "build-and-test / frontend"
          artifact-suffix: build-frontend
          step-outcomes: |
            clippy=${{ steps.clippy.outcome }}
            tests=${{ steps.tests.outcome }}
            build=${{ steps.build.outcome }}
          output-files: |
            ${{ runner.temp }}/clippy-frontend-output.txt
            ${{ runner.temp }}/clippy-frontend-stderr.txt
            ${{ runner.temp }}/test-frontend-output.txt
            ${{ runner.temp }}/build-frontend-output.txt

      - name: Write frontend summary
        if: "!cancelled()"
        run: |
          {
            echo "## Frontend Results"
            echo "| Check | Status |"
            echo "|-------|--------|"
            echo "| Clippy | ${{ steps.clippy.outcome == 'success' && '✅ Pass' || '❌ Fail' }} |"
            echo "| Tests | ${{ steps.tests.outcome == 'success' && '✅ Pass' || '❌ Fail' }} |"
            echo "| Trunk Build | ${{ steps.build.outcome == 'success' && '✅ Pass' || '❌ Fail' }} |"
          } >> "$GITHUB_STEP_SUMMARY"
