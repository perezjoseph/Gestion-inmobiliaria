name: Lint & Format

on:
  workflow_call:
    inputs:
      is-fork-pr:
        type: boolean
        required: true

permissions: {}

jobs:
  fmt:
    name: Format (rustfmt)
    runs-on: arc-runner-dind
    if: ${{ !inputs.is-fork-pr }}
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Rust setup
        id: rust-setup
        uses: ./.github/actions/rust-setup
        with:
          components: rustfmt

      - name: Check formatting (rustfmt)
        id: fmt
        run: cargo fmt --all -- --check 2>&1 | tee "${RUNNER_TEMP}/fmt-output.txt"

      - name: Collect fmt diagnostics on failure
        if: failure()
        run: |
          umask 077
          mkdir -p "${RUNNER_TEMP}/diag"
          OUT="${RUNNER_TEMP}/diag/context.txt"
          {
            echo "=== JOB: lint / fmt (rustfmt) ==="
            echo "=== FAILED STEP: fmt=${{ steps.fmt.outcome }} ==="
            echo ""
            echo "=== RUSTFMT CHECK OUTPUT ==="
            cat "${RUNNER_TEMP}/fmt-output.txt" 2>/dev/null || echo "(no output captured)"
          } > "$OUT"
          echo "Wrote $(wc -l < "$OUT") lines to $OUT"

      - name: Upload fmt diagnostics
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4.6.2
        with:
          name: diag-lint-fmt
          path: ${{ runner.temp }}/diag/context.txt
          retention-days: 1

  baileys-typecheck:
    name: Type Check (baileys-service)
    runs-on: arc-runner-dind
    if: ${{ !inputs.is-fork-pr }}
    permissions:
      contents: read
    defaults:
      run:
        working-directory: baileys-service
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: baileys-service/package-lock.json

      - name: Install dependencies
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_wait_seconds: 10
          command: cd baileys-service && npm ci

      - name: TypeScript compile check
        id: typecheck
        run: npm run build 2>&1 | tee "${RUNNER_TEMP}/baileys-tsc-output.txt"

      - name: Run tests
        id: tests
        run: npm test 2>&1 | tee "${RUNNER_TEMP}/baileys-test-output.txt"

      - name: Collect baileys diagnostics on failure
        if: failure()
        run: |
          umask 077
          mkdir -p "${RUNNER_TEMP}/diag"
          OUT="${RUNNER_TEMP}/diag/context.txt"
          {
            echo "=== JOB: lint / baileys-typecheck ==="
            echo "=== FAILED STEPS: typecheck=${{ steps.typecheck.outcome }} tests=${{ steps.tests.outcome }} ==="
            echo ""
            if [ -s "${RUNNER_TEMP}/baileys-tsc-output.txt" ]; then
              echo "=== TSC BUILD OUTPUT (last 200 lines) ==="
              tail -200 "${RUNNER_TEMP}/baileys-tsc-output.txt"
              echo ""
            fi
            if [ -s "${RUNNER_TEMP}/baileys-test-output.txt" ]; then
              echo "=== NPM TEST OUTPUT (last 200 lines) ==="
              tail -200 "${RUNNER_TEMP}/baileys-test-output.txt"
              echo ""
            fi
          } > "$OUT"
          echo "Wrote $(wc -l < "$OUT") lines to $OUT"

      - name: Upload baileys diagnostics
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4.6.2
        with:
          name: diag-lint-baileys
          path: ${{ runner.temp }}/diag/context.txt
          retention-days: 1

  gate:
    name: Lint Gate
    runs-on: arc-runner-dind
    if: "!cancelled() && !inputs.is-fork-pr"
    needs: [fmt, baileys-typecheck]
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          sparse-checkout: .github
          sparse-checkout-cone-mode: true

      - name: Write lint summary
        if: "!cancelled()"
        run: |
          {
            echo "## Lint & Format Results"
            echo "| Check | Status |"
            echo "|-------|--------|"
            echo "| rustfmt | ${{ needs.fmt.result == 'success' && '✅ Pass' || (needs.fmt.result == 'skipped' && '⏭️ Skipped' || '❌ Fail') }} |"
            echo "| baileys tsc | ${{ needs.baileys-typecheck.result == 'success' && '✅ Pass' || (needs.baileys-typecheck.result == 'skipped' && '⏭️ Skipped' || '❌ Fail') }} |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail if any lint job failed
        if: "!cancelled() && (needs.fmt.result == 'failure' || needs.baileys-typecheck.result == 'failure')"
        run: exit 1
