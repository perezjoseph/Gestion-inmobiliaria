name: Lint & Format

on:
  workflow_call:
    inputs:
      is-fork-pr:
        type: boolean
        required: true
    outputs:
      result:
        value: ${{ jobs.lint.result }}
      error_log:
        value: ${{ jobs.lint.outputs.error_log }}
      failed_steps:
        value: ${{ jobs.lint.outputs.failed_steps }}
      duration:
        value: ${{ jobs.lint.outputs.duration }}
      cache_hit:
        value: ${{ jobs.lint.outputs.cache_hit }}

permissions: {}

jobs:
  lint:
    name: Lint & Format
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 20
    if: ${{ !inputs.is-fork-pr }}
    permissions:
      contents: read
    outputs:
      error_log: ${{ steps.collect-errors.outputs.error_log }}
      failed_steps: ${{ steps.collect-errors.outputs.failed_steps }}
      duration: ${{ steps.timing.outputs.duration }}
      cache_hit: ${{ steps.rust-setup.outputs.cache-hit }}
    steps:
      - name: Record start time
        id: start
        run: echo "time=$(date +%s)" >> $GITHUB_OUTPUT

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Rust setup
        id: rust-setup
        uses: ./.github/actions/rust-setup
        with:
          components: rustfmt,clippy
          targets: wasm32-unknown-unknown
          cache-key: lint

      - name: Check formatting (rustfmt)
        id: fmt
        if: always() && steps.rust-setup.outcome == 'success'
        timeout-minutes: 5
        run: cargo fmt --all -- --check 2>&1 | tee "${RUNNER_TEMP}/fmt-output.txt"

      - name: Clippy backend
        id: clippy_backend
        if: always() && steps.rust-setup.outcome == 'success'
        timeout-minutes: 15
        run: |
          umask 077
          set +e
          cargo clippy --locked -p realestate-backend --message-format=json -- -D warnings \
            > "${RUNNER_TEMP}/clippy-backend.json" 2>"${RUNNER_TEMP}/clippy-backend-stderr.txt"
          RESULT=$?
          set -e
          jq -r 'select(.reason == "compiler-message") | .message.rendered // empty' \
            "${RUNNER_TEMP}/clippy-backend.json" > "${RUNNER_TEMP}/clippy-backend-output.txt" 2>/dev/null || true
          if [ $RESULT -ne 0 ]; then
            if [ -s "${RUNNER_TEMP}/clippy-backend-output.txt" ]; then
              cat "${RUNNER_TEMP}/clippy-backend-output.txt"
            else
              echo "--- stderr (no clippy JSON output -- likely a cargo-level error) ---"
              cat "${RUNNER_TEMP}/clippy-backend-stderr.txt" 2>/dev/null || true
            fi
            echo "::error::backend clippy found warnings/errors."
            exit 1
          fi

      - name: Clippy frontend
        id: clippy_frontend
        if: always() && steps.rust-setup.outcome == 'success'
        timeout-minutes: 15
        run: |
          umask 077
          set +e
          cargo clippy --locked --target wasm32-unknown-unknown -p realestate-frontend --message-format=json -- -D warnings \
            > "${RUNNER_TEMP}/clippy-frontend.json" 2>"${RUNNER_TEMP}/clippy-frontend-stderr.txt"
          RESULT=$?
          set -e
          jq -r 'select(.reason == "compiler-message") | .message.rendered // empty' \
            "${RUNNER_TEMP}/clippy-frontend.json" > "${RUNNER_TEMP}/clippy-frontend-output.txt" 2>/dev/null || true
          if [ $RESULT -ne 0 ]; then
            if [ -s "${RUNNER_TEMP}/clippy-frontend-output.txt" ]; then
              cat "${RUNNER_TEMP}/clippy-frontend-output.txt"
            else
              echo "--- stderr (no clippy JSON output -- likely a cargo-level error) ---"
              cat "${RUNNER_TEMP}/clippy-frontend-stderr.txt" 2>/dev/null || true
            fi
            echo "::error::frontend clippy found warnings/errors."
            exit 1
          fi

      - name: Assemble clippy JSON report
        if: always() && steps.rust-setup.outcome == 'success'
        run: |
          cat "${RUNNER_TEMP}/clippy-backend.json" "${RUNNER_TEMP}/clippy-frontend.json" \
            > clippy-report.json 2>/dev/null || true

      - name: Write lint summary
        if: always()
        run: |
          {
            echo "## Lint & Format Results"
            echo "| Check | Status |"
            echo "|-------|--------|"
            echo "| rustfmt | ${{ steps.fmt.outcome == 'success' && '✅ Pass' || (steps.fmt.outcome == 'skipped' && '⏭️ Skipped' || '❌ Fail') }} |"
            echo "| clippy backend | ${{ steps.clippy_backend.outcome == 'success' && '✅ Pass' || (steps.clippy_backend.outcome == 'skipped' && '⏭️ Skipped' || '❌ Fail') }} |"
            echo "| clippy frontend | ${{ steps.clippy_frontend.outcome == 'success' && '✅ Pass' || (steps.clippy_frontend.outcome == 'skipped' && '⏭️ Skipped' || '❌ Fail') }} |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Collect errors for notification
        id: collect-errors
        if: always() && (steps.fmt.outcome == 'failure' || steps.clippy_backend.outcome == 'failure' || steps.clippy_frontend.outcome == 'failure')
        run: |
          ERROR=""
          FAILED=""
          if [ "${{ steps.fmt.outcome }}" = "failure" ]; then
            FAILED="${FAILED}rustfmt,"
            ERROR="${ERROR}[rustfmt] $(head -c 1500 "${RUNNER_TEMP}/fmt-output.txt" 2>/dev/null || echo 'rustfmt found formatting issues.')\n\n"
          fi
          if [ "${{ steps.clippy_backend.outcome }}" = "failure" ]; then
            FAILED="${FAILED}clippy-backend,"
            ERROR="${ERROR}[clippy-backend] $(head -c 1500 "${RUNNER_TEMP}/clippy-backend-output.txt" 2>/dev/null || echo 'Backend clippy found warnings/errors.')\n\n"
          fi
          if [ "${{ steps.clippy_frontend.outcome }}" = "failure" ]; then
            FAILED="${FAILED}clippy-frontend,"
            ERROR="${ERROR}[clippy-frontend] $(head -c 1500 "${RUNNER_TEMP}/clippy-frontend-output.txt" 2>/dev/null || echo 'Frontend clippy found warnings/errors.')\n\n"
          fi
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "failed_steps=${FAILED%,}" >> $GITHUB_OUTPUT
          echo "error_log<<$EOF" >> $GITHUB_OUTPUT
          echo "$ERROR" >> $GITHUB_OUTPUT
          echo "$EOF" >> $GITHUB_OUTPUT

      - name: Record duration
        id: timing
        if: always()
        uses: ./.github/actions/job-timing
        with:
          start-time: ${{ steps.start.outputs.time }}

      - name: Fail job if any lint step failed
        if: always() && (steps.fmt.outcome == 'failure' || steps.clippy_backend.outcome == 'failure' || steps.clippy_frontend.outcome == 'failure')
        run: exit 1

      - name: Upload clippy report
        if: always() && hashFiles('clippy-report.json') != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: clippy-report
          path: clippy-report.json
          retention-days: 1

      - name: Clean up temp files
        if: always()
        run: |
          rm -f "${RUNNER_TEMP}/fmt-output.txt"
          rm -f "${RUNNER_TEMP}/clippy-backend.json" "${RUNNER_TEMP}/clippy-backend-stderr.txt" "${RUNNER_TEMP}/clippy-backend-output.txt"
          rm -f "${RUNNER_TEMP}/clippy-frontend.json" "${RUNNER_TEMP}/clippy-frontend-stderr.txt" "${RUNNER_TEMP}/clippy-frontend-output.txt"
          rm -f clippy-report.json

      - name: Notify webhook on failure
        if: failure()
        uses: ./.github/actions/webhook-notify
        with:
          job-name: lint
          step-name: clippy-or-fmt
          error-log: ${{ steps.collect-errors.outputs.error_log }}
          webhook-secret: ${{ secrets.WEBHOOK_SECRET }}
          webhook-host: ${{ secrets.WEBHOOK_HOST }}
