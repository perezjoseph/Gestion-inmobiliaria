name: Android CI
run-name: "Android CI [${{ github.event_name }}] ${{ github.ref_name }} @ ${{ github.sha }}"

on:
  push:
    branches: [main, develop]
    paths:
      - "android/**"
      - ".github/workflows/android-ci.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "android/**"
      - ".github/workflows/android-ci.yml"
  workflow_dispatch:

permissions: {}

concurrency:
  group: android-ci-${{ github.ref }}
  cancel-in-progress: false

env:
  JAVA_VERSION: "17"
  JAVA_DISTRIBUTION: "temurin"

jobs:
  # ── Stage 0: Runner Disk Cleanup (self-hosted only) ──

  runner-cleanup:
    name: Runner Disk Cleanup
    runs-on: ${{ github.actor == 'dependabot[bot]' && 'ubuntu-latest' || fromJSON('["self-hosted","linux"]') }}
    timeout-minutes: 5
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
    steps:
      - name: Aggressive disk cleanup
        run: |
          echo "=== Disk before cleanup ==="
          df -h / || true

          # Docker cleanup
          docker system prune -af --volumes 2>/dev/null || true
          docker builder prune -af 2>/dev/null || true

          # Gradle caches (build-cache, transforms, journal, wrapper dists, daemon)
          rm -rf ~/.gradle/caches/build-cache-* ~/.gradle/caches/transforms-* ~/.gradle/caches/journal-* 2>/dev/null || true
          rm -rf ~/.gradle/wrapper/dists/ ~/.gradle/daemon 2>/dev/null || true
          rm -rf ~/.gradle/caches/*/scripts ~/.gradle/caches/*/generated-gradle-jars 2>/dev/null || true

          # Tool caches older than 2 days
          find "${RUNNER_TOOL_CACHE:-/opt/hostedtoolcache}" -maxdepth 1 -mindepth 1 -mtime +2 -exec rm -rf {} + 2>/dev/null || true

          # Temp files older than 1 day
          find /tmp -maxdepth 1 -mindepth 1 -mtime +1 -exec rm -rf {} + 2>/dev/null || true
          rm -rf "${RUNNER_TEMP:-/tmp}"/runner-*/_actions/_temp_* 2>/dev/null || true

          # Old workspace leftovers (previous job checkouts)
          if [ -n "${GITHUB_WORKSPACE}" ] && [ "${GITHUB_WORKSPACE}" != "/" ]; then
            WORK_DIR=$(dirname "${GITHUB_WORKSPACE}")
            find "$WORK_DIR" -maxdepth 2 -mindepth 1 -name '.git' -mtime +1 -execdir rm -rf . \; 2>/dev/null || true
          fi

          echo "=== Disk after cleanup ==="
          df -h / || true
          AVAIL_KB=$(df --output=avail / | tail -1)
          AVAIL_MB=$((AVAIL_KB / 1024))
          echo "Available disk space: ${AVAIL_MB}MB"
          if [ "$AVAIL_MB" -lt 1024 ]; then
            echo "::error::Disk space critically low after cleanup (${AVAIL_MB}MB). Runner needs manual intervention."
            exit 1
          fi

  # ── Stage 1: Quality Checks (all run in parallel) ──

  secret-scan:
    name: Secret Scanning (Gitleaks)
    needs: [runner-cleanup]
    runs-on: ${{ github.actor == 'dependabot[bot]' && 'ubuntu-latest' || fromJSON('["self-hosted","linux"]') }}
    timeout-minutes: 10
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
    steps:
      - name: Free disk space (self-hosted)
        if: ${{ !startsWith(runner.name, 'GitHub Actions') }}
        run: |
          echo "=== Disk before cleanup ==="
          df -h / || true
          docker system prune -af --volumes 2>/dev/null || true
          find "${RUNNER_TOOL_CACHE:-/opt/hostedtoolcache}" -maxdepth 1 -mindepth 1 -mtime +2 -exec rm -rf {} + 2>/dev/null || true
          find /tmp -maxdepth 1 -mindepth 1 -mtime +1 -exec rm -rf {} + 2>/dev/null || true
          rm -rf ~/.gradle/caches/build-cache-* ~/.gradle/caches/transforms-* ~/.gradle/caches/journal-* 2>/dev/null || true
          rm -rf ~/.gradle/wrapper/dists/ ~/.gradle/daemon 2>/dev/null || true
          echo "=== Disk after cleanup ==="
          df -h / || true

      - name: Check available disk space
        if: ${{ !startsWith(runner.name, 'GitHub Actions') }}
        run: |
          AVAIL_KB=$(df --output=avail / | tail -1)
          AVAIL_MB=$((AVAIL_KB / 1024))
          echo "Available disk space: ${AVAIL_MB}MB"
          if [ "$AVAIL_MB" -lt 2048 ]; then
            echo "::error::Insufficient disk space (${AVAIL_MB}MB < 2048MB). Self-hosted runner needs manual cleanup by admin."
            exit 1
          fi

      - name: Clean workspace
        run: |
          if [ -z "$GITHUB_WORKSPACE" ] || [ "$GITHUB_WORKSPACE" = "/" ]; then
            echo "::error::GITHUB_WORKSPACE is empty or root -- aborting cleanup"
            exit 1
          fi
          rm -rf "${GITHUB_WORKSPACE:?}"/* || true
          find "${GITHUB_WORKSPACE}" -mindepth 1 -maxdepth 1 -name '.*' -exec rm -rf {} + 2>/dev/null || true

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Install Gitleaks (with checksum verification)
        timeout-minutes: 3
        run: |
          GITLEAKS_VERSION="8.24.3"
          GITLEAKS_SHA256="9991e0b2903da4c8f6122b5c3186448b927a5da4deef1fe45271c3793f4ee29c"
          ARCHIVE="${RUNNER_TEMP}/gitleaks.tar.gz"
          curl -sSfL --proto =https --connect-timeout 15 --max-time 120 -o "$ARCHIVE" \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          echo "${GITLEAKS_SHA256}  ${ARCHIVE}" | sha256sum -c -
          mkdir -p "${HOME}/.local/bin"
          tar xzf "$ARCHIVE" --no-same-owner --no-same-permissions -C "${HOME}/.local/bin" gitleaks
          rm -f "$ARCHIVE"
          export PATH="${HOME}/.local/bin:$PATH"
          echo "${HOME}/.local/bin" >> "$GITHUB_PATH"
          gitleaks version

      - name: Run Gitleaks secret detection
        run: gitleaks detect --source . --verbose --redact --exit-code 1

      - name: Post-job workspace cleanup
        if: always() && !startsWith(runner.name, 'GitHub Actions')
        run: |
          rm -rf "${GITHUB_WORKSPACE:?}"/* 2>/dev/null || true
          find "${GITHUB_WORKSPACE}" -mindepth 1 -maxdepth 1 -name '.*' ! -name '.runner' -exec rm -rf {} + 2>/dev/null || true

  dependency-review:
    name: Dependency Review (PR)
    runs-on: ${{ github.actor == 'dependabot[bot]' && 'ubuntu-latest' || fromJSON('["self-hosted","linux"]') }}
    timeout-minutes: 10
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Review dependency changes for vulnerabilities and license issues
        uses: actions/dependency-review-action@da24556b548a50705dd671f47852072ea4c105d9 # v4.7.1
        with:
          fail-on-severity: high
          deny-licenses: AGPL-3.0, GPL-3.0, GPL-2.0
          comment-summary-in-pr: on-failure

  lint:
    name: Android Lint & Static Analysis
    needs: [runner-cleanup]
    runs-on: ${{ github.actor == 'dependabot[bot]' && 'ubuntu-latest' || fromJSON('["self-hosted","linux"]') }}
    timeout-minutes: 20
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
    outputs:
      error_log: ${{ steps.collect-errors.outputs.error_log }}
      failed_steps: ${{ steps.collect-errors.outputs.failed_steps }}
      duration: ${{ steps.timing.outputs.duration }}
    steps:
      - name: Record start time
        id: start
        run: echo "time=$(date +%s)" >> $GITHUB_OUTPUT

      - name: Free disk space (self-hosted)
        if: ${{ !startsWith(runner.name, 'GitHub Actions') }}
        run: |
          echo "=== Disk before cleanup ==="
          df -h / || true
          docker system prune -af --volumes 2>/dev/null || true
          find "${RUNNER_TOOL_CACHE:-/opt/hostedtoolcache}" -maxdepth 1 -mindepth 1 -mtime +2 -exec rm -rf {} + 2>/dev/null || true
          find /tmp -maxdepth 1 -mindepth 1 -mtime +1 -exec rm -rf {} + 2>/dev/null || true
          rm -rf ~/.gradle/caches/build-cache-* ~/.gradle/caches/transforms-* ~/.gradle/caches/journal-* 2>/dev/null || true
          rm -rf ~/.gradle/wrapper/dists/ ~/.gradle/daemon 2>/dev/null || true
          echo "=== Disk after cleanup ==="
          df -h / || true

      - name: Check available disk space
        if: ${{ !startsWith(runner.name, 'GitHub Actions') }}
        run: |
          AVAIL_KB=$(df --output=avail / | tail -1)
          AVAIL_MB=$((AVAIL_KB / 1024))
          echo "Available disk space: ${AVAIL_MB}MB"
          if [ "$AVAIL_MB" -lt 2048 ]; then
            echo "::error::Insufficient disk space (${AVAIL_MB}MB < 2048MB). Self-hosted runner needs manual cleanup by admin."
            exit 1
          fi

      - name: Clean workspace
        run: |
          if [ -z "$GITHUB_WORKSPACE" ] || [ "$GITHUB_WORKSPACE" = "/" ]; then
            echo "::error::GITHUB_WORKSPACE is empty or root -- aborting cleanup"
            exit 1
          fi
          rm -rf "${GITHUB_WORKSPACE:?}"/* || true
          find "${GITHUB_WORKSPACE}" -mindepth 1 -maxdepth 1 -name '.*' -exec rm -rf {} + 2>/dev/null || true

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@ac638b010cf58a27ee6c972d7336334ccaf61c96 # v4.4.1
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Ensure gradlew is executable
        run: chmod +x android/gradlew

      - name: Run lint, detekt, and spotless checks
        id: lint-checks
        timeout-minutes: 15
        working-directory: android
        run: |
          umask 077
          set +e
          ./gradlew lint detekt spotlessCheck --parallel --continue --stacktrace 2>&1 | tee "${RUNNER_TEMP}/lint-all-output.txt"
          GRADLE_EXIT=$?
          set -e

          LINT_OK="true"; DETEKT_OK="true"; KTFMT_OK="true"
          if grep -qE "> Task .*:lint[A-Z].* FAILED" "${RUNNER_TEMP}/lint-all-output.txt"; then LINT_OK="false"; fi
          if grep -qE "> Task .*:detekt.* FAILED" "${RUNNER_TEMP}/lint-all-output.txt"; then DETEKT_OK="false"; fi
          if grep -qE "> Task .*[Ss]potless.* FAILED" "${RUNNER_TEMP}/lint-all-output.txt"; then KTFMT_OK="false"; fi

          echo "lint_ok=$LINT_OK" >> $GITHUB_OUTPUT
          echo "detekt_ok=$DETEKT_OK" >> $GITHUB_OUTPUT
          echo "ktfmt_ok=$KTFMT_OK" >> $GITHUB_OUTPUT

          exit $GRADLE_EXIT

      - name: Upload lint XML report for SonarQube
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: android-lint-xml
          path: android/app/build/reports/lint-results-debug.xml
          retention-days: 1
          if-no-files-found: warn

      - name: Upload detekt XML report for SonarQube
        if: always() && steps.lint-checks.outputs.detekt_ok == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: android-detekt-xml
          path: android/build/reports/detekt/detekt.xml
          retention-days: 1
          if-no-files-found: warn

      - name: Upload lint reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: android-lint-reports
          path: android/**/build/reports/lint-results*.html
          retention-days: 7
          if-no-files-found: warn

      - name: Write lint summary
        if: always()
        run: |
          {
            echo "## Android Lint Results"
            echo "| Check | Status |"
            echo "|-------|--------|"
            echo "| Android Lint | ${{ steps.lint-checks.outputs.lint_ok == 'true' && '✅ Pass' || '❌ Fail' }} |"
            echo "| Detekt | ${{ steps.lint-checks.outputs.detekt_ok == 'true' && '✅ Pass' || '❌ Fail' }} |"
            echo "| ktfmt (Spotless) | ${{ steps.lint-checks.outputs.ktfmt_ok == 'true' && '✅ Pass' || '❌ Fail' }} |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Collect lint errors
        id: collect-errors
        if: always() && steps.lint-checks.outcome == 'failure'
        run: |
          ERROR=""
          FAILED=""
          if [ "${{ steps.lint-checks.outputs.lint_ok }}" = "false" ]; then
            FAILED="android-lint"
            ERROR="[android-lint] $(grep -A5 'FAILED' "${RUNNER_TEMP}/lint-all-output.txt" 2>/dev/null | head -30 || echo 'Android lint failed.')"
          fi
          if [ "${{ steps.lint-checks.outputs.detekt_ok }}" = "false" ]; then
            FAILED="${FAILED:+${FAILED},}detekt"
            ERROR="${ERROR:+${ERROR}\n\n}[detekt] $(grep -B2 -A5 'detekt.*FAILED' "${RUNNER_TEMP}/lint-all-output.txt" 2>/dev/null | head -30 || echo 'Detekt found issues.')"
          fi
          if [ "${{ steps.lint-checks.outputs.ktfmt_ok }}" = "false" ]; then
            FAILED="${FAILED:+${FAILED},}ktfmt"
            ERROR="${ERROR:+${ERROR}\n\n}[ktfmt] $(grep -B2 -A5 '[Ss]potless.*FAILED' "${RUNNER_TEMP}/lint-all-output.txt" 2>/dev/null | head -30 || echo 'ktfmt formatting check failed. Run ./gradlew spotlessApply in android/ to fix.')"
          fi
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "failed_steps=${FAILED}" >> $GITHUB_OUTPUT
          echo "error_log<<$EOF" >> $GITHUB_OUTPUT
          echo "$ERROR" >> $GITHUB_OUTPUT
          echo "$EOF" >> $GITHUB_OUTPUT

      - name: Record duration
        id: timing
        if: always()
        run: echo "duration=$(( $(date +%s) - ${{ steps.start.outputs.time }} ))s" >> $GITHUB_OUTPUT

      - name: Fail job if lint failed
        if: always() && steps.lint-checks.outcome == 'failure'
        run: exit 1

      - name: Clean up temp files
        if: always()
        run: rm -f "${RUNNER_TEMP}/lint-all-output.txt"

      - name: Post-job workspace cleanup
        if: always() && !startsWith(runner.name, 'GitHub Actions')
        run: |
          rm -rf "${GITHUB_WORKSPACE:?}"/* 2>/dev/null || true
          find "${GITHUB_WORKSPACE}" -mindepth 1 -maxdepth 1 -name '.*' ! -name '.runner' -exec rm -rf {} + 2>/dev/null || true

  unit-test:
    name: Android Unit Tests
    needs: [runner-cleanup]
    runs-on: ${{ github.actor == 'dependabot[bot]' && 'ubuntu-latest' || fromJSON('["self-hosted","linux"]') }}
    timeout-minutes: 25
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
    outputs:
      error_log: ${{ steps.collect-errors.outputs.error_log }}
      duration: ${{ steps.timing.outputs.duration }}
    steps:
      - name: Record start time
        id: start
        run: echo "time=$(date +%s)" >> $GITHUB_OUTPUT

      - name: Free disk space (self-hosted)
        if: ${{ !startsWith(runner.name, 'GitHub Actions') }}
        run: |
          echo "=== Disk before cleanup ==="
          df -h / || true
          docker system prune -af --volumes 2>/dev/null || true
          find "${RUNNER_TOOL_CACHE:-/opt/hostedtoolcache}" -maxdepth 1 -mindepth 1 -mtime +2 -exec rm -rf {} + 2>/dev/null || true
          find /tmp -maxdepth 1 -mindepth 1 -mtime +1 -exec rm -rf {} + 2>/dev/null || true
          rm -rf ~/.gradle/caches/build-cache-* ~/.gradle/caches/transforms-* ~/.gradle/caches/journal-* 2>/dev/null || true
          rm -rf ~/.gradle/wrapper/dists/ ~/.gradle/daemon 2>/dev/null || true
          echo "=== Disk after cleanup ==="
          df -h / || true

      - name: Check available disk space
        if: ${{ !startsWith(runner.name, 'GitHub Actions') }}
        run: |
          AVAIL_KB=$(df --output=avail / | tail -1)
          AVAIL_MB=$((AVAIL_KB / 1024))
          echo "Available disk space: ${AVAIL_MB}MB"
          if [ "$AVAIL_MB" -lt 2048 ]; then
            echo "::error::Insufficient disk space (${AVAIL_MB}MB < 2048MB). Self-hosted runner needs manual cleanup by admin."
            exit 1
          fi

      - name: Clean workspace
        run: |
          if [ -z "$GITHUB_WORKSPACE" ] || [ "$GITHUB_WORKSPACE" = "/" ]; then
            echo "::error::GITHUB_WORKSPACE is empty or root -- aborting cleanup"
            exit 1
          fi
          rm -rf "${GITHUB_WORKSPACE:?}"/* || true
          find "${GITHUB_WORKSPACE}" -mindepth 1 -maxdepth 1 -name '.*' -exec rm -rf {} + 2>/dev/null || true

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@ac638b010cf58a27ee6c972d7336334ccaf61c96 # v4.4.1
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Ensure gradlew is executable
        run: chmod +x android/gradlew

      - name: Run unit tests
        id: unit-tests
        timeout-minutes: 20
        working-directory: android
        run: |
          umask 077
          ./gradlew testDebugUnitTest --parallel --stacktrace 2>&1 | tee "${RUNNER_TEMP}/test-output.txt"

      - name: Generate JaCoCo coverage reports
        id: coverage
        if: always() && steps.unit-tests.outcome == 'success'
        timeout-minutes: 10
        working-directory: android
        run: |
          umask 077
          ./gradlew createDebugUnitTestCoverageReport --parallel --continue --stacktrace 2>&1 || true

      - name: Upload JaCoCo coverage XML for SonarQube
        if: always() && steps.coverage.outcome == 'success'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: android-coverage-xml
          path: android/**/build/reports/coverage/test/debug/report.xml
          retention-days: 1
          if-no-files-found: warn

      - name: Upload JUnit XML test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: android-test-results-xml
          path: android/**/build/test-results/testDebugUnitTest/*.xml
          retention-days: 7
          if-no-files-found: warn

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: android-test-reports
          path: android/**/build/reports/tests/
          retention-days: 7
          if-no-files-found: warn

      - name: Write test summary
        if: always()
        run: |
          {
            echo "## Android Unit Test Results"
            if [ "${{ steps.unit-tests.outcome }}" = "success" ]; then
              # Parse JUnit XML for test counts
              TESTS=0; FAILURES=0; ERRORS=0; SKIPPED=0
              for xml in android/**/build/test-results/testDebugUnitTest/*.xml; do
                [ -f "$xml" ] || continue
                TESTS=$((TESTS + $(grep -oP 'tests="\K[0-9]+' "$xml" | head -1 || echo 0)))
                FAILURES=$((FAILURES + $(grep -oP 'failures="\K[0-9]+' "$xml" | head -1 || echo 0)))
                ERRORS=$((ERRORS + $(grep -oP 'errors="\K[0-9]+' "$xml" | head -1 || echo 0)))
                SKIPPED=$((SKIPPED + $(grep -oP 'skipped="\K[0-9]+' "$xml" | head -1 || echo 0)))
              done
              PASSED=$((TESTS - FAILURES - ERRORS - SKIPPED))
              echo "✅ All unit tests passed"
              if [ "$TESTS" -gt 0 ]; then
                echo "| Metric | Count |"
                echo "|--------|-------|"
                echo "| Total | $TESTS |"
                echo "| Passed | $PASSED |"
                echo "| Failed | $FAILURES |"
                echo "| Errors | $ERRORS |"
                echo "| Skipped | $SKIPPED |"
              fi
            else
              echo "❌ Unit tests failed"
              echo '```'
              grep -E "(FAILED|FAILURE|> Task .* FAILED)" "${RUNNER_TEMP}/test-output.txt" 2>/dev/null | head -20 || true
              echo '```'
            fi

            # Parse JaCoCo XML for coverage %
            COVERED=0; MISSED=0
            for xml in android/**/build/reports/coverage/test/debug/report.xml; do
              [ -f "$xml" ] || continue
              COVERED=$((COVERED + $(grep -oP 'type="LINE"[^/]*covered="\K[0-9]+' "$xml" | tail -1 || echo 0)))
              MISSED=$((MISSED + $(grep -oP 'type="LINE"[^/]*missed="\K[0-9]+' "$xml" | tail -1 || echo 0)))
            done
            TOTAL_LINES=$((COVERED + MISSED))
            if [ "$TOTAL_LINES" -gt 0 ]; then
              COVERAGE=$((COVERED * 100 / TOTAL_LINES))
              echo ""
              echo "**Line Coverage:** ${COVERAGE}% (${COVERED}/${TOTAL_LINES} lines)"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Collect test errors
        id: collect-errors
        if: failure()
        run: |
          ERROR=""
          [ -f "${RUNNER_TEMP}/test-output.txt" ] && ERROR="$(tail -c 3000 "${RUNNER_TEMP}/test-output.txt")"
          if [ -z "$ERROR" ]; then
            ERROR="Android unit tests failed but no captured output. Run ./gradlew testDebugUnitTest in android/ to reproduce."
          fi
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "error_log<<$EOF" >> $GITHUB_OUTPUT
          echo "$ERROR" >> $GITHUB_OUTPUT
          echo "$EOF" >> $GITHUB_OUTPUT

      - name: Record duration
        id: timing
        if: always()
        run: echo "duration=$(( $(date +%s) - ${{ steps.start.outputs.time }} ))s" >> $GITHUB_OUTPUT

      - name: Clean up temp files
        if: always()
        run: rm -f "${RUNNER_TEMP}/test-output.txt"

      - name: Post-job workspace cleanup
        if: always() && !startsWith(runner.name, 'GitHub Actions')
        run: |
          rm -rf "${GITHUB_WORKSPACE:?}"/* 2>/dev/null || true
          find "${GITHUB_WORKSPACE}" -mindepth 1 -maxdepth 1 -name '.*' ! -name '.runner' -exec rm -rf {} + 2>/dev/null || true

  quality-gate:
    name: Dependency Security Scan
    needs: [runner-cleanup]
    runs-on: ${{ github.actor == 'dependabot[bot]' && 'ubuntu-latest' || fromJSON('["self-hosted","linux"]') }}
    timeout-minutes: 20
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
      security-events: write
    outputs:
      error_log: ${{ steps.collect-errors.outputs.error_log }}
      failed_steps: ${{ steps.collect-errors.outputs.failed_steps }}
      duration: ${{ steps.timing.outputs.duration }}
    steps:
      - name: Record start time
        id: start
        run: echo "time=$(date +%s)" >> $GITHUB_OUTPUT

      - name: Free disk space (self-hosted)
        if: ${{ !startsWith(runner.name, 'GitHub Actions') }}
        run: |
          echo "=== Disk before cleanup ==="
          df -h / || true
          docker system prune -af --volumes 2>/dev/null || true
          find "${RUNNER_TOOL_CACHE:-/opt/hostedtoolcache}" -maxdepth 1 -mindepth 1 -mtime +2 -exec rm -rf {} + 2>/dev/null || true
          find /tmp -maxdepth 1 -mindepth 1 -mtime +1 -exec rm -rf {} + 2>/dev/null || true
          rm -rf ~/.gradle/caches/build-cache-* ~/.gradle/caches/transforms-* ~/.gradle/caches/journal-* 2>/dev/null || true
          rm -rf ~/.gradle/wrapper/dists/ ~/.gradle/daemon 2>/dev/null || true
          echo "=== Disk after cleanup ==="
          df -h / || true

      - name: Check available disk space
        if: ${{ !startsWith(runner.name, 'GitHub Actions') }}
        run: |
          AVAIL_KB=$(df --output=avail / | tail -1)
          AVAIL_MB=$((AVAIL_KB / 1024))
          echo "Available disk space: ${AVAIL_MB}MB"
          if [ "$AVAIL_MB" -lt 2048 ]; then
            echo "::error::Insufficient disk space (${AVAIL_MB}MB < 2048MB). Self-hosted runner needs manual cleanup by admin."
            exit 1
          fi

      - name: Clean workspace
        run: |
          if [ -z "$GITHUB_WORKSPACE" ] || [ "$GITHUB_WORKSPACE" = "/" ]; then
            echo "::error::GITHUB_WORKSPACE is empty or root -- aborting cleanup"
            exit 1
          fi
          rm -rf "${GITHUB_WORKSPACE:?}"/* || true
          find "${GITHUB_WORKSPACE}" -mindepth 1 -maxdepth 1 -name '.*' -exec rm -rf {} + 2>/dev/null || true

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@ac638b010cf58a27ee6c972d7336334ccaf61c96 # v4.4.1
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Ensure gradlew is executable
        run: chmod +x android/gradlew

      - name: Run Gradle dependency verification
        id: dep-verify
        if: always()
        timeout-minutes: 10
        working-directory: android
        run: |
          umask 077
          ./gradlew dependencies --write-verification-metadata sha256 --parallel --stacktrace 2>&1 | tee "${RUNNER_TEMP}/dep-output.txt"
          if ! git diff --exit-code gradle/verification-metadata.xml 2>/dev/null; then
            echo "::error::Gradle dependency verification metadata changed -- possible supply chain integrity issue. Run './gradlew dependencies --write-verification-metadata sha256' locally and commit the updated file."
            exit 1
          fi

      - name: Install Trivy for dependency vulnerability scanning
        id: install-trivy
        if: always()
        timeout-minutes: 3
        run: |
          TRIVY_VERSION="0.69.3"
          TRIVY_SHA256="1816b632dfe529869c740c0913e36bd1629cb7688bd5634f4a858c1d57c88b75"
          if command -v trivy &>/dev/null && [ "$(trivy --version 2>/dev/null | grep -oP '\d+\.\d+\.\d+')" = "$TRIVY_VERSION" ]; then
            echo "installed=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          ARCHIVE="${RUNNER_TEMP}/trivy.tar.gz"
          curl -sSfL --proto =https --connect-timeout 15 --max-time 120 -o "$ARCHIVE" \
            "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz"
          echo "${TRIVY_SHA256}  ${ARCHIVE}" | sha256sum -c -
          mkdir -p "${HOME}/.local/bin"
          tar xzf "$ARCHIVE" --no-same-owner --no-same-permissions -C "${HOME}/.local/bin" trivy
          rm -f "$ARCHIVE"
          echo "${HOME}/.local/bin" >> "$GITHUB_PATH"
          export PATH="${HOME}/.local/bin:$PATH"
          echo "installed=true" >> $GITHUB_OUTPUT

      - name: Scan Android dependencies for known vulnerabilities (Trivy)
        id: trivy-deps
        if: always() && steps.install-trivy.outputs.installed == 'true'
        timeout-minutes: 5
        run: |
          export PATH="${HOME}/.local/bin:$PATH"
          trivy fs --scanners vuln --exit-code 1 --severity CRITICAL,HIGH \
            --no-progress --format table \
            android/ 2>&1 | tee "${RUNNER_TEMP}/trivy-deps-output.txt"

      - name: Generate Trivy dependency SARIF report
        if: always() && steps.install-trivy.outputs.installed == 'true'
        run: |
          export PATH="${HOME}/.local/bin:$PATH"
          umask 077
          trivy fs --scanners vuln --severity CRITICAL,HIGH,MEDIUM \
            --no-progress --format sarif --output trivy-android-deps.sarif \
            android/ || true

      - name: Upload Trivy dependency SARIF to GitHub Security
        if: always() && steps.install-trivy.outputs.installed == 'true' && hashFiles('trivy-android-deps.sarif') != ''
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1
        with:
          sarif_file: trivy-android-deps.sarif
          category: trivy-android-deps
        continue-on-error: true

      - name: Write quality gate summary
        if: always()
        run: |
          {
            echo "## Android Dependency Security Results"
            echo "| Check | Status |"
            echo "|-------|--------|"
            echo "| Gradle Dependencies | ${{ steps.dep-verify.outcome == 'success' && '✅ Pass' || '❌ Fail' }} |"
            echo "| Trivy Dependency CVEs | ${{ steps.trivy-deps.outcome == 'success' && '✅ Pass' || (steps.install-trivy.outputs.installed != 'true' && '⏭️ Skipped' || '❌ Fail') }} |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Collect quality gate errors
        id: collect-errors
        if: always() && (steps.dep-verify.outcome == 'failure' || steps.trivy-deps.outcome == 'failure')
        run: |
          ERROR=""
          FAILED=""
          if [ "${{ steps.dep-verify.outcome }}" = "failure" ]; then
            FAILED="${FAILED}dep-verify,"
            ERROR="${ERROR}[dep-verify] $(tail -c 1500 "${RUNNER_TEMP}/dep-output.txt" 2>/dev/null || echo 'Gradle dependency verification failed.')\n\n"
          fi
          if [ "${{ steps.trivy-deps.outcome }}" = "failure" ]; then
            FAILED="${FAILED}trivy-deps,"
            ERROR="${ERROR}[trivy-deps] $(tail -c 1500 "${RUNNER_TEMP}/trivy-deps-output.txt" 2>/dev/null || echo 'Trivy found vulnerable Android dependencies.')\n\n"
          fi
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "failed_steps=${FAILED%,}" >> $GITHUB_OUTPUT
          echo "error_log<<$EOF" >> $GITHUB_OUTPUT
          echo -e "$ERROR" >> $GITHUB_OUTPUT
          echo "$EOF" >> $GITHUB_OUTPUT

      - name: Fail job if any check failed
        if: always() && (steps.dep-verify.outcome == 'failure' || steps.trivy-deps.outcome == 'failure')
        run: exit 1

      - name: Record duration
        id: timing
        if: always()
        run: echo "duration=$(( $(date +%s) - ${{ steps.start.outputs.time }} ))s" >> $GITHUB_OUTPUT

      - name: Clean up temp files
        if: always()
        run: rm -f "${RUNNER_TEMP}/dep-output.txt" "${RUNNER_TEMP}/trivy-deps-output.txt" trivy-android-deps.sarif

      - name: Post-job workspace cleanup
        if: always() && !startsWith(runner.name, 'GitHub Actions')
        run: |
          rm -rf "${GITHUB_WORKSPACE:?}"/* 2>/dev/null || true
          find "${GITHUB_WORKSPACE}" -mindepth 1 -maxdepth 1 -name '.*' ! -name '.runner' -exec rm -rf {} + 2>/dev/null || true

  # ── Stage 2: Build (gated on all quality checks) ──

  build:
    name: Android Debug Build
    runs-on: ${{ github.actor == 'dependabot[bot]' && 'ubuntu-latest' || fromJSON('["self-hosted","linux"]') }}
    timeout-minutes: 30
    needs: [secret-scan, dependency-review, lint, unit-test, quality-gate]
    if: |
      always() &&
      needs.secret-scan.result == 'success' &&
      needs.lint.result == 'success' &&
      needs.unit-test.result == 'success' &&
      (needs.dependency-review.result == 'success' || needs.dependency-review.result == 'skipped') &&
      (needs.quality-gate.result == 'success')
    permissions:
      contents: read
    outputs:
      error_log: ${{ steps.collect-errors.outputs.error_log }}
      duration: ${{ steps.timing.outputs.duration }}
    steps:
      - name: Record start time
        id: start
        run: echo "time=$(date +%s)" >> $GITHUB_OUTPUT

      - name: Free disk space (self-hosted)
        if: ${{ !startsWith(runner.name, 'GitHub Actions') }}
        run: |
          echo "=== Disk before cleanup ==="
          df -h / || true
          docker system prune -af --volumes 2>/dev/null || true
          find "${RUNNER_TOOL_CACHE:-/opt/hostedtoolcache}" -maxdepth 1 -mindepth 1 -mtime +2 -exec rm -rf {} + 2>/dev/null || true
          find /tmp -maxdepth 1 -mindepth 1 -mtime +1 -exec rm -rf {} + 2>/dev/null || true
          rm -rf ~/.gradle/caches/build-cache-* ~/.gradle/caches/transforms-* ~/.gradle/caches/journal-* 2>/dev/null || true
          rm -rf ~/.gradle/wrapper/dists/ ~/.gradle/daemon 2>/dev/null || true
          echo "=== Disk after cleanup ==="
          df -h / || true

      - name: Check available disk space
        if: ${{ !startsWith(runner.name, 'GitHub Actions') }}
        run: |
          AVAIL_KB=$(df --output=avail / | tail -1)
          AVAIL_MB=$((AVAIL_KB / 1024))
          echo "Available disk space: ${AVAIL_MB}MB"
          if [ "$AVAIL_MB" -lt 2048 ]; then
            echo "::error::Insufficient disk space (${AVAIL_MB}MB < 2048MB). Self-hosted runner needs manual cleanup by admin."
            exit 1
          fi

      - name: Clean workspace
        run: |
          if [ -z "$GITHUB_WORKSPACE" ] || [ "$GITHUB_WORKSPACE" = "/" ]; then
            echo "::error::GITHUB_WORKSPACE is empty or root -- aborting cleanup"
            exit 1
          fi
          rm -rf "${GITHUB_WORKSPACE:?}"/* || true
          find "${GITHUB_WORKSPACE}" -mindepth 1 -maxdepth 1 -name '.*' -exec rm -rf {} + 2>/dev/null || true

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@ac638b010cf58a27ee6c972d7336334ccaf61c96 # v4.4.1
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Ensure gradlew is executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        id: build-debug
        timeout-minutes: 25
        working-directory: android
        run: |
          umask 077
          ./gradlew assembleDebug --parallel --stacktrace 2>&1 | tee "${RUNNER_TEMP}/build-output.txt"

      - name: Scan APK for embedded secrets
        if: success()
        run: |
          APK_DIR="android/app/build/outputs/apk/debug"
          if [ ! -d "$APK_DIR" ]; then
            echo "::warning::APK output directory not found at $APK_DIR -- skipping secret scan"
            exit 0
          fi
          if command -v gitleaks &>/dev/null; then
            gitleaks detect --source "$APK_DIR" --no-git --verbose --redact --exit-code 1
          else
            GITLEAKS_VERSION="8.24.3"
            GITLEAKS_SHA256="9991e0b2903da4c8f6122b5c3186448b927a5da4deef1fe45271c3793f4ee29c"
            ARCHIVE="${RUNNER_TEMP}/gitleaks.tar.gz"
            curl -sSfL --proto =https --connect-timeout 15 --max-time 120 -o "$ARCHIVE" \
              "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
            echo "${GITLEAKS_SHA256}  ${ARCHIVE}" | sha256sum -c -
            mkdir -p "${HOME}/.local/bin"
            tar xzf "$ARCHIVE" --no-same-owner --no-same-permissions -C "${HOME}/.local/bin" gitleaks
            rm -f "$ARCHIVE"
            export PATH="${HOME}/.local/bin:$PATH"
            echo "${HOME}/.local/bin" >> "$GITHUB_PATH"
            gitleaks detect --source "$APK_DIR" --no-git --verbose --redact --exit-code 1
          fi

      - name: Upload debug APK
        if: success()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: android-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 7
          if-no-files-found: warn

      - name: Write build summary
        if: always()
        run: |
          {
            echo "## Android Build Results"
            if [ "${{ steps.build-debug.outcome }}" = "success" ]; then
              APK_SIZE=$(du -sh android/app/build/outputs/apk/debug/*.apk 2>/dev/null | head -1 | awk '{print $1}')
              echo "✅ Debug APK built successfully (${APK_SIZE:-unknown})"
            else
              echo "❌ Debug build failed"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Collect build errors
        id: collect-errors
        if: failure()
        run: |
          ERROR=""
          [ -f "${RUNNER_TEMP}/build-output.txt" ] && ERROR="$(tail -c 3000 "${RUNNER_TEMP}/build-output.txt")"
          if [ -z "$ERROR" ]; then
            ERROR="Android debug build failed but no captured output. Run ./gradlew assembleDebug in android/ to reproduce."
          fi
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "error_log<<$EOF" >> $GITHUB_OUTPUT
          echo "$ERROR" >> $GITHUB_OUTPUT
          echo "$EOF" >> $GITHUB_OUTPUT

      - name: Record duration
        id: timing
        if: always()
        run: echo "duration=$(( $(date +%s) - ${{ steps.start.outputs.time }} ))s" >> $GITHUB_OUTPUT

      - name: Clean up temp files
        if: always()
        run: rm -f "${RUNNER_TEMP}/build-output.txt"

      - name: Post-job workspace cleanup
        if: always() && !startsWith(runner.name, 'GitHub Actions')
        run: |
          rm -rf "${GITHUB_WORKSPACE:?}"/* 2>/dev/null || true
          find "${GITHUB_WORKSPACE}" -mindepth 1 -maxdepth 1 -name '.*' ! -name '.runner' -exec rm -rf {} + 2>/dev/null || true

  # ── Stage 2b: SonarQube Analysis (runs after lint + unit-test) ──

  sonarqube:
    name: SonarQube Code Quality Analysis
    runs-on: ${{ github.actor == 'dependabot[bot]' && 'ubuntu-latest' || fromJSON('["self-hosted","linux","sonarqube"]') }}
    timeout-minutes: 20
    permissions:
      contents: read
    env:
      DOCKER_CONTENT_TRUST: "1"
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
    needs: [lint, unit-test]
    if: |
      always() &&
      (needs.lint.result == 'success' || needs.unit-test.result == 'success')
    outputs:
      error_log: ${{ steps.collect-errors.outputs.error_log }}
      duration: ${{ steps.timing.outputs.duration }}
    steps:
      - name: Record start time
        id: start
        run: echo "time=$(date +%s)" >> $GITHUB_OUTPUT

      - name: Free disk space (self-hosted)
        if: ${{ !startsWith(runner.name, 'GitHub Actions') }}
        run: |
          echo "=== Disk before cleanup ==="
          df -h / || true
          docker system prune -af --volumes 2>/dev/null || true
          find "${RUNNER_TOOL_CACHE:-/opt/hostedtoolcache}" -maxdepth 1 -mindepth 1 -mtime +2 -exec rm -rf {} + 2>/dev/null || true
          find /tmp -maxdepth 1 -mindepth 1 -mtime +1 -exec rm -rf {} + 2>/dev/null || true
          rm -rf ~/.gradle/caches/build-cache-* ~/.gradle/caches/transforms-* ~/.gradle/caches/journal-* 2>/dev/null || true
          rm -rf ~/.gradle/wrapper/dists/ ~/.gradle/daemon 2>/dev/null || true
          echo "=== Disk after cleanup ==="
          df -h / || true

      - name: Check available disk space
        if: ${{ !startsWith(runner.name, 'GitHub Actions') }}
        run: |
          AVAIL_KB=$(df --output=avail / | tail -1)
          AVAIL_MB=$((AVAIL_KB / 1024))
          echo "Available disk space: ${AVAIL_MB}MB"
          if [ "$AVAIL_MB" -lt 2048 ]; then
            echo "::error::Insufficient disk space (${AVAIL_MB}MB < 2048MB). Self-hosted runner needs manual cleanup by admin."
            exit 1
          fi

      - name: Clean workspace
        run: |
          if [ -z "$GITHUB_WORKSPACE" ] || [ "$GITHUB_WORKSPACE" = "/" ]; then
            echo "::error::GITHUB_WORKSPACE is empty or root -- aborting cleanup"
            exit 1
          fi
          rm -rf "${GITHUB_WORKSPACE:?}"/* || true
          find "${GITHUB_WORKSPACE}" -mindepth 1 -maxdepth 1 -name '.*' -exec rm -rf {} + 2>/dev/null || true

      - name: Checkout repository with full history for blame analysis
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Download detekt XML report
        id: download-detekt
        if: needs.lint.result == 'success'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: android-detekt-xml
          path: android/build/reports/detekt/
        continue-on-error: true

      - name: Download Android Lint XML report
        id: download-lint
        if: needs.lint.result == 'success'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: android-lint-xml
          path: android/app/build/reports/
        continue-on-error: true

      - name: Download JaCoCo coverage XML reports
        id: download-coverage
        if: needs.unit-test.result == 'success'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: android-coverage-xml
          path: android/
        continue-on-error: true

      - name: Download JUnit XML test results
        id: download-junit
        if: needs.unit-test.result == 'success'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: android-test-results-xml
          path: android/
        continue-on-error: true

      - name: Validate SONAR_HOST_URL format
        id: sonar-url-check
        run: |
          if [ -z "$SONAR_HOST_URL" ]; then
            echo "::warning::SONAR_HOST_URL is not set -- skipping SonarQube scan"
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          if ! echo "$SONAR_HOST_URL" | grep -qE '^https?://[a-zA-Z0-9._-]+(:[0-9]{1,5})?(/[a-zA-Z0-9._/-]*)?$'; then
            echo "::error::SONAR_HOST_URL has invalid format -- possible SSRF vector"
            exit 1
          fi
          echo "skip=false" >> $GITHUB_OUTPUT

      - name: Verify SonarQube server is reachable
        id: sonar-reachable
        if: steps.sonar-url-check.outputs.skip != 'true'
        timeout-minutes: 2
        run: |
          SONAR_URL="${SONAR_HOST_URL}"
          for i in $(seq 1 12); do
            RESPONSE=$(curl -sf --connect-timeout 5 --max-time 10 "$SONAR_URL/api/system/status" 2>/dev/null) || RESPONSE=""
            if [ -n "$RESPONSE" ]; then
              STATUS=$(echo "$RESPONSE" | jq -r '.status // "UNREACHABLE"' 2>/dev/null) || STATUS="UNREACHABLE"
            else
              STATUS="UNREACHABLE"
            fi
            if [ "$STATUS" = "UP" ]; then
              echo "SonarQube is ready."
              echo "reachable=true" >> $GITHUB_OUTPUT
              exit 0
            fi
            echo "Attempt $i/12 -- status: $STATUS. Retrying in 5s..."
            sleep 5
          done
          echo "::warning::SonarQube at $SONAR_URL did not respond within ~60 seconds -- skipping analysis"
          echo "reachable=false" >> $GITHUB_OUTPUT

      - name: Bootstrap SonarQube token
        id: sonar-bootstrap
        if: steps.sonar-url-check.outputs.skip != 'true' && steps.sonar-reachable.outputs.reachable == 'true'
        timeout-minutes: 2
        run: |
          SONAR_URL="${SONAR_HOST_URL}"
          TOKEN="${{ secrets.SONAR_TOKEN }}"

          if [ -n "$TOKEN" ]; then
            echo "Using existing SONAR_TOKEN secret."
            echo "::add-mask::$TOKEN"
            echo "SONAR_ANALYSIS_TOKEN=$TOKEN" >> "$GITHUB_ENV"
            exit 0
          fi

          ADMIN_PASS="${{ secrets.SONAR_ADMIN_PASSWORD }}"
          if [ -z "$ADMIN_PASS" ]; then
            echo "::error::Neither SONAR_TOKEN nor SONAR_ADMIN_PASSWORD is set."
            exit 1
          fi

          TOKEN_NAME="android-ci-token-${{ github.run_id }}"
          curl -sf --connect-timeout 10 --max-time 30 -u "admin:${ADMIN_PASS}" -X POST \
            "$SONAR_URL/api/user_tokens/revoke?name=${TOKEN_NAME}" 2>/dev/null || true
          TOKEN_RESPONSE=$(curl -sf --connect-timeout 10 --max-time 30 -u "admin:${ADMIN_PASS}" -X POST \
            "$SONAR_URL/api/user_tokens/generate?name=${TOKEN_NAME}" 2>/dev/null) || TOKEN_RESPONSE=""
          TOKEN=$(echo "$TOKEN_RESPONSE" | jq -r '.token' 2>/dev/null) || TOKEN=""

          if [ -z "$TOKEN" ] || [ "$TOKEN" = "null" ]; then
            echo "::error::Failed to generate SonarQube token"
            exit 1
          fi

          echo "::add-mask::$TOKEN"
          echo "SONAR_ANALYSIS_TOKEN=$TOKEN" >> "$GITHUB_ENV"
          echo "temp_token=true" >> $GITHUB_OUTPUT
          echo "token_name=${TOKEN_NAME}" >> $GITHUB_OUTPUT

      - name: Run SonarQube analysis
        id: sonar-scan
        if: steps.sonar-url-check.outputs.skip != 'true' && steps.sonar-reachable.outputs.reachable == 'true'
        env:
          IS_PR: ${{ github.event_name == 'pull_request' }}
          PR_KEY: ${{ github.event.pull_request.number }}
          PR_BRANCH: ${{ github.head_ref }}
          PR_BASE: ${{ github.base_ref }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          SCAN_ARGS=()
          SCAN_ARGS+=("-Dsonar.projectBaseDir=/usr/src")
          SCAN_ARGS+=("-Dsonar.qualitygate.wait=true")
          SCAN_ARGS+=("-Dsonar.qualitygate.timeout=300")

          # Scope scan to Android sources only (override root sonar-project.properties
          # which includes backend/src and frontend/src -- Rust issues must not fail this gate)
          ANDROID_SOURCES=$(find android -path '*/src/main/kotlin' -type d -not -path '*/build/*' 2>/dev/null | sort | paste -sd ',' -)
          ANDROID_TESTS=$(find android -path '*/src/test/kotlin' -type d -not -path '*/build/*' 2>/dev/null | sort | paste -sd ',' -)

          if [ -z "$ANDROID_SOURCES" ]; then
            echo "::warning::No Kotlin source directories found -- skipping SonarQube analysis"
            exit 0
          fi

          SCAN_ARGS+=("-Dsonar.sources=${ANDROID_SOURCES}")
          if [ -n "$ANDROID_TESTS" ]; then
            SCAN_ARGS+=("-Dsonar.tests=${ANDROID_TESTS}")
          fi
          SCAN_ARGS+=("-Dsonar.rust.lcov.reportPaths=")
          SCAN_ARGS+=("-Dsonar.rust.clippy.reportPaths=")

          if [ -f android/build/reports/detekt/detekt.xml ]; then
            echo "Detekt report found -- including in SonarQube analysis"
            SCAN_ARGS+=("-Dsonar.kotlin.detekt.reportPaths=/usr/src/android/build/reports/detekt/detekt.xml")
          else
            echo "::warning::Detekt XML report not found -- skipping detekt import"
          fi

          if [ -f android/app/build/reports/lint-results-debug.xml ]; then
            echo "Android Lint report found -- including in SonarQube analysis"
            SCAN_ARGS+=("-Dsonar.androidLint.reportPaths=/usr/src/android/app/build/reports/lint-results-debug.xml")
          else
            echo "::warning::Android Lint XML report not found -- skipping lint import"
          fi

          COVERAGE_PATHS=$(find android -path '*/coverage/test/debug/report.xml' -type f 2>/dev/null | sed 's|^|/usr/src/|' | paste -sd ',' -)
          if [ -n "$COVERAGE_PATHS" ]; then
            echo "JaCoCo coverage reports found -- including in SonarQube analysis"
            SCAN_ARGS+=("-Dsonar.coverage.jacoco.xmlReportPaths=${COVERAGE_PATHS}")
          else
            echo "::warning::No JaCoCo coverage reports found -- SonarQube will report 0% coverage"
          fi

          JUNIT_PATHS=$(find android -path '*/test-results/testDebugUnitTest/*.xml' -type f 2>/dev/null | sed 's|^|/usr/src/|' | paste -sd ',' -)
          if [ -n "$JUNIT_PATHS" ]; then
            echo "JUnit test results found -- including in SonarQube analysis"
            SCAN_ARGS+=("-Dsonar.junit.reportPaths=${JUNIT_PATHS}")
          else
            echo "::warning::No JUnit test results found -- SonarQube will not import test execution data"
          fi

          if [ "$IS_PR" = "true" ] && [ -n "$PR_KEY" ]; then
            echo "PR detected (#${PR_KEY}) -- enabling PR decoration"
            SCAN_ARGS+=("-Dsonar.pullrequest.key=${PR_KEY}")
            SCAN_ARGS+=("-Dsonar.pullrequest.branch=${PR_BRANCH}")
            SCAN_ARGS+=("-Dsonar.pullrequest.base=${PR_BASE}")
          else
            BRANCH_NAME="${GITHUB_REF_NAME}"
            if [ -n "$BRANCH_NAME" ]; then
              SCAN_ARGS+=("-Dsonar.branch.name=${BRANCH_NAME}")
            fi
          fi

          docker run --rm \
            --network host \
            --security-opt no-new-privileges \
            --cap-drop ALL \
            --read-only \
            --user 1000:1000 \
            --memory 1g \
            --memory-swap 1g \
            --cpus 2 \
            --pids-limit 256 \
            --tmpfs /tmp:rw,nosuid,nodev,size=256m,uid=1000,gid=1000 \
            --tmpfs /opt/sonar-scanner/.sonar:rw,nosuid,nodev,size=512m,uid=1000,gid=1000 \
            --tmpfs /home/scanner:rw,noexec,nosuid,nodev,size=64m,uid=1000,gid=1000 \
            -e SONAR_TOKEN="${SONAR_ANALYSIS_TOKEN}" \
            -e SONAR_HOST_URL="${SONAR_HOST_URL}" \
            -e SONAR_SCANNER_SKIP_JRE_PROVISIONING=true \
            -e HOME=/home/scanner \
            -v "${GITHUB_WORKSPACE}:/usr/src" \
            sonarsource/sonar-scanner-cli:11.3@sha256:7462f132388135e32b948f8f18ff0db9ae28a87c6777f1df5b2207e04a6d7c5c \
            "${SCAN_ARGS[@]}" 2>&1 | tee "${RUNNER_TEMP}/sonar-output.txt"

      - name: Extract quality gate result
        id: quality-gate-result
        if: always() && steps.sonar-scan.outcome == 'success'
        run: |
          QG_STATUS=$(grep -oP 'Quality Gate[^:]*:\s*\K\S+' "${RUNNER_TEMP}/sonar-output.txt" 2>/dev/null | tail -1 || echo "UNKNOWN")
          echo "status=$QG_STATUS" >> $GITHUB_OUTPUT

      - name: Collect SonarQube errors
        id: collect-errors
        if: failure()
        run: |
          ERROR=""
          [ -f "${RUNNER_TEMP}/sonar-output.txt" ] && ERROR="$(tail -c 3000 "${RUNNER_TEMP}/sonar-output.txt")"
          if [ -z "$ERROR" ]; then
            ERROR="SonarQube analysis failed but no captured output. Check the sonarqube job logs for details."
          fi
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "error_log<<$EOF" >> $GITHUB_OUTPUT
          echo "$ERROR" >> $GITHUB_OUTPUT
          echo "$EOF" >> $GITHUB_OUTPUT

      - name: Write SonarQube summary
        if: always()
        run: |
          {
            echo "## SonarQube Analysis"
            echo "| Report | Imported |"
            echo "|--------|----------|"
            echo "| Detekt | ${{ steps.download-detekt.outcome == 'success' && '✅' || '⏭️ Skipped' }} |"
            echo "| Android Lint | ${{ steps.download-lint.outcome == 'success' && '✅' || '⏭️ Skipped' }} |"
            echo "| JaCoCo Coverage | ${{ steps.download-coverage.outcome == 'success' && '✅' || '⏭️ Skipped' }} |"
            echo "| JUnit Results | ${{ steps.download-junit.outcome == 'success' && '✅' || '⏭️ Skipped' }} |"
            echo "| Scanner | ${{ steps.sonar-scan.outcome == 'success' && '✅ Pass' || (steps.sonar-url-check.outputs.skip == 'true' || steps.sonar-reachable.outputs.reachable != 'true') && '⏭️ Skipped' || '❌ Fail' }} |"
            QG="${{ steps.quality-gate-result.outputs.status }}"
            if [ -n "$QG" ] && [ "$QG" != "UNKNOWN" ]; then
              if [ "$QG" = "OK" ]; then
                echo "| Quality Gate | ✅ Passed |"
              else
                echo "| Quality Gate | ❌ $QG |"
              fi
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Record duration
        id: timing
        if: always()
        run: echo "duration=$(( $(date +%s) - ${{ steps.start.outputs.time }} ))s" >> $GITHUB_OUTPUT

      - name: Revoke temporary SonarQube token
        if: always() && steps.sonar-bootstrap.outputs.temp_token == 'true'
        run: |
          ADMIN_PASS="${{ secrets.SONAR_ADMIN_PASSWORD }}"
          TOKEN_NAME="${{ steps.sonar-bootstrap.outputs.token_name }}"
          if [ -n "$ADMIN_PASS" ] && [ -n "$TOKEN_NAME" ]; then
            curl -sf --connect-timeout 10 --max-time 30 -u "admin:${ADMIN_PASS}" -X POST \
              "${SONAR_HOST_URL}/api/user_tokens/revoke?name=${TOKEN_NAME}" 2>/dev/null || true
          fi

      - name: Clean up temp files
        if: always()
        run: rm -f "${RUNNER_TEMP}/sonar-output.txt"

      - name: Post-job workspace cleanup
        if: always() && !startsWith(runner.name, 'GitHub Actions')
        run: |
          rm -rf "${GITHUB_WORKSPACE:?}"/* 2>/dev/null || true
          find "${GITHUB_WORKSPACE}" -mindepth 1 -maxdepth 1 -name '.*' ! -name '.runner' -exec rm -rf {} + 2>/dev/null || true

  # ── Stage 3: Failure Notification ──

  notify-failure:
    name: Android Failure Notification
    runs-on: ${{ github.actor == 'dependabot[bot]' && 'ubuntu-latest' || fromJSON('["self-hosted","linux"]') }}
    timeout-minutes: 5
    permissions: {}
    env:
      WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
      WEBHOOK_HOST: ${{ secrets.WEBHOOK_HOST }}
      GH_SERVER_URL: ${{ github.server_url }}
      GH_REPOSITORY: ${{ github.repository }}
      GH_RUN_ID: ${{ github.run_id }}
      GH_SHA: ${{ github.sha }}
      GH_REF_NAME: ${{ github.ref_name }}
      GH_ACTOR: ${{ github.actor }}
    needs: [secret-scan, dependency-review, lint, unit-test, quality-gate, build, sonarqube]
    if: always() && contains(needs.*.result, 'failure')
    steps:
      - name: Validate webhook configuration
        id: webhook-check
        run: |
          if [ -z "$WEBHOOK_SECRET" ] || [ -z "$WEBHOOK_HOST" ]; then
            echo "::warning::WEBHOOK_SECRET or WEBHOOK_HOST not configured -- skipping notifications"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Notify -- secret scanning detected leaked secrets
        if: always() && needs.secret-scan.result == 'failure' && steps.webhook-check.outputs.skip != 'true'
        run: |
          PAYLOAD=$(jq -n \
            --arg job "secret-scan" \
            --arg step "gitleaks" \
            --arg error_log "Gitleaks detected secrets in the Android repository. Review the secret-scan job output and rotate any exposed credentials immediately." \
            --arg run_url "${GH_SERVER_URL}/${GH_REPOSITORY}/actions/runs/${GH_RUN_ID}" \
            --arg commit "$GH_SHA" \
            --arg branch "$GH_REF_NAME" \
            --arg actor "$GH_ACTOR" \
            '{job: $job, step: $step, error_log: $error_log, run_url: $run_url, commit: $commit, branch: $branch, actor: $actor}')
          SIGNATURE=$(printf '%s' "$PAYLOAD" | openssl dgst -sha256 -hmac "${WEBHOOK_SECRET}" | awk '{print $NF}')
          curl -s --connect-timeout 5 --max-time 10 -X POST http://${WEBHOOK_HOST}:9090/ci-failure \
            -H "Content-Type: application/json" \
            -H "X-Signature-256: sha256=$SIGNATURE" \
            -d "$PAYLOAD" || echo "Webhook unreachable -- skipping notification"

      - name: Notify -- Android lint failed
        if: always() && needs.lint.result == 'failure' && steps.webhook-check.outputs.skip != 'true'
        env:
          ERROR_LOG: ${{ needs.lint.outputs.error_log }}
          FAILED_STEPS: ${{ needs.lint.outputs.failed_steps }}
        run: |
          sanitize_payload() { sed -E -e 's/(password|secret|token|key|credential|authorization)[=: ]+[^ "]+/\1=***REDACTED***/gi' -e 's/ghp_[A-Za-z0-9_]+/***REDACTED***/g' -e 's/ghs_[A-Za-z0-9_]+/***REDACTED***/g' -e 's/github_pat_[A-Za-z0-9_]+/***REDACTED***/g' -e 's/Bearer [A-Za-z0-9._\-]+/Bearer ***REDACTED***/g'; }
          if [ -z "$ERROR_LOG" ]; then
            ERROR_LOG="Android lint failed but no captured output. Run ./gradlew lint in android/ to reproduce."
          fi
          ERROR_LOG=$(printf '%s' "$ERROR_LOG" | sanitize_payload)
          STEP="${FAILED_STEPS:-android-lint}"
          PAYLOAD=$(jq -n --arg job "android-lint" --arg step "$STEP" --arg error_log "$ERROR_LOG" \
            --arg run_url "${GH_SERVER_URL}/${GH_REPOSITORY}/actions/runs/${GH_RUN_ID}" \
            --arg commit "$GH_SHA" --arg branch "$GH_REF_NAME" --arg actor "$GH_ACTOR" \
            '{job: $job, step: $step, error_log: $error_log, run_url: $run_url, commit: $commit, branch: $branch, actor: $actor}')
          SIGNATURE=$(printf '%s' "$PAYLOAD" | openssl dgst -sha256 -hmac "${WEBHOOK_SECRET}" | awk '{print $NF}')
          curl -s --connect-timeout 5 --max-time 10 -X POST http://${WEBHOOK_HOST}:9090/ci-failure \
            -H "Content-Type: application/json" \
            -H "X-Signature-256: sha256=$SIGNATURE" \
            -d "$PAYLOAD" || echo "Webhook unreachable -- skipping notification"

      - name: Notify -- Android unit tests failed
        if: always() && needs.unit-test.result == 'failure' && steps.webhook-check.outputs.skip != 'true'
        env:
          ERROR_LOG: ${{ needs.unit-test.outputs.error_log }}
        run: |
          sanitize_payload() { sed -E -e 's/(password|secret|token|key|credential|authorization)[=: ]+[^ "]+/\1=***REDACTED***/gi' -e 's/ghp_[A-Za-z0-9_]+/***REDACTED***/g' -e 's/ghs_[A-Za-z0-9_]+/***REDACTED***/g' -e 's/github_pat_[A-Za-z0-9_]+/***REDACTED***/g' -e 's/Bearer [A-Za-z0-9._\-]+/Bearer ***REDACTED***/g'; }
          if [ -z "$ERROR_LOG" ]; then
            ERROR_LOG="Android unit tests failed but no captured output. Run ./gradlew testDebugUnitTest in android/ to reproduce."
          fi
          ERROR_LOG=$(printf '%s' "$ERROR_LOG" | sanitize_payload)
          PAYLOAD=$(jq -n --arg job "android-unit-test" --arg step "gradle-test" --arg error_log "$ERROR_LOG" \
            --arg run_url "${GH_SERVER_URL}/${GH_REPOSITORY}/actions/runs/${GH_RUN_ID}" \
            --arg commit "$GH_SHA" --arg branch "$GH_REF_NAME" --arg actor "$GH_ACTOR" \
            '{job: $job, step: $step, error_log: $error_log, run_url: $run_url, commit: $commit, branch: $branch, actor: $actor}')
          SIGNATURE=$(printf '%s' "$PAYLOAD" | openssl dgst -sha256 -hmac "${WEBHOOK_SECRET}" | awk '{print $NF}')
          curl -s --connect-timeout 5 --max-time 10 -X POST http://${WEBHOOK_HOST}:9090/ci-failure \
            -H "Content-Type: application/json" \
            -H "X-Signature-256: sha256=$SIGNATURE" \
            -d "$PAYLOAD" || echo "Webhook unreachable -- skipping notification"

      - name: Notify -- dependency security gate failed
        if: always() && needs.quality-gate.result == 'failure' && steps.webhook-check.outputs.skip != 'true'
        env:
          ERROR_LOG: ${{ needs.quality-gate.outputs.error_log }}
          FAILED_STEPS: ${{ needs.quality-gate.outputs.failed_steps }}
        run: |
          sanitize_payload() { sed -E -e 's/(password|secret|token|key|credential|authorization)[=: ]+[^ "]+/\1=***REDACTED***/gi' -e 's/ghp_[A-Za-z0-9_]+/***REDACTED***/g' -e 's/ghs_[A-Za-z0-9_]+/***REDACTED***/g' -e 's/github_pat_[A-Za-z0-9_]+/***REDACTED***/g' -e 's/Bearer [A-Za-z0-9._\-]+/Bearer ***REDACTED***/g'; }
          if [ -z "$ERROR_LOG" ]; then
            ERROR_LOG="Android dependency security gate failed. Check Gradle dependency verification for details."
          fi
          ERROR_LOG=$(printf '%s' "$ERROR_LOG" | sanitize_payload)
          STEP="${FAILED_STEPS:-dep-verify}"
          PAYLOAD=$(jq -n --arg job "android-quality-gate" --arg step "$STEP" --arg error_log "$ERROR_LOG" \
            --arg run_url "${GH_SERVER_URL}/${GH_REPOSITORY}/actions/runs/${GH_RUN_ID}" \
            --arg commit "$GH_SHA" --arg branch "$GH_REF_NAME" --arg actor "$GH_ACTOR" \
            '{job: $job, step: $step, error_log: $error_log, run_url: $run_url, commit: $commit, branch: $branch, actor: $actor}')
          SIGNATURE=$(printf '%s' "$PAYLOAD" | openssl dgst -sha256 -hmac "${WEBHOOK_SECRET}" | awk '{print $NF}')
          curl -s --connect-timeout 5 --max-time 10 -X POST http://${WEBHOOK_HOST}:9090/ci-failure \
            -H "Content-Type: application/json" \
            -H "X-Signature-256: sha256=$SIGNATURE" \
            -d "$PAYLOAD" || echo "Webhook unreachable -- skipping notification"

      - name: Notify -- Android build failed
        if: always() && needs.build.result == 'failure' && steps.webhook-check.outputs.skip != 'true'
        env:
          ERROR_LOG: ${{ needs.build.outputs.error_log }}
        run: |
          sanitize_payload() { sed -E -e 's/(password|secret|token|key|credential|authorization)[=: ]+[^ "]+/\1=***REDACTED***/gi' -e 's/ghp_[A-Za-z0-9_]+/***REDACTED***/g' -e 's/ghs_[A-Za-z0-9_]+/***REDACTED***/g' -e 's/github_pat_[A-Za-z0-9_]+/***REDACTED***/g' -e 's/Bearer [A-Za-z0-9._\-]+/Bearer ***REDACTED***/g'; }
          if [ -z "$ERROR_LOG" ]; then
            ERROR_LOG="Android debug build failed but no captured output. Run ./gradlew assembleDebug in android/ to reproduce."
          fi
          ERROR_LOG=$(printf '%s' "$ERROR_LOG" | sanitize_payload)
          PAYLOAD=$(jq -n --arg job "android-build" --arg step "gradle-assemble" --arg error_log "$ERROR_LOG" \
            --arg run_url "${GH_SERVER_URL}/${GH_REPOSITORY}/actions/runs/${GH_RUN_ID}" \
            --arg commit "$GH_SHA" --arg branch "$GH_REF_NAME" --arg actor "$GH_ACTOR" \
            '{job: $job, step: $step, error_log: $error_log, run_url: $run_url, commit: $commit, branch: $branch, actor: $actor}')
          SIGNATURE=$(printf '%s' "$PAYLOAD" | openssl dgst -sha256 -hmac "${WEBHOOK_SECRET}" | awk '{print $NF}')
          curl -s --connect-timeout 5 --max-time 10 -X POST http://${WEBHOOK_HOST}:9090/ci-failure \
            -H "Content-Type: application/json" \
            -H "X-Signature-256: sha256=$SIGNATURE" \
            -d "$PAYLOAD" || echo "Webhook unreachable -- skipping notification"

      - name: Notify -- SonarQube analysis failed
        if: always() && needs.sonarqube.result == 'failure' && steps.webhook-check.outputs.skip != 'true'
        env:
          ERROR_LOG: ${{ needs.sonarqube.outputs.error_log }}
        run: |
          sanitize_payload() { sed -E -e 's/(password|secret|token|key|credential|authorization)[=: ]+[^ "]+/\1=***REDACTED***/gi' -e 's/ghp_[A-Za-z0-9_]+/***REDACTED***/g' -e 's/ghs_[A-Za-z0-9_]+/***REDACTED***/g' -e 's/github_pat_[A-Za-z0-9_]+/***REDACTED***/g' -e 's/Bearer [A-Za-z0-9._\-]+/Bearer ***REDACTED***/g'; }
          if [ -z "$ERROR_LOG" ]; then
            ERROR_LOG="SonarQube analysis failed or quality gate not passed. Check the sonarqube job output for details."
          fi
          ERROR_LOG=$(printf '%s' "$ERROR_LOG" | sanitize_payload)
          PAYLOAD=$(jq -n --arg job "android-sonarqube" --arg step "sonar-scan" \
            --arg error_log "$ERROR_LOG" \
            --arg run_url "${GH_SERVER_URL}/${GH_REPOSITORY}/actions/runs/${GH_RUN_ID}" \
            --arg commit "$GH_SHA" --arg branch "$GH_REF_NAME" --arg actor "$GH_ACTOR" \
            '{job: $job, step: $step, error_log: $error_log, run_url: $run_url, commit: $commit, branch: $branch, actor: $actor}')
          SIGNATURE=$(printf '%s' "$PAYLOAD" | openssl dgst -sha256 -hmac "${WEBHOOK_SECRET}" | awk '{print $NF}')
          curl -s --connect-timeout 5 --max-time 10 -X POST http://${WEBHOOK_HOST}:9090/ci-failure \
            -H "Content-Type: application/json" \
            -H "X-Signature-256: sha256=$SIGNATURE" \
            -d "$PAYLOAD" || echo "Webhook unreachable -- skipping notification"

      - name: Write failure summary
        if: always()
        run: |
          {
            echo "## Android Pipeline Failure Summary"
            echo "| Job | Result |"
            echo "|-----|--------|"
            for JOB in secret-scan dependency-review lint unit-test quality-gate build sonarqube; do
              case "$JOB" in
                secret-scan) RESULT="${{ needs.secret-scan.result }}" ;;
                dependency-review) RESULT="${{ needs.dependency-review.result }}" ;;
                lint) RESULT="${{ needs.lint.result }}" ;;
                unit-test) RESULT="${{ needs.unit-test.result }}" ;;
                quality-gate) RESULT="${{ needs.quality-gate.result }}" ;;
                build) RESULT="${{ needs.build.result }}" ;;
                sonarqube) RESULT="${{ needs.sonarqube.result }}" ;;
              esac
              case "$RESULT" in
                success) ICON="✅" ;;
                failure) ICON="❌" ;;
                cancelled) ICON="⏹️" ;;
                skipped) ICON="⏭️" ;;
                *) ICON="❓" ;;
              esac
              echo "| $JOB | $ICON $RESULT |"
            done
            echo ""
            echo "Commit: \`${GH_SHA}\` by @${GH_ACTOR}"
          } >> "$GITHUB_STEP_SUMMARY"

  # ── Stage 4: Pipeline Improvement (main branch only) ──

  pipeline-improve:
    name: Android Pipeline Improvement
    runs-on: ${{ github.actor == 'dependabot[bot]' && 'ubuntu-latest' || fromJSON('["self-hosted","linux"]') }}
    timeout-minutes: 10
    permissions:
      contents: read
    env:
      WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
      WEBHOOK_HOST: ${{ secrets.WEBHOOK_HOST }}
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      GH_SERVER_URL: ${{ github.server_url }}
      GH_REPOSITORY: ${{ github.repository }}
      GH_RUN_ID: ${{ github.run_id }}
      GH_SHA: ${{ github.sha }}
      GH_REF_NAME: ${{ github.ref_name }}
      GH_ACTOR: ${{ github.actor }}
      GH_EVENT_NAME: ${{ github.event_name }}
      GH_REF: ${{ github.ref }}
    needs: [secret-scan, dependency-review, lint, unit-test, quality-gate, build, sonarqube, notify-failure]
    if: |
      always() &&
      github.ref == 'refs/heads/main' &&
      !contains(github.event.head_commit.message, 'ci: improve pipeline') &&
      !contains(github.event.head_commit.message, 'fix: resolve CI failures (auto-fix)')
    steps:
      - name: Validate webhook configuration
        id: webhook-check
        run: |
          if [ -z "$WEBHOOK_SECRET" ] || [ -z "$WEBHOOK_HOST" ]; then
            echo "::warning::WEBHOOK_SECRET or WEBHOOK_HOST not configured -- skipping improvement webhooks"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Collect SonarQube open issues
        id: sonar-issues
        if: steps.webhook-check.outputs.skip != 'true'
        run: |
          SONAR_URL="${SONAR_HOST_URL}"
          TOKEN="${{ secrets.SONAR_TOKEN }}"
          PROJECT_KEY="gestion-inmobiliaria"

          if [ -z "$SONAR_URL" ]; then
            echo "sonar_report=SonarQube URL not configured -- skipping issue collection." >> $GITHUB_OUTPUT
            exit 0
          fi

          if [ -z "$TOKEN" ]; then
            ADMIN_PASS="${{ secrets.SONAR_ADMIN_PASSWORD }}"
            if [ -z "$ADMIN_PASS" ]; then
              echo "sonar_report=SonarQube credentials unavailable -- skipping issue collection." >> $GITHUB_OUTPUT
              exit 0
            fi
            TOKEN_NAME="android-ci-improve-${GH_RUN_ID}"
            curl -sf --connect-timeout 10 --max-time 30 -u "admin:${ADMIN_PASS}" -X POST \
              "$SONAR_URL/api/user_tokens/revoke?name=${TOKEN_NAME}" 2>/dev/null || true
            TOKEN_RESPONSE=$(curl -sf --connect-timeout 10 --max-time 30 -u "admin:${ADMIN_PASS}" -X POST \
              "$SONAR_URL/api/user_tokens/generate?name=${TOKEN_NAME}" 2>/dev/null) || TOKEN_RESPONSE=""
            TOKEN=$(echo "$TOKEN_RESPONSE" | jq -r '.token // empty' 2>/dev/null) || TOKEN=""
            if [ -z "$TOKEN" ]; then
              echo "sonar_report=SonarQube token unavailable -- skipping issue collection." >> $GITHUB_OUTPUT
              exit 0
            fi
            echo "::add-mask::$TOKEN"
            echo "temp_token=true" >> $GITHUB_OUTPUT
            echo "token_name=${TOKEN_NAME}" >> $GITHUB_OUTPUT
          fi

          ISSUES_JSON=$(curl -sf --connect-timeout 10 --max-time 30 -u "$TOKEN:" \
            "$SONAR_URL/api/issues/search?projectKeys=${PROJECT_KEY}&resolved=false&ps=100&s=SEVERITY&asc=false&statuses=OPEN,CONFIRMED,REOPENED&languages=kotlin" \
            2>/dev/null || echo '{}')

          TOTAL=$(echo "$ISSUES_JSON" | jq -r '.total // 0')
          BREAKDOWN=$(echo "$ISSUES_JSON" | jq -r '
            [.issues // [] | group_by(.severity) | .[] |
              {severity: .[0].severity, count: length}] |
            map("\(.count) \(.severity)") | join(", ")' 2>/dev/null || echo "unknown")

          ISSUE_LIST=$(echo "$ISSUES_JSON" | jq -r '
            [.issues[:80] | .[] |
              "\(.severity) | \(.component | split(":") | last):\(.line // "?") | \(.rule) | \(.message)"] |
            join("\n")' 2>/dev/null || echo "")

          HOTSPOTS_JSON=$(curl -sf --connect-timeout 10 --max-time 30 -u "$TOKEN:" \
            "$SONAR_URL/api/hotspots/search?projectKey=${PROJECT_KEY}&status=TO_REVIEW&ps=50" \
            2>/dev/null || echo '{}')

          HOTSPOT_TOTAL=$(echo "$HOTSPOTS_JSON" | jq -r '.paging.total // 0')
          HOTSPOT_LIST=$(echo "$HOTSPOTS_JSON" | jq -r '
            [.hotspots[:30] | .[] |
              "\(.vulnerabilityProbability) | \(.component | split(":") | last):\(.line // "?") | \(.securityCategory) | \(.message)"] |
            join("\n")' 2>/dev/null || echo "")

          SONAR_REPORT="SonarQube Kotlin Issues Report (project: ${PROJECT_KEY}):\n"
          SONAR_REPORT="${SONAR_REPORT}Total open Kotlin issues: ${TOTAL}\n"
          SONAR_REPORT="${SONAR_REPORT}Breakdown: ${BREAKDOWN}\n\n"
          SONAR_REPORT="${SONAR_REPORT}Issues (severity | file:line | rule | message):\n${ISSUE_LIST}\n\n"
          SONAR_REPORT="${SONAR_REPORT}Security Hotspots to review: ${HOTSPOT_TOTAL}\n"
          SONAR_REPORT="${SONAR_REPORT}Hotspots (risk | file:line | category | message):\n${HOTSPOT_LIST}"

          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "sonar_report<<$EOF" >> $GITHUB_OUTPUT
          echo -e "$SONAR_REPORT" >> $GITHUB_OUTPUT
          echo "$EOF" >> $GITHUB_OUTPUT

      - name: Build pipeline report
        id: analyze
        if: steps.webhook-check.outputs.skip != 'true'
        env:
          LINT_ERRORS: ${{ needs.lint.outputs.error_log }}
          TEST_ERRORS: ${{ needs.unit-test.outputs.error_log }}
          QUALITY_ERRORS: ${{ needs.quality-gate.outputs.error_log }}
          BUILD_ERRORS: ${{ needs.build.outputs.error_log }}
          SONAR_ERRORS: ${{ needs.sonarqube.outputs.error_log }}
        run: |
          sanitize_log() {
            sed -E \
              -e 's/(password|secret|token|key|credential|authorization)[=: ]+[^ "]+/\1=***REDACTED***/gi' \
              -e 's/ghp_[A-Za-z0-9_]+/***REDACTED***/g' \
              -e 's/ghs_[A-Za-z0-9_]+/***REDACTED***/g' \
              -e 's/github_pat_[A-Za-z0-9_]+/***REDACTED***/g' \
              -e 's/Bearer [A-Za-z0-9._\-]+/Bearer ***REDACTED***/g'
          }

          FOCUS="general"
          REPORT=""

          REPORT="${REPORT}Android Pipeline Run Summary:\n"
          REPORT="${REPORT}  Job                | Result   | Duration\n"
          REPORT="${REPORT}  -------------------|----------|----------\n"
          REPORT="${REPORT}  secret-scan        | ${{ needs.secret-scan.result }} | n/a\n"
          REPORT="${REPORT}  dependency-review  | ${{ needs.dependency-review.result }} | n/a\n"
          REPORT="${REPORT}  lint               | ${{ needs.lint.result }} | ${{ needs.lint.outputs.duration || 'n/a' }}\n"
          REPORT="${REPORT}  unit-test          | ${{ needs.unit-test.result }} | ${{ needs.unit-test.outputs.duration || 'n/a' }}\n"
          REPORT="${REPORT}  quality-gate       | ${{ needs.quality-gate.result }} | ${{ needs.quality-gate.outputs.duration || 'n/a' }}\n"
          REPORT="${REPORT}  sonarqube          | ${{ needs.sonarqube.result }} | ${{ needs.sonarqube.outputs.duration || 'n/a' }}\n"
          REPORT="${REPORT}  build              | ${{ needs.build.result }} | ${{ needs.build.outputs.duration || 'n/a' }}\n"

          ERRORS=""
          if [ "${{ needs.lint.result }}" = "failure" ] && [ -n "$LINT_ERRORS" ]; then
            SANITIZED=$(printf '%s' "$LINT_ERRORS" | sanitize_log)
            ERRORS="${ERRORS}\n--- ANDROID LINT/DETEKT ERRORS ---\n${SANITIZED}\n"
          fi
          if [ "${{ needs.unit-test.result }}" = "failure" ] && [ -n "$TEST_ERRORS" ]; then
            SANITIZED=$(printf '%s' "$TEST_ERRORS" | sanitize_log)
            ERRORS="${ERRORS}\n--- ANDROID TEST ERRORS ---\n${SANITIZED}\n"
          fi
          if [ "${{ needs.quality-gate.result }}" = "failure" ] && [ -n "$QUALITY_ERRORS" ]; then
            SANITIZED=$(printf '%s' "$QUALITY_ERRORS" | sanitize_log)
            ERRORS="${ERRORS}\n--- ANDROID QUALITY GATE ERRORS ---\n${SANITIZED}\n"
          fi
          if [ "${{ needs.build.result }}" = "failure" ] && [ -n "$BUILD_ERRORS" ]; then
            SANITIZED=$(printf '%s' "$BUILD_ERRORS" | sanitize_log)
            ERRORS="${ERRORS}\n--- ANDROID BUILD ERRORS ---\n${SANITIZED}\n"
          fi
          if [ "${{ needs.sonarqube.result }}" = "failure" ] && [ -n "$SONAR_ERRORS" ]; then
            SANITIZED=$(printf '%s' "$SONAR_ERRORS" | sanitize_log)
            ERRORS="${ERRORS}\n--- ANDROID SONARQUBE ERRORS ---\n${SANITIZED}\n"
          fi

          if [ -n "$ERRORS" ]; then
            REPORT="${REPORT}\nFailed Job Error Logs:${ERRORS}\n"
          fi

          if [ "${{ needs.quality-gate.result }}" = "failure" ] || [ "${{ needs.secret-scan.result }}" = "failure" ]; then
            FOCUS="security"
          elif [ "${{ needs.lint.result }}" = "failure" ] || [ "${{ needs.unit-test.result }}" = "failure" ]; then
            FOCUS="bugs"
          elif [ "${{ needs.build.result }}" = "failure" ]; then
            FOCUS="pipeline"
          elif [ "${{ needs.sonarqube.result }}" = "failure" ]; then
            FOCUS="sonarqube,pipeline"
          else
            FOCUS="security,pipeline,reporting,sonarqube"
          fi

          REPORT="${REPORT}\nFocus: ${FOCUS}\n"
          REPORT="${REPORT}Trigger: ${GH_EVENT_NAME} on ${GH_REF}\n"
          REPORT="${REPORT}Commit: ${GH_SHA}\n"

          echo "focus=$FOCUS" >> $GITHUB_OUTPUT
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "report<<$EOF" >> $GITHUB_OUTPUT
          echo -e "$REPORT" >> $GITHUB_OUTPUT
          echo "$EOF" >> $GITHUB_OUTPUT

      - name: Write pipeline summary
        if: always()
        run: |
          {
            echo "## Android Pipeline Summary"
            echo "| Job | Result | Duration |"
            echo "|-----|--------|----------|"
            echo "| secret-scan | ${{ needs.secret-scan.result }} | -- |"
            echo "| dependency-review | ${{ needs.dependency-review.result }} | -- |"
            echo "| lint | ${{ needs.lint.result }} | ${{ needs.lint.outputs.duration || 'n/a' }} |"
            echo "| unit-test | ${{ needs.unit-test.result }} | ${{ needs.unit-test.outputs.duration || 'n/a' }} |"
            echo "| quality-gate | ${{ needs.quality-gate.result }} | ${{ needs.quality-gate.outputs.duration || 'n/a' }} |"
            echo "| sonarqube | ${{ needs.sonarqube.result }} | ${{ needs.sonarqube.outputs.duration || 'n/a' }} |"
            echo "| build | ${{ needs.build.result }} | ${{ needs.build.outputs.duration || 'n/a' }} |"
            echo ""
            echo "Commit: \`${GH_SHA}\` by @${GH_ACTOR} on \`${GH_REF_NAME}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Send pipeline improvement request to webhook
        if: steps.webhook-check.outputs.skip != 'true'
        env:
          FOCUS: ${{ steps.analyze.outputs.focus }}
          REPORT: ${{ steps.analyze.outputs.report }}
          SONAR_REPORT: ${{ steps.sonar-issues.outputs.sonar_report }}
        run: |
          PAYLOAD=$(jq -n \
            --arg focus "$FOCUS" \
            --arg pipeline_report "$REPORT" \
            --arg sonar_report "$SONAR_REPORT" \
            --arg run_url "${GH_SERVER_URL}/${GH_REPOSITORY}/actions/runs/${GH_RUN_ID}" \
            '{focus: $focus, pipeline_report: $pipeline_report, sonar_report: $sonar_report, run_url: $run_url}')

          SIGNATURE=$(printf '%s' "$PAYLOAD" | openssl dgst -sha256 -hmac "${WEBHOOK_SECRET}" | awk '{print $NF}')
          curl -s --connect-timeout 5 --max-time 10 -X POST http://${WEBHOOK_HOST}:9090/ci-improve \
            -H "Content-Type: application/json" \
            -H "X-Signature-256: sha256=$SIGNATURE" \
            -d "$PAYLOAD" || echo "Webhook unreachable -- skipping pipeline improvement"

      - name: Send SonarQube issues to dedicated fix webhook
        if: steps.webhook-check.outputs.skip != 'true'
        env:
          SONAR_REPORT: ${{ steps.sonar-issues.outputs.sonar_report }}
        run: |
          if [ -z "$SONAR_REPORT" ] || echo "$SONAR_REPORT" | grep -q "unavailable"; then
            echo "No SonarQube data available -- skipping sonar-fix webhook"
            exit 0
          fi

          if echo "$SONAR_REPORT" | grep -q "Total open Kotlin issues: 0"; then
            echo "No open SonarQube Kotlin issues -- skipping sonar-fix webhook"
            exit 0
          fi

          PAYLOAD=$(jq -n \
            --arg sonar_report "$SONAR_REPORT" \
            --arg run_url "${GH_SERVER_URL}/${GH_REPOSITORY}/actions/runs/${GH_RUN_ID}" \
            '{sonar_report: $sonar_report, run_url: $run_url}')

          SIGNATURE=$(printf '%s' "$PAYLOAD" | openssl dgst -sha256 -hmac "${WEBHOOK_SECRET}" | awk '{print $NF}')
          curl -s --connect-timeout 5 --max-time 10 -X POST http://${WEBHOOK_HOST}:9090/sonar-fix \
            -H "Content-Type: application/json" \
            -H "X-Signature-256: sha256=$SIGNATURE" \
            -d "$PAYLOAD" || echo "Webhook unreachable -- skipping SonarQube fix"

      - name: Revoke temporary SonarQube token
        if: always() && steps.sonar-issues.outputs.temp_token == 'true'
        run: |
          ADMIN_PASS="${{ secrets.SONAR_ADMIN_PASSWORD }}"
          TOKEN_NAME="${{ steps.sonar-issues.outputs.token_name }}"
          if [ -n "$ADMIN_PASS" ] && [ -n "$TOKEN_NAME" ]; then
            curl -sf --connect-timeout 10 --max-time 30 -u "admin:${ADMIN_PASS}" -X POST \
              "${SONAR_HOST_URL}/api/user_tokens/revoke?name=${TOKEN_NAME}" 2>/dev/null || true
          fi
