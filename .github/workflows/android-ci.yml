name: Android CI
run-name: "Android CI [${{ github.event_name }}] ${{ github.ref_name }} @ ${{ github.sha }}"

on:
  push:
    branches: [main, develop]
    paths:
      - "android/**"
      - ".github/workflows/android-ci.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "android/**"
      - ".github/workflows/android-ci.yml"
  workflow_dispatch:

permissions: {}

concurrency:
  group: android-ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  JAVA_VERSION: "17"
  JAVA_DISTRIBUTION: "temurin"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # ── Stage 1: Quality Checks (all run in parallel) ──

  secret-scan:
    name: Secret Scanning (Gitleaks)
    runs-on: arc-runner-dind
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Install Gitleaks (with checksum verification)
        run: |
          GITLEAKS_VERSION="8.24.3"
          GITLEAKS_SHA256="9991e0b2903da4c8f6122b5c3186448b927a5da4deef1fe45271c3793f4ee29c"
          ARCHIVE="${RUNNER_TEMP}/gitleaks.tar.gz"
          curl -sSfL --proto =https --connect-timeout 15 --max-time 120 -o "$ARCHIVE" \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          echo "${GITLEAKS_SHA256}  ${ARCHIVE}" | sha256sum -c -
          mkdir -p "${HOME}/.local/bin"
          tar xzf "$ARCHIVE" --no-same-owner --no-same-permissions -C "${HOME}/.local/bin" gitleaks
          rm -f "$ARCHIVE"
          export PATH="${HOME}/.local/bin:$PATH"
          echo "${HOME}/.local/bin" >> "$GITHUB_PATH"
          gitleaks version

      - name: Run Gitleaks secret detection
        run: gitleaks detect --source . --verbose --redact --exit-code 1

  dependency-review:
    name: Dependency Review (PR)
    runs-on: arc-runner-dind
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Review dependency changes for vulnerabilities and license issues
        uses: actions/dependency-review-action@da24556b548a50705dd671f47852072ea4c105d9 # v4.7.1
        with:
          fail-on-severity: high
          deny-licenses: AGPL-3.0, GPL-3.0, GPL-2.0
          comment-summary-in-pr: on-failure

  lint:
    name: Android Lint & Static Analysis
    runs-on: arc-runner-dind
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
    outputs:
      error_log: ${{ steps.collect-errors.outputs.error_log }}
      failed_steps: ${{ steps.collect-errors.outputs.failed_steps }}
      duration: ${{ steps.timing.outputs.duration }}
    steps:
      - name: Record start time
        id: start
        run: echo "time=$(date +%s)" >> $GITHUB_OUTPUT

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - name: Verify JAVA_HOME
        run: |
          if [ -z "$JAVA_HOME" ] || [ ! -x "$JAVA_HOME/bin/java" ]; then
            echo "::warning::JAVA_HOME not set by setup-java, searching tool cache"
            JAVA_BIN=$(find "${RUNNER_TOOL_CACHE:-/opt/hostedtoolcache}" -path "*/bin/java" -type f 2>/dev/null | head -1)
            if [ -n "$JAVA_BIN" ]; then
              JAVA_HOME=$(cd "$(dirname "$JAVA_BIN")/.." && pwd)
              echo "JAVA_HOME=$JAVA_HOME" >> "$GITHUB_ENV"
              echo "$(dirname "$JAVA_BIN")" >> "$GITHUB_PATH"
              export JAVA_HOME PATH="$(dirname "$JAVA_BIN"):$PATH"
            fi
          fi
          java -version || { echo "::error::Java not available after setup-java"; exit 1; }

      - name: Ensure unzip is available
        run: |
          if command -v unzip &>/dev/null; then
            echo "unzip already available: $(unzip -v 2>&1 | head -1)"
            exit 0
          fi
          mkdir -p "$HOME/.local/bin"
          printf '%s\n' \
            '#!/usr/bin/env python3' \
            'import zipfile, sys, os' \
            'args = sys.argv[1:]' \
            'dest, zippath, i = ".", None, 0' \
            'while i < len(args):' \
            '    if args[i] == "-d":' \
            '        i += 1; dest = args[i]' \
            '    elif not args[i].startswith("-"):' \
            '        zippath = args[i]' \
            '    i += 1' \
            'if not zippath:' \
            '    sys.exit(1)' \
            'os.makedirs(dest, exist_ok=True)' \
            'with zipfile.ZipFile(zippath) as zf:' \
            '    zf.extractall(dest)' \
            > "$HOME/.local/bin/unzip"
          chmod +x "$HOME/.local/bin/unzip"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/.local/bin:$PATH"
          echo "Installed Python-based unzip shim"

      - name: Set up Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@ac638b010cf58a27ee6c972d7336334ccaf61c96 # v4.4.1
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Ensure gradlew is executable
        run: chmod +x android/gradlew

      - name: Run lint, detekt, and spotless checks
        id: lint-checks
        env:
          GRADLE_OPTS: "-Xmx512m -Dorg.gradle.jvmargs=-Xmx2g"
        uses: nick-fields/retry@ce71cc2ab81d554ebbe88c79ab5975992d79ba08 # v3.0.2
        with:
          timeout_minutes: 30
          max_attempts: 2
          command: |
            cd android
            umask 077
            set -o pipefail
            set +e
            ./gradlew lint detekt spotlessCheck --parallel --max-workers=4 --continue --stacktrace 2>&1 | tee "${RUNNER_TEMP}/lint-all-output.txt"
            GRADLE_EXIT=$?
            set -e

            LINT_OK="true"; DETEKT_OK="true"; KTFMT_OK="true"
            if grep -qE "> Task .*:lint[A-Z].* FAILED" "${RUNNER_TEMP}/lint-all-output.txt"; then LINT_OK="false"; fi
            if grep -qE "> Task .*:detekt.* FAILED" "${RUNNER_TEMP}/lint-all-output.txt"; then DETEKT_OK="false"; fi
            if grep -qE "> Task .*[Ss]potless.* FAILED" "${RUNNER_TEMP}/lint-all-output.txt"; then KTFMT_OK="false"; fi

            echo "lint_ok=$LINT_OK" >> $GITHUB_OUTPUT
            echo "detekt_ok=$DETEKT_OK" >> $GITHUB_OUTPUT
            echo "ktfmt_ok=$KTFMT_OK" >> $GITHUB_OUTPUT

            exit $GRADLE_EXIT

      - name: Upload lint reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: android-lint-reports
          path: |
            android/**/build/reports/lint-results*.html
            android/**/build/reports/lint-results-debug.html
            android/**/build/reports/detekt/detekt.html
          retention-days: 7
          if-no-files-found: warn

      - name: Write lint summary
        if: always()
        run: |
          {
            echo "## Android Lint Results"
            echo "| Check | Status |"
            echo "|-------|--------|"
            echo "| Android Lint | ${{ steps.lint-checks.outputs.lint_ok == 'true' && '✅ Pass' || '❌ Fail' }} |"
            echo "| Detekt | ${{ steps.lint-checks.outputs.detekt_ok == 'true' && '✅ Pass' || '❌ Fail' }} |"
            echo "| ktfmt (Spotless) | ${{ steps.lint-checks.outputs.ktfmt_ok == 'true' && '✅ Pass' || '❌ Fail' }} |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Collect lint errors
        id: collect-errors
        if: always() && steps.lint-checks.outcome == 'failure'
        run: |
          ERROR=""
          FAILED=""
          if [ "${{ steps.lint-checks.outputs.lint_ok }}" = "false" ]; then
            FAILED="android-lint"
            ERROR="[android-lint] $(grep -A5 'FAILED' "${RUNNER_TEMP}/lint-all-output.txt" 2>/dev/null | head -30 || echo 'Android lint failed.')"
          fi
          if [ "${{ steps.lint-checks.outputs.detekt_ok }}" = "false" ]; then
            FAILED="${FAILED:+${FAILED},}detekt"
            ERROR="${ERROR:+${ERROR}\n\n}[detekt] $(grep -B2 -A5 'detekt.*FAILED' "${RUNNER_TEMP}/lint-all-output.txt" 2>/dev/null | head -30 || echo 'Detekt found issues.')"
          fi
          if [ "${{ steps.lint-checks.outputs.ktfmt_ok }}" = "false" ]; then
            FAILED="${FAILED:+${FAILED},}ktfmt"
            ERROR="${ERROR:+${ERROR}\n\n}[ktfmt] $(grep -B2 -A5 '[Ss]potless.*FAILED' "${RUNNER_TEMP}/lint-all-output.txt" 2>/dev/null | head -30 || echo 'ktfmt formatting check failed. Run ./gradlew spotlessApply in android/ to fix.')"
          fi
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "failed_steps=${FAILED}" >> $GITHUB_OUTPUT
          echo "error_log<<$EOF" >> $GITHUB_OUTPUT
          echo "$ERROR" >> $GITHUB_OUTPUT
          echo "$EOF" >> $GITHUB_OUTPUT

      - name: Record duration
        id: timing
        if: always()
        run: echo "duration=$(( $(date +%s) - ${{ steps.start.outputs.time }} ))s" >> $GITHUB_OUTPUT

      - name: Fail job if lint failed
        if: always() && steps.lint-checks.outcome == 'failure'
        run: exit 1
