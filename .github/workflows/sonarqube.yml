name: SonarQube Analysis

on:
  workflow_call:
    inputs:
      skip-sonarqube:
        description: Skip SonarQube analysis
        type: boolean
        default: false
      lint-result:
        description: Result of the lint job
        type: string
        required: true
      test-backend-result:
        description: Result of the test-backend job
        type: string
        required: true
      test-frontend-result:
        description: Result of the test-frontend job
        type: string
        required: true
      coverage-backend-result:
        description: Result of the coverage-backend job
        type: string
        required: true
    secrets:
      SONAR_HOST_URL:
        required: true
      SONAR_TOKEN:
        required: false
      SONAR_ADMIN_PASSWORD:
        required: false
    outputs:
      result:
        description: Job result
        value: ${{ jobs.sonarqube.result }}
      error_log:
        description: Error log from SonarQube analysis
        value: ${{ jobs.sonarqube.outputs.error_log }}
      duration:
        description: Job duration
        value: ${{ jobs.sonarqube.outputs.duration }}

permissions: {}

jobs:
  sonarqube:
    name: SonarQube Code Quality & Coverage Analysis
    runs-on: arc-runner-dind
    timeout-minutes: 20
    permissions:
      contents: read
    env:
      DOCKER_CONTENT_TRUST: "1"
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
    if: |
      !inputs.skip-sonarqube &&
      (inputs.test-backend-result == 'success' || inputs.test-frontend-result == 'success' || inputs.lint-result == 'success' ||
       (inputs.test-backend-result != 'failure' && inputs.test-frontend-result != 'failure' && inputs.lint-result != 'failure'))
    outputs:
      error_log: ${{ steps.collect-errors.outputs.error_log }}
      duration: ${{ steps.timing.outputs.duration }}
    steps:
      - name: Record start time
        id: start
        run: echo "time=$(date +%s)" >> $GITHUB_OUTPUT

      - name: Checkout repository with full history for blame analysis
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Download backend coverage report
        id: download-coverage
        if: inputs.coverage-backend-result == 'success'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: backend-coverage
          path: coverage/
        continue-on-error: true

      - name: Download clippy report
        id: download-clippy
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: clippy-report
          path: .
        continue-on-error: true

      - name: Validate clippy report JSON
        id: validate-clippy
        if: steps.download-clippy.outcome == 'success' && hashFiles('clippy-report.json') != ''
        run: |
          if jq -e 'true' clippy-report.json >/dev/null 2>&1; then
            echo "valid=true" >> $GITHUB_OUTPUT
          else
            echo "::warning::clippy-report.json contains malformed JSON (likely from failed lint job) -- excluding from SonarQube scan"
            rm -f clippy-report.json
            echo "valid=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up JDK 17 for Android analysis
        id: setup-java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: "17"
          distribution: "temurin"
        continue-on-error: true

      - name: Setup Gradle
        if: steps.setup-java.outcome == 'success'
        uses: gradle/actions/setup-gradle@ac638b010cf58a27ee6c972d7336334ccaf61c96 # v4.4.1
        with:
          cache-read-only: true
        continue-on-error: true

      - name: Generate Android Lint XML report
        id: android-lint-xml
        if: steps.setup-java.outcome == 'success'
        timeout-minutes: 15
        working-directory: android
        run: |
          umask 077
          ./gradlew :app:lintDebug --no-daemon --stacktrace 2>/dev/null || true
        continue-on-error: true

      - name: Generate detekt XML report
        id: detekt-xml
        if: steps.setup-java.outcome == 'success'
        timeout-minutes: 10
        working-directory: android
        run: |
          umask 077
          ./gradlew detekt --no-daemon --stacktrace 2>/dev/null || true
        continue-on-error: true

      - name: Cache SonarQube packages
        if: steps.setup-java.outcome == 'success'
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Run Android SonarQube Gradle analysis
        id: android-sonar
        if: steps.setup-java.outcome == 'success'
        timeout-minutes: 15
        working-directory: android
        env:
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_PROJECT_KEY: "Gestion-inmobiliaria"
          SONAR_PROJECT_NAME: "Gestion-inmobiliaria"
        run: |
          umask 077
          ./gradlew sonar --no-daemon --stacktrace 2>/dev/null || true
        continue-on-error: true

      - name: Validate SONAR_HOST_URL format
        id: sonar-url-check
        run: |
          if [ -z "$SONAR_HOST_URL" ]; then
            echo "::warning::SONAR_HOST_URL is not set -- skipping SonarQube scan"
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          SONAR_URL_CLEAN=$(printf '%s' "$SONAR_HOST_URL" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//;s|/*$||')
          if ! printf '%s' "$SONAR_URL_CLEAN" | grep -qE '^https?://[a-zA-Z0-9._-]+(:[0-9]{1,5})?(/[a-zA-Z0-9._:@%+~&=?/-]*)?$'; then
            echo "::error::SONAR_HOST_URL has invalid format -- possible SSRF vector"
            exit 1
          fi
          echo "SONAR_HOST_URL=$SONAR_URL_CLEAN" >> "$GITHUB_ENV"
          echo "skip=false" >> $GITHUB_OUTPUT

      - name: Verify SonarQube server is reachable
        id: sonar-reachable
        if: steps.sonar-url-check.outputs.skip != 'true'
        timeout-minutes: 2
        run: |
          SONAR_URL="${SONAR_HOST_URL}"
          for i in $(seq 1 8); do
            RESPONSE=$(curl -sf --connect-timeout 5 --max-time 10 "$SONAR_URL/api/system/status" 2>/dev/null) || RESPONSE=""
            if [ -n "$RESPONSE" ]; then
              STATUS=$(echo "$RESPONSE" | jq -r '.status // "UNREACHABLE"' 2>/dev/null) || STATUS="UNREACHABLE"
            else
              STATUS="UNREACHABLE"
            fi
            if [ "$STATUS" = "UP" ]; then
              echo "SonarQube is ready."
              echo "reachable=true" >> $GITHUB_OUTPUT
              exit 0
            fi
            echo "Attempt $i/8 -- status: $STATUS. Retrying in 5s..."
            sleep 5
          done
          echo "::warning::SonarQube at $SONAR_URL did not respond within ~80 seconds -- skipping analysis"
          echo "reachable=false" >> $GITHUB_OUTPUT

      - name: Bootstrap SonarQube project and token
        id: sonar-bootstrap
        if: steps.sonar-url-check.outputs.skip != 'true' && steps.sonar-reachable.outputs.reachable == 'true'
        timeout-minutes: 2
        run: |
          SONAR_URL="${SONAR_HOST_URL}"
          TOKEN="${{ secrets.SONAR_TOKEN }}"

          if [ -n "$TOKEN" ]; then
            echo "Using existing SONAR_TOKEN secret."
            echo "::add-mask::$TOKEN"
            {
              echo "SONAR_ANALYSIS_TOKEN=$TOKEN"
            } >> "$GITHUB_ENV"
            exit 0
          fi

          ADMIN_PASS="${{ secrets.SONAR_ADMIN_PASSWORD }}"
          if [ -z "$ADMIN_PASS" ]; then
            echo "::error::Neither SONAR_TOKEN nor SONAR_ADMIN_PASSWORD is set. Configure one in GitHub repository secrets."
            exit 1
          fi

          curl -sf --connect-timeout 10 --max-time 30 -u "admin:${ADMIN_PASS}" -X POST \
            "$SONAR_URL/api/projects/create?name=Gestion+Inmobiliaria&project=Gestion-inmobiliaria" \
            2>/dev/null || echo "Project already exists."

          DEFAULT_QG=$(curl -sf --connect-timeout 10 --max-time 30 -u "admin:${ADMIN_PASS}" \
            "$SONAR_URL/api/qualitygates/list" 2>/dev/null || echo '{}')
          DEFAULT_QG=$(echo "$DEFAULT_QG" | jq -r '.qualitygates[] | select(.isDefault==true) | .name' 2>/dev/null || echo "Sonar way")
          if [ -z "$DEFAULT_QG" ]; then DEFAULT_QG="Sonar way"; fi
          if [ -n "$DEFAULT_QG" ]; then
            curl -sf --connect-timeout 10 --max-time 30 -u "admin:${ADMIN_PASS}" -X POST \
              "$SONAR_URL/api/qualitygates/select?projectKey=Gestion-inmobiliaria&gateName=$(echo "$DEFAULT_QG" | jq -sRr @uri)" \
              2>/dev/null || echo "Quality gate already assigned."
          fi

          TOKEN_NAME="ci-token-${{ github.run_id }}"
          curl -sf --connect-timeout 10 --max-time 30 -u "admin:${ADMIN_PASS}" -X POST \
            "$SONAR_URL/api/user_tokens/revoke?name=${TOKEN_NAME}" 2>/dev/null || true
          TOKEN_RESPONSE=$(curl -sf --connect-timeout 10 --max-time 30 -u "admin:${ADMIN_PASS}" -X POST \
            "$SONAR_URL/api/user_tokens/generate?name=${TOKEN_NAME}" 2>/dev/null) || TOKEN_RESPONSE=""
          TOKEN=$(echo "$TOKEN_RESPONSE" | jq -r '.token' 2>/dev/null) || TOKEN=""

          if [ -z "$TOKEN" ] || [ "$TOKEN" = "null" ]; then
            echo "::error::Failed to generate SonarQube token"
            exit 1
          fi

          echo "::add-mask::$TOKEN"
          {
            echo "SONAR_ANALYSIS_TOKEN=$TOKEN"
          } >> "$GITHUB_ENV"

      - name: Run SonarQube static analysis scan
        id: sonar-scan
        if: steps.sonar-url-check.outputs.skip != 'true' && steps.sonar-reachable.outputs.reachable == 'true'
        env:
          HAS_COVERAGE: ${{ steps.download-coverage.outcome == 'success' }}
        run: |
          SCAN_ARGS=()
          SCAN_ARGS+=("-Dsonar.projectBaseDir=/usr/src")
          SCAN_ARGS+=("-Dsonar.qualitygate.wait=true")
          SCAN_ARGS+=("-Dsonar.qualitygate.timeout=300")
          if [ "$HAS_COVERAGE" = "true" ] && [ -f coverage/lcov.info ]; then
            echo "Coverage report found -- including in SonarQube analysis"
            SCAN_ARGS+=("-Dsonar.rust.lcov.reportPaths=/usr/src/coverage/lcov.info")
          fi
          if [ -f clippy-report.json ]; then
            echo "Clippy report found -- including in SonarQube analysis"
            SCAN_ARGS+=("-Dsonar.rust.clippy.reportPaths=/usr/src/clippy-report.json")
          fi
          if [ -f android/app/build/reports/lint-results-debug.xml ]; then
            echo "Android Lint XML report found -- including in SonarQube analysis"
            SCAN_ARGS+=("-Dsonar.androidLint.reportPaths=/usr/src/android/app/build/reports/lint-results-debug.xml")
          else
            echo "::notice::Android Lint XML report not found -- clearing default path to avoid import warning"
            SCAN_ARGS+=("-Dsonar.androidLint.reportPaths=")
          fi
          if [ -f android/build/reports/detekt/detekt.xml ]; then
            echo "Detekt report found -- including in SonarQube analysis"
            SCAN_ARGS+=("-Dsonar.kotlin.detekt.reportPaths=/usr/src/android/build/reports/detekt/detekt.xml")
          fi
          umask 077
          set +e
          DOCKER_CONTENT_TRUST=0 docker run --rm \
            --network host \
            --security-opt no-new-privileges \
            --cap-drop ALL \
            --read-only \
            --user 1000:1000 \
            --memory 1g \
            --memory-swap 1g \
            --cpus 2 \
            --pids-limit 256 \
            --tmpfs /tmp:rw,nosuid,nodev,size=256m,uid=1000,gid=1000 \
            --tmpfs /opt/sonar-scanner/.sonar:rw,nosuid,nodev,size=512m,uid=1000,gid=1000 \
            --tmpfs /home/scanner:rw,noexec,nosuid,nodev,size=64m,uid=1000,gid=1000 \
            -e SONAR_TOKEN="${SONAR_ANALYSIS_TOKEN}" \
            -e SONAR_HOST_URL="${SONAR_HOST_URL}" \
            -e HOME=/home/scanner \
            -v "${GITHUB_WORKSPACE}:/usr/src" \
            sonarsource/sonar-scanner-cli:11.3@sha256:7462f132388135e32b948f8f18ff0db9ae28a87c6777f1df5b2207e04a6d7c5c \
            "${SCAN_ARGS[@]}" 2>&1 | tee "${RUNNER_TEMP}/sonar-scan-output.txt"
          SCAN_EXIT=$?
          set -e
          if [ $SCAN_EXIT -ne 0 ]; then
            echo "::warning::SonarQube scanner exited with code $SCAN_EXIT"
            tail -30 "${RUNNER_TEMP}/sonar-scan-output.txt" || true
            exit $SCAN_EXIT
          fi

      - name: Report SonarQube analysis completeness
        if: always() && steps.sonar-url-check.outputs.skip != 'true' && steps.sonar-reachable.outputs.reachable == 'true'
        env:
          COVERAGE_OK: ${{ steps.download-coverage.outcome == 'success' }}
          CLIPPY_OK: ${{ steps.download-clippy.outcome == 'success' }}
          LINT_RESULT: ${{ inputs.lint-result }}
          COVERAGE_BACKEND_RESULT: ${{ inputs.coverage-backend-result }}
        run: |
          MISSING=0
          {
            echo "## SonarQube Analysis Completeness"
            echo "| Report | Status | Source Job |"
            echo "|--------|--------|------------|"
            if [ "$COVERAGE_OK" = "true" ] && [ -f coverage/lcov.info ]; then
              echo "| Coverage (lcov) | ✅ Imported | coverage-backend |"
            else
              echo "| Coverage (lcov) | ⚠️ Missing | coverage-backend ($COVERAGE_BACKEND_RESULT) |"
              MISSING=$((MISSING + 1))
            fi
            if [ "$CLIPPY_OK" = "true" ] && [ -f clippy-report.json ]; then
              echo "| Clippy report | ✅ Imported | lint |"
            else
              echo "| Clippy report | ⚠️ Missing | lint ($LINT_RESULT) |"
              MISSING=$((MISSING + 1))
            fi
            if [ -f android/app/build/reports/lint-results-debug.xml ]; then
              echo "| Android Lint | ✅ Imported | sonarqube (local) |"
            else
              echo "| Android Lint | ⏭️ Not generated | sonarqube (local) |"
            fi
            if [ -f android/build/reports/detekt/detekt.xml ]; then
              echo "| Detekt | ✅ Imported | sonarqube (local) |"
            else
              echo "| Detekt | ⏭️ Not generated | sonarqube (local) |"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
          if [ "$MISSING" -gt 0 ]; then
            echo "::warning::SonarQube analysis is incomplete -- $MISSING Rust report(s) missing due to cancelled/failed upstream jobs"
          fi

      - name: Fetch SonarQube results and notify
        if: always() && steps.sonar-url-check.outputs.skip != 'true' && steps.sonar-reachable.outputs.reachable == 'true'
        timeout-minutes: 8
        env:
          SONAR_TOKEN: ${{ env.SONAR_ANALYSIS_TOKEN }}
          SCAN_OUTCOME: ${{ steps.sonar-scan.outcome }}
          GH_SERVER_URL: ${{ github.server_url }}
          GH_REPOSITORY: ${{ github.repository }}
          GH_RUN_ID: ${{ github.run_id }}
          GH_SHA: ${{ github.sha }}
          GH_REF_NAME: ${{ github.ref_name }}
          GH_ACTOR: ${{ github.actor }}
        run: |
          SONAR_URL="${SONAR_HOST_URL}"
          GATE_STATUS="UNKNOWN"

          if [ "$SCAN_OUTCOME" = "success" ]; then
            GATE_STATUS="OK"
          fi

          if [ "$GATE_STATUS" = "UNKNOWN" ]; then
            REPORT_FILE=$(find . -name 'report-task.txt' -path '*scannerwork*' -print -quit 2>/dev/null)
            if [ -n "$REPORT_FILE" ] && [ -f "$REPORT_FILE" ]; then
              CE_TASK_ID=$(grep '^ceTaskId=' "$REPORT_FILE" | cut -d= -f2)
              if [ -n "$CE_TASK_ID" ]; then
                for i in $(seq 1 60); do
                  CE_RESPONSE=$(curl -sf --connect-timeout 10 --max-time 30 -u "$SONAR_TOKEN:" \
                    "$SONAR_URL/api/ce/task?id=$CE_TASK_ID" 2>/dev/null || echo '{}')
                  CE_STATUS=$(echo "$CE_RESPONSE" | jq -r '.task.status // "UNKNOWN"')
                  if [ "$CE_STATUS" = "SUCCESS" ]; then
                    ANALYSIS_ID=$(echo "$CE_RESPONSE" | jq -r '.task.analysisId // empty')
                    if [ -n "$ANALYSIS_ID" ]; then
                      GATE=$(curl -sf --connect-timeout 10 --max-time 30 -u "$SONAR_TOKEN:" \
                        "$SONAR_URL/api/qualitygates/project_status?analysisId=$ANALYSIS_ID" 2>/dev/null || echo '{}')
                      GATE_STATUS=$(echo "$GATE" | jq -r '.projectStatus.status // "UNKNOWN"')
                    fi
                    break
                  elif [ "$CE_STATUS" = "FAILED" ] || [ "$CE_STATUS" = "CANCELED" ]; then
                    echo "::warning::SonarQube CE task ended with status: $CE_STATUS"
                    GATE_STATUS="ERROR"
                    break
                  fi
                  sleep 5
                done
              fi
            fi
          fi

          if [ "$GATE_STATUS" = "UNKNOWN" ]; then
            for i in $(seq 1 30); do
              GATE=$(curl -sf --connect-timeout 10 --max-time 30 -u "$SONAR_TOKEN:" \
                "$SONAR_URL/api/qualitygates/project_status?projectKey=Gestion-inmobiliaria" 2>/dev/null || echo '{}')
              GATE_STATUS=$(echo "$GATE" | jq -r '.projectStatus.status // "UNKNOWN"')
              if [ "$GATE_STATUS" != "UNKNOWN" ] && [ "$GATE_STATUS" != "NONE" ]; then
                break
              fi
              sleep 5
            done
          fi

          if [ "$GATE_STATUS" = "UNKNOWN" ] || [ "$GATE_STATUS" = "NONE" ]; then
            if [ "$SCAN_OUTCOME" = "success" ]; then
              GATE_STATUS="OK"
            elif [ "$SCAN_OUTCOME" = "skipped" ] || [ -z "$SCAN_OUTCOME" ]; then
              echo "::warning::SonarQube scan was skipped -- treating gate as OK (non-blocking)."
              GATE_STATUS="OK"
            fi
          fi

          echo "Final quality gate status: $GATE_STATUS"

          ISSUES=$(curl -sf --connect-timeout 10 --max-time 30 -u "$SONAR_TOKEN:" \
            "$SONAR_URL/api/issues/search?projectKeys=Gestion-inmobiliaria&resolved=false&ps=50&s=SEVERITY&asc=false" 2>/dev/null || echo '{}')
          TOTAL=$(echo "$ISSUES" | jq -r '.total // 0')
          SUMMARY=$(echo "$ISSUES" | jq -r '
            [.issues // [] | group_by(.severity) | .[] |
              {severity: .[0].severity, count: length}] |
            map("\(.count) \(.severity)") | join(", ")' 2>/dev/null || echo "Could not parse issues")

          MEASURES=$(curl -sf --connect-timeout 10 --max-time 30 -u "$SONAR_TOKEN:" \
            "$SONAR_URL/api/measures/component?component=Gestion-inmobiliaria&metricKeys=coverage,lines_to_cover,uncovered_lines,duplicated_lines_density,ncloc" 2>/dev/null || echo '{}')
          COVERAGE=$(echo "$MEASURES" | jq -r '.component.measures[]? | select(.metric=="coverage") | .value // "N/A"' 2>/dev/null || echo "N/A")
          NCLOC=$(echo "$MEASURES" | jq -r '.component.measures[]? | select(.metric=="ncloc") | .value // "N/A"' 2>/dev/null || echo "N/A")
          DUPLICATION=$(echo "$MEASURES" | jq -r '.component.measures[]? | select(.metric=="duplicated_lines_density") | .value // "N/A"' 2>/dev/null || echo "N/A")

          {
            echo "## SonarQube Results"
            echo "- Quality Gate: **$GATE_STATUS**"
            echo "- Open Issues: **$TOTAL** ($SUMMARY)"
            if [ "$COVERAGE" != "N/A" ]; then
              echo "- Coverage: **${COVERAGE}%**"
            fi
            if [ "$NCLOC" != "N/A" ]; then
              echo "- Lines of Code: **$NCLOC**"
            fi
            if [ "$DUPLICATION" != "N/A" ]; then
              echo "- Duplication: **${DUPLICATION}%**"
            fi
            echo "- [View Dashboard](${SONAR_HOST_URL}/dashboard?id=Gestion-inmobiliaria)"
            if [ "$GATE_STATUS" = "ERROR" ]; then
              echo ""
              echo "### Top Issues"
              echo '```'
              echo "$ISSUES" | jq -r '.issues[:10] | .[] | "\(.severity) \(.component | split(":") | last):\(.line // "?") \(.message)"' 2>/dev/null || true
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$GATE_STATUS" = "ERROR" ]; then
            echo "::error::SonarQube quality gate failed"
            exit 1
          fi

      - name: Revoke bootstrap SonarQube token
        if: always() && steps.sonar-url-check.outputs.skip != 'true' && steps.sonar-reachable.outputs.reachable == 'true' && env.SONAR_ANALYSIS_TOKEN != ''
        run: |
          TOKEN="${{ secrets.SONAR_TOKEN }}"
          if [ -n "$TOKEN" ]; then
            echo "Using persistent SONAR_TOKEN -- skipping revocation"
            exit 0
          fi
          ADMIN_PASS="${{ secrets.SONAR_ADMIN_PASSWORD }}"
          TOKEN_NAME="ci-token-${{ github.run_id }}"
          if [ -n "$ADMIN_PASS" ]; then
            curl -sf --connect-timeout 10 --max-time 30 -u "admin:${ADMIN_PASS}" -X POST \
              "${SONAR_HOST_URL}/api/user_tokens/revoke?name=${TOKEN_NAME}" 2>/dev/null || true
            echo "Bootstrap token revoked."
          fi

      - name: Collect sonarqube errors for notification
        id: collect-errors
        if: failure()
        run: |
          ERROR=""
          if [ -f "${RUNNER_TEMP}/sonar-scan-output.txt" ]; then
            ERROR=$(tail -c 3000 "${RUNNER_TEMP}/sonar-scan-output.txt" 2>/dev/null || true)
          fi
          if [ -z "$(printf '%s' "$ERROR" | tr -d '[:space:]')" ]; then
            ERROR="SonarQube analysis failed. Check SonarQube server status and scan configuration."
          fi
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "error_log<<$EOF" >> $GITHUB_OUTPUT
          echo "$ERROR" >> $GITHUB_OUTPUT
          echo "$EOF" >> $GITHUB_OUTPUT

      - name: Record duration
        id: timing
        if: always()
        uses: ./.github/actions/job-timing
        with:
          start-time: ${{ steps.start.outputs.time }}

      - name: Clean up sensitive temp files
        if: always()
        run: rm -f "${RUNNER_TEMP}/sonar-scan-output.txt"
