name: Kiro Autofix (reusable)

# Reusable workflow that runs kiro-cli to fix CI / deploy failures.
# Callers collect their own diagnostics into an artifact and call this
# workflow with the artifact name. Up to MAX_ATTEMPTS consecutive autofix
# commits at HEAD are tolerated; on overflow, comments on the PR and fails.

on:
  workflow_call:
    inputs:
      stage:
        description: "Stage that failed: build | deploy | other"
        type: string
        required: true
      branch:
        description: "Branch to check out and push fixes to"
        type: string
        required: true
      context-artifact:
        description: "Name of the artifact containing the diagnostics file"
        type: string
        required: true
      context-filename:
        description: "Filename inside the artifact to read as the error context"
        type: string
        required: false
        default: "context.txt"
      artifact-run-id:
        description: "Workflow run ID where the artifact lives. Empty = current run."
        type: string
        required: false
        default: ""
      run-url:
        description: "URL of the failing workflow run for traceability"
        type: string
        required: true
      max-attempts:
        description: "Max consecutive kiro-bot commits at HEAD before bailing"
        type: number
        required: false
        default: 5
    secrets:
      kiro-api:
        description: "KIRO_API_KEY for kiro-cli headless mode"
        required: true
      github-token:
        description: "PAT with contents:write and pull_requests:write to push and comment"
        required: true

permissions: {}

jobs:
  autofix:
    name: "Kiro Autofix (${{ inputs.stage }})"
    runs-on: arc-runner-dind
    timeout-minutes: 30
    permissions:
      actions: read
      contents: write
      pull-requests: write
    env:
      MAX_ATTEMPTS: ${{ inputs.max-attempts }}
    steps:
      # Preflight: fail fast with a clear message if required secrets are
      # missing or empty. Without this, actions/checkout below would die
      # with the opaque "Input required and not supplied: token" error
      # because we explicitly pass token:, and an empty secret resolves
      # to an empty input value rather than falling back to a default.
      - name: Validate required secrets
        env:
          GITHUB_TOKEN_INPUT: ${{ secrets.github-token }}
          KIRO_API_INPUT: ${{ secrets.kiro-api }}
        run: |
          umask 077
          missing=()
          [ -z "${GITHUB_TOKEN_INPUT}" ] && missing+=("github-token")
          [ -z "${KIRO_API_INPUT}" ] && missing+=("kiro-api")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Kiro Autofix cannot run: caller did not supply secret(s): ${missing[*]}"
            echo "::error::Ensure the calling workflow passes these via 'secrets:' and that they are configured at the repository level."
            exit 1
          fi
          echo "All required secrets are supplied by caller."

      - name: Checkout branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.branch }}
          fetch-depth: 0
          token: ${{ secrets.github-token }}
          persist-credentials: true

      - name: Download diagnostics artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ inputs.context-artifact }}
          path: ${{ runner.temp }}/kiro-context
          run-id: ${{ inputs.artifact-run-id || github.run_id }}
          github-token: ${{ secrets.github-token }}

      - name: Count prior autofix attempts on this branch
        id: attempts
        run: |
          umask 077
          count=0
          while [ "$count" -lt 50 ]; do
            email=$(git log --format='%ae' -n 1 "HEAD~$count" 2>/dev/null || true)
            if [ -z "$email" ]; then
              break
            fi
            case "$email" in
              kiro-bot@*) count=$((count + 1)) ;;
              *) break ;;
            esac
          done
          echo "count=$count" >> "$GITHUB_OUTPUT"
          if [ "$count" -ge "${MAX_ATTEMPTS}" ]; then
            echo "exceeded=true" >> "$GITHUB_OUTPUT"
            echo "::warning::Kiro Autofix attempt limit reached: $count consecutive auto-fix commits at HEAD (max: ${MAX_ATTEMPTS})."
          else
            echo "exceeded=false" >> "$GITHUB_OUTPUT"
            echo "Autofix attempt $((count + 1)) of ${MAX_ATTEMPTS}"
          fi

      - name: Find related PR
        id: pr
        if: steps.attempts.outputs.exceeded == 'true'
        env:
          GH_TOKEN: ${{ secrets.github-token }}
        run: |
          umask 077
          pr_number=$(gh pr list \
            --repo "${{ github.repository }}" \
            --head "${{ inputs.branch }}" \
            --state open \
            --json number \
            --jq '.[0].number // empty')
          echo "number=${pr_number}" >> "$GITHUB_OUTPUT"

      - name: Notify human on PR (max attempts reached)
        if: steps.attempts.outputs.exceeded == 'true' && steps.pr.outputs.number != ''
        env:
          GH_TOKEN: ${{ secrets.github-token }}
        run: |
          gh pr comment "${{ steps.pr.outputs.number }}" \
            --repo "${{ github.repository }}" \
            --body "🤖 **Kiro Autofix gave up at the \`${{ inputs.stage }}\` stage.**

          Attempted ${{ env.MAX_ATTEMPTS }} consecutive automated fixes without restoring CI to green. Manual intervention is required.

          - Failed run: ${{ inputs.run-url }}
          - Branch: \`${{ inputs.branch }}\`
          - Stage: \`${{ inputs.stage }}\`

          To resume autofix, push a non-bot commit to this branch (the counter resets on any human commit at HEAD)."

      - name: Stop if max attempts exceeded
        if: steps.attempts.outputs.exceeded == 'true'
        run: |
          echo "::error::Kiro Autofix has attempted ${{ env.MAX_ATTEMPTS }} fixes without success. Manual intervention required."
          exit 1

      - name: Rust setup
        if: steps.attempts.outputs.exceeded == 'false' && inputs.stage == 'build'
        uses: ./.github/actions/rust-setup
        with:
          components: rustfmt,clippy
          targets: x86_64-unknown-linux-musl,wasm32-unknown-unknown

      - name: Build git history of prior attempts
        id: history
        if: steps.attempts.outputs.exceeded == 'false'
        env:
          ATTEMPT_COUNT: ${{ steps.attempts.outputs.count }}
        run: |
          umask 077
          HISTORY_LOG="${RUNNER_TEMP}/git-history.txt"
          {
            echo "=== RECENT COMMITS (last 10) ==="
            git log --format='%h %ae %s%n%b%n---' -n 10
            echo ""
            echo "=== CONSECUTIVE PRIOR KIRO-BOT ATTEMPTS AT HEAD: ${ATTEMPT_COUNT} ==="
            if [ "${ATTEMPT_COUNT}" -gt 0 ]; then
              echo ""
              echo "=== DIFFS FROM EACH PRIOR KIRO-BOT ATTEMPT ==="
              i=0
              while [ "$i" -lt "${ATTEMPT_COUNT}" ]; do
                echo "--- Attempt commit HEAD~${i} ---"
                git show --stat --format='%h %ae %s%n%b' "HEAD~${i}"
                echo ""
                i=$((i + 1))
              done
            fi
          } > "$HISTORY_LOG"
          echo "history_log=$HISTORY_LOG" >> "$GITHUB_OUTPUT"

      - name: Prepare kiro-cli data directory
        if: steps.attempts.outputs.exceeded == 'false'
        run: |
          umask 077
          DATA_HOME="${RUNNER_TEMP}/kiro-data"
          mkdir -p "${DATA_HOME}/kiro-cli" "${HOME}/.local/share/kiro-cli"
          echo "XDG_DATA_HOME=${DATA_HOME}" >> "$GITHUB_ENV"
          echo "kiro-cli data dir ready: ${DATA_HOME}/kiro-cli"

      - name: Run Kiro CLI agent to fix errors
        id: kiro
        if: steps.attempts.outputs.exceeded == 'false'
        env:
          KIRO_API_KEY: ${{ secrets.kiro-api }}
          KIRO_DIAGNOSTICS_FILE: ${{ runner.temp }}/kiro-context/${{ inputs.context-filename }}
          KIRO_COMMIT_MSG_FILE: ${{ runner.temp }}/kiro-commit-message.txt
          KIRO_MAX_FIX_ITERATIONS: "3"
          STAGE: ${{ inputs.stage }}
          BRANCH: ${{ inputs.branch }}
        run: |
          umask 077
          if [ ! -s "${KIRO_DIAGNOSTICS_FILE}" ]; then
            echo "::error::Diagnostics artifact at ${KIRO_DIAGNOSTICS_FILE} is empty or missing"
            exit 1
          fi

          set +e
          kiro-cli chat --agent autofix --model claude-opus-4.6 --effort max --no-interactive --trust-all-tools \
            "Fix ${STAGE} failure on branch ${BRANCH}. Diagnostics at KIRO_DIAGNOSTICS_FILE."
          AGENT_EXIT=$?
          set -e

          echo "agent_exit=${AGENT_EXIT}" >> "$GITHUB_OUTPUT"
          if [ "$AGENT_EXIT" -ne 0 ]; then
            echo "::warning::Kiro agent exited with code ${AGENT_EXIT} (partial fix or failure)"
          fi

      - name: Check for changes
        id: changes
        if: steps.attempts.outputs.exceeded == 'false'
        run: |
          git add -A
          if [ -z "$(git status --porcelain)" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No changes to commit"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push fixes
        if: steps.attempts.outputs.exceeded == 'false' && steps.changes.outputs.has_changes == 'true'
        env:
          ATTEMPT: ${{ steps.attempts.outputs.count }}
          STAGE: ${{ inputs.stage }}
          RUN_URL: ${{ inputs.run-url }}
          KIRO_COMMIT_MSG_FILE: ${{ runner.temp }}/kiro-commit-message.txt
        run: |
          umask 077
          attempt_num=$((ATTEMPT + 1))

          git config user.name "kiro-bot"
          git config user.email "kiro-bot@users.noreply.github.com"

          if [ -s "${KIRO_COMMIT_MSG_FILE}" ]; then
            echo "Using Kiro-generated commit message:"
            cat "${KIRO_COMMIT_MSG_FILE}"
            git commit -F "${KIRO_COMMIT_MSG_FILE}"
          else
            echo "::warning::Kiro did not produce a commit message; using fallback."
            git commit -m "fix(${STAGE}): auto-fix CI errors via Kiro CLI (attempt ${attempt_num}/${{ env.MAX_ATTEMPTS }})

          Kiro did not write a descriptive commit message. Inspect the diff for details.
          Workflow run: ${RUN_URL}"
          fi

          git push origin "${{ inputs.branch }}"

      - name: Fail step if agent exited non-zero
        if: steps.attempts.outputs.exceeded == 'false' && steps.kiro.outputs.agent_exit != '0' && steps.kiro.outputs.agent_exit != ''
        run: |
          echo "::error::Kiro agent exited with code ${{ steps.kiro.outputs.agent_exit }}. Partial fix committed (if changes existed)."
          exit 1
