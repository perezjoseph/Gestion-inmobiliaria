name: Kiro Autofix
run-name: "Kiro Autofix [${{ github.event_name }}] ${{ github.ref_name }}"

# Triggered when the main CI workflow fails on a PR
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches-ignore: [main]

permissions: {}

concurrency:
  group: kiro-autofix-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  autofix:
    name: Kiro Autofix
    runs-on: arc-runner-dind
    timeout-minutes: 30
    if: >-
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.head_repository.full_name == github.repository
    permissions:
      contents: write
    steps:
      - name: Checkout branch that failed
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.workflow_run.head_branch }}
          fetch-depth: 0
          token: ${{ secrets.KIRO_GITHUB_TOKEN }}

      - name: Rust setup
        uses: ./.github/actions/rust-setup
        with:
          components: rustfmt,clippy
          targets: x86_64-unknown-linux-musl,wasm32-unknown-unknown

      - name: Install Kiro CLI
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_wait_seconds: 10
          command: curl -fsSL https://cli.kiro.dev/install | bash

      - name: Collect error context
        id: errors
        run: |
          umask 077
          ERROR_LOG="${RUNNER_TEMP}/ci-errors.txt"
          echo "=== RUSTFMT CHECK ===" > "$ERROR_LOG"
          cargo fmt --all -- --check >> "$ERROR_LOG" 2>&1 || true
          echo "" >> "$ERROR_LOG"

          echo "=== CLIPPY BACKEND ===" >> "$ERROR_LOG"
          cargo clippy --locked -p realestate-backend -- -D warnings >> "$ERROR_LOG" 2>&1 || true
          echo "" >> "$ERROR_LOG"

          echo "=== CLIPPY FRONTEND ===" >> "$ERROR_LOG"
          cargo clippy --locked --target wasm32-unknown-unknown -p realestate-frontend -- -D warnings >> "$ERROR_LOG" 2>&1 || true
          echo "" >> "$ERROR_LOG"

          echo "=== CARGO TEST BACKEND ===" >> "$ERROR_LOG"
          cargo test --locked -p realestate-backend --no-fail-fast 2>&1 | tail -100 >> "$ERROR_LOG" || true
          echo "" >> "$ERROR_LOG"

          echo "=== CARGO TEST FRONTEND ===" >> "$ERROR_LOG"
          cargo test --locked -p realestate-frontend --no-fail-fast 2>&1 | tail -100 >> "$ERROR_LOG" || true

          echo "error_log=$ERROR_LOG" >> "$GITHUB_OUTPUT"

      - name: Run Kiro CLI to fix errors
        env:
          KIRO_API_KEY: ${{ secrets.KIRO_API_KEY }}
        run: |
          ERROR_CONTEXT=$(cat "${{ steps.errors.outputs.error_log }}")

          kiro-cli chat --no-interactive --trust-all-tools \
            "The CI pipeline failed on this branch. Here are the errors:

          ${ERROR_CONTEXT}

          Fix all compilation errors, clippy warnings, test failures, and formatting issues.
          Run 'cargo fmt --all' after making changes.
          Run 'cargo clippy -p realestate-backend -- -D warnings' and 'cargo clippy --target wasm32-unknown-unknown -p realestate-frontend -- -D warnings' to verify fixes.
          Do NOT add new features or refactor unrelated code. Only fix what is broken."

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet && git diff --cached --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No changes to commit"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push fixes
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git config user.name "kiro-bot"
          git config user.email "kiro-bot@users.noreply.github.com"
          git add -A
          git commit -m "fix: auto-fix CI errors via Kiro CLI

          Automated fix applied by Kiro CLI in response to CI failure.
          Workflow run: ${{ github.event.workflow_run.html_url }}"
          git push origin ${{ github.event.workflow_run.head_branch }}
