name: Kiro Autofix (reusable)

# Reusable workflow that runs kiro-cli to fix CI / deploy failures.
# Callers collect their own diagnostics into an artifact and call this
# workflow with the artifact name. Up to MAX_ATTEMPTS consecutive autofix
# commits at HEAD are tolerated; on overflow, comments on the PR and fails.

on:
  workflow_call:
    inputs:
      stage:
        description: "Stage that failed: build | deploy | other"
        type: string
        required: true
      branch:
        description: "Branch to check out and push fixes to"
        type: string
        required: true
      context-artifact:
        description: "Name of the artifact containing the diagnostics file"
        type: string
        required: true
      context-filename:
        description: "Filename inside the artifact to read as the error context"
        type: string
        required: false
        default: "context.txt"
      artifact-run-id:
        description: "Workflow run ID where the artifact lives. Empty = current run."
        type: string
        required: false
        default: ""
      run-url:
        description: "URL of the failing workflow run for traceability"
        type: string
        required: true
      max-attempts:
        description: "Max consecutive kiro-bot commits at HEAD before bailing"
        type: number
        required: false
        default: 5
    secrets:
      kiro-api:
        description: "KIRO_API_KEY for kiro-cli headless mode"
        required: true
      github-token:
        description: "PAT with contents:write and pull_requests:write to push and comment"
        required: true

permissions: {}

jobs:
  autofix:
    name: "Kiro Autofix (${{ inputs.stage }})"
    runs-on: arc-runner-dind
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
    env:
      MAX_ATTEMPTS: ${{ inputs.max-attempts }}
    steps:
      - name: Checkout branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.branch }}
          fetch-depth: 0
          token: ${{ secrets.github-token }}
          persist-credentials: true

      - name: Download diagnostics artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: ${{ inputs.context-artifact }}
          path: ${{ runner.temp }}/kiro-context
          run-id: ${{ inputs.artifact-run-id || github.run_id }}
          github-token: ${{ secrets.github-token }}

      - name: Count prior autofix attempts on this branch
        id: attempts
        run: |
          umask 077
          count=0
          while [ "$count" -lt 50 ]; do
            email=$(git log --format='%ae' -n 1 "HEAD~$count" 2>/dev/null || true)
            if [ -z "$email" ]; then
              break
            fi
            case "$email" in
              kiro-bot@*) count=$((count + 1)) ;;
              *) break ;;
            esac
          done
          echo "count=$count" >> "$GITHUB_OUTPUT"
          if [ "$count" -ge "${MAX_ATTEMPTS}" ]; then
            echo "exceeded=true" >> "$GITHUB_OUTPUT"
            echo "::warning::Kiro Autofix attempt limit reached: $count consecutive auto-fix commits at HEAD (max: ${MAX_ATTEMPTS})."
          else
            echo "exceeded=false" >> "$GITHUB_OUTPUT"
            echo "Autofix attempt $((count + 1)) of ${MAX_ATTEMPTS}"
          fi

      - name: Find related PR
        id: pr
        if: steps.attempts.outputs.exceeded == 'true'
        env:
          GH_TOKEN: ${{ secrets.github-token }}
        run: |
          umask 077
          pr_number=$(gh pr list \
            --repo "${{ github.repository }}" \
            --head "${{ inputs.branch }}" \
            --state open \
            --json number \
            --jq '.[0].number // empty')
          echo "number=${pr_number}" >> "$GITHUB_OUTPUT"

      - name: Notify human on PR (max attempts reached)
        if: steps.attempts.outputs.exceeded == 'true' && steps.pr.outputs.number != ''
        env:
          GH_TOKEN: ${{ secrets.github-token }}
        run: |
          gh pr comment "${{ steps.pr.outputs.number }}" \
            --repo "${{ github.repository }}" \
            --body "🤖 **Kiro Autofix gave up at the \`${{ inputs.stage }}\` stage.**

          Attempted ${{ env.MAX_ATTEMPTS }} consecutive automated fixes without restoring CI to green. Manual intervention is required.

          - Failed run: ${{ inputs.run-url }}
          - Branch: \`${{ inputs.branch }}\`
          - Stage: \`${{ inputs.stage }}\`

          To resume autofix, push a non-bot commit to this branch (the counter resets on any human commit at HEAD)."

      - name: Stop if max attempts exceeded
        if: steps.attempts.outputs.exceeded == 'true'
        run: |
          echo "::error::Kiro Autofix has attempted ${{ env.MAX_ATTEMPTS }} fixes without success. Manual intervention required."
          exit 1

      - name: Rust setup
        if: steps.attempts.outputs.exceeded == 'false' && inputs.stage == 'build'
        uses: ./.github/actions/rust-setup
        with:
          components: rustfmt,clippy
          targets: x86_64-unknown-linux-musl,wasm32-unknown-unknown

      - name: Install Kiro CLI
        if: steps.attempts.outputs.exceeded == 'false'
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_wait_seconds: 10
          command: curl -fsSL https://cli.kiro.dev/install | bash

      - name: Build git history of prior attempts
        id: history
        if: steps.attempts.outputs.exceeded == 'false'
        env:
          ATTEMPT_COUNT: ${{ steps.attempts.outputs.count }}
        run: |
          umask 077
          HISTORY_LOG="${RUNNER_TEMP}/git-history.txt"
          {
            echo "=== RECENT COMMITS (last 10) ==="
            git log --format='%h %ae %s%n%b%n---' -n 10
            echo ""
            echo "=== CONSECUTIVE PRIOR KIRO-BOT ATTEMPTS AT HEAD: ${ATTEMPT_COUNT} ==="
            if [ "${ATTEMPT_COUNT}" -gt 0 ]; then
              echo ""
              echo "=== DIFFS FROM EACH PRIOR KIRO-BOT ATTEMPT ==="
              i=0
              while [ "$i" -lt "${ATTEMPT_COUNT}" ]; do
                echo "--- Attempt commit HEAD~${i} ---"
                git show --stat --format='%h %ae %s%n%b' "HEAD~${i}"
                echo ""
                i=$((i + 1))
              done
            fi
          } > "$HISTORY_LOG"
          echo "history_log=$HISTORY_LOG" >> "$GITHUB_OUTPUT"

      - name: Run Kiro CLI to fix errors
        if: steps.attempts.outputs.exceeded == 'false'
        env:
          KIRO_API_KEY: ${{ secrets.kiro-api }}
          ATTEMPT_NUM: ${{ steps.attempts.outputs.count }}
          STAGE: ${{ inputs.stage }}
          RUN_URL: ${{ inputs.run-url }}
        run: |
          umask 077
          CONTEXT_PATH="${RUNNER_TEMP}/kiro-context/${{ inputs.context-filename }}"
          if [ ! -s "$CONTEXT_PATH" ]; then
            echo "::error::Diagnostics artifact at $CONTEXT_PATH is empty or missing"
            exit 1
          fi
          ERROR_CONTEXT=$(cat "$CONTEXT_PATH")
          GIT_HISTORY=$(cat "${{ steps.history.outputs.history_log }}")
          COMMIT_MSG_FILE="${RUNNER_TEMP}/kiro-commit-message.txt"
          ATTEMPT_DISPLAY=$((ATTEMPT_NUM + 1))

          export KIRO_COMMIT_MSG_FILE="$COMMIT_MSG_FILE"

          STAGE_GUIDANCE=""
          case "${STAGE}" in
            build)
              STAGE_GUIDANCE="The failure is in the CI build/test stage. The diagnostics below come from whichever job(s) failed — this could be Rust (clippy, tests, cargo build), TypeScript (baileys-service tsc/tests), rustfmt, security scans (cargo-deny, trivy IaC), or container builds. Read the diagnostics carefully to identify which job failed and fix accordingly. For Rust issues, verify with 'cargo fmt --all', 'cargo clippy -p realestate-backend -- -D warnings', and 'cargo clippy --target wasm32-unknown-unknown -p realestate-frontend -- -D warnings'. For baileys-service TypeScript issues, verify with 'cd baileys-service && npm run build && npm test'. For security/container issues, fix the relevant config files."
              ;;
            deploy)
              STAGE_GUIDANCE="The failure is in the Kubernetes deploy stage. The diagnostics include kubectl events, pod descriptions, and container logs from the realestate namespace. The fix could go in: (1) backend/frontend Rust code if logs show a panic, missing env var, or startup error; (2) Kubernetes manifests under infra/k8s/app/ if it's a manifest, probe, resource, or selector issue; (3) Caddyfile under infra/caddy/ for ingress/proxy issues. Read the logs carefully and identify the actual failure mode (CrashLoopBackOff, ImagePullBackOff, readiness/liveness failure, OOMKilled) before editing. Do NOT change image tags or digests — those are managed by deploy.yml."
              ;;
            *)
              STAGE_GUIDANCE="Diagnose the failure from the diagnostics below and fix only what is broken."
              ;;
          esac

          kiro-cli chat --no-interactive --trust-all-tools \
            "You are running in CI as automated remediation for a failed pipeline.
          Stage: ${STAGE}.
          This is autofix attempt ${ATTEMPT_DISPLAY} of ${MAX_ATTEMPTS} on this branch.

          STEP 1 — Review prior history before changing anything.
          Inspect the git history below. If there are prior kiro-bot attempts at HEAD,
          read what they tried and DO NOT repeat the same change. If a previous
          attempt's approach clearly failed, try a fundamentally different approach
          rather than tweaking incrementally.

          === GIT HISTORY (recent commits + prior autofix attempts) ===
          ${GIT_HISTORY}

          STEP 2 — Diagnose.
          ${STAGE_GUIDANCE}

          === DIAGNOSTICS ===
          ${ERROR_CONTEXT}

          STEP 3 — Fix only what is broken.
          - Match the project's existing style and conventions.
          - Do NOT add new features or refactor unrelated code.
          - Touch only files necessary to resolve the failure.

          STEP 4 — Write a descriptive commit message.
          After all fixes are in place, write a commit message to the file at the
          path stored in the environment variable KIRO_COMMIT_MSG_FILE. The message
          must follow this exact format:

              fix(${STAGE}): <one-line subject under 70 chars summarizing the fix>

              Attempt ${ATTEMPT_DISPLAY} of ${MAX_ATTEMPTS}.

              Root cause:
              - <what was actually wrong; cite test names, lint IDs, file:line, pod names, or k8s events>

              Changes:
              - <bullet per file or logical change, naming the symbol or file>

              Verification:
              - <which commands you ran and what they showed>

              Workflow run: ${RUN_URL}

          Be specific. Reference exact test names, clippy lint IDs, file paths,
          symbols, pod names, or kubectl event messages. Avoid filler like 'various
          fixes' or 'minor improvements'. Do NOT run 'git commit' or 'git push'
          yourself; the workflow handles that."

      - name: Check for changes
        id: changes
        if: steps.attempts.outputs.exceeded == 'false'
        run: |
          if git diff --quiet && git diff --cached --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No changes to commit"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify fix before committing
        id: verify
        if: steps.attempts.outputs.exceeded == 'false' && steps.changes.outputs.has_changes == 'true' && inputs.stage == 'build'
        run: |
          umask 077
          echo "=== Verifying Kiro's fix locally before pushing ==="
          VERIFY_LOG="${RUNNER_TEMP}/verify-output.txt"
          PASS_FILE="${RUNNER_TEMP}/verify-pass"
          echo "true" > "$PASS_FILE"

          # Run the same checks that CI would run
          {
            echo "=== RUSTFMT CHECK ==="
            if ! cargo fmt --all -- --check 2>&1; then
              echo "false" > "$PASS_FILE"
              echo "FAILED: rustfmt"
            fi
            echo ""
            echo "=== CLIPPY BACKEND ==="
            if ! cargo clippy --locked -p realestate-backend -- -D warnings 2>&1; then
              echo "false" > "$PASS_FILE"
              echo "FAILED: clippy backend"
            fi
            echo ""
            echo "=== CLIPPY FRONTEND ==="
            if ! cargo clippy --locked --target wasm32-unknown-unknown -p realestate-frontend -- -D warnings 2>&1; then
              echo "false" > "$PASS_FILE"
              echo "FAILED: clippy frontend"
            fi
          } | tee "$VERIFY_LOG"

          PASS=$(cat "$PASS_FILE")
          if [ "$PASS" = "true" ]; then
            echo "verified=true" >> "$GITHUB_OUTPUT"
            echo "✅ Local verification passed — safe to push."
          else
            echo "verified=false" >> "$GITHUB_OUTPUT"
            echo "verify_log=$VERIFY_LOG" >> "$GITHUB_OUTPUT"
            echo "::warning::Local verification failed. Giving Kiro a second pass."
          fi

      - name: Re-run Kiro CLI to fix verification failures
        if: steps.verify.outputs.verified == 'false'
        env:
          KIRO_API_KEY: ${{ secrets.kiro-api }}
        run: |
          umask 077
          VERIFY_ERRORS=$(cat "${{ steps.verify.outputs.verify_log }}")
          COMMIT_MSG_FILE="${RUNNER_TEMP}/kiro-commit-message.txt"
          export KIRO_COMMIT_MSG_FILE="$COMMIT_MSG_FILE"

          kiro-cli chat --no-interactive --trust-all-tools \
            "Your previous fix did not pass local verification. The errors below are from
          running cargo fmt, clippy, and tests on your changes. Fix these remaining issues.
          Do NOT revert your prior changes — build on them.

          === VERIFICATION ERRORS ===
          ${VERIFY_ERRORS}

          After fixing, update the commit message file at KIRO_COMMIT_MSG_FILE."

      - name: Re-verify after second pass
        id: reverify
        if: steps.verify.outputs.verified == 'false'
        run: |
          umask 077
          PASS=true
          cargo fmt --all -- --check 2>&1 || PASS=false
          cargo clippy --locked -p realestate-backend -- -D warnings 2>&1 || PASS=false
          cargo clippy --locked --target wasm32-unknown-unknown -p realestate-frontend -- -D warnings 2>&1 || PASS=false

          if [ "$PASS" = "true" ]; then
            echo "verified=true" >> "$GITHUB_OUTPUT"
            echo "✅ Second-pass verification passed."
          else
            echo "verified=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Second-pass verification also failed. Pushing anyway to consume an attempt."
          fi

      - name: Commit and push fixes
        if: steps.attempts.outputs.exceeded == 'false' && steps.changes.outputs.has_changes == 'true'
        env:
          ATTEMPT: ${{ steps.attempts.outputs.count }}
          STAGE: ${{ inputs.stage }}
          RUN_URL: ${{ inputs.run-url }}
        run: |
          umask 077
          COMMIT_MSG_FILE="${RUNNER_TEMP}/kiro-commit-message.txt"
          attempt_num=$((ATTEMPT + 1))

          git config user.name "kiro-bot"
          git config user.email "kiro-bot@users.noreply.github.com"
          git add -A

          if [ -s "$COMMIT_MSG_FILE" ]; then
            echo "Using Kiro-generated commit message:"
            cat "$COMMIT_MSG_FILE"
            git commit -F "$COMMIT_MSG_FILE"
          else
            echo "::warning::Kiro did not produce a commit message; using fallback."
            git commit -m "fix(${STAGE}): auto-fix CI errors via Kiro CLI (attempt ${attempt_num}/${{ env.MAX_ATTEMPTS }})

          Kiro did not write a descriptive commit message. Inspect the diff for details.
          Workflow run: ${RUN_URL}"
          fi

          git push origin "${{ inputs.branch }}"
