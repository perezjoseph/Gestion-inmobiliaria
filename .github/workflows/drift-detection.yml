name: Drift Detection

on:
  schedule:
    # Run weekly on Sundays at 04:00 UTC
    - cron: "0 4 * * 0"
  workflow_dispatch:

permissions: {}

jobs:
  unused-dependencies:
    name: Unused Dependencies (cargo-machete)
    runs-on: arc-runner-dind
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Rust setup
        uses: ./.github/actions/rust-setup

      - name: Install cargo-machete
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_wait_seconds: 10
          command: |
            export PATH="$HOME/.cargo/bin:$PATH"
            cargo install cargo-machete --locked 2>&1 || true
            cargo-machete --version || cargo install cargo-machete --locked

      - name: Check for unused dependencies
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          cargo machete 2>&1 | tee "${RUNNER_TEMP}/machete-output.txt" || true
          # Report but don't fail — this is advisory
          if grep -q "unused" "${RUNNER_TEMP}/machete-output.txt"; then
            echo "::warning::Unused dependencies detected. Review machete output above."
          fi

      - name: Write summary
        if: "!cancelled()"
        run: |
          {
            echo "## Drift Detection: Unused Dependencies"
            echo '```'
            cat "${RUNNER_TEMP}/machete-output.txt" 2>/dev/null || echo "No output"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  dead-code:
    name: Dead Code Detection
    runs-on: arc-runner-dind
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Rust setup
        uses: ./.github/actions/rust-setup

      - name: Check for dead code (unreachable pub items)
        run: |
          # Use clippy's unreachable_pub lint as a proxy for dead public API
          cargo clippy --workspace --message-format=json -- \
            -W unreachable-pub 2>/dev/null \
            | jq -r 'select(.reason == "compiler-message") | select(.message.code.code == "unreachable_pub") | .message.rendered // empty' \
            > "${RUNNER_TEMP}/dead-pub-items.txt" 2>/dev/null || true
          LINES=$(wc -l < "${RUNNER_TEMP}/dead-pub-items.txt" | tr -d ' ')
          echo "Found $LINES unreachable pub items"
          if [ "$LINES" -gt 0 ]; then
            echo "::warning::$LINES unreachable pub items detected. Consider reducing visibility."
            head -20 "${RUNNER_TEMP}/dead-pub-items.txt"
          fi

      - name: Write summary
        if: "!cancelled()"
        run: |
          LINES=$(wc -l < "${RUNNER_TEMP}/dead-pub-items.txt" 2>/dev/null | tr -d ' ')
          {
            echo "## Drift Detection: Unreachable Pub Items"
            echo "Found **${LINES:-0}** items with unnecessarily broad visibility."
            if [ "${LINES:-0}" -gt 0 ]; then
              echo '```'
              head -30 "${RUNNER_TEMP}/dead-pub-items.txt"
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  test-quality:
    name: Test Coverage Trend
    runs-on: arc-runner-dind
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:16@sha256:5a65324fe84dc41709ff914e90b07f3e2f577073ed27bf917d4873aca0c9ec51
        env:
          POSTGRES_DB: realestate
          POSTGRES_USER: realestate
          POSTGRES_PASSWORD: realestate_dev_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U realestate"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
          --health-start-period 15s
    env:
      DATABASE_URL: postgresql://realestate:realestate_dev_password@localhost:5432/realestate
      JWT_SECRET: drift_detection_jwt_secret_32chars_long!
      SERVER_PORT: "8080"
      CORS_ORIGIN: http://localhost:8080
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Rust setup
        uses: ./.github/actions/rust-setup
        with:
          components: llvm-tools-preview

      - name: Mask credentials
        run: |
          echo "::add-mask::realestate_dev_password"
          echo "::add-mask::drift_detection_jwt_secret_32chars_long!"

      - name: Install cargo-llvm-cov
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_wait_seconds: 10
          command: |
            LLVM_COV_VERSION="0.8.4"
            ARCHIVE="${RUNNER_TEMP}/cargo-llvm-cov.tar.gz"
            curl -sSfL --proto =https --connect-timeout 15 --max-time 120 -o "$ARCHIVE" \
              "https://github.com/taiki-e/cargo-llvm-cov/releases/download/v${LLVM_COV_VERSION}/cargo-llvm-cov-x86_64-unknown-linux-musl.tar.gz"
            mkdir -p "${HOME}/.cargo/bin"
            tar xzf "$ARCHIVE" --no-same-owner -C "${HOME}/.cargo/bin" cargo-llvm-cov
            rm -f "$ARCHIVE"
            chmod +x "${HOME}/.cargo/bin/cargo-llvm-cov"

      - name: Run coverage analysis
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
        with:
          timeout_minutes: 30
          max_attempts: 2
          command: |
            export PATH="$HOME/.cargo/bin:$PATH"
            cargo llvm-cov test --locked -p realestate-backend \
              --summary-only 2>&1 | tee "${RUNNER_TEMP}/coverage-summary.txt"

      - name: Write coverage summary
        if: "!cancelled()"
        run: |
          {
            echo "## Drift Detection: Test Coverage"
            echo '```'
            grep -E "^(TOTAL|Region|Function|Line|Branch)" "${RUNNER_TEMP}/coverage-summary.txt" 2>/dev/null || echo "Coverage data unavailable"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
