name: SonarQube (Post-CI)

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main, develop]

permissions: {}

concurrency:
  group: sonarqube-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  sonarqube:
    name: SonarQube Analysis
    if: github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: read
    uses: ./.github/workflows/sonarqube.yml
    with:
      skip-sonarqube: false
      lint-result: 'success'
      test-backend-result: 'success'
      test-frontend-result: 'success'
      coverage-backend-result: 'success'
    secrets:
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_ADMIN_PASSWORD: ${{ secrets.SONAR_ADMIN_PASSWORD }}
