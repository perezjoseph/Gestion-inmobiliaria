name: Scheduled Security Scans

on:
  schedule:
    # Nightly at 04:23 UTC
    - cron: "23 4 * * *"
  workflow_dispatch: {}

permissions: {}

jobs:
  # ══════════════════════════════════════════════════════════════════════════════
  # CodeQL Analysis
  # ══════════════════════════════════════════════════════════════════════════════

  # ── Rust: build-mode none (no build needed, uses rust-analyzer internally) ──
  codeql-rust:
    name: CodeQL (Rust)
    runs-on: arc-runner-dind
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Rust setup
        uses: ./.github/actions/rust-setup

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: rust
          build-mode: none
          queries: security-extended
          config: |
            paths:
              - backend
              - frontend

      - name: Perform CodeQL Analysis
        id: analyze
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          category: codeql-rust

      - name: Collect diagnostics
        if: failure()
        uses: ./.github/actions/collect-diagnostics
        with:
          job-name: "scheduled-security-scans / codeql-rust"
          artifact-suffix: codeql-rust
          step-outcomes: |
            analyze=${{ steps.analyze.outcome }}
          extra-context: "CodeQL analysis for Rust failed. Check the SARIF results in GitHub Security tab."

  # ── JavaScript/TypeScript: covers baileys-service ──
  codeql-javascript:
    name: CodeQL (JavaScript/TypeScript)
    runs-on: arc-runner-dind
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: javascript-typescript
          queries: security-extended
          config: |
            paths:
              - baileys-service

      - name: Perform CodeQL Analysis
        id: analyze
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          category: codeql-javascript

      - name: Collect diagnostics
        if: failure()
        uses: ./.github/actions/collect-diagnostics
        with:
          job-name: "scheduled-security-scans / codeql-javascript"
          artifact-suffix: codeql-javascript
          step-outcomes: |
            analyze=${{ steps.analyze.outcome }}
          extra-context: "CodeQL analysis for JavaScript/TypeScript failed. Check the SARIF results in GitHub Security tab."

  # ── Python: covers ocr-service ──
  codeql-python:
    name: CodeQL (Python)
    runs-on: arc-runner-dind
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.10"

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: python
          queries: security-extended
          config: |
            paths:
              - ocr-service

      - name: Perform CodeQL Analysis
        id: analyze
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          category: codeql-python

      - name: Collect diagnostics
        if: failure()
        uses: ./.github/actions/collect-diagnostics
        with:
          job-name: "scheduled-security-scans / codeql-python"
          artifact-suffix: codeql-python
          step-outcomes: |
            analyze=${{ steps.analyze.outcome }}
          extra-context: "CodeQL analysis for Python failed. Check the SARIF results in GitHub Security tab."

  # ── Java/Kotlin: covers android/ multi-module project ──
  # Note: autobuild fails because AGP 9.0 has built-in Kotlin support and the
  # CodeQL autobuild runs `clean` which triggers plugin resolution before our
  # Gradle wrapper can configure properly. Manual build mode gives us control.
  codeql-kotlin:
    name: CodeQL (Java/Kotlin)
    runs-on: arc-runner-dind
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Android SDK
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_wait_seconds: 10
          command: |
            if [ -d "${ANDROID_HOME:-/opt/android-sdk}/cmdline-tools/latest" ]; then
              export ANDROID_HOME="${ANDROID_HOME:-/opt/android-sdk}"
              echo "Android SDK already available at ${ANDROID_HOME}"
              echo "ANDROID_HOME=${ANDROID_HOME}" >> "${GITHUB_ENV}"
              echo "${ANDROID_HOME}/cmdline-tools/latest/bin" >> "${GITHUB_PATH}"
              echo "${ANDROID_HOME}/build-tools/36.0.0" >> "${GITHUB_PATH}"
              exit 0
            fi
            export ANDROID_HOME="${HOME}/android-sdk"
            mkdir -p "${ANDROID_HOME}/cmdline-tools"
            curl -fsSL "https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip" \
              -o /tmp/cmdline-tools.zip
            unzip -qo /tmp/cmdline-tools.zip -d "${ANDROID_HOME}/cmdline-tools"
            mv -f "${ANDROID_HOME}/cmdline-tools/cmdline-tools" "${ANDROID_HOME}/cmdline-tools/latest" 2>/dev/null || true
            yes 2>/dev/null | "${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager" --licenses > /dev/null 2>&1 || true
            "${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager" \
              "platforms;android-36" "build-tools;36.0.0" > /dev/null 2>&1
            echo "ANDROID_HOME=${ANDROID_HOME}" >> "${GITHUB_ENV}"
            echo "${ANDROID_HOME}/cmdline-tools/latest/bin" >> "${GITHUB_PATH}"
            echo "${ANDROID_HOME}/build-tools/36.0.0" >> "${GITHUB_PATH}"

      - name: Cache Gradle dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-codeql-${{ hashFiles('android/**/*.gradle.kts', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-codeql-

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: java-kotlin
          build-mode: manual
          queries: security-extended
          config: |
            paths:
              - android

      - name: Build Android project
        env:
          JAVA_HOME: /usr/lib/jvm/java-21-amazon-corretto
        run: |
          cd android
          chmod +x gradlew
          ./gradlew --no-daemon compileDebugKotlin compileDebugJavaWithJavac

      - name: Perform CodeQL Analysis
        id: analyze
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          category: codeql-kotlin

      - name: Collect diagnostics
        if: failure()
        uses: ./.github/actions/collect-diagnostics
        with:
          job-name: "scheduled-security-scans / codeql-kotlin"
          artifact-suffix: codeql-kotlin
          step-outcomes: |
            analyze=${{ steps.analyze.outcome }}
          extra-context: "CodeQL analysis for Java/Kotlin failed. Check the SARIF results in GitHub Security tab."

  # ══════════════════════════════════════════════════════════════════════════════
  # Semgrep — unified scan (App rules + community rule packs in one job)
  # ══════════════════════════════════════════════════════════════════════════════

  semgrep:
    name: Semgrep
    runs-on: arc-runner-dind
    permissions:
      contents: read
    env:
      SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Run Semgrep CI (App-managed rules)
        id: scan-ci
        run: semgrep ci 2>&1 | tee "${RUNNER_TEMP}/semgrep-ci-output.txt"

      - name: Run community rule packs (language + security + infra)
        id: scan-community
        if: "!cancelled()"
        run: |
          semgrep scan \
            --config "p/rust" \
            --config "p/kotlin" \
            --config "p/python" \
            --config "p/fastapi" \
            --config "p/owasp-top-ten" \
            --config "p/trailofbits" \
            --config "p/supply-chain" \
            --config "p/docker" \
            --config "p/dockerfile" \
            --config "p/kubernetes" \
            --config "p/github-actions" \
            --error 2>&1 | tee "${RUNNER_TEMP}/semgrep-community-output.txt"

      - name: Collect diagnostics
        if: failure()
        uses: ./.github/actions/collect-diagnostics
        with:
          job-name: "scheduled-security-scans / semgrep"
          artifact-suffix: semgrep-ci
          step-outcomes: |
            scan-ci=${{ steps.scan-ci.outcome }}
            scan-community=${{ steps.scan-community.outcome }}
          output-files: |
            ${{ runner.temp }}/semgrep-ci-output.txt
            ${{ runner.temp }}/semgrep-community-output.txt
