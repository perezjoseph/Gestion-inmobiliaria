name: Deploy

on:
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-backend:
    name: Build Backend Release
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: realestate
          POSTGRES_USER: realestate
          POSTGRES_PASSWORD: realestate_dev_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U realestate"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://realestate:realestate_dev_password@localhost:5432/realestate
      JWT_SECRET: ci_test_secret_not_for_production
      SERVER_PORT: 8080
      CORS_ORIGIN: http://localhost:8080

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-release-

      - name: Run backend tests
        run: cargo test -p realestate-backend --all-targets

      - name: Build backend release
        run: cargo build -p realestate-backend --release

      - name: Upload backend binary
        uses: actions/upload-artifact@v4
        with:
          name: backend-binary
          path: target/release/realestate-backend
          retention-days: 14

  build-frontend:
    name: Build Frontend Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install Trunk
        uses: jetli/trunk-action@v0.5.0

      - name: Install wasm-opt (binaryen)
        run: |
          sudo apt-get update && sudo apt-get install -y binaryen

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-wasm-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-wasm-release-

      - name: Build frontend
        run: trunk build --release
        working-directory: frontend

      - name: Optimize WASM
        run: |
          WASM_FILE=$(find frontend/dist -name "*.wasm" -type f | head -1)
          if [ -n "$WASM_FILE" ]; then
            BEFORE=$(wc -c < "$WASM_FILE")
            wasm-opt -Oz --enable-bulk-memory --enable-nontrapping-float-to-int -o "${WASM_FILE}.opt" "$WASM_FILE"
            mv "${WASM_FILE}.opt" "$WASM_FILE"
            AFTER=$(wc -c < "$WASM_FILE")
            echo "WASM: $((BEFORE / 1024))KB → $((AFTER / 1024))KB"
          fi

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 14

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Download backend binary
        uses: actions/download-artifact@v4
        with:
          name: backend-binary
          path: artifacts/backend

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: artifacts/frontend

      # -------------------------------------------------------
      # Add your deployment steps here. Examples:
      #
      # Option A: SSH/SCP to a VPS
      # - name: Deploy to server
      #   uses: appleboy/scp-action@v0.1.7
      #   with:
      #     host: ${{ secrets.DEPLOY_HOST }}
      #     username: ${{ secrets.DEPLOY_USER }}
      #     key: ${{ secrets.DEPLOY_SSH_KEY }}
      #     source: "artifacts/*"
      #     target: "/opt/realestate"
      #
      # Option B: Docker build + push
      # - name: Build and push Docker image
      #   uses: docker/build-push-action@v5
      #   with:
      #     push: true
      #     tags: ghcr.io/${{ github.repository }}:latest
      #
      # Option C: AWS ECS / Fly.io / Railway / etc.
      # -------------------------------------------------------

      - name: Deployment placeholder
        run: |
          echo "✅ Artifacts ready for deployment"
          echo "Backend binary: artifacts/backend/realestate-backend"
          echo "Frontend dist:  artifacts/frontend/"
          echo ""
          echo "Configure your deployment target by editing this workflow."
