name: Deploy

on:
  workflow_call:
    inputs:
      backend-digest:
        type: string
        required: true
      frontend-digest:
        type: string
        required: true
      ocr-service-digest:
        type: string
        required: false
        default: ""
      baileys-digest:
        type: string
        required: true
    secrets:
      POSTGRES_PASSWORD:
        required: true
      JWT_SECRET:
        required: true
      KUBECONFIG_DATA:
        required: true
      DEV_POSTGRES_PASSWORD:
        required: true
      DEV_JWT_SECRET:
        required: true

permissions: {}

jobs:
  # ── Deploy to Dev (develop branch or main) ──
  deploy-dev:
    name: Deploy to Dev (k3s)
    runs-on: arc-runner-dind
    environment: development
    concurrency:
      group: deploy-development
      cancel-in-progress: false
    permissions:
      contents: read
      packages: read
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Deploy to dev namespace
        uses: ./.github/actions/k8s-deploy
        with:
          namespace: realestate-dev
          kubeconfig-data: ${{ secrets.KUBECONFIG_DATA }}
          db-username: realestate_dev
          db-password: ${{ secrets.DEV_POSTGRES_PASSWORD }}
          db-host: db.realestate.svc.cluster.local:5432
          db-name: realestate_dev
          jwt-secret: ${{ secrets.DEV_JWT_SECRET }}
          kustomize-path: infra/k8s/app/overlays/dev/
          caddyfile-path: infra/k8s/app/overlays/dev/Caddyfile
          backend-digest: ${{ inputs.backend-digest }}
          frontend-digest: ${{ inputs.frontend-digest }}
          baileys-digest: ${{ inputs.baileys-digest }}
          ocr-service-digest: ${{ inputs.ocr-service-digest }}
          image-owner: ${{ github.repository_owner }}
          verify-attestations: "false"

      - name: Smoke tests (dev)
        id: smoke-tests
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
        env:
          NS: realestate-dev
          KUBECONFIG_DATA: ${{ secrets.KUBECONFIG_DATA }}
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 10
          command: |
            umask 077
            mkdir -p "${HOME}/.kube"
            echo "${KUBECONFIG_DATA}" | base64 -d > "${HOME}/.kube/config"

            echo "Waiting for backend rollout..."
            kubectl rollout status deployment/backend -n ${NS} --timeout=120s

            echo "Waiting for a Ready backend pod..."
            kubectl wait --for=condition=Ready pod \
              -l app.kubernetes.io/name=backend -n ${NS} --timeout=60s

            # Brief settle time after readiness before exec'ing into the pod
            sleep 5

            BACKEND_POD=$(kubectl get pods -n ${NS} -l app.kubernetes.io/name=backend \
              -o jsonpath='{range .items[*]}{.metadata.name}{"\t"}{.status.phase}{"\n"}{end}' \
              | grep Running | head -1 | cut -f1)

            if [ -z "$BACKEND_POD" ]; then
              echo "::error::No Ready backend pod found"
              kubectl get pods -n ${NS} -l app.kubernetes.io/name=backend -o wide
              exit 1
            fi
            echo "Using backend pod: $BACKEND_POD"

            echo "Testing backend /health..."
            HEALTH_RESPONSE=$(kubectl exec "$BACKEND_POD" -n ${NS} -- \
              curl -sf --max-time 10 http://localhost:8080/health 2>&1) || {
              echo "::error::Backend /health endpoint unreachable"
              echo "Pod status:"
              kubectl describe pod "$BACKEND_POD" -n ${NS} | tail -30
              echo "Recent logs:"
              kubectl logs "$BACKEND_POD" -n ${NS} --tail=50
              exit 1
            }
            echo "Backend /health: $HEALTH_RESPONSE"

            echo "Testing frontend..."
            kubectl rollout status deployment/frontend -n ${NS} --timeout=120s
            kubectl wait --for=condition=Ready pod \
              -l app.kubernetes.io/name=frontend -n ${NS} --timeout=60s

            FRONTEND_POD=$(kubectl get pods -n ${NS} -l app.kubernetes.io/name=frontend \
              -o jsonpath='{range .items[*]}{.metadata.name}{"\t"}{.status.phase}{"\n"}{end}' \
              | grep Running | head -1 | cut -f1)

            if [ -z "$FRONTEND_POD" ]; then
              echo "::error::No Ready frontend pod found"
              kubectl get pods -n ${NS} -l app.kubernetes.io/name=frontend -o wide
              exit 1
            fi
            echo "Using frontend pod: $FRONTEND_POD"

            FRONTEND_STATUS=$(kubectl exec "$FRONTEND_POD" -n ${NS} -- \
              wget --spider -qS --no-check-certificate --timeout=10 https://localhost:8443/ 2>&1 | grep "HTTP/" | tail -1) || {
              echo "::error::Frontend not responding on port 8443"
              kubectl logs "$FRONTEND_POD" -n ${NS} --tail=30
              exit 1
            }
            echo "Frontend status: $FRONTEND_STATUS"
            echo "All smoke tests passed"

            rm -f "${HOME}/.kube/config"

      - name: Collect smoke test diagnostics
        if: failure() && steps.smoke-tests.outcome == 'failure'
        uses: ./.github/actions/collect-diagnostics
        with:
          job-name: "deploy / deploy-dev / smoke-tests"
          artifact-suffix: deploy-dev-smoke
          github-token: ${{ github.token }}
          step-outcomes: |
            smoke-tests=${{ steps.smoke-tests.outcome }}
          extra-context: |
            Smoke tests failed after successful k8s-deploy action.
            The deployment rolled out but the in-pod health check could not reach the backend /health endpoint
            or the frontend. This is likely a timing issue in the smoke test script, a pod crash after readiness,
            or a networking/configuration problem in the realestate-dev namespace.

  # ── Deploy to Production (main branch only) ──
  deploy-prod:
    name: Deploy to Production (k3s)
    runs-on: arc-runner-dind
    environment: production
    needs: [deploy-dev]
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    permissions:
      contents: read
      packages: read
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Deploy to production namespace
        uses: ./.github/actions/k8s-deploy
        with:
          namespace: realestate
          kubeconfig-data: ${{ secrets.KUBECONFIG_DATA }}
          db-username: realestate
          db-password: ${{ secrets.POSTGRES_PASSWORD }}
          db-host: db:5432
          db-name: realestate
          jwt-secret: ${{ secrets.JWT_SECRET }}
          kustomize-path: infra/k8s/app/overlays/prod/
          caddyfile-path: infra/k8s/app/overlays/prod/Caddyfile
          shared-manifests-path: infra/k8s/app/shared/
          backend-digest: ${{ inputs.backend-digest }}
          frontend-digest: ${{ inputs.frontend-digest }}
          baileys-digest: ${{ inputs.baileys-digest }}
          ocr-service-digest: ${{ inputs.ocr-service-digest }}
          image-owner: ${{ github.repository_owner }}
          verify-attestations: "true"
          github-token: ${{ secrets.GITHUB_TOKEN }}
