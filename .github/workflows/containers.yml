name: Container Images

on:
  workflow_call:
    inputs:
      is-production:
        description: "Whether this is a production build (main push). Controls tagging and latest."
        type: boolean
        required: true
      build-backend:
        description: "Whether to build the backend container image (backend or ci changed)."
        type: boolean
        required: true
      build-frontend:
        description: "Whether to build the frontend container image (frontend or ci changed). Must match when frontend-dist was produced."
        type: boolean
        required: true
    outputs:
      backend-digest:
        value: ${{ jobs.container-image-backend.outputs.digest }}
      frontend-digest:
        value: ${{ jobs.container-image-frontend.outputs.digest }}

permissions: {}

jobs:
  container-image-backend:
    name: Container Image (Backend)
    runs-on: arc-runner-dind
    timeout-minutes: 30
    if: ${{ inputs.build-backend }}
    permissions:
      actions: read
      contents: read
      packages: write
      security-events: write
      id-token: write
      attestations: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    env:
      DOCKER_CONTENT_TRUST: "1"
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Build, scan & attest backend container
        id: build
        uses: ./.github/actions/container-build-scan
        with:
          image-name: realestate-backend
          context: .
          dockerfile: infra/docker/Dockerfile.backend
          build-args: |
            MODE=prebuilt
            GH_REPO=${{ github.repository }}
            GH_RUN_ID=${{ github.run_id }}
          build-secrets: |
            gh_token=${{ secrets.GITHUB_TOKEN }}
          is-production: ${{ inputs.is-production }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          image-owner: ${{ github.repository_owner }}
          cache-suffix: buildcache
          sarif-category: trivy-backend-image
          artifact-suffix: container-backend
          job-name: "containers / container-image-backend"

  container-image-frontend:
    name: Container Image (Frontend)
    runs-on: arc-runner-dind
    timeout-minutes: 30
    if: ${{ inputs.build-frontend }}
    permissions:
      actions: read
      contents: read
      packages: write
      security-events: write
      id-token: write
      attestations: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    env:
      DOCKER_CONTENT_TRUST: "1"
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Download frontend dist artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: frontend-dist
          path: ${{ runner.temp }}/frontend-artifact

      - name: Prepare frontend build context
        run: cp -r "${{ runner.temp }}/frontend-artifact" dist

      - name: Build, scan & attest frontend container
        id: build
        uses: ./.github/actions/container-build-scan
        with:
          image-name: realestate-frontend
          context: .
          dockerfile: infra/docker/Dockerfile.frontend
          build-args: MODE=prebuilt
          is-production: ${{ inputs.is-production }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          image-owner: ${{ github.repository_owner }}
          cache-suffix: buildcache
          sarif-category: trivy-frontend-image
          artifact-suffix: container-frontend
          job-name: "containers / container-image-frontend"
