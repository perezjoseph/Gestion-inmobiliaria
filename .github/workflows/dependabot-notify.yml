name: Dependabot Notify

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  pull-requests: read

jobs:
  notify:
    name: Notify Webhook on Dependabot PR
    runs-on: [self-hosted, linux, sonarqube]
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Notify webhook
        run: |
          curl -s --connect-timeout 5 --max-time 10 -X POST http://${{ secrets.WEBHOOK_HOST }}:9090/ci-failure \
            -H "Content-Type: application/json" \
            -d '{
              "job": "dependabot",
              "step": "dependency-update",
              "error_log": "Dependabot opened PR #${{ github.event.pull_request.number }}: ${{ github.event.pull_request.title }}. Review the dependency update, check for breaking changes, and run cargo test --workspace to verify compatibility.",
              "run_url": "${{ github.event.pull_request.html_url }}"
            }' || echo "Webhook unreachable — skipping notification"
