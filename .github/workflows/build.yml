name: Build

on:
  workflow_call:
    inputs:
      is-production:
        description: "Whether this is a production build (main push). Controls SBOM generation."
        type: boolean
        required: false
        default: false
    outputs:
      build-frontend-result:
        value: ${{ jobs.build-frontend.result }}
      build-frontend-error-log:
        value: ${{ jobs.build-frontend.outputs.error_log }}
      build-frontend-duration:
        value: ${{ jobs.build-frontend.outputs.duration }}
      build-backend-result:
        value: ${{ jobs.build-backend.result }}
      build-backend-error-log:
        value: ${{ jobs.build-backend.outputs.error_log }}
      build-backend-duration:
        value: ${{ jobs.build-backend.outputs.duration }}

permissions: {}

jobs:
  build-frontend:
    name: Build Frontend (Trunk + WASM)
    runs-on: arc-runner
    permissions:
      contents: read
      id-token: write
      attestations: write
    outputs:
      error_log: ${{ steps.collect-errors.outputs.error_log }}
      duration: ${{ steps.timing.outputs.duration }}
    steps:
      - name: Record start time
        id: start
        run: echo "time=$(date +%s)" >> $GITHUB_OUTPUT

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Rust toolchain and cache
        uses: ./.github/actions/rust-setup
        with:
          targets: wasm32-unknown-unknown

      - name: Install Trunk
        id: install-trunk
        run: |
          TRUNK_VERSION="0.21.14"
          TRUNK_SHA256="a67f4054b249fe9acc5fabc25de1aebf19783aca3ad6ff64bf34d7da44d0ea20"
          ARCHIVE="${RUNNER_TEMP}/trunk.tar.gz"
          curl -sSfL --proto =https --retry 3 --retry-delay 5 --connect-timeout 15 --max-time 120 -o "$ARCHIVE" \
            "https://github.com/trunk-rs/trunk/releases/download/v${TRUNK_VERSION}/trunk-x86_64-unknown-linux-musl.tar.gz"
          echo "${TRUNK_SHA256}  ${ARCHIVE}" | sha256sum -c -
          mkdir -p "${HOME}/.local/bin"
          tar xzf "$ARCHIVE" --no-same-owner --no-same-permissions -C "${HOME}/.local/bin" trunk
          rm -f "$ARCHIVE"
          chmod +x "${HOME}/.local/bin/trunk"
          export PATH="${HOME}/.local/bin:$PATH"
          echo "${HOME}/.local/bin" >> "$GITHUB_PATH"
          trunk --version

      - name: Pre-install wasm-bindgen-cli
        run: |
          export PATH="${HOME}/.local/bin:$HOME/.cargo/bin:$PATH"
          WASM_BINDGEN_VERSION=$(grep -A1 '^name = "wasm-bindgen"' Cargo.lock | grep -oP 'version = "\K[^"]+')
          if [ -z "$WASM_BINDGEN_VERSION" ]; then
            echo "::error::Could not determine wasm-bindgen version from Cargo.lock"
            exit 1
          fi
          if ! wasm-bindgen --version 2>/dev/null | grep -q "$WASM_BINDGEN_VERSION"; then
            cargo install wasm-bindgen-cli --version "$WASM_BINDGEN_VERSION" --locked
          fi

      - name: Build frontend with Trunk
        id: build
        run: |
          export PATH="${HOME}/.local/bin:$HOME/.cargo/bin:$PATH"
          trunk build --release 2>&1 | tee "${RUNNER_TEMP}/build-frontend-output.txt"
        working-directory: frontend/

      - name: Verify Cargo.lock is up to date
        run: |
          if ! git diff --quiet -- frontend/Cargo.lock; then
            echo "::error::Cargo.lock changed during build -- commit the updated lockfile"
            exit 1
          fi

      - name: Install security tools
        uses: ./.github/actions/install-security-tools
        with:
          gitleaks: 'true'
          trivy: 'true'

      - name: Scan dist for secrets
        run: |
          gitleaks detect --source frontend/dist --verbose --redact --exit-code 1 --no-git

      - name: Generate checksums
        run: |
          cd frontend/dist
          find . -type f -exec sha256sum {} \; | sort -k2 > "${RUNNER_TEMP}/frontend-checksums.sha256"
          echo "Generated checksums for $(wc -l < "${RUNNER_TEMP}/frontend-checksums.sha256") files"

      - name: Generate SBOM
        if: inputs.is-production
        run: |
          umask 077
          trivy fs --format cyclonedx --output frontend-sbom.cdx.json frontend/

      - name: Check for sensitive files in dist
        run: |
          SENSITIVE_PATTERNS=("*.pem" "*.key" "*.env" "*.secret" "*.p12" "*.pfx" "id_rsa" "id_ed25519")
          FOUND=0
          for pattern in "${SENSITIVE_PATTERNS[@]}"; do
            if find frontend/dist -name "$pattern" -type f 2>/dev/null | grep -q .; then
              echo "::error::Sensitive file pattern '$pattern' found in dist output"
              FOUND=1
            fi
          done
          if [ "$FOUND" -eq 1 ]; then exit 1; fi

      - name: Upload frontend dist artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4.6.2
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7
          if-no-files-found: error

      - name: Upload frontend SBOM
        if: inputs.is-production
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4.6.2
        with:
          name: frontend-sbom
          path: frontend-sbom.cdx.json
          retention-days: 30

      - name: Attest build provenance
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: frontend/dist/

      - name: Record duration
        id: timing
        if: always()
        uses: ./.github/actions/job-timing
        with:
          start-time: ${{ steps.start.outputs.time }}

      - name: Collect errors
        id: collect-errors
        if: always() && failure()
        run: |
          ERROR=""
          if [ "${{ steps.build.outcome }}" = "failure" ]; then
            ERROR="[build] $(head -c 3000 "${RUNNER_TEMP}/build-frontend-output.txt" 2>/dev/null || echo 'Frontend build failed.')"
          fi
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "error_log<<$EOF" >> $GITHUB_OUTPUT
          echo "$ERROR" >> $GITHUB_OUTPUT
          echo "$EOF" >> $GITHUB_OUTPUT

  build-backend:
    name: Build Backend (Cargo)
    runs-on: arc-runner
    permissions:
      contents: read
      id-token: write
      attestations: write
    outputs:
      error_log: ${{ steps.collect-errors.outputs.error_log }}
      duration: ${{ steps.timing.outputs.duration }}
    steps:
      - name: Record start time
        id: start
        run: echo "time=$(date +%s)" >> $GITHUB_OUTPUT

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Rust toolchain and cache
        uses: ./.github/actions/rust-setup

      - name: Build backend release binary
        id: build
        run: |
          cargo build --locked -p realestate-backend --release 2>&1 | tee "${RUNNER_TEMP}/build-backend-output.txt"

      - name: Install security tools
        uses: ./.github/actions/install-security-tools
        with:
          gitleaks: 'true'
          trivy: 'true'

      - name: Scan binary output for secrets
        run: |
          gitleaks detect --source target/release --verbose --redact --exit-code 1 --no-git --config .gitleaks.toml

      - name: Generate checksum
        run: |
          sha256sum target/release/realestate-backend > "${RUNNER_TEMP}/backend-checksum.sha256"
          cat "${RUNNER_TEMP}/backend-checksum.sha256"

      - name: Generate SBOM
        if: inputs.is-production
        run: |
          umask 077
          trivy fs --format cyclonedx --output backend-sbom.cdx.json .

      - name: Scan binary for vulnerabilities
        run: |
          trivy fs --scanners vuln --exit-code 0 --severity CRITICAL,HIGH \
            --no-progress --format table \
            target/release/realestate-backend

      - name: Check for sensitive files in release output
        run: |
          SENSITIVE_PATTERNS=("*.pem" "*.key" "*.env" "*.secret" "*.p12" "*.pfx" "id_rsa" "id_ed25519")
          FOUND=0
          for pattern in "${SENSITIVE_PATTERNS[@]}"; do
            if find target/release -maxdepth 1 -name "$pattern" -type f 2>/dev/null | grep -q .; then
              echo "::error::Sensitive file pattern '$pattern' found in release output"
              FOUND=1
            fi
          done
          if [ "$FOUND" -eq 1 ]; then exit 1; fi

      - name: Upload backend binary artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4.6.2
        with:
          name: backend-binary
          path: target/release/realestate-backend
          retention-days: 7
          if-no-files-found: error

      - name: Upload backend SBOM
        if: inputs.is-production
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4.6.2
        with:
          name: backend-sbom
          path: backend-sbom.cdx.json
          retention-days: 30

      - name: Attest build provenance
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: target/release/realestate-backend

      - name: Record duration
        id: timing
        if: always()
        uses: ./.github/actions/job-timing
        with:
          start-time: ${{ steps.start.outputs.time }}

      - name: Collect errors
        id: collect-errors
        if: always() && failure()
        run: |
          ERROR=""
          if [ "${{ steps.build.outcome }}" = "failure" ]; then
            ERROR="[build] $(head -c 3000 "${RUNNER_TEMP}/build-backend-output.txt" 2>/dev/null || echo 'Backend build failed.')"
          fi
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "error_log<<$EOF" >> $GITHUB_OUTPUT
          echo "$ERROR" >> $GITHUB_OUTPUT
          echo "$EOF" >> $GITHUB_OUTPUT
