# Cargo audit configuration
# https://docs.rs/cargo-audit

[advisories]
# RUSTSEC-2023-0071: rsa timing sidechannel (Marvin Attack)
# Severity: 5.9 (medium). No fixed version available.
# Transitive dep via jsonwebtoken 10.x (rust_crypto feature) and sqlx-mysql.
# We only use PostgreSQL and HMAC-based JWTs — RSA key operations are not exposed.
ignore = [
    "RUSTSEC-2023-0071",
    "RUSTSEC-2026-0097",
    "RUSTSEC-2025-0141",
    "RUSTSEC-2021-0153",
    "RUSTSEC-2020-0144",
    "RUSTSEC-2024-0370",
    "RUSTSEC-2021-0140",
    "RUSTSEC-2020-0020",
    "RUSTSEC-2020-0056",
]
